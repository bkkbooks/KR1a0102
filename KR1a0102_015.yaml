body:
  text: 葉八白易傳卷十五明葉山撰巽小亨利有攸往利見大人何也葉子曰剛毅奮震之才可以橫絶乎四海發強果敢之氣可以操縱乎八荒弱而不能出退而専務入矣其何以定天下之大業而成天下之大務哉施之身而不足以恢宏其德業布之政而不足以光大其國家其惟卑身而從上屈己以下人乎若鄭之依晉若蔡之依楚取其蔭而竊其庇保國安民之道也雖然審所圖而知所附者資強起弱之道也不然則廢于弱知所附而又知所擇者以弱用強之哲也不然反斃于強江黃之主齊雖可以獲一時之美觀而終不免于滅魏孝武之依宇文泰雖可脫一時之虎口而竟至于亡故東萊有言曰為國者當使人依己不當使己依人己不能自立而因人以為重未有不窮者也所依者不能常盛有時而衰不能常存有時而亡一旦驟失所依將何恃乎雖然此特依之不可常耳抑有甚者焉使所依者常存常盛可矣然猶未足恃也晉主夏盟宋謹事之及厄于楚師析骸易子晉迫于狄而弗能救也齊桓仗義江黃睦焉及楚人圍之旋以亡滅齊忽簡書而莫之恤也齊晉猶不可依况其他乎雖然此特論人之不足依耳抑尤有甚者焉魏孝武脅于髙歡所恃者宇文泰耳一旦脫身虎口杖䇿入關舍所畏而得所依天下之樂孰有過于是乎然孝武之禍不在于所畏之髙歡而在于所依之宇文泰以是論之非惟人之不可依而禍實生于所依也外物之變不可勝窮恃外以為安者其失豈一端邪使鄭忽不辭齊婚則彭生之禍不在魯而在鄭矣豈有禍魯而福鄭者哉然則信非德髙位髙道勝勢勝若周文為阮人之所依漢文為南越之所仗以強大之英勝為弱小之歸附者果未足為福而禍或存乎其間矣可不慎乎易曰巽小亨利有攸往利見大人初六進退利武人之貞何也葉子曰畏首尾者無幾餘之身無特操者多坐起之節昔嘗為之詩曰莫言男子性烈火焚枯柴莫言男子情一刀兩分開蓋謂天下事斷之在已而已矣若日出而言之日中不決是為因人成事之人而語不可了者不免為姦人之所棄君子尚可以無斷乎無斷則作止皆疑而漠然兩可上之不可以立功下之不可以建德矣此豈持身之道也知其非持身之道而藥之以對病之劑其惟奮武夫之勇而義以為上達必為之義而禮以行之已乎則起懦為強而天下之疑以斷破暗為明而天下之業可定士道其庶幾矣孫權既欲迎操又欲敵操不有砍几之斷天下或幾乎危矣袁紹既欲伐劉又欲援劉終無一定之適所以不免倉亭官渡之敗也與毛遂之言曰縱之利害兩言而決然則執狐疑之心而持不斷之意者果不足以成天下之事也何貴于卑且遜哉易曰進退利武人之貞九二巽在牀下用史巫紛若吉無咎何也葉子曰恭近于禮以逺恥辱者君子守身之常法撝謙而不為違則者人臣處事而應機士大夫豈不欲守天下之定禮持一身之中正哉時之所遭勢之所壓不得不若是焉耳是故鞠躬未足也而俯僂俯僂未足也而扶伏扶伏未足也而下牀下牀未足也而宣之于聲音笑貌之繁備之以陳辭請告之劇則亦極矣以其迹觀之誠若鄙夫之容説蘇秦張儀之妾婦孔光張禹胡廣趙戒之望風承旨望塵下拜遺笑千古得罪名教者然有為焉非邪心也有故焉非諂態也居非其地則委曲所以逺災勢可不伸則卑屈所以安分是亦定禮之不可廢而中正之所由行也已不然君子以其一身養浩然之氣而使之塞天地之間者乃為是足恭以至斯極可謂有人心乎正考甫之益恭于三命之後德言盛也周公之恐懼于流言之日禮言恭也藺相如之引車避匿不敢以私鬭也李訴之拜于路左蓋欲示之分也觀其心者可以知用中之權矣易曰巽在牀下用史巫紛若吉無咎九三頻巽吝何也葉子曰恭儉不可以聲音笑貌為也以聲音笑貌為恭儉則有時而作亦有時而輟此王濬勉為折辱而終之不能無褊心也其惟相如之于亷頗周瑜之于程普乎雖然哲宗相司馬光詔詳定役法蘇軾言于光曰差役免役各有利害光曰于君何如軾曰法相因則事易成有漸則民不驚光不然之軾又陳于政事堂光忿然軾曰昔韓魏公刺陜西義勇公為諌官爭之甚力韓公不樂公亦不顧昔軾聞公道其詳豈今日作相不許軾盡言邪光謝之時光將盡改熙豐之法范純仁曰差役當熟講而緩行不然滋為民病光持之益切純仁曰是使人不得盡言爾若欲媚公以求容恱何如少年合安石以速富貴哉光深謝之嗚呼以君實之賢而猶不免于今日謝軾明日謝純仁而况其他乎此君子所以克己之為貴也易曰頻巽吝六四悔亡田獲三品何也葉子曰天下之事已不可以弱才單力為之矣而又况遇人之剛暴乎詩曰條其嘯矣遇人之不淑矣此君子所以多慨歎而啜泣也雖然君子之處世也不患吾力之寡弱而惟患持己之不恭不患彼勢之強暴而惟患接人之無禮夫苟敬而無失與人恭而有禮則四海之內皆兄弟矣何往而不善乎以內則得親以外則信友以上則得君以下則得民古之人有行之者其丙吉之寬厚不伐張安世之謹慎周密乎成有聲之業全名位之盛不曰徼幸而已也然則鄭以慎禮處強暴之間則存蔡以宣淫密夷狄之側則滅不亦宜乎易曰悔亡田獲三品九五貞吉悔亡無不利無初有終先庚三日後庚三日吉何也葉子曰傳曰通其變使民不倦神而化之使民宜之管子曰聖人者明于治亂之道習于人事之終始者也其治人民也期于利民而止故其為治也不慕古不留今與時變與俗化是知聖人以德臨民固未嘗不守天下之常而以時出治亦未始不通天下之變惟易窮而變變而不失其常乃所以為正也正則變而通通而久是以自天祐之吉無不利矣太初太始不可以久安敦艮厚終乃所為長治其斯以為聖人之道與雖然民不可慮始而可與樂成常人安于故俗而學者溺于所聞是以始之甚難而終之則易耳聖人知始之難而終則易也是故有神化之道焉丁寧于其變之前必也革而當俾天下曉然知利害之原揆度于其變之後必也宜于民俾天下安然習便利之益則始之雖或尤而或怨終之且不識而不知矣楊誠齋曰盤庚之遷都先之以上篇之書後之以中篇下篇之書成王之化商民先之以召詔洛詔後之以多士多方是也卒之民安而俗定聖人之用權蓋如此秦政王莽不足言矣宋神宗不審丁寧揆度之義卒為國家喪亂之本可不慎乎易曰貞吉悔亡無不利無初有終先庚三日後庚三日吉上九巽在牀下喪其資斧貞凶何也葉子曰孔子曰鄙夫之事君茍患失之無所不至矣宋人書五代郭崇韜傳後曰古之大臣富貴已極滿前無所顧則退為身慮夫患失之心生則脅肩之態作顧慮之心盛則吮舐之醜章此之謂不復知人間有羞恥事此之謂不能以禮義廉恥節嗜欲矣何以持其身而植其節乎然而為此者以為足以保所有也殊不知恭愈過而計愈踈卑愈甚而謀愈拙徒喪其守而不免于傾其身以敗其家矣豈所謂致恭以存其位也哉李斯聽趙髙廢立之邪謀阿二世狂悖之瞑行而卒之殺斯者髙與二世也崇韜勸立劉后以自固而卒之殺韜者劉氏也嗚呼豈非萬世人臣之監乎何也禮雖自卑而尊人而妄恱人者亦所以自辱昔晉趙武卒鄭伯鋭然如晉弔及雍乃復晉少薑死魯昭鋭然如晉弔及河晉侯使人辭曰非伉儷也請君無辱卒之鄭細日甚而昭公客死不可以知諂媚譎恧之不足以自全乎夫以諂媚人者求免而未可必則以禮自處者履虎而不嘻人斷可知矣是故衛青尊寵于羣臣無二公卿以下皆卑奉之獨汲黯與抗禮人或説黯曰大將軍尊重不可以不拜黯曰以大將軍有揖客反不重耶大將軍聞之愈賢黯數請問朝廷國家大疑遇黯加于平日魏進司馬昭為晉王太尉王祥司徒何曾司空荀顗共詣之顗謂祥曰相王尊重何侯與朝廷皆已盡敬今日便當相率而拜無疑也祥曰王公相去一階而已安有天子三公可輒拜人者及入顗拜而祥獨長揖昭曰今日然後知君見顧之重也然則禮是而人乃是正所以全人禮是而人則非非所以行禮是故均一計也知者謀之則為哲愚者謀之則為畏均一禮也君子行之則為恭小人行之則為恧均一儉也君子行之則為節小人行之則為詐何則時義之不同存心之各異也故子囊囊瓦之城郢孰不衛社稷也而一則君子以為忠一則沈尹戌以為卑陳萬年之教其子婁師德之教其弟孰不與人恭也而一則後世以為諂一則君子以為厚公孫𢎞宣秉之布被孰不為志約也而一則汲黯以為詐一則光武以為節豈非施之于其所當施則是而不當為而為之則不勝其陋邪易曰巽在牀下喪其資斧貞凶兊亨利貞何也葉子曰書曰罔咈百姓以從已之欲夫不咈百姓以從欲則所欲與聚所惡勿施民之歸仁猶水之就下獸之走壙也其為歡欣交通何如哉然而又曰罔違道以千百姓之譽則生殺豫奪一以至仁而無私刑賞威惠本諸天理而無間矣斯其為聖人法天之治乎故曰秋霜肅殺而木不怨落春風長養而草不謝榮涵之以德義不知其為惠鰌之以法律不知其為刑所謂王者之民皞皞如也三王五帝之治蓋如此沛公初入關悉召諸縣父老謂曰父老苦秦苛法久矣誹謗者族偶語者棄市吾當王關中與父老約法三章耳餘悉除去秦法凡吾所以來為父老除害非有所侵暴無恐于是民惟恐沛公不為秦王更始拜劉秀行大司馬事持節北渡河鎮慰州郡秀至河北所過郡縣考察官吏黜陟能否平遣囚徒除王莽苛政復漢官名吏民喜恱爭持牛酒迎勞唐祖克長安約法十二條悉除隋苛禁太宗擊破河西執髙德儒數其為佞人而斬之自餘不戮一人秋毫無犯各慰撫復業逺近聞之大恱庶幾得恱民之道物莫不恱而與之矣自餘暴君汚吏不知所以恱民而好人所惡惡人所好拂人之性而災不免於逮其身矣甚者恱之不以道若宋鮑禮于國人季氏世修其勤田氏家量貸而公量入則非惟恱道之蠧抑亦國之賊而民之餌矣可不慎乎吾有善于馮道之取劉審交焉漢汝州防禦劉審交卒吏民詣闕上書以審交有仁政乞留葬汝州得奉祀其丘壠許之州人為立祠歲時享焉馮道曰吾嘗為劉君僚佐觀其為政無以踰人非能減其租稅除其徭役也但惟公廉慈愛之心以行之耳此衆人之所能為但衆人不為而劉君獨為之故汝人愛之如此使天下二千石皆效其所為何患得民不如劉君哉易曰兊亨利貞初九和兊吉何也葉子曰天下之味五錯而味不可勝用也天下之色五錯而色不可勝用也天下之音五錯而音不可勝用也錯之者和之也是故常以經變也變以緯常也常變經緯而天下之事庶有瘳乎是故喜起于上朝無間言矣不有同牀之慮乎和衷于下野無偶語矣不有同塵之陋乎是故上下之相恱君子當知所審矣負特立不倚之操于大同無我之日持由衷獨斷之見于都俞吁咈之朝若舉朝皆贊拜而伯益進警戒之謨舉世尚節義而申屠蟠為見幾之哲斯不以恱為恱而以道濟其恱恱之至同之異也非剛方正大之君子其孰能與于此孔子曰君子和而不同晏子曰和如和羮同如濟水可以知君子之恱矣易曰和兊吉九二孚兊吉悔亡何也葉子曰貞介絶俗者多睽孤之行嫵媚柔和者乏誠信之資是故恱固與人之至德而誠又持恱之要道也誠齋曰刁協以佞説近伯仁則不克仲智之責蕭誠以軟美恱九齡則終為李泌之所譙君子之恱人也其可以不誠乎愈色婉容以恱其親忠信誠慤以恱其友精誠懇惻以恱其君易直子諒以恱其民斯無愧于恱矣三代而下惟程明道其可以語于此乎易曰孚兊吉悔亡六三來兊凶何也葉子曰君子易事而難恱也恱之不以道不恱也小人難事而易恱不以道恱之脅肩諂笑以為媚未同而言以求容而孰知君子之不恱也烏能得其歡心哉齊王厚送其女而屠牛吐有弗受鄭詹自齊逃來而君子曰佞人來矣佞人來矣王欽若為寇凖拂鬚而凖曰安有樞使為人拂鬚者二張位在宋璟上易之素憚璟欲恱其意虛位揖之而璟不為禮故曰脅肩諂笑病于夏畦又曰未同而言觀其色赧赧然非由之所知也噫小人以為容恱可以要君子其如君子之不可要何易曰來兊凶九四商兊未寧介疾有喜何也葉子曰大臣之事君以求恱也恱有二容恱不足言矣以安社稷為恱者恱在外者也以正君心為恱者恱在內者也二者有本末先後之分為可無商榷謹擇之慮乎有商榷謹擇之慮則自無安居寧處之心矣然則若之何而可隔絶衆疾不使居膏之下肓之上以正君之心一正君而國定乎恱之大喜之至也夫何以生疾傳曰君子有四時朝以聽政晝以訪問夕以修令夜以安身勿使有所壅閉湫底以露其體兹心不爽而昏亂百度今無乃一之則生疾矣何謂疾傳曰人主之疾十有二痿蹶逆脹滿支膈盲煩喘痺風奈何而治之傳曰省事輕刑則痿不作無使小人飢寒則蹶不作無令貨財上流則逆不作無令倉庫積腐則脹不作無使府庫充實則滿不作無使羣臣怨咨則支不作無使下情不上通則膈不作上材恤下則盲不作法令奉行則煩不作無使下怨則喘不作無使賢伏匿則痺不作無使百姓歌吟誹謗則風不作夫重臣羣下者人主之心腹支體也心腹支體無疾則人主安而國定社稷無傾覆之患矣恱之大喜之至也先達有言人之養生者餧肥甘被輕暖是庖饔縫染之人之所供者也至其疾病瘡瘍之作則必賴于醫焉醫之于人也飲之以苦口之藥而然之以炙膚之艾投之以刺體之針而薄之以傷􅡌之刃誠不如肥甘之嗛其口輕暖之便其體也然非是則無以治其疾而全其生古之為天下者設司農之官典教之職外有守令而內有公卿所以輔君而教養其民者是庖縫之類也然輔之或愆其道養之或謬其理則必有繩其愆糾其謬而後歸于治焉此法家拂士之所以不可無也古之人或郤姬坐或引帝裾或頭觸乘輪或額叩龍墀或入閣而爭或叩鐶而呼或上十八疏或進十九章或言紀綱五事或陳利害十六事而天子為之改容羣僚為之側目猶醫之用藥艾針刃者也是豈不知將順之為美和同之為安哉不如是則疾不去疾不去則王心不寧為有大患存焉耳若醫不用藥而姑佐庖縫之人以供衣食豈所謂醫哉故曰膏肓純白二豎不生是謂心寧房闥清淨嬖孽不生是謂政平夫膏肓近心而處厄針之不達藥之不中攻之不可二豎藏焉是為篤患故治身治國者惟是之畏非伊尹之于太甲周公之于成王曷足以語此易曰商兊未寧介疾有喜九五孚于剝有厲何也葉子曰寵姦者切身之災也信佞者刺心之疾也趙孝王時客有見王者曰世有所謂桑雍者王知之乎王曰未之聞也曰所謂桑雍者便嬖左右之人及優愛孺子也此皆能乘王之醉昏而求所欲于王者也是能得之于內則大臣為枉法于外矣故日月暉于外其賊在于內謹備其所憎而禍在于所愛真德秀曰常人之情于所憎惡則謹為之防于所愛則忽焉而莫之備不知禍亂之萌往往自所忽始齊桓能服徑楚卒之亂齊者三豎而非楚也秦始皇能却強胡卒之滅秦者中府令髙而非胡也蟾蜍食月古有是言而月之食初不由此言者特借此以覺悟王心使知近習托身于王而能禍王若蟾蜍托身于月而能食月也程晏設齊寇之對亦曰君不聞鼷鼠之牙乎食人與百類雖齧盡而不痛俗謂之甘口鼠也魯國之牛聞食其角矣請以是風焉牛之寢齕有蚊蚋撓其膚毛必知鼓耳搖尾以麾之及鼷鼠食之而不知其痛也鼷鼠一牙豈不甚于蚊蚋千噆乎以其口甘雖貫心徹骨而不知也况其角乎是故世有毒石者食之則枯竭其氣血傅之則潰腐其體膚世有小人焉內之蠧壞乎心術外之虧喪乎德業無所往而不為鑠且銷者也是以君子惟逺之不暇焉詩曰取彼譖人投畀豺虎豺虎不食投畀有北有北不受投畀有昊奈之何其信之乎國亡無日矣桀信于妹喜斯觀而不知關龍逢以惑其心而亂其行紂信于妲己飛亷而不知微子啓以惑其心而亂其行故羣臣去忠而事私百姓怨誹而不用賢良退處而隱逃此所以喪九牧之地而虛宗廟之國者也楚大國也使無極以讒勝囊瓦以貨行則吳得敵之于長岸敗之于雞父至于柏舉之戰國破君奔幾于亡滅子南見殺于其君郤伯見逐于其母皆是物也秦二世欲悉耳目之所好窮心志之所樂趙髙曰陛下嚴法而刻刑盡除先帝之故臣更置陛下親信則髙枕肆志矣不越嵗而告亡古人拜相而人人喜恱明主則曰人情賢于夢卜晉齊王司馬攸德望日隆而荀朂馮紞楊珧皆惡之紞言于武帝曰陛下詔諸侯之國宜從親者始齊王獨留京師可乎朂曰百僚皆歸心齊王陛下試詔之國必舉朝以為不可則臣言驗矣帝以為然乃以攸為大司馬都督青州諸軍事于是王渾司馬駿李熹羊琇王濟甄德果切諫攸卒不留噫其與以人心為向背者異矣利口之覆邦家如此後唐莊宗以宦官之譛罷李建及而失忠壯之助以俳優之説用李存儒而失要害之地以役使之愛使朱守殷而陷南城喪芻糧數百萬幾如是而地不蹙國不亡然不旋踵而滅梁者適當梁祚告終之期朱溫惡積之候也若梁主友貞溫恭儉約無荒淫之失但寵信趙張使擅威福疏棄敬李舊臣不用其言以至于亡此則理之一定無能逃者可不慎乎易曰孚于剝有厲上六引兊何也葉子曰小人之引其類者昌其黨也歡兜之薦共工楊畏之舉蔡京是也其引君子也餌之而欲食其肉也蔡京之于司馬光韓托胄之于趙汝愚是也始之以為掌中珠而終也視為几上肉則亦不憚下之卑而求之切耳然惟君子之于小人也逺之若蛇蝎而處之以寬恕夫安得而入之哉彌子瑕因子路以求主而孔子曰有命王歡因公行子以納言而孟子欲行禮悲哉二子計徒狡而心徒切也易曰引兊渙亨王假有廟利涉大川利貞何也葉子曰散而必合者天之時也合散以道者人之事也天時乘矣而人謀不臧雖欲聚而不合雖或合而終散矣是故亂從天始非吾我之力所能扶禍本人成非都邑之政所能揆必也知先施告報明神以為誓必也識重務卓立根本以為基乎管子曰順天之經在明鬼神祇山川不明鬼神則陋民不悟不祗山川則威令不聞陸贄曰無紓目前之虞或興意外之患人者邦之本財者人之心也其心傷則其本傷其本傷則支幹顛瘁矣又曰王者畜威以昭德偏廢則危居重以馭輕倒持則悖又曰鋒鏑交于原野而決䇿于九重之中機命變于斯須而定計于千里之外用舍相礙臧否皆凶上有掣肘之譏下無死綏之志嗚呼其知所以合散之道矣髙祖太宗有分羮脅父之忿則又何知祖考之當尊陳勝項籍惟暗質小知之逞則又何知當務之為急其惟武王乎王朝步自周于征伐商底商之罪告于皇天后土所過名山大川既而祀于周廟候甸邦衛駿奔走執籩豆其所以啓天下之精神者機莫先焉反商政政由舊釋囚封墓散財發粟歸馬放牛列爵分土建官位事其所以立天下之大本者務莫要焉其次宋主受大命而首建四親廟贈韓通死節遣使賑貸于諸州庶幾知所以合散矣易曰渙亨王假有廟利涉大川利貞初六用拯馬壯吉何也葉子曰身所以濟難馬所以濟身逢難不救坐待其斃矣救難而弱焉載胥不及溺乎襄陽之會先主無的盧則為檀溪之溺鬼張繡之難曹瞞無絶影則飫淯河之鱉靈馬可以不壯乎是故不患時之難而患不能救不患不能救而患無其人不患無其人而患無其哲不患無其哲而患無其順知人而敬奉之目于眢井而出之矣難何有不濟乎信從何平從無知諸將從鄧禹秦府之士從玄齡濟亂之功何如哉若司馬師殺李豐豐弟翼為兖州刺史遣使收之翼妻荀氏曰可及詔書未至赴吳何為坐取死亡問左右可同赴水火者為誰翼思未答妻曰君在大州不知可與同死生者雖去亦不免乃止然則殺身非不幸矣易曰用拯馬壯吉九二渙奔其機悔亡何也葉子曰濟難以人和為基本避難以地利為據依太王避狄人而無岐周襄子避知伯而無晉陽不幾于殆乎劉玄德之奔小沛新野也弱而不足振其奔荆州也暗而不足依奔許昌也險而不可恃奔夀春也陋而不足憑孔明以為必跨荆益據漢中然後足以成鼎足英雄之見固如此易曰渙奔其機悔亡六三渙其躬無悔何也葉子曰見天下之義者不有其身者也茍有吾身則吾身之外無利凡天下之利皆身矣而何有于父子何有于兄弟乎而况于天下之人乎昔者晉文妻趙衰生原同屏括樓嬰衰先娶于狄曰叔隗生盾衰反國趙姬請逆盾與其母子餘辭姬曰得寵而忘舊何以使人必逆之固請許之來以盾為才固請子公以為嫡子而使其三子下之以叔隗為內子而已下之其後趙盾請以括為公族曰君姬氏之愛子也微君姬氏則臣狄人也公許之趙盾為旄車之族使屏季以其故族為公族大夫夫君姬氏以盾為賢固請于公以為嫡子是愛子以才而已子不得與不有其子者也母之賢也趙宣子以括為君姬氏之愛子使為公族大夫而已為旄車之族是報母以德而已子不敢専不有其身者也子之孝也母賢子孝不亦去利而見義者乎杜太后欲以均孝望諸子而匡義則悖矣欲以均愛望諸兄而光美則死矣吾身之可愛而夫人之身不足死也悲夫然則公而忘其私若范文正不顧在吾之能否國而忘其家若富鄭公不問男女之生死君而忘其身若諸葛武侯不惜終身之流汗寧非見天下之義自吾身始皆當不顧而為之而况吾身之外者乎故曰吾志在行道以富貴為心則為富貴所纍以妻子為念則為妻子所奪道不得行矣易曰渙其躬無悔六四渙其羣元吉渙有丘匪夷所思何也葉子曰精白一心以事上者人臣之職分也吹噓萬象以同天者大臣旋轉之規模也昔者春秋于祭伯來朝而不言朝祭叔來聘而不言使尹氏王子虎劉卷來赴而不書其爵秩皆所以正人臣之義絶私交之弊息黨錮之禍而昭一統之權者也人臣之事君而可不散天下之黨乎故曰田氏六卿不服則齊晉無不亡之道三桓不臣則魯無可治之理是故去河北賊以那民之居去中朝朋黨以寧王之心臣道之大光君子之急務也然而散一己之黨易使天下散其黨難散天下之黨易使天下之黨聚而歸于君難吕大防秦人戇直無黨范祖禹師事司馬光不立黨可矣而洛蜀之黨固在也韓愈前不汚伾文後不汚牛李可矣而伾文牛李之黨固在也李絳裴度歐陽修力排天下之黨矣而未必天下之黨皆傾心以事上也散君子之朋于朝使秉忠以事一人散小人之黨于野俾精白以承休德其惟伊尹周公乎俾萬姓咸曰大哉王言又曰一哉王心豫有臣三千惟一心又曰一德一心以定厥功非旋乾轉坤之力經天緯地之功曷足以語此孔子亦然蘇子曰孔子以羈旅之臣而能舉治世之禮以律亡國之臣墮名都出藏甲而三桓不疑其害也此必有不言而信不怒而威者矣彼晏平仲者亦切知之曰田氏之僣惟禮可以已之嬰能知之而不能為之嬰非不賢也其浩然之氣以直養而無害塞乎天地之間者不及孔孟也嗚呼是豈可以易言哉易曰渙其羣元吉渙有丘匪夷所思九五渙汗其大號渙王居無咎何也葉子曰濟天下之難有二道不動其機不可以一天下之志不懷其生不可以收天下之心唐之代德播遷流離困己甚矣一用栁伉陸贄之言貶損自責以感發天下君臣之機由是天下之民頓忘前怨痛心疾首爭先赴敵不踰月而歸二君于故都祀唐配天不失舊物矣唐至代德猥庸削弱不支久矣一用崔祐甫楊炎之言以淄青獻錢賜將士以自今財賦歸左藏使將士人人感上恩以懷一路斯民之生由是諸道聞之知朝廷不重貨財李正已乃大慚服天下以為太平之治庶幾可望矣嗚呼孰謂濟難而無其道乎雖然動其機矣而不恃之以王者之信若趙光竒之對唐德宗曰前云兩稅之外悉無他徭而誅求者殆過于稅又云和糴而實強取之曽不識一錢天下無所據矣故管子曰號令已出又易之禮義已行又止之度量已制又遷之刑罰已措又移之如是則慶賞雖重民不勸也殺戮雖繁民不畏也故曰上無國植則下有疑心國無常經民力必竭其機何以動乎懷生矣而不本之以王者之公若惠王之告孟子曰河內凶則移其民于河東移其粟于河內河東凶亦然斯民無所有矣故傅子曰有及人之小惠而無濟世之宏功略民間之虛利而無府庫之開發靳有司之出納而窺逺近之趨從則天下之所嗤而已矣其生何以懷乎必也如漢髙入關而約法三章悉除去秦法唐髙祖克長安而約法十二條悉除隋苛禁民如安堵而世守之為一代恆久之法必也如武王之克商而散鹿臺之財發巨橋之粟宋祖之開國而發倉賑給親解御用之物以賜人而大為有孚惠心之惠斯其為濟難之道乎不可以不審也易曰渙汗其大號渙王居無咎上九渙其血去逖出無咎何也葉子曰天下之所以四分五裂而不定者殺傷之未去也爾戈爾干之稱比未已四伐五伐六伐七伐之事猶存四海若之何其平哉民生之所以分崩離析而不合者王心之未寧也曰豫畏上帝不敢不正曰肅將天威夙夜祇懼民患若之何其安哉至于攸徂之民室家相慶投干講藝歸馬放牛殺傷去而天下定矣王心載寧武成垂拱憂懼出而民生安矣其仲虺伊尹革夏輔湯之後周公太公相武為周之時乎蕭曹佐髙祖取天下投戈講藝與民休息順流與之更化房杜佐太宗定天下除隋之亂比迹湯武致治之美庶幾成康有太平之風趙普佐宋祖治天下收藩鎮之權建國家久安長治之計抑亦可以為次矣雖然若段文昌蕭俯銷兵以為平忘備以為寧則亂而已矣易曰渙其血去逖出無咎節亨苦節不可貞何也葉子曰天下百物猶之水焉不為之限而止必至奔潰四出而不可救是故制度品節之説興焉限民財所以防濫限民欲所以防淫限民行所以防縱限民心所以防侈不濫不淫不縱不侈然後亂不作而天下安民斯定矣故曰致治之術先屏四患一曰偽二曰私三曰放四曰奢偽亂俗私壞法放越軌奢敗制四者不除則政末由行矣俗亂則道荒雖天地不得保其性矣法壞則世傾雖人主不得守其度矣越軌則禮亡雖聖人不得全其道矣制敗則欲肆雖四表不能充其求矣是謂四患四患屏而理道適矣雖然過則澀澀則窮天下之弊極之于其窮故曰管仲鏤簋朱紘山節藻梲君子以為濫矣晏平仲祀其先人豚肩不掩豆浣衣濯冠以朝君子以為隘矣故曰縱民之情謂之亂絶公之情謂之荒然則如之何而可限以防其奢中以示其則齊以禮一以制上下有分名器有等髙之不得亢而奢卑之不得固而陋斯其至善矣故曰興農桑以養其生審好惡以正其俗宣文教以彰其化立武備以秉其威明賞罰以統其法是謂五政二帝三王之因革損益所可考而知也求其實其禹之無間然乎易曰節亨苦節不可貞初九不出户庭無咎何也葉子曰豹非不欲變也而為南山之隱龍非不欲見也而為北海之潛豈豹與龍之志哉時焉已也故君子之居世深藏以不出以門外為等間靜伏而不動若酣寢而不顧非楊氏之為我不以利天下為也謹守其身俟時焉耳矣不然顔氏之陋巷曽子之藜藿原思之環堵天下之蠧物也豈聖人之徒與故曰潛龍以不見成德管寧所以針邴原也全身以待時杜襲所以戒繁欽也君子朂諸易曰不出户庭無咎九二不出門庭凶何也葉子曰禹稷當平世三過其門而不入豈一體之偏枯摩頂放踵以利天下為哉時至而不行是為天下之蠧物道成而不用是為迷懷之忍人聖賢弗為也是故徇器使之方則漆雕開可以仕急拯救之義則諸葛不當隱茍不知此舍堯舜而巢許矣知長幼而昧君臣矣而可乎易曰不出門庭凶六三不節若則嗟若無咎何也葉子曰身欲節節以勤傳曰民生在勤勤則不匱文王猶勤而况其他乎家欲節節以儉語曰與其奢也寧儉大禹猶儉而况其下乎不勤不儉反節為侈則人惡其盈鬼瞰其室國人賤之室人遍謫將能泰然而已乎詩云心之憂矣自貽伊戚又云啜其泣矣何嗟及矣此趙嬰欒黶伯有公孫戌之徒至于見殺見逐而不容于天地之間追誦白首而不悔也故荀子曰今人之生也方多畜雞狗豬彘又畜牛羊然而食不敢有酒肉餘刀布有囷窖然而衣不敢有絲帛約者有筐篋之藏然而行不敢有輿馬是何也非不欲也幾不長慮顧後而恐無以繼之故也于是又節用御欲收斂畜藏以繼之是于已長慮顧後幾不甚美矣哉若夫偷生淺知之屬曽此而不知也糧食太侈不顧其後俄則屈安窮矣是其所以不免于凍餓為溝中瘠者也况夫先王之道仁義之統詩書禮樂之分乎彼固天下之大慮也將為天下生民之屬長慮顧後而保萬世也其流長矣其溫厚矣其功盛遙逺矣非熟修為之君子莫之能知也是故管氏之政罷民無伍罷女無家士三黜妻逐于境外女三出嫁入于舂穀是故民皆勉為善士與其為善于鄉不如為善于里與其為善于里不如為善于家是故士莫敢言一朝之便皆有終身之計莫敢以終嵗為議皆有終身之功嗚呼若是而何不節之有不然若何曽日食萬錢子劭且食二萬孫綏及弟機羡侈汰尤甚卒以驕奢亡族可不戒哉雖然王戎身位三公而自執牙籌常若不足其妻日令人負糞過庭戎弟諫而嫂欲笞之則又非人道矣易曰不節若則嗟若無咎六四安節亨何也葉子曰君有玄默恭儉之心而臣接之以收斂撙節之道上有納民軌物之令而下順之以先意敬恭之誠臣工不享其福而天下不蒙其賜者幾希矣文王克勤克儉而周公承以几几之忠文帝恭默節儉而周勃承以寧一之政代宗敦本貯實而楊綰濟以清德之輔民生之不厚民財之不阜者未之有也不然上有美德而不能將順以成之其何貴于為臣哉昔謝安欲增修宫室王彪之曰中興之初即東府為宫誠為儉陋蘇峻之亂成帝止蘭臺都坐不蔽風雨是以更營新宫比之漢魏則為儉比之過江則為侈矣今敵冦方強豈可大興功役勞擾百姓為邪安曰宫室敝陋後世謂人無能彪之曰凡任天下之重者當保定國家緝熙政事乃以修宫室為能耶安不能奪故終彪之之世無營造夫大臣當國不能上承儉德乃欲以土木為功能謝安之賢而云此過矣雖然公孫布被之詐揚雄瓦器之偽則不免惡賔之譏天下後世之議亦豈所謂安安者耶君子審之易曰安節亨六五甘節吉往有尚何也葉子曰荀子有言成侯嗣公聚斂計數之君也未及取民也子産取民者也未及為政也管仲為政者也未及修理也孔子曰禹吾無間然矣菲飲食而致孝乎鬼神惡衣服而致美乎黻冕卑宫室而盡力乎溝洫禹吾無間然矣其所以為修禮者乎禮則中中則正曷過不及之有焉故曰君子之道本諸身徴諸庶民考諸三王而不謬建諸天地而不悖質諸鬼神而無疑百世以俟聖人而不惑是故君子動而世為天下道行而世為天下法言而世為天下則逺之則有望近之則不厭嗚呼其斯以為大中至正之矩三極之道而天下萬世之所共由者乎非堯舜三代之建中而建極不足以語此易曰甘節吉往有尚上六苦節貞凶悔亡何也葉子曰遊方之內者其道貞而不窮遊方之外者其行堅而難入貞者遲緩而甘和堅者疾迫而苦急巢父聞許由之言而洗其耳於陵仲子辭三公而為人灌園成公趙不得生刺宋成公而立稿于彭山之上管寧坐榻著膝處皆穿范粲三十年未嘗開口世之所不可凖亦世之所不能堪而亦世之所黜而姍笑者也然人則苦而已甘之彼方難而吾易之不怨不懟不渝不困不可為法于天下亦足繩墨其一身又何不得其心之有哉易曰苦節貞凶悔亡葉八白易傳卷十五
