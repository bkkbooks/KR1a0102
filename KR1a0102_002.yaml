front:
  text: 欽定四庫全書葉八曰易𫝊卷二明葉山撰需有孚光亨貞吉利涉大川何也葉子曰天下有必至
  hash: sha256:d923e5a9b931959b61317626d424725117393bd97b427541327bec91d08b716a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1a0102_WYG_002-1a, image: WYG0032/WYG0032-0605a.png}
body:
  text: 之時不可以不俟而廹其至天下有必成之事不可以不待而速其成所當俟而待也誠於中而慎其外則心寛而事濟矣是故之其達焉伊尹之囂囂起莘而伐夏救民太公之九十離渭而鷹揚萬里其始也未始不樂天而知命安土而敦仁而終之則道濟天下曲成萬物矣之其窮焉孔子之志學從心而不知年數之不足孟子之美大聖神而慎之乎揠苗而助長則其始未始不優㳺而厭飫而終之則徳為聖人學成亞聖矣之其上焉漸之以仁摩之以義浹之于肌膚淪之于骨髓然後天下文明而黎民於變者聖人之乆道而化成也之其下焉沐于聖人之道徳而不知囿于聖人之禮樂而不覺遷善敏徳而莫測其成天下之亹亹者百姓之日用而不知也天下事其可以造次急遽為之乎霸者不知此道見卵而求時夜見彈而求鴞炙廹促起而治道荒矣學者不知此道未立而欲行不勝而决往壯于趾而履錯然矣雖然齊桓入國破制養兵訓義導利數年而始試之辛勤圖霸猶積三年而後有召陵之役其㑹諸侯之事亦三十餘年屢盟屢㑹而後有葵丘之盛晉文公始入而教其民二年欲用之子犯曰民未知義未安其居於是乎出定襄王入務利民民懐生矣將用之子犯曰民未知信未宣其用於是乎伐原以示之信民易資者不求豐焉明徴其辭公曰可矣子犯曰民未知禮未生其共于是乎大蒐以示之禮作執秩以正其官民聽不惑而後用之特其侵曹伐衛勝楚圍許盟踐土㑹于温兩致天王執曹衛之君而復之凡霸者之事為之略盡皆在一年之内則齊桓猶有持重之心而晉文則太廹矣劉向韓愈博極羣書經綸有藴以身當天下之事君子猶譏其不知敬之以辟咎而况新進少年若安石者豈不用罔之甚乎揚雄王通道有自得學㡬聖賢慨然以斯文自任君子猶訾其入域之未優而况無知妄作若許衡者豈不枉已之甚乎此誠不足以知俟時之義大矣哉而又安知俟時之道以淑其身也易曰需有孚光亨貞吉利涉大川初九需于郊利用恒无咎何也葉子曰君子不幸而受君國之寄身坐水火之中則亦末如之何矣幸而猶居自適之鄉得以逺去之地將何為哉沒身而已矣故伯夷避紂居北海之濵以待天下之清也若將終身焉太公避紂居東海之濵以待天下之清也若將終身焉潔其迹而道不汙安其身而名不穢康其色而禍不罹夫固履道之坦坦幽人之貞吉者歟故可以沒齒不可以朶頥茍不固其守人將議其後不招而来我將罹其災若殷浩之不果隠种放之弗克終㡬何而不為犯難之行乎是故無災致災無難犯難若燕之僻處北陬無故而交上國越之逺在海隅妄意而事吴楚秦穆公聽把子之言勞師而逺伐鄭夫差違子胥之計勤師而北伐齊取禍之道也天下事類如此可不戒哉易曰需于郊利用恒无咎九二需于沙小有言終吉何也葉子曰肉食無潔身之義不當潔其身則必勞吾之身人臣有受責之分不能盡其責則不免人之責士大夫豈得為山林之逸乎記曰四郊多壘卿大夫之恥也地廣大而不治士之辱也然則身受君國之寄而躬遭水火之災不為身心之焦勞則致彼此之翕訿矣傷能免乎雖然操不急之志以為有漸之圖展剛毅之才以伸排解之力天下之事其亦庶乎有瘳者祖逖之屯淮隂陶侃之在廣州無為優㳺而事不如志方將撃楫渡江而致力中原卒之剪除荆棘收復河南平定四州為晉藩蔽以美終也易曰需于沙小有言終吉九三需于泥致寇至何也葉子曰世亂之方殷也能動則亨事變之將定者惟静致福不知是道而悻悻之氣不勝其忿忿之情暴厲之才恣逞其憤懣之志災本在外而我自速之若之何其不敗哉不然自郢及我九百里安能害我吁此宋襄以天之所棄而争霸燕丹以命之垂亡而刺秦姜維以孤危之蜀而伐魏韓侂胄以單弱之宋而謀金速禍而已矣詩曰心之憂矣自貽伊戚豈不信哉易曰需于泥致寇至六四需于血出自穴何也葉子曰君子不免于身坐水火之中者事變之遭也而卒不為水之所溺火之所爇者完徳之禦也古語云古之真人入水不濡入火不灼水火豈不能濡人灼人哉順水之道而不狎順火之性而不玩修乎己者完以固聽乎物者安以静水火其奈之何哉甯俞當成公之無道日有九死焉而卒保其身以濟其君忠之勝也婁師徳狄仁傑當武曌之慆淫九死不足焉而卒成大業反周為唐知之攝也知者不㝠行忠者不妄作非順之至而静之極也乎噫非天下之至精其孰能與于此易曰需于血出自穴九五需于酒食貞吉何也葉子曰不為而期成猶却行而求前非天下之定理也為之而廹效亦揠苗而助長豈聖人之順治哉孔子曰無欲速無見小利董子曰正其誼不謀其利明其道不計其功此仁人之事而純王之道也是故險者夷難者平正徳利用厚生惟和天下自此定矣夫何為哉養之以康樂則基命宥宻飫之以安平則吉福大来涵濡休息與天下優㳺於無事而坐收王道之成已矣夫何為哉噫非唐虞三代之聖主曷足以語此秦始皇唐太宗夷難之才也而非養福之器漢元帝唐文宗養福之器也而非致福之資王道日逺無足怪也何也才不辦則九功不叙器不重則九叙不歌天下奚以定乎是故風飛雷厲常在事前龜息蛇藏常在事後武成之餘而武王垂拱非玩愒也百戰之後而光武休息非怠荒也究王道之終始也雖然未有憂勤而早圖逸樂無所事事而祇務優㳺則是聖人之訓且為般樂怠敖之資而實非經世定功之道矣昔者唐穆宗甫過公除即事逰畋聲色賜予無節欲以重陽大宴拾遺李珏率同僚極諫常謂拾遺丁公著曰聞外間人多實樂此乃時和人安足用為慰對曰此非佳事恐漸勞聖慮曰何故對曰自天寳以来公卿大夫競為㳺宴沈酣晝夜優雜子女不愧左右如此不已則百職皆廢陛下獨能無憂勞乎願少加禁止乃天下之福也噫省此而後可以詘豐亨豫大之説絶飲食宴樂之䛕不然假聖經以恣佚欲借王道以作荒淫弊也滋矣易曰需于酒食貞吉上六入于穴有不速之客三人来敬之終吉何也葉子曰禍起于才知之不足福生于事變之偶然勿謂天下無是事也昔者郢人有遺燕相書者夜書火不明因謂持燭者曰舉燭云而誤書舉燭舉燭非書意也燕相受書而説之曰舉燭者尚明也尚明也者舉賢而任之燕相白王大悦國以治唐錢鏐統鎮兵討賊是時黄巢攻略浙東至臨安其先鋒度險皆單騎鏐率勁卒伏山谷中𤼵弩射殺其將巢兵亂引勁卒蹂之斬首數百級乃引兵趨八百里八百里地名也告道傍媪曰後有問者告曰臨安兵屯八百里矣巢衆至聞媪語不知其地名曰向十餘不可敵况八百里乎遂引兵過東坤氏曰夫郢人之云舉燭本以責照夜也而燕相從而舉賢是燥濕之就也路媪之言八百里本以告師次也而賊衆以為大屯是風鶴之驚也將相之謀人國而其成算之資乃有出於無情竟外之夫道傍之婦若有人鬼黙相之者天下事豈人所能逆料者哉然則載胥及溺其何能淑矣天下豈無不期而㑹之人舉手投足之便乎故本非所望卒然值之雖有可懼之勢而有求于人必先下之亦有可叩之機王導作奸之計既窮佐逆之形已露呼周顗以救之而卒保其百口此其明騐也特伯仁之救出於本心之誠而無事王導之敬者悲夫易曰入于穴有不速之客三人来敬之終吉訟有孚窒惕中吉終凶利見大人不利涉大川何也葉子曰兩兩相下則民雖下愚不能無遜心兩兩相傾則民雖上智不能無争心夫惟争心一起則巧者眩拙拙雖直而不伸詐者諼直直雖是而亦屈矣誠而見疑忠而見罪不其然乎雖然誠忠而屈於疑罪非徳之累憂懼而反於中和保我實多虞芮質成文王而不果訟田者望見王烈之閭而即返不亦君子之髙致乎少屈而務求必勝出已而即欲擠人身滅而家破矣古今為戒恒數數然也雖然世有文王王烈則自歉者負愧而中止懐直者抱義而逺来故曰舜禹在上訟獄歸焉可矣若上下其手出入其情是季子為政而父子訟於魯文公為霸而君臣訟於衛㡬何而能伸天下之抑哉雖然望聖人以質成噬物以為合者良民之所以自解也聖人何拒焉犯大難以興訟冒是以為非者奸民之所以妨衆也聖人將容之乎大舜之堲讒説孔子之誅亂政此類是也争乎争乎君子平之吉而小人浚之凶乎易曰訟有孚窒惕中吉終凶利見大人不利涉大川初六不永所事小有言終吉何也葉子曰遜當因而不可暫争當暫而不可長忍傷之大君子謂之不隕厥問謂之遵養時晦傷之小而必争之不為蔡息之俱滅哉是故有慚忿而無遂心者保家之主也寧人負我而無我負人者守身之要也成師以出惟敵是求者刑戮之民也知斯義者其荀罃二三子與季文子延陵季子乎易曰不永所事小有言終吉九二不克訟歸而逋其邑人三百户无眚何也葉子曰不可以卒避者横逆之来也不能以不辨者人情之常也不得以自伸者强弱之勢也忍逆者安含情者勝順勢者昌知此者其夫差之於越以甲楯三千棲於㑹稽楚成之於晉惟痛心俯首不出江淮鄭伯之肉袒負荆宋華御之先為之弱子産之敬恭玊帛乎宋襄方脱釁鼓之餘正其反躬自悼之日顧乃不思卧薪嘗胆之計退然下敵之心而妄為輕謀挑禍之圖敢興伐鄭仇楚之戰傷泓而死非不幸也是故息伐鄭而亡鄭勝蔡而懼蔡大敗楚而滅小國讎大國而幸勝焉禍之本也雖然亦顧其義命何如耳義在必争命在必死君子亦争之死之而已安可以勢之不敵而遂輟不為也哉死于命安于義君子何求焉不知此道而曰吾處卑約吾免災患若南渡人君而為此是為大不孝南渡人臣而為此是為大不忠尚可以立于天地之間乎彼固稱臣稱講稱大金使且稱詔諭江南矣卑約殆甚而災患猶故則亦何益之有乎君子不可以不審也易曰不克訟歸而逋其邑人三百户无眚六三食舊徳貞厲終吉或從王事无成何也葉子曰喜於鬬樂於争羣然而鬨起者叔世趨㑹之風也釁於勇嗇於禍懵然而不顧者小人用壯之氣也然則天下險陂以相傾吾獨安常而不動天下誕肆以相軋吾獨守分而不争天下不愛萬金之産以搆敵吾獨安世守業而不出户天下各自為戰以自强吾獨處乎素位而不願乎外不亦卓卓乎保身保家之主也哉雖弱奚病焉晉楚争霸而北燕逺在朔漠不與其事故得優㳺無事于多故之秋楚漢争王而南越僻在一隅不逞其能故能超然獨存乎芟夷之日此其騐矣雖然閉門之守非用世之雄也唾面自乾之資非折衝禦侮之器也君子亦與其心而不能不惜其才矣易曰食舊徳貞厲終吉或從王事无成九四不克訟復即命渝安貞吉何也葉子曰霍然而欲鬬者人心之間熾乎其畫然而反步者道心之欽止乎率道心而人心聽命焉君子所不訾也是故仲虺之贊成湯不稱其無過而稱其改過吉甫之頌周宣不美其無闕而美其補闕則夫就居易俟命之道變行險徼倖之心此自訟之良改過之勇而作聖之資也况以之而處争辯之細乎順于禮而安于義端其事而正其心身安而家可保行成而義不虧卓卓乎君子之髙致矣趙盾收諸侯八百乗之師子犯退晉師三十里之舍其知是道乎不然如竇嬰之助灌夫趙廣漢之脅魏相公孫賀之捕朱安世禍而已矣易曰不克訟復即命渝安貞吉九五訟元吉何也葉子曰獄者天下之大命有司之獄成則獻于郡國有司之不當郡國得以平反之郡國聽其成則上于廷尉郡國之不當廷尉得以出入之廷尉允其平則報于天子廷尉之不當天子得以生殺之天子之不當不亦危乎其殆哉為臣執君偏而逆也上下其手私而邪也惟官惟反惟内惟貨惟来而民其無所措手足矣其惟徳威惟畏徳明惟明剛柔分動而明雷電合而章乎雍子不得以鬻獄王叔不得以誣要梗陽不得以進賂此無情者不得以盡辭而大畏民志之道窮鄉下邑之福遐方小人不幸中之大幸也故曰訟獄者不之堯之子而之舜不之舜之子而之禹又曰皇帝清問下民鰥寡無盖典獄非訖于威惟訖于富敬忌罔有擇言在身惟克天徳自作元命配享在下易曰訟元吉上九或錫之鞶帶終朝三褫之何也葉子曰物以自得者居之安貨以悖入者出之亟然則命服非所以錫奸以奸得之不可長也争訟非所以勝人以争勝之不可乆也何也詩曰彼已之子不稱其服不稱矣豈曰以章徳乎傳曰服之不衷身之災也不衷矣豈所以為稱乎受之非道而得之非分不衷不稱孰甚焉菑害並至雖有善者末如之何矣君子曰楊惲告霍氏息夫躬告東平初以此而侯卒以此而誅是也好還天道固然矣豈不信哉季文子藉强晉之勢問笑辱之故掃境入齊而得汶陽之田未㡬而韓穿之来不可支矣漢武起四世之仇𤼵數十年之怨窮海内之力竭府庫之藏逺問匈奴之罪而幕南無王庭矣呼韓邪單于欵塞稽顙矣國家虛耗漢業索然得不償失是亦何益之有乎易曰或錫之鞶帶終朝三褫之師貞丈人吉无咎何也葉子曰聖人之利天下也大是故以三農生九穀而耒耨臼杵之制興聖人之防天下也周是故以九伐靖邦國而弧矢干戈之事備傳曰天生五材誰能去兵司馬法曰教笞不可廢于家刑戮不可弛于國征誅不可偃于天下管子曰誅暴國必以兵禁辟民必以刑兵也者外以除暴内以禁邪尊主安國之經也師乎師乎其所由来者逺矣黄帝嘗與炎帝戰顓頊嘗與共工争故黄帝戰于涿鹿之野堯戰于丹水之浦舜伐有苗啟攻有扈自五帝而弗能偃也又况衰世乎然而兵所以禁暴討亂也炎帝為火災故黄帝擒之共工為水害故顓頊誅之兵豈聖人之得已哉是故兵出無名事故不成名其為賊敵乃可服必也以寛而伐虐以仁而伐暴誅無道秦討逆賊項其殆庶㡬乎大者應天而順人次者攘夷而尊主聖人之興兵也雖然將不知兵以其卒與敵矣君不擇將以其國與敵矣其必鷹揚之尚父元老之方叔㢘頗充國李靖老有少力諸葛周瑜謝安少有老謀其殆庶㡬乎上之説禮樂而敦詩書次之昭殺敵而致果毅明君之命將也故曰三代之兵若時雨而起有一毫名不正而使不當耶不然拜賜之師晉人以為笑侏儒是使魯人以為戚矣師乎師乎生民之菑乎易曰師貞丈人吉无咎初六師出以律否臧凶何也葉子曰興師以正者大君之宜行師以法者將帥之責是故師之道正至焉法次焉宋襄公不鼓不成列不擒二毛不重傷晉伐鄭楚共王救鄭姚句耳觀楚師子駟問焉對曰其行速過險而不整平王為舟師以伐吴不為軍政無功而還是正法俱亡不足道也漢昭烈憤闗張之死興伐吴之師而連營七百里包原隰險阻而為軍曹丕譏之而卒為陸遜所折敗則亦非善之善者矣故荀子曰師由其道則行不由其道則廢楚人鮫革犀兕以為甲鞈如金石宛如鉅鐵釶惨如蜂蠆輕利僄遫倅如飄風然而兵殆于沙垂唐蔑死莊蹻起楚分而為三四是豈無堅甲利兵也哉統之非其道也然則坐作進退之有節攻殺撃刺之有方牛馬臣妾之勿逐或六步七步之不敢越或四伐五伐六伐七伐之不敢亂其兵家之要略乎三代以還日尋戰鬬魚麗鵝鸛方略百出管子荀卿首壊古制吴起穰苴並擅當代而開闔進退参伍錯綜則孫武十三篇為之最其推衍兵法精變神聖雖深識兵機者所不能洞則有武侯之八陣焉孫吴之書家置而喙誦矣武侯八陣一在䕫州之永安宫盖武侯從先主伐吴防守江路行營布伍之遺踪自山上俯視下百餘丈在江濤中皆聚細石為之凡八行六十四蕝此方陣法也土人言水方盛時沒在深淵水落依然如故一在新都之彌牟鎮新都為成都之近郊則其恒所講武之場也凡一百二十有八當頭陣法也其地象城門四起上列土壘約髙三尺耕者或剗平之經旬餘復突出在成都東南隅號曰棊盤市此舊八陣營凡二百五十有六下營法也棊盤市今無其迹而趙清獻為之集記曰武侯于八陣鄉以土為隆基凡一百三十所盖左右六十四前二每基下五六寸皆江石也耆老相傳其石盖兵數武侯于此教戰陣出入之法舊記謂四面開四門起六十四魁應六十四卦八八為行周回四百七十二步所謂六十四魁但得其半耳王恭簡公續記曰眉州賢良王當嘗論八陣法刻石廟下論曰八陣之法四竒四正棊布壁立其體皆方竒正相生風旋日暈其用皆圓盖方利于止方其體則其勢固宻故其徐如林不動如山難知如隂此所以為不可犯也圓利于動圓其用則其勢健决故其動如雷其疾如風侵掠如火此所以為不可禦也其體雖方而圓在其中其用雖圓而方在其内此所以為不可測也竒正相循出入往復如環之無端體用迭作合散變化如神之不窮圓之為用如身使臂如臂使指雖五旅之師如一身如木百圍根株相連各有本統枝葉相屬各有條理雖五師之軍如一本故其法曰紛紛紜紜鬬亂而不可亂渾渾沌沌形圓而不可敗圓之為利其来乆矣圓之為用則以分其勢而敗其兵疑其心而亂其目勢分則陣薄兵散則氣怯心疑則易却目亂則易眩圓之為用以將雜卒卒恃其將以强雜弱弱恃其强將卒相恃理必俱勝强弱相恃勢不偏敗突出争先鷹揚脱不可拒也併力盡怒齊勇如一不可遏也其氣益銳則其節益險如驚湍巨浪不可涉也如層崖峻谷不可越也使敵得之如蟲之著網魚之在笥虎之陷阱是以其將可却其兵可殺其重不可脱八陣之法也營室之法四竒四正屯亦如之戰陣之法左旋右轉教亦如之教之有法必欲其誠盖誠則乆乆則天天則神故前後相屬首尾相接如得于天如出于信莫知其所以然而然者入于神也教之為法築土為壇其形皆圓其數皆八壇之髙下與人相稱壇之濶狭與陣相稱竒旋向左正旋向右旋向左者攻在外也旋向右者攻在内也或旋向左或旋向右便其用也或攻其内或攻其外紊其列也教之為法在家則依比閭族黨之儀在軍則依伍兩卒旅之法使之更相親視有無相通患難相救疾病相扶自比以上皆文官主之教之忠厚教之正信教之孝友睦婣教之禮義㢘恥自伍以上皆武官主之教之出入變化教之射御撃刺教之先登啓行教之破陣劫將在家書其美惡而辨其賢愚在軍紀其勇怯而别其利鈍嵗終則以功行差次而進退之使之剛而不暴勇而知義入則可與同其安出則可與共其危故可生可殺而不可使犯非義者八陣之法也常山之蛇安則静静則直觸之則動動則圓孫武常山蛇陣杜牧以為八陣勢取桓温之説也傳謂推衍兵法作八陣圖演孫武法也八陣取諸八卦欲包并八荒也旌旄旗幟各從其方之色欲别其屬也四維從其二方之色惟西南獨從土色依其相生之數則土實居此也八卦變為六十四象四陣散為六十四隊又按八陣為天地風雲龍虎鳥蛇八者是也天取其覆地取其載風雲取其變龍虎取其動静鳥蛇取其相應風生於地而虎從之雲騰于天而龍從之鳥為動物必翔于天蛇為蟄物必蟠于地盖有同位相生之義焉昔竇憲常勒八陣以撃匈奴馬隆亦用八陣以攻凉州而世獨稱武侯者不特法紀之神而忠義之徹亦天地鬼神之所共䕶者而豈茍焉已哉雖然此其一定之成迹耳惟善為將者師其法善察法者識其意善得意者通其變善觀變者盡其神則可使以衆撃寡治撃亂富撃貧能撃不能教卒練士驅衆選徒有風雲之行而不逺道里矣有飛鳥之舉而不涉險矣有電震之戰而獨行無敵矣可以聚則成卒散則成列延則若鏌鎁之長刃嬰之者斷鋭則若鏌鎁之利鋒當之者潰圓居而方止則若磐石然觸之者摧可以使將死鼓御死轡百吏死職大夫死行列矣法可以不慎乎雖然此一定之法也有卒爾之法焉既募之後則有紀律馬燧之練募精卒是也方募之始則有差擇馬燧之立標揀試是也雖然此一時之法也有素履之法焉曹劌之諗莊公曰小大之獄雖不能察必以情曰忠之屬也可以一戰晉文公始入而教其民二年欲用之子犯曰民未知義未安其居于是出定襄王入務利民民懐生矣將用之子犯曰民未知信未宣其用于是乎伐原以示之信民易資者不求豐焉明徴其辭公曰可矣子犯曰民未知禮未生其恭于是乎大蒐以示之禮作執秩以正其官民聽不惑而後用之此又律之律也故士蒍曰禮樂慈愛戰所畜也士㑹曰徳刑政事典禮不易不可敵也申叔時曰徳刑祥義禮信戰之器也則古之行師者其道可知矣勇謀知力果其必次者歟易曰師出以律否臧凶九二在師中吉无咎王三錫命何也葉子曰受分閫之寄者寡徳則剛而無禮不可以治兵兵不治則無寵寡權則帥賤民慢不可以成功功不成則為戮故曰古之為將者必説禮樂而敦詩書必兼慈愛而畜戰器必殺敵致果以為禮必明天時以察七緯之情同五行之趣聽八風之動監五雲之候必辨地勢以識七舍之形别九地之勢必練人謀以抱五徳之美握二柄之要故方命也跪而推轂曰閫以内寡人制之閫以外將軍制之既命也天顔温厚以瞻其勤天語可嚀以宣其親天恩優渥以孺其殷歌采薇賡采芑習出車杕杜以大其禮故曰下軍死綏中軍賈餘勇故曰一器成狂夫懼而天下無戰心二器成驚夫懼而天下無守城三器成㳺夫懼而天下無聚黨嗚呼其何攻之不可何敵之不克而何功之不成耶茲孔明所以獨任於後主而子儀取重于代肅非偶然也何也備三才之道適大中之宜剛勇不為李陵之輕敵知謀不為吕蒙之掩襲專斷不為光弼之驕恣乆役不為懐恩之阻兵茲三軍之所以用命而朝廷之所由專寄也不然缺機智者乏成功負勇略者震世主其何以有是哉易曰在師中吉无咎王三錫命六三師或輿尸凶何也葉子曰將也者三軍之司命也不可以不慎也故古之為將者有四勝一曰賢將以道取勝以道勝人者人罕能以道勝之二曰良將以徳取勝以徳勝人者人罕能以徳敵之三曰才將以謀取勝深謀致淺謀近猷蹶逺猷四曰猛將以力取勝一人潰十人十人潰百人百人潰千人千人潰萬人是故文武吉甫萬邦為憲方叔元老克壯其猷上也忽如鬼精疾如風霆突如熊羆厭如山陵次也不然才腐而乳臭心狡而狼貪傲狠而無禮是之謂奮螳螂之怒以當車轍此其志之㥄也而不知其不勝任也禍敗可勝言也哉邾莒伐鄫臧紇救之遂敗于狐駘國人誦之曰臧之狐裘敗我于狐駘我君小子侏儒是使侏儒侏儒使我敗于邾子玉治兵終日而畢鞭七人貫三人耳國老皆賀蒍賈曰子玉剛而無禮不可以治民過三百乗其不能入矣茍入而賀何後之有卒之敗城濮而死嗚呼將豈易言也哉易曰師或輿尸凶六四師左次无咎何也葉子曰能勇强也能怯以弱為强也能强者勝以弱為强者存巴蜀之王不與楚鬬繞角之遇不與楚争畜弱以為强也夫何過哉何也知彼知己百戰百勝既不能强又不能弱滅亡之道也楚伐鄭晉師救之及河聞及楚平荀林父欲還曰無及於鄭而𠞰民焉用之楚歸而動不後士㑹曰善㑹聞用師觀釁而動徳刑政事典禮不易不可敵也楚皆有之若之何敵之見可而進知難而退軍之善政也先縠曰不可晉所以霸師武臣力也今失諸侯不可謂力有敵而不從不可謂武且成師以出聞敵强而退非夫也以中軍佐濟林父不能禁從而共濟遂有邲之大敗衛侵齊與齊師遇石稷欲還孫良夫曰不可以師伐人遇其師而還將謂君何若知不能則如無出今既遇矣不如戰也師遂大敗仲叔于奚救良夫良夫是以免吴伐齊齊人知其不可禦而不能全民命嚴守備屈之以義乃冒死而進故將戰而公孫夏命其徒歌虞殯陳子行命其徒具含玉公孫揮命其徒曰人尋約吳髪短東郭書曰三戰必死于此三矣使問弦多以琴曰吾不復見子矣陳書曰此行也吾聞鼔而巳不聞金矣遂大敗而死夫知不可敵不能保師以愛民知難以為退斯聖人之所深罪也甚而至於底白登渡鴨綠亡無日矣雖然有㡬焉彼宗競于楚吾姑退而使自斃吾伏吾强矣夾泜之陳紓晉師而退舍不亦為陽子之所賣乎子上之死自取之也是以君子貴審㡬焉易曰師左次无咎六五田有禽利執言无咎長子帥師弟子輿尸貞凶何也葉子曰兵出無名事故不成聖人不能也君不擇將以國與敵聖人不為也故淮南子曰古之用兵者非利土壤之廣而貪金玉之略也將以存亡繼絶平天下之亂而除萬民之害也然則聖王之世而有貪忿之兵乎以義而起以廹而應是故蠻夷猾夏寇賊奸宄為生民害不可懐来則明刑于大士昏迷不恭侮慢自賢反道敗徳民棄不保則奉辭以伐苗必不為秦皇漢武窮山林索禽獸也雖然兵應者勝義者王師直為壯曲為老此固理之必然不曰三軍之司命在一人一將之成功在九徳天下無必勝之兵而有不可敗之將乎是故趙衰之舉將在于説禮樂而敦詩書子犯之行師本于知信義而有禮古之所謂將知兵而卒服習歴年多而將士皆出其門下者此所以終無踰于老臣也若曰任之不以其賢使之不以其能鮮不敗矣是故不為柏直之口尚乳臭則為趙穿之剛愎不仁右領差車左史老有二俘之賤而無其令徳楚成得臣過三百乗而不能入矣其如兵何哉雖然將知擇矣而任之不專猶不擇也河曲之戰趙盾為將而令出趙穿邲之師荀林父為將而令出先縠濟涇而次欒黶欲東而荀偃之令不行鄴城之圍統以宦官魚朝恩而九節度之師一夕而潰專行不獲聽而無上禍敗可勝言哉易曰田有禽利執言无咎長子帥師弟子輿尸貞凶上六大君有命開國承家小人勿用何也葉子曰聖人有報天下之仁亦有别天下之知聖人有定天下之功亦有不亂天下之哲書曰一戎衣天下大定乃偃武修文歸馬于華山之陽放牛于桃林之野示天下弗服列爵惟五分土惟三建官惟賢位事惟能惇信明義崇徳報功垂拱而天下治何也淮南子曰今世之祭井竈門户箕帚杵臼者非以其神為能享之也時賴其徳煩苦之無已是故以時見其徳所以不忘其功也而况天下英雄豪傑暴露于野澤蒙矢石而墮谿谷出百死而得一生以争天下之權奮武厲誠以決一旦之命者乎是故博其能于袪亂之初而屯其膏于登平之後若土龍芻狗然則鄙嗇而不仁是故列爵分土之所由起矣然潰其施于崇報之日而昧其辨于決擇之中若雨澤溉浸然則眇眯而不智是故惟三惟五之所以異也雖然寵命有功非至正不為功登用人才非君子不為才優其賞于施祿及下之日而吝其用于知人安民之初然後功成而無後患是故報功不先于崇徳位能不先于建賢此所以為武成也不然渾其功而不别漢髙不免沙中之語昧其人而用之唐莊卒致易姓之禍可不鑒乎雖然先史有言武臣勤勞汗馬冒犯矢石内平中國之難外攘夷狄之凶百死一生乃成厥績于是功銘太常恩覃帶礪俾子孫世守而弗失此則封功錫爵之彝典矣殊不知武臣之功能平已然之禍亂諫諍之臣克明先見之危亡曲突徙薪之功利宜不出武臣之下者是以考夫前代或有人君失政奸雄在朝擅生殺之權變祖宗之法繆專國賦僭握兵符包藏禍心竊窺神器宗室弱而不救奸佞閉而不言簒弑之謀變在朝夕幸而鯁亮直言之士奮不顧身折繡檻于彤庭披忠肝于玉陛力陳其罪直指奸邪破插血之凶盟誅連根之黨類于是罪人斯得天下肅清較之武臣功孰居右茍能知此而加以美諡録其子孫使忠言讜論耿耿不磨則後之忠臣義士安得不仰其遺風而繼其芳踵乎此亦不可謂非正功之大典也易曰大君有命開國承家小人勿用此吉原筮元永貞无咎不寧方来後夫凶何也葉子曰中天下而立定四海之民君子樂之者也何樂乎立與定也其道大行無一夫不被其澤是為君子之樂事也然則天下大悦而將歸已寧非君子之願乎雖然臨下以徳寡徳者殃親民有道失道者亡春秋書鄆潰以亡無愛徴民不見徳昭公不能為魯君也孟子稱亦運以如水益深如火益熱宣王不能為燕王也君道君徳其可以不審乎其仁如天其徳好生堯之繼天立極也至誠無息不息則乆文之咸和萬民也純王之心純王之道舜之紹堯致治也故曰是宜為君有恤民之心又曰君子體仁足以長人惟仁者宜在髙位不仁而在髙位是播其惡於衆也君子而有堯舜文王之道以為天下主則天下皆来歸之謳歌訟獄之咸至玉帛萬國之畢㑹矣争先亟赴安能自取防風後至之戮致譚子不朝之誅堕酈生後服先亡之禍乎昔者晉悼初立始命百官施舍己責逮鰥寡振廢滯匡乏困救災患禁淫慝薄賦斂宥罪戾節器用時用民欲無犯時逐不臣者七人而六官之長皆民譽也風聲所至邇服逺慕于是魯成公言其有禮而把伯驟為之朝吴子謝雞澤之不㑹而聽善道之後期陳成公改于尸而鄭僖公去乎楚一舉而復霸三駕而楚不能與之争霸者尚然而况帝王之道乎不然民逃其上衆散而歸雖與之天下不能一朝居矣故曰兵立有幟射有的注望而統其集者衆趨之㑹于幟也叢射而受其破者衆勝之傾于的也順徳者昌為天下幟逆徳者亡為天下的易曰比吉原筮元永貞无咎不寧方来後夫凶初六有孚比之无咎有孚盈缶終来有他吉何也葉子曰與物者立身之始乎誠意者自修之首乎誠意以潤其身與物以致其誠則悦親而信友獲上而治民天下之事一以貫之而無疑矣感所不期而自應朋所不思而爾從大哉誠乎其動萬物起天下之本乎傳曰勇士一呼而三軍皆避士之誠也昔者楚熊渠子夜行見寢石以為伏虎彎弓而射之沒金飲羽下視知其為石石為之開而况人乎夫唱而不和動而不僨中心有不全者矣夫不降席而匡天下者求之已也孔子曰其身正不令而行其身不正雖令不從先王之所以拱揖指揮而四海来賔者誠徳之至也故曰𤼵一誠心則李廣之石可使為虎𤼵一疑心則樂令之弓亦能為蛇然則大舜之感頑嚚周公之致風雷始于一誠終于積滿易曰有孚比之无咎有孚盈缶終来有他吉六二比之自内貞吉何也葉子曰天下有道以身殉道進徳修業欲及乎時聖賢之訓也故曰隠居以求其志行義以達其道又曰夫人幼而學之壯而欲行之則夫去陋巷而急禹稷之志出下帷而抱伊吕之戈起隆中而勤管樂之業非變塞也釋草茅而行君臣之義辭煙霞而依日月之光蛻脫汙泥而浮㳺塵埃之外舎去家食而揚休天子之庭君子之達節通人之赴時也不然王道不行天徳何由而達大用不適全體何貴于明乎此二八之所以並升而多士之所由濟濟也易曰比之自内貞吉六三比之匪人何也葉子曰鞭策淬礪取之于己而薰陶漸染資之于人語曰泰山之溜穿石單木之抗斷幹水非石之鑽索非木之鋸漸靡使之然也故曰益者三友損者三友君子之于友可不慎哉昔楚有善相人者所言無遺美聞于國中莊王召而問焉對曰臣非能相人也能相人之友者也嗚呼友生之義大矣哉是故兩明相照不爽幽奥明暗相倚盲者不圯兩瞽相並必堕陷阱孔子慎網羅之患荀卿切蓬麻之喻夫豈茍然而已乎所以深戒親非其人也親非其人則故僻邪侈之心滋行險徼倖之機熟傷莫甚矣史弼有言所與羣居皆有口無行或家之棄子朝之斥臣必有羊勝伍被之禍可無懼乎是故伯禽康叙見商子聞喬梓之説則恭父商臣以潘崇為之師起大事之謀則弑頵左儒杜伯之相善則君友之道俱明子公子家之相比則弑逆之惡莫禁吁戒之哉故曰因不失其親亦可宗也又曰觀近臣以其所為主觀逺臣以其所主主者成敗之機榮辱之本也而可以不慎乎昭公棄晉主齊至于客死鄭伯逃齊主楚終以乞盟紀侯謀咨齊難而主魯桓簒弑之人竟告不能鄭伯一失其身餌楚而五受楚兵從楚者六歸晉者五二三十年之間乍楚乍晉不能自立㳺邃避地於薊後歸慕容廆廆以為股肱王浚屢以書招其兄暢暢欲赴之邃曰彭祖必不能乆宜且盤桓以俟之暢曰彭祖忍而多疑今手書殷懃而稽留不往將累及卿且亂世家屬宜分以冀遺種遂從之卒與浚俱没孔子曰非所據而據焉身必危不亦信乎昔魏正始中夏侯𤣥及何晏鄧颺俱有盛名欲交傅嘏嘏不受荀粲怪而問之嘏曰太初志大其量能合虚聲而無實才何平叔言逺而情近好辨而無誠所謂利口覆邦家之人也鄧𤣥茂外要名利内無闗鑰貴同惡異多言而妬前多言多釁妬前無親以吾觀之此三人皆將敗家逺之猶恐禍及况昵之乎裴武為𤣥菟太守卒弟嶷與武子開以其䘮歸過慕容廆廆敬禮之行及遼西道不通嶷欲還開曰等為流寓段氏强慕容氏弱何必去此而就彼嶷曰欲求托足之地豈可不慎擇其人女觀諸段豈有逺略且能待國士乎慕容公修仁行義有霸王之心加以國富民安今往從之髙可以立功名下可以庇宗族女何疑焉廆大喜以為謀主噫明暗之為就而存亡别矣君子可不知所擇乎若夫鄭愔初附来俊臣俊臣誅附張易之易之誅附韋氏韋氏敗又附譙王重福重福反竟坐族誅此又益不足言矣易曰比之匪人六四外比之貞吉何也葉子曰君子之持身也其處則備純白以修己其出則執中精一以事君其事君也在内則謇諤忠誠不徇阿比之志在外則靖恭守節不擅出疆之權是故終始逺近由乎道内外小大安于順詩之言曰予曰有疏附予曰有先後予曰有奔走予曰有禦侮夫是四友之臣所以多助于文王者而豈其微哉然而不以逺近内外廢恭順也故曰天威不違顔咫尺又曰君天也而豈遺要荒萬里乎是故周召分陕以輔周室其後吉甫在太原方叔居荆蠻仲山甫徂齊其所作為何如也夙夜以明勞肅將以明順嚴翼以明節故曰既明且哲以保其身嗚呼此臣道之所以立極乎後世不明此義公子遂如周遂如晉公子結媵陳人之婦于鄄遂及齊侯宋公盟嗚呼是使其君不得有為于其國而輙以一身當乎大禮之重君子以為專矣此華元子反相好以成二國之平羊祐陸抗交歡邉境而不啟戰争之禍知道者不免有遺議焉而馮奉世矯制𤼵兵撃破莎車蕭望之以為有功不可為法陳湯矯制𤼵兵與甘延夀斬郅支單于匡衡以擅興師矯制幸得不誅不宜復加爵土非抑之也雖然上之不足以利國下之不足以利民可以需君命也而竊之以自擅君子以為専矣若利害出于一時而制之于千里之外當此之時而或泥焉君子將不以固哉病之乎是故不可為甘陳可以為長孺嗟夫外之不可以不從上如此内而出為祭伯之朝魯季友之如陳葬原仲莒大夫之即魯而圖婚誣上行私合羣結黨則春秋之所痛絶矣易曰外比之貞吉九五顯比王用三驅失前禽邑人不誡吉何也葉子曰聖人之于民治之也而非留之也聖人之于物取之也而不盡之也不留則公不盡則大其斯以為明章光皎之化乎管子曰無蔽女惡無易女度賢者將不女助言室滿室言堂滿堂是謂賢王何也陸敬輿曰宇宙之變態日千萬而一人之聽覽不可得而窮億兆之欺奸日雜遝而一人之防慮不可得而勝是故役智彌精失道彌逺項羽慮秦卒復叛而坑之旋踵而滅髙帝受降人不疑而用之五載而漢興畜疑之與推誠其效固不同也秦始皇嚴肅雄猜而荆軻奮其險詐光武寛容博厚而馬援輸其欵誠豈不以虚懐待人人亦思附挟數御物物終不親乎故曰上之御下猶夫釣者焉隠于手而應于鈎則可以得魚自近御逺猶夫御馬焉和于手而調于御則可以使馬故至道之要不于身非道也覩孺子之驅鷄也而見御民之有道孺子驅鷄者急則驚緩則治方其北也遽要之則折而過南方其南也遽要之則折而過北廹則飛踈則放志閒則比之流緩而不安則食之不驅之驅驅之至者也志安則循路而入門是故司馬公之言曰天子所以統治萬國討其不服撫其微弱行其號令一其法度惇明信義以兼愛兆民父母天下之道也唐莊宗既滅梁馬殷遣子希範入貢莊宗曰比聞馬氏之業終為髙郁所奪今有兒如此郁豈能得之哉郁馬氏之良佐也希範兄希聲聞是言卒矯其父命而殺之此乃市道商販之所為豈帝王之體哉故勝梁之後曾不數年内外離叛置身無所誠知用兵之術而不知公天下之道也周世宗則不然以信令御羣臣以正義責諸國王環以不降受賞劉仁贍以堅守蒙褒嚴續以盡忠獲存馮道以失節被棄張美以私恩見疏江南未服則親犯矢石期于必克既服則愛之如子推誠盡言為之逺慮使其完城繕甲據守要害為子孫計真為光顯之遺而王者之心也人之度量相越豈不逺哉雖然来者不拒去者不追此固比天下之道而任其自来聽其自去則非所以慎内外之防何休曰王者不治異域而潁濵駁之以為古之所以待外國有用武而征之者髙宗文王是也有修文而和親之者漢文景是也有拒絶而不納之者光武謝西域却匈奴是也此皆治逺人之大要今曰来者必不可拒去者必不可追則數君者之所為皆非矣乎故凡休之説施之于中國盛强敵人暴横之時則將養寇以遺子孫之憂施之于中國新定休息自養之際則為寇讐之所役使以自勞敝而不止凡此二者休之説無時而可也盖聞之聖人之於逺人也吾欲其来則来之雖有欲去者不可得而去也吾欲其去則拒之雖有欲来者不可得而来也夫如是故伸縮進退莫不在我而休欲聽其自来而自去耶噫此又治天下者所當深知也故胡文定曰天無所不覆地無所不載何有於内外乎無不覆載者王徳之體内中國而外四裔者王道之用是故以諸夏而親戎狄致金繒之奉首顧居下其䇿不可施也以荒服而朝諸夏位侯王之上亂常失序其禮不可行也以羌戎而居塞内無出入之防候隙乗便輒為横逆致風塵之驚其禍不可長也不然而或昵之禍旋踵矣是故結戎狄以許婚而配偶非其類如西漢之于匈奴約戎狄以求援而華夏被其毒如肅宗之于回紇信戎狄以與盟而臣主蒙其恥如徳宗之于尚結贊皆不講于内外之防審于追拒之説故也可不謹哉易曰顯比王用三驅失前禽邑人不誡吉上六比之无首凶何也葉子曰元首者四體之所因也故曰舜首圓以象天天下稱明焉而萬物莫不仰也氣散而元首下墜矣四體何所因哉天子者萬民之所因也故曰王者往也天下之所歸往也徳亡而天子庶人矣萬民何所因哉下墜不可以起四肢庶人不可以統衆物亡其有日乎哉嗚呼此獨夫之受可以為逋逃主而不可為臣民主也易曰比之无首凶葉八白易傳卷二
