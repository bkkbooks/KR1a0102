body:
  text: 葉八白易傳卷六明葉山撰噬嗑亨利用獄何也葉子曰兩情之不通者一孽之為間也萬理之未融者一疑之為窒也然則惑既辨而悦諸心隙既塗而協其志不亦天下之定理乎故淮南子曰水之性淖以清窮谷之汙生以青苔不治其性也掘其所流而深之茨其所決而髙之使得循勢而行乗衰而流雖有腐髊流漸弗能汙也其性非異也通之與不通也管氏之書曰水未始弗勝火也鬵釡鬲之則火烈熾然熬而不已水涸竭枯乾而失其性矣鬵釡之鬲其患乃如此然則君臣父子朋友之間而一有讒邪間于其中其害可勝言哉成王周公之管蔡楚平子建之無極髙國與諸大夫之陳乞一日不去則君臣父子朋友一日不得而合矣是故梗者決而後心始悦間者融而後情可通自一身而推之天下無不皆然者非特父子君臣朋友而已也夫間而必使通隔而必使融此疏淤理滯之道通塞決壅之機也是故以是道而聽訟情則無壅以是道而斷辭民則無咨舜禹之興而為天下之所趨者此其道乎臯陶之明刑子路之折獄亦率是軌也已易曰噬嗑亨利用獄初九屨校滅趾无咎何也葉子曰豪傑之士不待文王而後興陳良是也英斷之人不必懲戒而自改周處是也若夫小人豈易易哉不威則不懲不懲則不戒故曰君子以情用小人以形用榮辱者賞罰之精華也故禮教榮辱以加君子化其情也桎梏鞭扑以加小人治其形也又曰教化之廢引君子而墜于小人之域罰懲之飾引小人而納于君子之塗然則庶頑以撻而格王駘以兀而賢朝為小人暮為君子聖人之刑盖期于無刑信矣誠齋之言乎昔者楚之為楚聖人立必後至天子弱必先叛周王不君而横行江表逺交魯近伐鄭駸駸乎守闗問鼎之勢矣齊桓一舉召陵之師則退休江漢不敢犯王室者㡬二十年晉文一勝城濮之戰則逺避荆郢不敢亂中國者五六十載小懲而大誡如此不然周室為其所并矣此一匡天下民到於今受其賜微管仲吾其被髮左袵者夫子所以大其始懲之功也易曰屨校滅趾无咎六二噬膚滅鼻无咎何也葉子曰匪佞折獄惟良折獄故天下之最可以服人者惟賢惟徳也而䲭義奸宄奪攘矯䖍亦有卒不可以賢徳服者巨憸猾豪也雖然賢徳在我君子亦修其歉焉求良而已矣憸猾之懲而弗吾服吾何容心哉古之人所以不罪人而罪我有由然矣是故舜有好生之徳而苗民逆命禹有訟獄之歸而防風不来非舜禹之歉也所乗非其人也然則大順大化之中固有負固梗逆之醜耶故子路之片言折獄而終不能墮成子産之舉國順命而不能克子南子晳之訟勢所不行有自来矣吾于聖賢乎何尤雖然吾有服人之徳而人有不服之心吾何愧矣若武后有憾于郝象賢使奴誣告象賢族誅之象賢臨刑極口罵太后𤼵揚宫中隠慝自後法官刑人先以木丸塞其口則不務徳而務禁人抑末矣彼雖不得言而吾服彼服彼云乎哉易曰噬膚滅鼻无咎六三噬腊肉遇毒小吝无咎何也葉子曰弱于齒而噬大堅齒必不全短于才而治巨黠黠則反詰然則欲治人之不道而才不稱信取辱焉而已矣魯桓以弑君之賊無恥之人而强平宋鄭故宋鄭為之辭平欲平莒及郯而莒人不肯故雖侵宋伐莒而必不能使心服矣朱全忠襲李克用克用前後八表稱全忠隂猾禍賊異日必為國患惟乞下詔削其官爵臣自率本道兵討之僖宗無徳威以為畏無徳明以為明祗優詔和解之故朱全忠益無所憚而克用終鬰鬱心不能平卒之不服而為唐之梗矣故曰百揆非舜則去四凶以安民祗以危民司宼非仲尼則誅正卯以治魯祗以禍魯雖然邪以間正則治邪者為輔正奸以梗賢則治奸者為䕶賢才雖不逮而推其心可以保國力雖不堪而扶其義足以定邦故大者翟義舉兵西誅不當攝者李敬業以匡復廬陵王為辭次者陳蕃竇武之去漢賊李訓鄭注之去唐兇事雖不濟君子盖有通論矣是故吾寧為魏戊不為叔魚伯州犂易曰噬腊肉遇毒小吝无咎九四噬乾胏得金矢利艱貞吉何也葉子曰天下之流奔壑赴而不可禁止者莫急于有抑而欲伸天下之疾趨亟往而莫能遏禦者最先于有辭而欲白惟官惟反惟内惟貨惟来而奔者注赴者止徳威不畏徳明不明而趨者反往者復矣剛柔分動而明雷電合而章惟齊非齊有倫有要而天下之强梗服無情者不得盡其辭則天下之有所抑而欲言有其辭而欲達者不之我而曷之哉文王之虞芮質成包拯之裹糧聽斷是也不然將為愚谷之老人寧喪馬而不来矣昔者桓公獵于山谷之中見一老公而問之曰是名何谷對曰以臣名為愚公之谷公問其故對曰臣故畜牸牛生子大而賣之而買駒少年曰牛不能生馬遂持駒去傍鄰聞之以臣為愚故名此谷為愚公之谷桓公歸以語管仲仲曰此臣之愚也使堯在上臯陶為理安有取人之駒者乎若有見暴如是叟者必不與也知公訟獄之不正故去之而不訟耳然則訟者之来不有以知致之乎雖然緹縈有言獄者天下之大命死者不可復生刑者不可復續其可茍焉而已哉不曰其難其慎則以民命為戯不由正常平直則為獄吏所舞其不流為秦刑隋法者幾希矣可不慎乎故曰天地之大徳曰生萬物之大極曰死死者不可以生刑者不可以復先王之刑也官師以成之棘槐以斷之情訊以寛之朝市以共之哀矜以恤之刑斯斷樂不舉情之至也刑哉刑哉其慎矣夫易曰噬乾胏得金矣利艱貞吉六五噬乾肉得黄金貞厲无咎何也葉子曰小人之惡止之于初矣順者變而為君子逆者積而為獨夫獨夫天所棄而人所疾塊然死物而已食其肉而寢處其皮也夫何難哉此天下之大順逺近之大化舜去四凶而訟獄之咸歸禹格苗民而萬國之畢㑹者也雖然元惡大憝固當誅而欽哉之恤不可以不慎一怒安民固所望而好生之徳不可以不全故曰獄者天下之大命又曰刑者成也一成而不可反是故州郡之不當刺史得而平反之刺史之不當廷尉得而轉移之廷尉之不當天子得而更張之天子之不當天下鮮有所措其手足矣故唐髙祖之言曰雖太子有罪亦不可赦近于公矣而失父子之恩使太子不免于絀死𤣥宗以重刑加于后黨之輕罪近于斷矣而傷夫婦之義使皇后不免于廢殺故曰㡬者動之微不可以不慎也又曰八議設而後輕重得其宜君子戒之焉易曰噬乾肉得黄金貞厲无咎上九何校滅耳凶何也葉子曰稔惡之極天網之所不漏也獲罪于天人刑之所必及也鄭莊公曰不義不暱厚將崩齊仲孫湫曰難不已將自斃州吁弑完而虐用其民衆仲知其必不克商人弑舍而多行無禮季文子知其弗能立楚頵僣王馮陵中夏戰勝諸侯毒流天下復以不仁處其身而以不孝處其子卒之禍𤼵蕭牆而莫之覺楚䖍殺麇自立而求諸侯于晉晉人許之中國從之執徐子圍朱方遷頼于鄢城竟莫校畏其彊盛則曰晉楚惟天所授不可與争滅陳而不能救則曰陳亡而楚有之天道也滅蔡而又不能救則曰天將棄蔡以壅楚盈而降之罰也至使窮凶極惡師潰于梁身竄于棘里而縊于申亥人不致討而天自討之下至李斯趙髙滅于秦董卓梁冀滅于漢韓全誨崔允滅于唐蔡京童貫王黼梁師成秦檜賈似道韓侂胄之徒滅于宋所謂小人以小惡為無傷而弗去而不知格人元龜罔敢知吉重辟所潜至矣夫孰有能遁其天刑者哉雖然自取之也使耳而聰聰而明則聞言而聽知過可改何至為天下之大僇乎陳轅頗出奔鄭初頗為司徒賦封田以嫁公女有餘以為已大器國人逐之故出道渇其族袁咺進稻醲粱糗腵脯喜曰何其給也對曰器成而具曰何不吾諫對曰懼先行郭君出郭謂其御者曰吾渴欲飲御者進清酒曰吾飢欲食御者進乾脯粱糗曰何備也曰臣儲之曰奚儲之曰為君之出亡而道飢渴也曰子知吾且亡何不諫曰君喜道䛕而惡至言臣欲諫而恐先郭亡是以不諫閻樂將兵入望夷宫射二世二世怒召左右皆惶擾不鬭傍有宦者一人侍不敢去二世曰公何不早告我宦者曰臣不敢言故得全使臣早言皆已誅安得至此故曰赴谷必墜失水必溺人見之也赴阱必陷失道必沈人不見之也不察之故君子慎乎所不察自古昏亂之禍皆如此豈特一商鞅不聽趙良之言蕭至忠不受宋璟之諫乎易曰何校滅耳凶賁亨小利有攸往何也葉子曰盛矣哉文之始乎洋洋乎郁郁乎用之邦國焉用之鄉黨焉薦之于鬼神焉羞之于王公焉何其通達而敷暢乎故曰無本不立無文不行父子主恩必有嚴順之體君臣主敬必有承接之儀禮讓存乎内待威儀而後行尊卑有其序非物則無别文之與實相須而不可缺也傷矣哉文之盛乎用之乆則彌甚行之逺則滅質始于黄唐而極于有周繁華盛而朴素亡物采彰而真實泯其何以行之哉昔者孔子筮得易賁卦愀然而不樂彰文之弊也其曰周監於二代郁郁乎文哉吾從周正以苦于文而厄于時不得已焉耳不然何以曰如用之則吾從先進先進也者羲黄之真三皇五帝之精也嗚呼文乎達于始而弊于盛乎非有道者孰能識之易曰賁亨小利有攸往初九賁其趾舍車而徒何也葉子曰君子一身斯文之㑹也故曰文王既沒文不在兹乎是故達而在上也弁冕朱纓以文首錦衣繡裳以文身虎變彪炳以文乎天下不幸而窮在下也夫何飾哉華其足不妄行以垢辱文其拇恒兀兀以防走豹變絢蔚以文乎其身而已矣煙霞之處其雲漢之章乎奚事分外之榮焉伯夷棄列土之封而采薇首陽之巔嚴光舍諫議大夫而釣于富春之水於陵仲子辭三公而為人灌園谷口鄭子真不屈其志而耕乎巖石之下彼豈以一物之微而動其心者哉易曰賁其趾舍車而徒六二賁其須何也葉子曰君子處天下之事也有道焉可以速則速其速也不為躁可以緩則緩其緩也不為遲是故備武事則啓處之不遑故曰玁狁孔熾我是用急又曰元戎十乗以先啓行修文教則優㳺而不廹故曰禮樂積徳百年而後興又曰孔明而不死禮樂其庶㡬矣進退遲速皆道也然則文章禮樂而可驟然為之乎可以非其人率意而為之乎是故乃翁有馬上之習而説以詩書謙讓有未遑之心而導以禮樂不俟人也君子以為陋而疎得古磬三十六而請興禮樂于外戚用事之朝見博士不講習而請修學校于閹宦弄權之日不俟時也君子以為迂而妄善乎致堂之言曰曹褒深見叔孫通之儀未當故憤然欲正之而章帝亦排班固廣集諸儒共議得失之儀任其獨斷矣豈知博徴名儒遲以年嵗猶庶㡬乎不大違戾而乃身當重任決以獨見遽成百五十篇且又雜以䜟記之文盖不待見其書而可以逆知其舛繆矣嗚呼曾謂禮樂文章而可以茍然乎哉易曰賁其須九三賁如濡如永貞吉何也葉子曰鴻荒之世其民涸以焦羲農之世其民澁而燥其惟堯舜成周之盛乎禮樂興制作備文物具典章成由其世者足以華身而澤體潤耳而濕目生民之大幸君子之盛際也故曰巍巍乎其有成功也煥乎其有文章又曰周監于二代郁郁乎文哉然則君子際此奈之何固其質不使以文滅篤其初不使以末疎執其貞不使以華凌敦其朴不使以儀牿孔子之從先進孟子之守古制率是道也林放問禮之本抑亦其善反者乎不然水積而生相食之魚土積而生自穴之獸禮義飾而生偽匿之本其弊不可勝言矣易曰賁如濡如永貞吉六四賁如皤如白馬翰如匪寇婚媾何也葉子曰生文明之世者文盛則樂主文明之運者文盛則憂居近君之位近臣之親不主其柄而挽其趨反其本而黜其靡可乎故身處其白示天下以則馬乗而疾亟反之以質此豈與天下為鬭逆其好而拂之欲哉防其流而節其潰所以存其性而教之中父母之心愷悌之念也伊周之訓誥用是道乎中古以後斯道替矣知此者霍光知時務之要楊綰敦清簡儉素之節司馬光守純樸貞白之風易曰賁如皤如白馬翰如匪寇婚媾六五賁于丘園束帛戔戔吝終吉何也葉子曰楚之興也篳路藍縷而其衰也翠被豹飾吳之興也食不重席而其衰也次有臺榭陂池宿有妃嬙嬪御故國之興衰成敗視其君之奢儉而已矣何也漢時長安語曰城中好髙髻四方髙一尺城中好廣眉四方且半額城中好大袖四方全疋帛上之所好下必甚焉管子曰工以巧矣而民不足于備用者其悦在玩好農以勞矣而天下饑者其悦在珍怪方丈陳于前女以巧矣而天下寒者其悦在文繡是故博帶棃大袂列文繡染刻鏤削雕琢采明君子務也君淫而民侈國濫而俗流雖有天下其能一朝居乎是故卑宫室惡衣服菲飲食不為廟堂朝著之飾而為丘陵田園之務大布之冠大練之衣大澣之服不為綺羅錦繡之文而執簡素淺小之物則人將曰田舍翁得此亦足矣曰上之人無聞知富有天下之氣象尊為天子之規模固不如是也然為天下敦大本主忠信幹風俗豈曰小補之哉成康尚矣髙祖聽戍卒不懐居遷萬乗不俟終日孝文不愛千里馬慎夫人衣不曳地光武手不持珠玉真知是道矣乎梁武雖不足道其亦異乎陳叔寳隋楊廣焉易曰賁于丘園束帛戔戔吝終吉上九白賁无咎何也葉子曰志有之夏尚忠君子忠矣小人失之野救野莫如敬故殷人尚之以質君子質矣小人失之鬼救鬼莫如文故周人尚之以文君子文矣小人失之鄙救鄙莫如忠是故白黑青黄旋相為尚者色之濟也英華果實旋相為變者物之成也居賁飾之極當文窮之時可無拯救之權乎以忠信誠慤之心為嘉㑹合禮之飾率真純朴素之務為俯仰進退之容則是挽太始于波靡之日回淳初于亨盡之時當國者之盛事也曷使天下之靡靡乎是之謂以質為文以素為絢淮南子曰舉大木者前呼邪許後亦應之此舉重勸力之歌也豈無鄭衛激楚之音哉然而不用者不若此其宜也治國有禮不在文辨嗚呼此伊周之訓誥蕭曹之清浄平勃之寧壹所以為天下萬世大臣之準歟雖然馬廖有言改政移風必有其本唐代宗以楊綰為中書侍郎制下之日朝野相賀郭子儀方宴客聞之減坐中聲樂五分之四京兆尹黎幹騶從甚盛即日省之止存十騎中丞崔寛第舍宏偉亟毁之此可以回天下矣不然是為公孫之布被而窮奢自在徒為惡賔之嗤揚雄之瓦器而淫濫不救終為千古之姍矣則亦何益之有乎易曰白賁无咎剥不利有攸往何也葉子曰長木之斃無不摽也國狗之瘈無不噬也隂自下起則駸駸之勢其漸不可遏彼落我矣陽自上觀則怱怱之微其盡不可保我將落矣小人盛而君子衰君子將何之哉漢徴魏桓桓不行其鄉人勸之桓曰夫干禄求進所以行其志也今後宫數千其可損乎廏馬萬匹其可減乎左右權豪其可去乎皆對曰不可桓曰使桓生行死歸于諸君何有哉裴頠薦韋忠于張華華辟之忠辭疾不起人問其故忠曰張茂先華而不實裴逸民欲而無厭棄典禮而附賊后此豈大丈夫之所為乎逸民每有心托我我常恐其溺于深淵而餘波及我况可搴裳而就之哉楊駿辟王章為司馬章逃不受其友怪問之章曰自古一姓二后鮮有不敗况楊太傅昵近小人疎逺君子專權自恣乎吾踰海塞以避之猶恐及禍奈何應其辟乎亞聖之後有孟文龍者廢于賈似道後史弼等列薦起之文龍答書曰文龍未死慚負明神羣公相國以忠孝文龍為羣公起將何以令今之事君者敢以死辭噫若數子者知天行矣不然若前漢王式與諸博士共薦詔除為博士既至為江公所辱式恥之謂諸生曰我本不欲来諸生勸我竟為孺子所辱遂謝病歸若此者雖往何益可謂不諗消息盈虚之故不察進退行藏之宜矣易曰剥不利有攸往初六剥牀以足蔑貞凶何也葉子曰毒甚者機不𤼵之驟奸深者禍必探其端小人之欲凶于而國也夫豈遽及其國害于而身也夫豈遽及其身哉滅乎下使上承者無其具懸其上使下倚者無其資夫然後一推而可蹶一撼而即仆天下之事不中其奸不墮其計者鮮矣李斯趙髙佐始皇坑殺學士盡用法律之徒俾髙義儒者野蹲而草伏而天下盖岌岌焉李林甫為相欲蔽塞人主視聽自專大權明召諫官謂曰今明主在上羣臣將順之不暇烏用多言諸君不見立仗馬乎食三品料一鳴輙斥去悔之何及補闕杜璡嘗上書言事明日出為下邽令自是諫諍路絶人主孤立漁陽一嘯而唐室亡矣嗚呼衆君子者人主之股肱天下豈有手足折而身獨立者乎易曰剥牀以足蔑貞凶六二剥牀以辨蔑貞凶何也葉子曰小人之禍猶之蛇虺然中乎一肢未有不徧于四體者也及于四體未有不攻其心腹者也誅小臣而小臣盡矣進而及大臣也曽是而有忌乎滅逺臣而逺臣盡矣進而及邇臣也曾是而復顧乎趙髙勸始皇殺學士立法吏矣已而勸二世族大臣而逺骨肉盡除去先帝之舊臣更置陛下所親信于是殺大臣蒙毅等公子十二人僇死咸陽市人人自危欲叛者衆而楚戍陳勝等作亂豪傑並起而亡秦矣九齡罷林甫相一日殺三子而天下之事尚可為乎易曰剥牀以辨蔑貞凶六三剥之无咎何也葉子曰兩虎相嚙則人可逸兩䮘相鬭則馬可走邪剥正將盡竟與類為釁隂消陽已極竟與黨相軋其趙髙誅李斯國忠激禄山之時乎君子于此可以獲弛擔之利矣故齊楚為釁髙祖可以息肩汜㴶相治承奉得以少紆王吕相傾子瞻得以緩死易曰剥之无咎六四剥牀以膚凶何也葉子曰水自地出而及于簀火自燎突而入于寢必然之勢也不決諸地不滅諸突而曰水火不為吾害有是理乎撼其卧而不使之安則卧必墜敲其寢而不使之息則寢必驚斯為禍矣傳曰所謂禍在此矣及身之謂也股肱折手足腹心裂患豈在外乎趙髙前數言闗東盗無能為及項羽虜秦將王離等鉅鹿下而章邯等數却燕趙齊楚韓魏皆為立王自闗以東大扺盡叛秦諸侯咸率其衆西鄉沛公已屠武闗髙恐二世怒誅及其身乃使其壻閻樂等將兵入望夷宫劫二世令自殺召子嬰立之嬰立三月而秦亡矣漁陽之兵一起而明皇竄蜀切近之災夫安得而逃之乎易曰剥牀以膚凶六五貫魚以宫人寵无不利何也葉子曰魚潛在藻或躍于淵孰能貫之聖人之權貫之奚為承寵于陽曷其承之以植天綱嗚呼斯文王率商之叛國以事紂者乎彼以慕仁而歸周吾則倡義以事紂彼以怨紂而来歸吾以事紂而復往翊恭王室而大義因之自明焉稽首商庭而大分為之自定焉則欲逃之父母之國者至是而無所逃于天地之間無所逃于天地之間者至是而無解于惻隠之心矣民雖畔商而不亡商民雖歸周而不臣周文王此意盖深逺哉噫非内文明而外柔順之聖人其孰能與于此故曰周之徳其可謂至徳也已矣易曰貫魚以宫人寵无不利上九碩果不食君子得輿小人剥廬何也葉子曰孤陽在上引而未絶大命近止間不容髪有文王則天下紂之天下也文王且服事之而况其他乎無文王則為曹操之漢獻司馬昭之髙貴鄉公劉裕之晉恭帝本實蹶焉而枝葉之害一果之實誠不足數也雖然華督欲弑君而憚孔父劉安欲叛漢而憚汲長孺曹操欲簒漢而憚孔融世變之極茍有一士大夫直躬履方義形于色者居于其間力雖不足其威望猶足以折奸人之心况身為文王而當紂世者乎下至唐宦者張承業從晉唐亡十六年而忠心耿耿不忘舊君能使李存朂終身以復仇為事承業卒六月而亞子稱帝所謂天地間不可一日無君子信矣嗚呼均一命絶之夫也遇君子則存遇小人則亡其在幸與不幸之間乎易曰碩果不食君子得輿小人剥廬復亨出入无疾朋来无咎反復其道七日来復利有攸往何也葉子曰君子不患吾道之不行而惟患陽徳之不長不患陽徳之不長而惟患天運人事之不周天運回人事善陽道盛而萬事舉矣宋之神宗誤用安石而天下無復生意陽徳或㡬乎絶矣哲宗以幼冲踐祚宣仁同政初年召用司馬光吕公著諸賢罷青苗復常平登俊良開言路天下人心翕然向化為元祐之政庶㡬仁宗天下正氣乆屈而不伸者至是能無一達矣乎故蔡確免安石卒惠卿竄而馬吕之動作無抑塞蘇軾言變法宜漸范純仁言差役緩行程頥舉坐講禮而諸賢之進退無碍阻太平之風可指日而致雍熈之治可刻期而得矣尚何功之懼不成而業之慮不就耶故曰陽春布徳而天下無滯物元精㑹氣而四體無僝形易曰復亨出入无疾朋来无咎反復其道七日来復利有攸往初九不逺復无祗悔元吉何也葉子曰今之君子過則順之豈徒順之又從為之辭小人之長惡非乎而曹操之下令是已始焉誦茅鴟而不覺既而歌相鼠而不知下愚之㝠頑非乎而慶封之為使是已若此者望其知過且不能而况于改乎是故楚靈之不能自克以及于乾谿之難商鞅之不知變而蒙車裂之禍古今盖不少也故曰已矣乎吾未見能見其過而内自訟者也此周處為百世之俊傑而下至唐坰之類亦君子之所與矣雖然困于心衡于慮而後作徴于色𤼵于聲而後喻其為不自得也亦大而其為力也亦勞矣若夫不思而未得不勉而未中或者有心過焉然生于其心而即明于其心不復萌于心從容未中道從心或踰矩或者有身過焉然形于其身而即察于其身不復履于身是終其身不特無口過而亦無身過不特無身過而亦無心過天命流行至誠在我下聖人一等信非顔子不足以與此矣易曰不逺復无祗悔元吉六二休復吉何也葉子曰獨逺于實者良能或困于愚蒙比之匪人者天性或戕于險惡固雖苦心而極力人一而已百將何以為明善而復初乎嗚呼此魯之多賢子賤易以成徳事其大夫之賢友其士之仁子貢所以為仁也與易曰休復吉六三頻復厲无咎何也葉子曰夫人不能無過而難于知過夫人不患于有過而貴于改過方其過也如日月之食焉虧大明而塞昏暗天道㡬乎息矣棄天䙝天將于是在危孰甚焉及其更也人皆仰之其何傷于日月乎嗚呼斯欲寡未能伯玉雖行年五十而猶有四十九年之非不為過也孔子曰回也其心三月不違仁其餘則日月至焉而已矣方其違之而去之也若是乎道心微而人心危也及其不違而至之也仁在其中矣吾何尤焉雖然由日月而三月則賢矣由三月而不息則聖矣方三月而必違之至三月而必去之天命不㡬于泯乎此君子所以貴于知之未嘗復行也與易曰頻復厲无咎六四中行獨復何也葉子曰同流而合汙者庸人之不克自樹也希聖而親賢者英豪之所以自拔也孟子曰待文王而興者凡民也若夫豪傑之士雖無文王猶興不其然乎然則自振于流俗之中而親賢以成其徳挺拔乎汙濁之世而私淑以善其身無謂世無其人也南容生孟氏之門司馬牛在桓魋子頎子車之列而獨從孔子陳良生于楚悦周公仲尼之道北學於中國三子者其古之豪傑非乎有道而不知從見聖而不克由斯陳瓘所以有責沈之文而成王所以為君陳之戒也吾于孟僖子有餘美焉何也蘇子之言曰夫人之聖其少也賤天下莫知其為聖人魯人曰此吾東家丘也又曰此鄹人之子也楚子西齊晏嬰所謂賢人君子也其言曰孔子之道迂濶而不可用况夫三桓之間而孰知有夫孔子哉僖子之病也告其子曰聖人有明徳者若不當世其後必有達人今其將在孔子乎我若獲没必屬説與何忌于夫子使事之而學禮焉以定其位嗚呼孔子用于魯三月而齊人懼其霸以僖子之賢而知其為聖也使其未亡則必授之政而魯其為東周矣雖然夫子之道充于天下自僖子始懿子學乎仲尼請于魯君而與之車使適周觀禮焉而聖人之業然後大備僖子之功雖不能用之于未亡之前而猶能救之于已沒之後宜夫子稱之為補過君子也易曰中行獨復六五敦復无悔何也葉子曰帝王之所以成其徳者三一曰生質之美二曰學問之功三曰輔導之力堯舜之允執其中無假于學問輔導者也成王之敬迓天威嗣守文武大訓無敢昏逾則自治之勤矣康王之自亂于威儀無以其冒貢于非㡬豈非賢徳是頼乎質為上學次之教又次之然則深潛純粹天理之所以常存忠信誠篤外誘之所以不入無資于物無賴于勤豈非美徳之自成人主之髙致乎漢之文宋之仁其殆庶㡬矣一則二十三年之間專務以徳化民一則四十餘年如一日誠為切近矣然而不免黄老之雜用君子小人之叢進則不能不下成康一等也噫易曰敦復无悔上六迷復凶有災眚用行師終有大敗以其國君凶至于十年不克征何也葉子曰禍莫大于重回首愚莫甚于履畏途昔者仲虺于成湯不稱其無過而稱其改過仲山甫于宣王不望其無闕而望其補闕古人不徒然也復見天地之心而况于人乎楚靈王方㑹諸侯于申誅齊慶封作章華臺求周九鼎志小天下亦已侈矣及右尹子革誦祈招之詩以止王心乃揖而入饋不食寢不寐數日不能自克以及于難仲尼曰古也有志克已復禮仁也信善哉楚靈王若能如是豈其辱于乾谿然則古今小人以亢滿之資履崇髙之位至于遂其奸而不改迷于邪而不復鮮有不禍于而身天災人眚之畢集害于而國喪師戚君而不振者勢所不免也莫敖狃于勝而自用而曰諫者有刑子玉逞其剛而無禮而曰願以間執讒慝之口是以一則有伐羅之敗北一則有城濮之喪師噫荒谷之縊連穀之死將能逃乎卒使楚失其威而喪其霸沒世不可用也悲哉袁紹趙染劉琨亦然官渡之戰田豐切諫紹不聽卒至大敗紹恚曰諸人皆閔孤獨田别駕以為快幸其言之中也遂殺豐劉曜趙染宼長安索綝出拒之染有輕綝之色長史魯徽曰晉之君臣自知强弱不敵將致死于我不可輕也染曰以司馬模之强吾取之如拉朽索綝小豎豈能汙吾馬蹄刃刃乎晨率輕騎數百逆之曰要當獲綝而後食琳與戰于城西兵敗而歸悔曰吾不用徽言至此何面目見之先命斬徽徽曰將軍愚愎以取敗乃復忌前害勝猶有天地其得死于枕席乎染攻北地中弩而死劉琨奢豪喜聲色徐潤以音律得幸驕恣干與政事䕶軍令狐盛數以為言琨怒殺之琨母曰女不能駕馭豪傑以恢逺略而專除勝已禍必及我盛子泥奔漢具言虚實劉聰乗虛入晉陽琨救不及率數十騎奔常山泥殺琨父母此其剛愎之取禍理有所不免矣易曰迷復凶有災眚用行師終有大敗以其國君凶至于十年不克征葉八白易傳卷六
