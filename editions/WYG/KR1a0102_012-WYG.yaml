body:
  text: 葉八白易傳卷十二明葉山撰萃亨王假有廟利見大人亨利貞用大牲吉利有攸往何也葉子曰吾嘗觀之堯舜三王之世矣天地交而隂陽和萬物㑹而貨食足君臣契而大道行萬民恊而天下熈此物生全盛之候天人交㑹之機也不其至盛矣乎惟聖人處盛有道焉何也萃者渙之根渙者萃之原将交渙而不交神是不告也不告則昧本而弗能聚渙己聚而神不交是不報也不報則忘本而聚復散萬物本乎天人本乎祖本其可忘乎劉𤣥徳即位而大祫禘宋太祖登極而立四親廟知此道矣萃者蹇之平蹇者萃之傾方在蹇而無大人孰與開創無開創則業不就已就聚而無大人孰與保成無保成則聚復散自古有治人無治法人其可無乎晉武帝疏杜預用賈充而成永嘉之禍唐罷張九齡相李林甫而釀天寳之亂可以鑒矣萃者損之反損者萃之簡損而祭之厚是為大阜大阜則神有時恫物有所萃而祭之薄是為不足不足則神有時怨牲牷肥腯粢盛豐備然後明徳以薦馥香犧牲不成粢盛不潔不敢為賜薄而請之厚享其可茍乎哉萃者剥之對剥非萃之配剥落而有事是為㝠行㝠行者往而困萃聚而無為是為費事費事者失時極講藝於投戈之後則禮樂積徳而可興修文於偃武之日則詩書比屋而可講事其可廢乎哉非天下之至精其孰能與於此易曰萃亨王假有廟利見大人亨利貞用大牲吉利有攸往初六有孚不終乃亂乃萃若號一握為笑勿恤往无咎何也葉子曰君子之於天下也兩不可相背猶當觀諸其㑹通兩不必並與夫安得而浮游其志意哉里克於獻公之私則告之以慈于申生之懼則告之以孝可謂善處其父子矣其後驪姬之奸謀欲成優施之巧言漸惑乃曰秉君而殺太子吾不忍通復故交吾不敢中立其免乎夫克不知狥貞之道㑹通之宜而為浮游之態卒使奸謀成而晉禍稔變其初心之過也雖然克非附姬以反友也特其不學無術徒知父子之間當兩全而不知邪正之間必不可以並而立是以一悞而至此故東莱責之曰兩刄之下人不容足兩虎之鬬獸不容蹄驪姬申生之際夫豈人臣中立之地哉夫中立且不可而况叛正而與邪哉叛正而與邪難乎免於世之姍而笑矣雖然人言不足恤而吾之禮義必不可愆失之於初猶可反之於後也詩曰士也罔極二三其徳君子姑勿論其始語曰無適無莫義之與比君子不可不正其終魏舒初從欒書之亂既而乃歸范宣子召伯盈初已從王子朝之僣既而乃從劉文公君子之所與也髙季興之叛唐也其子從誨切諌不聽既襲位謂僚佐曰唐近而呉逺唐正而呉逆非計也乃由楚王殷以謝罪於唐求復脩職貢亦庶乎近之若輕於背與國妄以附强家如魯宣之舍齊而媚晉欲以去三桓而强公室則臣不可保而出奔君無如何而事輟矣寧不為天下後世哂哉又况既從朝廷復叛朝廷既從靈寳復叛靈寳若劉牢之者則去吕布無異矣君子何所齒哉易曰有孚不終乃亂乃萃若號一握為笑勿恤往无咎六二引吉无咎孚乃利用禴何也葉子曰君臣一體呼吸同情齊桓禮東野之九九朞月而四方之士相導而沓至燕昭王延郭隗以致士未幾而樂毅自趙往劇辛自齊往君之引其臣也從古則然矣當間隔之際遇剥落之時臣獨不當引君以相聚引類以聚君乎多方以求遂其魚水之歡委曲以求致其明良之㑹若鄭之以齊朝王若魯之以衛㑹晉若靡之於少康崎嶇亂離之間復禹迹還舊都若雲長之於先主厯五闗斬諸将而追赴汝南若韓滉之於劉𤣥佐約為兄弟請拜其母遺之錢以備行装出金帛以勞軍士卒使一軍傾動𤣥佐驚服遂與曲環俱入朝此其誠意為何如固所以行無所逃之義亦所以盡不可解之心也上帝有不享而明神有不福之者乎易曰引吉无咎孚乃利用禴六三萃如嗟如无攸利往无咎小吝何也葉子曰君子之於天下也備盛徳至善則終不可諠兮有威儀風度則秉彛者好徳故使人之未見也有翹然願見之心其既見也有戀然願留之心至其不可留而去也則有悵然恨失之心李膺黄憲之於漢明道温公之於宋是可見也乃若不為流俗之所容何邪豈不以下交者道徳之助也我之不賢人将拒我矣雖凟之而奚益上交者功業之引也我非其人則棄之如遺矣雖謟之而奚為乎是故下焉者獲魯賢之多而不我與盡青雲之志而莫我親上焉者多田文之愛客而莫我收同鄭荘之好賢而莫我顧倀倀乎其何之矣其父母國人皆賤之無所容而承以羞者乎推其極商鞅之投民舍章惇之走雷州斯其類矣山澤納汚川藪藏疾瑾瑜匿瑕國君含垢無已其求之上乎雖然我非出門之誠彼無炙手之勢則亦何益矣君子所以貴自奮也不然周禎漢雋将何足羡焉易曰萃如嗟知无攸利往无咎小吝九四大吉无咎何也葉子曰君子所以大居正也何者衆皆仰之君子之樂事也或者違道以干譽乎君無尤焉君子之大欲也或者逢迎以為悦乎中正以觀天下精白以承休徳為伊尹為周公斯無愧矣不然季氏世脩其勤而得魯衆田氏家貸公入而齊民徳之是國賊也張禹孔光之昵於漢林甫盧把之比於唐是民蠧也而可乎故曰進不負其君退不愧其民君子哉以其所不負者卷而藏之以繹天下之思沒而為遺愛夫是之謂不負詩曰蔽芾甘棠勿剪勿伐召伯所苃是已以其所不愧者舉而措之以對天下之望去而為遺澤夫是之謂不愧詩曰芃芃黍苗隂雨膏之四國有王郇伯勞之是已易曰大吉无咎九五萃有位无咎匪孚元永貞悔亡何也葉子曰君天下有道皇極之敷是也感天下有機愛人不親反其仁治人不治反其智是也荀卿之言曰君者何也能羣也羣者何也善生養人者也善班治人者也善顯設人者也善藩餙人者也善生養人者人親之善班治人者人安之善顯設人者人樂之善藩餙人者人榮之四統者俱而天下歸之夫是之謂能羣能羣則君道盡矣詩曰自西自東自南自北無思不服此之謂也雖然苗民逆命帝乃誕敷文徳伐崇不降文王退脩政敎凢有血氣莫不尊親雖聖人配天之盛而朕躬有罪無以萬方又聖人事天之誠聖人豈固舍己而顓求之人者哉故曰無然畔援無然歆羡又曰不大聲以色不長夏以革若譚子以無禮誅曹共公以不禮伐則王徳衰而躬不厚矣區區責人而罪彼何為者哉易曰萃有位无咎匪孚元永貞悔亡上六齎咨涕洟无咎何也葉子曰天下㑹合之際公卿大夫聚於朝明經孝亷聚於鄉進之則行道退之則脩徳時之盛樂之極也吾獨倀倀乎奚之不為天下之棄物乎欲允升而為常安民之所攻将來連而為陳同甫之所逃斯其可悲已矣憂懼而不寜哀痛之日甚其将能已乎雖然悲哀疾痛之地庶幾反身修徳之鄉自怨自艾之餘抑亦克終厥徳之候可則為太甲之善反不可則昌邑之不克終矣可不慎乎易曰齎咨涕洟无咎升元亨用見大人勿恤南征吉何也葉子曰日月之呉而落也景物為之收含草木之伏而歸也枝葉為之憔悴及其離海角而麗中天則景開而物動感陽和而舒發則枝暢而葉伸何也時也是故物必遭時聖賢不能違時堯之大明於上不但九官十二牧之甄抜超擢也雖深山之側㣲有鰥之匹夫方且一舉而登庸之而况其他乎春秋日昃之離秋末之候也戰國日入地中隆冬之逼也孔孟休矣他尚何説焉是故物必遭時聖賢不能違時易曰升元亨用見大人勿恤南征吉初六允升大吉何也葉子曰塵埃之中物色之所不來大行之下然諾之所並起世之態人之情也𫝊曰鳳凰之初起也翾翾十步之雀吚喔而笑之及其升於髙一屈一申展而雲間藩木之雀超然知其不及逺矣士褐衣緼著未嘗完也糲藿之食未嘗飽也世俗之士即以為羞耳及其出則安百議用則延民命世俗之士超然自知不及逺矣故淮南子曰百里奚之飯牛伊尹之負鼎太公之鼓刀寗戚之商歌其美有存焉者矣人見其位之卑賤事之汚濁而不知其大畧以為不肖及其發於鼎俎之間出於屠沽之肆解於縲絏之中興於牛頷之下洗之以湯沐祓之以火立於本朝之上倚於三公之位内不慚於國家外不愧於諸侯符志有以内合乃始信於異衆也故未有功而知其賢者堯之知舜也功成事立而知其賢者衆人之知舜也雖然賢人之才徳石藏於玉時人未之知也而和則知之故鮑叔之識仲不待於葵丘而一軍皆驚此子亦參政是横目之常度必待其樹功揚名而後人人無異訿甚而宋璟亦曰不意韓休乃能如是矣若小人之邪惡狐為美女衆人未之知也而賢亦為所欺故歐陽修為王安石延譽趙鼎薦秦檜可大用而蘓眀允之辨奸晏敦復之憂色古今盖罕有矣豈惟君子之善定於成功雖小人之惡亦且彰之於事定也哉易曰允升大吉九二孚乃利用禴无咎何也葉子曰君臣之間甚矣其難合也而亦易投也何也其始也相遇之疎而難合是以三聘猶嫌其為簡七戒猶懼其或輕光武撫嚴光之腹曰咄咄子陵不可相助為理耶光乃張目熟視曰昔唐堯著徳巢由洗耳士固有志何至相迫乎及其終也相湏之殷而易投則固契以心而不以迹交以誠而不以偽臣有所當為雖遂事而不為専上有所重發雖衡命而不為悖股股心膂通為一身安事外餙之虚文乎書曰惟尹躬暨湯咸有一徳克享天心此之謂也耿弇破張歩光武車駕至臨淄自勞軍羣臣大㑹帝謂弇曰昔韓信破厯下以開基将軍攻祝阿以發迹此皆齊之西界功足相方而韓信襲擊已降将軍獨拔勁敵其功又難於信也又田横烹酈生及横降髙帝詔衛尉不聽為仇張步前殺伏隆若步來歸命吾當詔大司徒釋其怨此事尤相類也将軍前在南陽建此大䇿常以為落落難合有志者事竟成也劉𤣥徳與諸葛孔明歡同魚水與闗侯張飛相友善寢則同牀恩若兄弟而稠人廣坐侍立終日隨備周旋不避艱險至其南北各處獨行萬里專决自便不煩一表以相明君臣之際良可詠矣易曰引吉无咎孚乃利用禴九三升虗邑何也葉子曰古之君子生不逢其時進不遇其君則舉足為茅塞之蹊觸目皆羸角之藩王侯之國俱壁壘之固也哀哉故曰謂天盖髙不敢不局謂地盖厚不敢不蹐及其出剛方果毅之才用正直聰明之徳遭大明熈洽之時遇神聖仁厚之主則運籌合上意諫諍見聽用進退得闗其忠任職得行其術去卑辱奥渫而升本朝離蔬釋蹻而享膏粱上下俱歡千載一㑹翼乎如鴻毛遇順風沛乎若巨魚縱大壑欣欣乎其得意之甚坦坦乎其何天之衢而豁達無碍動而不括矣此王褒所以為聖主頌也與噫非二八諸公之在堯舜之世不足以語此易曰升虚邑六四王用享于西山吉无咎何也葉子曰君子不以爵禄為榮華也而憂則違之確乎其不可拔亦不以山林為避就也而樂則行之沛然莫之能禦然則其行其止無適無莫也而時行時止焉耳以時而進進豈有窮乎一人信其忠而舉朝服其信咸有一徳而克享天心盖謂此矣三聘而起之伊尹三顧而出之孔明非乎而歡若魚水王心以寜是已故君子祭不欲數數則煩煩則不敬祭不欲疎疎則怠怠則忘是故其祈焉其報焉其由辟焉無先後也時舉則舉時廢則廢焉耳以時而祭神其吐之乎故曰懐柔百神及河喬嶽又曰陟其髙山允猶翕河敷天之下裒時之對時周之命易曰王用享于西山吉无咎六五貞吉升階何也葉子曰天下大器也君天下大事也理之得其道則日裕而見其甚易不得其道則日蹙而見其為難何也慎與肆也慎其始則終易肆於前則後艱昔者魏文侯問元年於呉子呉子對曰言國君必慎始也慎始奈何曰正之正之奈何曰明智易曰正其本萬事理差之毫釐繆以千里是故君子貴建本而重始荀子曰天子即位上卿進曰如之何憂之長也能除患則為福不能除患則為賊授天子一䇿中卿進曰配天而有下土者先事慮事先患慮患先事慮事謂之接接則事優成先患慮患謂之豫豫則禍不生事至而後慮者謂之後後則事不舉患至而後慮者謂之困困則禍不可豫授天子二䇿下卿進曰儆戒無怠慶者在堂弔者在閭福與禍鄰莫知其門豫哉豫哉萬民望之授天子三䇿故成康慎乃在位恵文清净寜壹光武兢兢保守不敢逺期十年則為天下君安而不危存而不忘治而不亂秦隋之君蕩而不法則為天下更大艱難求為匹夫而不可得矣故曰春秋之義有正春者無亂秋有正君者無危國易曰貞吉升階上六㝠升利於不息之貞何也葉子曰天下之最不可過求者身外之物故造物者忌多取天下之最不厭多求者反身之功故仁以為己任者必死而後已知進而不知退知存而不知亡知得而不知䘮李斯而下諸人安在其不敗哉老子曰功成名遂身退天之道伊尹曰臣罔以寵利居成功魏野詩云西祀東封今已了好來相伴赤松遊張良之辟榖兩疏之見幾張翰之思鱸司馬孚武攸緒之髙卧錢若水之急流勇退五代荆南梁震佐成髙氏基業後乃曰先王待我如布衣交以嗣王屬我今能自立不墜基業吾老矣不復事人矣遂固請退居髙從誨不能留乃為之築室於土州震披鶴氅自稱荆臺隠士嗚呼不以利禄眯其心則庶乎知進退存亡而不失其正矣去滔滔者不亦逺乎惜乎天下以求仁之功為求利之謀者多移求利之心於求仁之道者寡何也仁不可足也故不可息也先達有言古之君子恒不足窮不足於學達不足於治何也天地至大萬物至衆億世至逺而君子以一心之㣲而欲探萬物之理以一身之渺而欲配天地之徳以百年之湏臾而欲立乎億世之上億世之下不如是不已也既如是不息也庸可足乎一職易盡一方易理伊欲聖元后端百揆熙萬姓旁達四方之外蠻夷戎狄之衆上及飛鳥下及魚鱉與夫跂行喘息蠕動之物根荄之植皆萃以蕃山川鬼神皆寧以謐七緯順而氛祲㣲三辰和而雨𤾉若餘波浸乎後世然後為治之至也而君子病之又可足乎舜禹周公聖人也治莫踰焉然舜猶好問好察禹猶一饋十起周公猶一沐三握非不足於治邪孔子聖人也學莫踰焉猶好古敏求而無常師入太廟每事問非不足於學邪天覆萬物而不息以為髙地載衆形而不息以為厚是之謂不足不足則不息矣故昔者子貢問於孔子曰賜倦於學矣願息事君孔子曰詩云温恭朝夕執事有恪事君難焉可息哉然則賜願息事親孔子曰詩云孝子不匱永錫爾類事親難焉可息哉然則賜願息於妻子孔子曰詩云刑於寡妻至于兄弟以御于家邦妻子難焉可息哉然則賜願息於朋友孔子曰詩云朋友攸攝攝以威儀朋友難焉可息哉然則賜願息於耕孔子曰詩云晝爾于茅宵爾索綯亟其乘屋其始播百榖耕難焉可息哉然則賜無息者乎孔子曰望其壙宰如也填如也鬲如也此則知所息矣子貢曰大哉死乎君子息焉小人休焉嗚呼此君子之所以俛焉日有孜孜斃而後已也雖然亦有斃而未已者史魚自以不能進蘧伯玉退彌子瑕既死猶以屍諫靈公卒用伯玉而退子瑕孔子稱之曰忠感其君郗超恐父之哀其死而成疾遂令門生進其一箱與桓溫往返密謀書父果怒曰小子死已晚矣遂不復哭朱子書其卒而不去其官嗚呼君子遽以死而已其事哉易曰冥升利子不息之貞困亨貞大人吉无咎有言不信何也葉子曰蜻蜓四翼横空無極螻蟻制之翼足俱食騏驥千里日馳不已僕夫曳之跬步不起然則有雄豪横絶之才而當憸壬險陂之厄其何以振拔而有為邪此君子之身所以憊而乏君子之用所以窒而窮乎雖然可危者身不可危者心阨我者時不阨我者道身險而心説則身屈而道道困而安失其所亨乎荘生有言寖假而化予之左臂以為雞予因以求時夜寖假而化予之右臂以為彈予因以求鴞炙寖假而化予之尻以為輪以神為馬予因而乘之豈更駕哉且夫得者時也失者順也安時而處順哀樂不能入也斯之謂天下之大通斯之謂天下之至正雖然此豈易為哉剛於中斯百險不能隕其正正於己斯千憂不能䘮其樂非仲尼之弦歌顔子之不改栁下惠之不怨不憫不足以語此故曰樂天知命故不憂又曰天所命者通極於性遇之吉凶不足以戕之雖然禍敗之來皆天也人不必以煩辭宣阨窮之遇皆命也機不容以詭辭避莊生有言父母於子東西南北惟命之從隂陽於人不啻父母彼近吾死而我不聽我則捍矣彼何罪焉今大冶鑄金金踊躍曰我且必為鏌鋣則大冶必以為不祥之金今一犯人之形而曰人耳人耳則造化必以為不祥之人然則舍困亨之腴而求亨困之㨗廢而示用屈而宣申若李斯之為者人誰與之祗益其窮而已矣嗚呼此臣罪之當誅念天王之明聖文王之所以為文也易曰困亨貞太人吉无咎有言不信初六臀困于株木入于幽谷三嵗不覿何也葉子曰弱而不足以自振者才之末也暗而不足以自拔者質之昏也生於太平長於太平猶未足以覲日出之光而况憸壬得志濁穢溷溺之時乎詩曰其何能淑載胥及溺又曰多将熇熇不可救藥嗚呼此唐末諸士貶官於白馬驛而朱全忠一夕殺之君子以為既無先見之明又無克亂之才有隕而已矣雖然元稹一經挫折不克固守忠直古人謂之下喬入幽秖自毁壊盧擕初年奏疏意氣甚壯後凂北司以至仰藥君子謂之溷厠終身可不慎乎易曰臀困于株木入于幽谷三嵗不覿九二困于酒食朱紱方來利用亨祀征凶无咎何也葉子曰君臣之遇士君子之所甚欲也委任之多而不克畢其多付托之重而不能悉其重亦其所甚病矣多與重不足以病君子也時之不利命之不濟所由以病也夫我之所以獲於上者已多而不可解而上之所以多乎我者方殷而未之艾則以平日成功之地而於今適為困苦之機矣君子於此将何為哉守至誠以待天命之來積孚敬以格神明之祐而已矣此居易俟命之正鼓缶而歌之常道也不度時而必欲功之成不安命而必欲事之濟取敗而已矣文天祥張世傑陸秀夫豈不可哀也哉雖然尤有可哀者焉不允其聴天而必欲其回天不使其俟命而必使之隕命若唐昭宗之於杜讓能是則重可哀矣李茂貞恃功驕横上表大肆不恭昭宗决策討之命讓能専掌其事讓能諌曰陛下初臨大寳國􅇍未夷李茂貞近在國門未宜搆怨萬一不克悔之無及上曰王室日卑號令不出國門此志士憤痛之秋朕不能坐視陵夷卿但為調兵食讓能曰陛下必欲行之中外大臣宜協力以行其志不當獨以任臣上曰卿位居元輔與朕同休戚不宜避事讓能泣曰臣豈敢避事顧時有未可勢有未能恐他日徒受晁錯之誅不能弭七國之禍也敢不奉詔以死繼之乃命讓能留中書計畫調度月餘不歸未幾茂貞拒官軍官軍潰茂貞表讓能罪請誅之連貶為雷州司户茂貞勒兵不解連表請誅讓能然後還卒賜之死嗚呼事不濟而理固無尤身則死而國亦何益若讓能者亦重可哀也已易曰困于酒食朱紱方來利用享祀征凶无咎六三困于石據于蒺藜入于其宫不見其妻凶何也葉子曰禍莫大於使强役於弱愚莫甚於眯仇以為親荆蠻之狡楚成之强天下所知也而宋襄以亡國之餘與之争霸欲使横行江漢之雄俯首而聴命於不仁不智之醜其不磨其虎牙而滋其虎吻者天下無是理也雖然使吾之黨親而可據據之而可得以為安猶有幸也是故鹿上之盟幸脱虎口有齊在耳盂之㑹齊懼楚而不至陳蔡許皆其與國獨有曹為中國之資而實宋之仇矣安得而不為所執哉况一㑹而虐二國之君又不免諸侯之所共疾則夫視其執視其釋如玩嬰兒於掌股之上乃諸侯之同欲也又安望其合謀而救乎嗚呼不幸而當齊桓既沒之餘又不幸而當楚成方强之始國之危亡無日矣獨有内據子魚外據齊魯曹衛可以稍安而宋襄反之安能免於死邪故傳曰己困而不見據於賢人困之困者也昔者秦穆公困於殽疾據五羖大夫蹇叔公孫枝而小霸晉文困於驪氏疾據舅犯趙衰介子推而遂為君越王勾踐困於㑹稽疾據范蠡大夫種而霸南國齊桓公困於長勺疾據管仲寗戚隰朋而匡天下此皆知困而疾據賢人者也不據賢人不亡何待詩曰人之云亡邦國殄瘁無善人之謂也故荀子曰南方有鳥名曰蒙鳩以羽為巢而編之以髪繫之以葦苕風至苕折卵破子死巢非不完也所繫者然也易曰困于石據于蒺藜入于其宫不見其妻凶九四來徐徐困于金車吝有終何也葉子曰君子之材調大而偉故其强力足以起天下之幽君子之器度正以宏故其義聞足以排天下之障齊桓起北杏同盟幽而天下信其信仁其仁則不召而至者江人黄人也晉悼圍彭城城虎牢而天下畏其威懐其恵則望華而改於尸者陳成公也荆楚雖强其奈三國何而三國亦何厄楚之有哉晉靈立於少而趙盾始當國鄭衛之東望也乆矣曰庻㡬其有瘳乎而間闗迤􅆔直至衛㑹魯成公於沓鄭㑹魯成公於棐然後合而成之以去楚嗚呼此豈大丈夫之生世舉一世而安全之者之事乎規模之庳萎氣局之鄙陋夫亦不足觀矣雖然材力之不勝氣勢之不足吾無憾也是故呉公能薦賈生而不能决絳灌之䜛士㒟能以百口保飛而不能囘秦檜之賊可惜也已若夫劉封孟達不救麦城之難賀蘭進明不救睢陽之圍斯則罪之大者其於悲墜屨而哭亡簪不亦逺乎易曰來徐徐困于金車吝有終九五劓則困于赤紱乃徐有説利用祭祀何也葉子曰天以時為權地以財為權人以力為權君以令為權失其殺奪予施之威福亡其進退廢置之政柄則不利我而害我不餙我而妨我一身之外皆荆棘左右之餘皆坑谷又可以為君乎何也管子曰為人上者釋法而行私則為人臣者援私以為公行公道而托其私焉寖久而不知奸心得無積乎奸心之積也其大者有侵殺逼上之禍其小者有内争比周之亂所以然者由主徳不立而國無常法也主徳不立則婦人能食其意國無常法則大臣敢侵其勢大臣假於女之能以規主情婦人寵嬖假於男之智以援外權於是乎兵亂内作以召外冦矣此周赧漢獻之受制於强臣唐文宗之受制於家奴昭宗自討李茂貞後朝廷動息皆禀邠岐南北司往徃依附二鎮以邀恩澤千古之恥也曠嵗而待時命則大福不再脩徳以享天心則上帝不蠲嗚呼若之何其不亡乎吾有取於夏之仲康焉后羿廢太康而立仲康仲康不得有為於其國矣然能内存不肯受制之心外韜不敢有為之氣卒之命𦙍侯掌六師以收其兵權征羲和以剪其羽翼終其身使羿不得逞斯則善於處變矣易曰劓刖困於赤紱乃徐有説利用祭祀上六困于葛藟于􅔨卼曰動悔有悔征吉何也葉子曰縛厄於患難之中而伸縮不得以自如揺撼不能以自定者時之所遭也奮勵於患難之中而鞭策其氣以振拔懲艾其志以改圖者才之所起也昔子産當國内則有諸大夫之争互相誅殺外則有晉楚之兵無日不至城下國之危弱幾不可為已拘係而不舒危殆而不安尚得喘息於其國哉而子産於此激昻奮勵果斷剛决其於内也務息諸大夫之争而先除為凶之人雖無忿疾之道而不失勸懲之公雖不輕動以發大難之端亦不緩治以失事機之㑹自子南逐子晢死而豪家大姓靡然聽順無復有梗其政者其於外也事大國以禮而不茍狥其求禦强暴以貞而不瞑墮其詐善應對以辭而不可窮其詰抑之愈奮摧之愈厲争承却丐挺挺不拔卒之楚方退息而不敢與之争晉與盟誓而不復與之貳四十餘年之間無復諸侯之討而用能轉弱為强古今稱名卿焉奚縛厄之有易曰困于葛藟于􅔨卼曰動悔有悔貞吉井改邑不改井无䘮无得徃來井井汔至亦未繘井羸其瓶凶何也葉子曰水之所蓄也取之而不窮用之而不竭其為利也大利也者養人成務之具也黄帝所以授之堯堯舜所以授之周雖以戰國擾攘之秋兵農紛紜之際而孟子導齊梁以王政亦曰五畆之宅樹墻下以桑雞豚狗彘之畜無失其時百畆之田勿奪其時何則其所以利民者深焉耳嗚呼自有耒耜之利以來易姓受命其㡬而終莫之變焉何也生民之所係惟是為大而禮樂文章則固成定之彪炳也夫養民之道則因民之所利而利無損恵也故曰利而利之不如不利而利之利也耕田而食鑿井而飲下無益徳也故曰不識不知順帝之則殺之而不怨利之而不庸五十者可以衣帛七十者可以食肉八口之家可以無饑矣故曰老有所終幼有所養嗚呼此先王之治所以為熈熈皡皡與上下同流而莫之間者邪雖然聖人之治久於其道王者之政必世而後仁故曰三年耕必有一年之積九年耕則有三年之積計三十年之通可使民無菜色未有及民之少利而即為無益之妄圖不為經國之逺猷而日事紛更之制作則功未成而民告病利未及而害己加矣是豈聖人之所貴哉嗟乎堯舜三代之愛天下也深故其利天下也大堯舜三代之慮天下也逺故其安天下也恒齊宣請嘗試之而不果怠於志也滕文使問井地而不行屈於勢也仲舒言之而視為虛文多慾之不足以效唐虞之治也師丹言之而竟寢不舉貴戚近習多所不便之故也嗚呼安得堯舜三代之君主之於上堯舜三代之臣輔之於下而與之共成養人成務之具也哉易曰井改邑不改井无䘮无得往來井井汔至亦未繘井羸其瓶凶初六井泥不食舊井无禽何也葉子曰夫物必自擲而後人擲之人必自棄而後人棄之淮南子曰江河之腐胔不可勝數然祭者汲焉大也一杯酒白蠅漬其中匹夫廢嘗焉小也然則以𤨏𤨏卑末之器而無純白之徳戔戔淺小之資而有汚穢之累不可親而可拒不當近而當逺是為天下之棄才盛世之廢民矣上之不數於其主下之不齒於其徒商賈之所不足侣農圃醫卜之所恥為傳而况明君賢相與夫大人君子何所顧而惜之乎喬綝張涉劉秩之類盖似之矣束之髙閣且為大幸而何逺行之望焉易曰井泥不食舊井无禽九二井谷射鮒甕敝漏何也葉子曰修徳可以及物而不能自及於物正己所以正人而不能自正乎人韓子有言致君豈無術自進誠獨難悲夫此孟子之所以歴聘七十二君而卒不一遇而知言養氣之學與䘮禮經界之制王道治世之施為經濟不過以告萬章公孫丑之庸庸而已噫古今道徳之士上無青雲之附以為汲引可以同升諸公下惟卑賤之交以成其徳不足以相推轂卒之斂道以終身豈一二哉易曰井谷射鮒甕敝漏九三井渫不食為我心惻可用汲王明並受其福何也葉子曰隨和之璧横棄於道傍雖非賈客見者必為之深歎千㝷之材叢生於荒谷雖非匠石過者必為之長吁然則有佐王之才抱經綸之術而居在下之位極其養人之具而卒與草木同凋腐豈惟同類之戚戚哉行道之所不忍有識之所傷心矣所以然者無他明王不作天下莫能宗焉耳茍有作者則施之者安富而尊榮受之者康寧而富夀介慶何如哉是知功業不成非君子之病顧上之人何如耳㣲明揚之帝堯則大舜雷澤之漁父非明哲之髙宗則傅說巖野之胥靡古人有言綿綿之葛在於曠野良工得之以為絺紵良工不得枯死於野古之達賢不遇明君世主幾行乞丐枯死中野譬猶綿綿之葛矣然則髙材而無貴仕饕餮而居大位自古所歎豈特管輅一人而已哉易曰井渫不食為我心惻可用汲王明並受其福六四井甃无咎何也葉子曰徳之不脩足以憂孔子道未足以濟天下君子不為憂也學不能行足以病子貢澤未足以周萬物君子不為病也是故體未信則求信達之未順施不􅀶而濟不衆吾何歉乎哉本未立則求立道之未生君不致而民不澤吾何畏彼哉曽㸃之歌詠漆雕之未信果有以也不然不幾於子路子羔之病乎易曰井甃无咎九五井冽寒泉食何也葉子曰舉餓鬼而飽滿之者君之心吞江河而厭酌之者民之願然使天徳之不純王道之不善則我雖與人而人不欲固有吐汚泥義不食而去之者矣傅説非其后不食伯夷非其君不事是已使弱徳不可以愽施小道不可以濟衆則民雖取之而或不足固有望空泉失願望而去之者矣若漢末之民求復漢官威儀而不得晚唐之士想望開元貞觀之治而不能是已秉聰明睿智之質備仁義禮智之徳以為天下民物主而使天下老者安少者懐懐生之物各得其所哨翹喘􆂼各厭其情非堯舜之世三代之英曷足以語此易曰井冽寒泉食上六井收勿幕有孚元吉何也葉子曰朝廷取其設施百姓資其足給君子藉其進用華夏仰其懐綏大臣之職分也居大臣之分承汲取之時而可茍焉已哉恢宏其濟世之仁汪浸其潤物之澤以天下為度而不靳其可施之功以四海為心而不隘其可充之量然後足以稱其職不虧其分焉耳然此豈易易哉有本焉斯能取之而不窮用之而不竭天下酌之而有餘有道焉斯若江海之浸膏澤之潤百姓日用而不知也而豈易易也哉必如是然後天下之民舉安王者之化無外巍巍乎上下與天地同流而非區區之小補者矣噫非周公其孰能當之易曰井收勿幕有孚元吉葉八白易傳卷十二
