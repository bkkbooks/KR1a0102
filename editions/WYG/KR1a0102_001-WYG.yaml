body:
  text: 葉八白易傳卷一明葉山撰乾元亨利貞何也葉子曰天道運而無所積故萬物成帝道運而無所積故天下歸聖道運而無所積故海内服莊生之至言也是故天道運而春夏秋冬之不窮隂陽升降於其間矣帝道運而化教勸率之不窮經權神明於其間矣聖道運而仁義禮知之不窮體用經緯於其間矣是故道之道盡之於天矣天之道盡之於帝矣帝之道盡之於聖矣天之能盡道故曰動之始則陽生焉動之極則隂生焉一隂一陽交而天之用盡之矣動之大者為太陽静之大者為太隂動之少者為少陽静之少者為少隂太陽為日太隂為月少陽為星少隂為辰日月星辰交而天之體盡之矣日為暑月為寒星為晝辰為夜暑寒晝夜交而天之變盡之矣暑變物之性寒變物之情晝變物之形夜變物之體性情形體交而動植之感盡之矣天之道盡之於帝故曰謂其能以心代天意口代天言手代天工身代天事者焉謂其能上識天時下察地理中盡物情通照人事者焉謂其能彌綸天地出入造化進退古今表裏人物者焉帝之道盡之於聖故曰謂其能以一心觀萬心以一身觀萬身以一物觀萬物以一世觀萬世者焉革而革者一世之事業也革而因者十世之事業也因而革者百世之事業也因而因者千世之事業也可以因則因可以革則革者萬世之事業也一世之事業非五霸之道而何十世之事業非三王之道而何百世之事業非五帝之道而何千世之事業非三皇之道而何萬世之事業非仲尼之道而何是故五帝三王者命世之謂也仲尼者不世之謂也嗚呼天開於子此伏羲神農黄帝堯舜禹湯文武所以為繼天立極之主而孔子為繼往開来之聖歟天行始則始焉天行終則終焉終始隨乎天行而元㑹運世之不窮皇帝王霸之無盡易書詩春秋之不知其所終也易曰乾元亨利貞初九潛龍勿用何也葉子曰天下之事時為大隨時之義順為安大哉時乎君子之所以順而隨之者乎時未至神龍困縛大舜泣厯山之田伊尹耕有莘之野太公伏東海之濵非捐世也下至公孫卜式皆以鴻漸之翼困於燕雀逺迹羊豕之間未遇萁時焉能蠕蠕以自動乎時既至腐草光榮或解縛而相或釋褐而𫝊或立談間而封侯或枉千乗而勸駕羣然而起以際時也然則聖賢非能違時順時而已矣是故七十説而不遇厯羣雄而不省如以水投石莫之受也拔之於芻牧擢之於豎賈奮之於奴僕用之於降虜如以石投水莫之拒也夫曷知夫時之所為哉易曰潛龍勿用九二見龍在田利見大人何也葉子曰方白龍之魚服也余且得而困之鱔鰍得而狎侮之及其駕風雲吸百川霍然變化於原畆阡隴之間而萬物風斯下矣聞竒見異天下有不争先而快覩者乎昔者聖人之未遇也毁於叔孫議於武叔困於匡訾於東門所在厭見而射遘之矣及其遇大行之㑹㑹天人之契舒聖人之道𤼵康濟之略天下將謂我何哉無事則以手加額曰此司馬相公也所至民遮道聚觀曰公無歸洛留相天子蘇軾自登州召還緣道人相聚號呼曰寄謝司馬相公毋去朝廷厚自愛以活我有事則曰君胡不胄國人望君如望慈母焉盜賊之矢若傷君是絶民望也又曰君胡胄國人望君如望嵗焉日月以㡬若見君面是得艾也民知不死其亦夫有奮心將旌君以徇於國而猶掩面以絶民望不亦甚乎嗚呼我也鼔動陶鑄而不以為功彼也仰觀瞻企而不能自已此㝠契之㑹而天機之孚無間然也伊尹周公以之而蕭曹房杜弗與焉易曰見龍在田利見大人九三君子終日乾乾夕惕若厲无咎何也葉子曰聖人以天下為己任則嘗為人之所不敢為是以或危殆而不安故曰矛頭淅米劒頭炊百嵗老翁攀枯枝盲人騎瞎馬夜半臨深池然惟聖人以徳義為心師則又謹人之所不能謹是以雖履危而不墜故曰弔者在門賀者在閭懼以始終其要旡咎昔者伊尹周公為商周之大臣舉放攝之大事此豈恒人耳目所覩記哉故曰昔之登髙者下之人代之㥄手足為之汗出而上之人乃始轉折枝而趨操木則二公之身且不保天下其謂我何哉然而伊尹曰若虞機張往省括於度則釋欽厥止周公曰予手拮据予口卒瘏予羽譙譙予尾翛翛予音嘵嘵䖍其始而厚其終挈其心而提其志勤於徳而懼於位詩曰夙夜匪懈不遑寢處二公以之斯其卒成天下之大忠大孝乎太甲賴匡救之徳於終成王行新迎之禮於國天下安而二公亦以安矣霍子孟承周公之托而不匪其彭既以萌驂乗之禍行伊尹之事而不歛其徳卒不免赤族之誅豈易言也哉豈易言也哉易曰君子終日乾乾夕惕若厲无咎九四或躍在淵无咎何也葉子曰天下擾擾生民之塗炭極矣聞鷄起舞非豪傑之志乎而髙卧北窓抱膝長嘯未可以誚隠也天下擾擾禮樂之崩壊極矣洗耳長往非貞士之守乎而逡廵隴畆遷延阡陌未可以卜任也察盈虚消息之機審進退存亡之道觀吉凶得失之數考成敗利鈍之原龍興而雲屬虎嘯而風馳堯舜立而二八升湯武起而伊吕至不爾則蟄焉蟄之存其身不蟄光其化故曰龍生於水被五色而㳺故神欲小則化如蠶蠋欲大則藏於天下欲上則凌於雲氣欲下則入於深泉上下無時謂之神中古以来斯道替矣諸葛孔明其庶㡬乎抱管樂之宏略感真主之屢勤痛明堂之不祀許先主以馳驅捐身而起岀處潔矣夫何間然之有哉易曰或躍在淵无咎九五飛龍在天利見大人何也葉子曰天下之不容或已者好徳爾縻之良而使人之不可諠者天徳王道之備是故儀封人請見矣見者能㡬何哉道在而位不在焉彼欲見而不知也泄栁閉門而不納矣位在而道不在焉我欲見而不能也其惟堯舜乎徳與位並運與時隆應天而興與日俱融斯圓穹垂象而列宿昭符滄溟西下而江漢朝宗者乎燦然勃然夫誰能禦之易曰飛龍在天利見大人上九亢龍有悔何也葉子曰天髙地下萬物散殊而時為物之極卑髙以陳貴賤位矣而君為位之極履乎時之極則命之去我牛不如禴矣故雖貴而無位雖髙而無民雖有賢人而無輔大命近止不絶如綫不將寄空身於天下乎過乎君之上則我墜厥命瘠可僨肥矣故雖有位而不貴雖有民而不髙雖有輔而不賢危若綴旒險若膠舟不將取實禍於目前乎是雖負變化之形而實無變化之靈是雖冒崇髙之名而實彰卑賤之徴故曰天之廢商乆矣君將興之不亦難乎又曰天之所廢誰能興之此齊湣衆棄之暴楚靈投龜之詬夏桀日亡之狂而商紂不知命之在周而以為已有也不亡何待易曰亢龍有悔坤元亨利牝馬之貞君子有攸往先迷後得主利西南得朋東北䘮朋安貞吉何也葉子曰君徳以剛為主臣道奉天而行奚以有是云也不以天下之至順不能配天下之至健也晉陽之難將士讙呼惟髙赫不失君臣之禮而襄子以為賞先至徳之初制度草創惟李勉能為朝廷之尊而肅宗以為倚重不順而能之乎雖然順則順矣䖍其始而不厚其終恭乎前而少肆於後非純臣也霍光李徳裕可以鑒矣其惟周公乎負成王於襁褓而不以權勢加天下復少子以明辟而不以寵利居成功一人之身而三變焉皆不失節於臣子斯順之至也順則哲哲則何患於迷順則安安則奚患不得是故天生地成則萬寳告成而天下歸地之徳君令臣行則庶績咸熙而天下歸臣之功斯之謂不言所利而利聚焉不施其勞而勞併焉然則為臣者亦何憚於居後以從事而必取於争先以犯分哉知乎此則為順為悦為巽為麗者全身之道也為動為止為險為健者傾覆之基也君子宜知所擇矣易曰坤元亨利牝馬之貞君子有攸往先迷後得主利西南得朋東北䘮朋安貞吉初六履霜堅氷至何也葉子曰物必有兆事貴審機能謹其始則福致辨之不早則禍隨是以將萌之際聖人有隠憂焉故曰蜰􅖆一出潛魚盡怖霜鐘初動巢鳥咸驚何也䑕牙雖尖而有害象之技豺舌雖狭而有殺虎之能君子不可以不慎也昔者王莽謙恭之始曹操夷難之初司馬懿恭命之日識微之士盖三致意焉不有由然者乎不然秦不過一西戎之國耳何夫子定書而附以秦誓盖駸駸乎王之後矣刪詩而列以秦風盖勃勃乎夏之漸矣天下之勢日趨於秦聖人盖有以知之知之而憂焉而示警於周惜周之圖回無其人也嗚呼維此聖人瞻言百里維彼愚人覆狂以喜是故金人之銘曰勿謂何傷其禍將長勿謂何害其禍將大勿謂何淺其禍將然勿謂莫聞夭妖伺人熒熒不滅炎炎奈何涓涓不壅將成江河綿綿不絶將成網羅青青不伐將尋斧柯言不能慎始之禍也是故齊襄之無道文姜之淫亂莊公不察以為常事朝廷處之而不疑大臣順之而不諫百姓安之而無忿疾之心使人欲大肆天理滅亡由是叔牙之弑械成於前慶父之無君動於後圉人犖卜齮之賊交𤼵於黨氏武闈之間哀姜以國君之母與聞乎故而不忌也魯君再弑㡬至亡國其禍豈淺淺哉而况於始而㑹鄭以伐宋固請而行繼而㑹宋以伐鄭先期而往不待鍾巫之變知其有無君之心者乎此春秋之所以謹於微也易曰履霜堅氷至六二直方大不習无不利何也葉子曰立天下之正位以禮而制心行天下之大道以義而制事充諸内而見乎外根於心而生於色是之謂履繩而蹈矩光明而正大内有青天白日之心志外有髙山大川之規模此臣道之純而厚徳之至也主不疑而萬民服何不利之有哉周公之於成王伊尹之於太甲孔明之於後主皆不疑其所行者也故曰中正行險往且有功雖危无咎能自信也伊尹以之剛健主豫動而有應羣疑乃亡能自强也周公以之又曰劉后授之無疑心武侯受之無懼色繼體納之無貳情百姓信之無異志易曰直方大不習无不利六三含章可貞或從王事无成有終何也葉子曰臣道貴恭而戒驕逞馳而焜燿驕之大者也臣道尚讓而忌專斷制而裁割專之大者也禰衡諸葛恪之殺其身李徳裕令狐綯之疑其主豈盡夫人之過哉是故韜藏知技而不露有善則歸之於君持身不變之道也隨事補拾而無成有勞則任之於已守職終身之分也髙而曷以危滿而何所溢哉信非大禹之不矜不伐周公之不驕且吝不足以語此田興幼孤兄融長養而教之興常於軍中角射一軍莫及融退而抶之曰爾不自悔禍將及矣故興能自全於田季安淫虐猜暴之時而卒為魏博節度使為晚唐忠順之臣許存歸王建建忌其勇略欲殺之王宗綰宻言存謙厚有良將才乃舍之更姓名曰王宗播栁脩每勸宗播慎静以免禍後遇强敵諸將所憚者宗播以身先之及有功輙稱病不自伐由是得以功名終嗚呼亦庶乎知恭順之義矣易曰含章可貞或從王事无成有終六四括􅇸无咎无譽何也葉子曰聖賢之進退以其道而君子之語黙因乎時士未可以言而言是以言取名也侯生盧生非乎是士之罪也而韋裕之因見殺於唐懿抑又甚矣可以言而不言是以黙取容也胡廣張禹非乎是士之恥也而闗播之不敢𤼵口於盧把又其每下矣慎哉其惟時乎天下有道危言危行天下無道危行言孫是之謂聖人之時焉而出處進退係之矣非夫子與顔淵用之行而舍之藏言足興而黙足容何得以語此而比干之剖心伯夷之扣馬弗與焉易曰括􅇸无咎无譽六五黄裳元吉何也葉子曰昔者天根之治天下也㳺心於淡合氣於漠順物自然而無容私焉耳此至文之治盛徳無為之化也故淮南子曰古有鍪而卷領以王天下者矣天下不非其服同懐其徳况服之衷而飾之盛稱其徳而民所望者乎黄帝堯舜垂衣裳而天下治有由然矣何也長民者衣服不貳從容有常以齊其民則民徳歸一矣此正位凝命恭已以正南面之事非唐虞三代何足以語此故曰欽明文思安安允恭克讓曰濬哲文明温恭允塞曰克勤克儉不矜不伐曰聖敬日躋上帝是祗曰徽柔懿恭小心翼翼易曰黄裳元吉上六龍戰于野其血𤣥黄何也葉子曰隂極抗陽臣盛逼君小人壯而病君子天下之勢也相抗則争相逼則鬬相病則撃天下之情也鬬無兩全争無兩活撃無兩存天下之理也漢宦官盛而誅黨人黨人盡而趙忠張讓等捕殺凡二千餘人唐宦官恣而毒南司南司盡而第五可範等數百人悉誅殺宋之小人羣起而攻道學道學斃而韓侂胄賈似道等皆死於憤憤不平之手秦始皇簒周周滅而秦亦斃李斯趙髙覆秦秦亡而斯髙亦誅王莽盜漢漢微而莽亦敗變所從来乆矣君子亦慎其初乎易曰龍戰于野其血𤣥黄屯元亨利貞勿用有攸往利建侯何也葉子曰資始之餘物不能不穉也雲行雨施而品物流行矣蠱壊之極時不能不亂也首出庶物而萬國咸寧矣然則難也者其時之所值乎難無不通者其天運人事之不容或已者乎然天機雖必有所動而人為不可以不臧以燕伐燕以暴易暴不臧孰甚焉若之何其臧之舉仁義以濟時艱大徳也鎮安静以俟天命大順也扶宏義以致英俊大略也大徳以先天下何不服大順以應時宜何不散大畧以任武勇何不誅漢髙帝除秦苛暴約法三章徳莫加焉以天下城邑封功臣捐數千里之地以與信越而不惜畧莫加焉五載而成帝業夫豈偶然而已乎易曰屯元亨利貞勿用有攸往利建侯初九盤桓利居貞利建侯何也葉子曰處平安則率履易故順事而能適遭蹇難則操心危故遇變而能通東坤有言君子之厄於難也强偶在外不得紓其並驅之志也則堅執必抗之心而不挫不憚征繕以為輔是為備其危而絶其望知所以為社稷之權也强敵在前不得遂其剪除之願也則大奮必勝之氣而不委若將改立以改圖是為折其驕而沮其銳知所以為君之道也昔者秦王使告趙王願與王為好㑹於西河外澠池趙王行藺相如從㢘頗送至境與王訣曰王行度道里㑹遇之禮畢還不過三十日三十日不還則請立太子以絶秦望王許之宋真宗時契丹犯邉王旦從幸澶州雍王元份留守東京遇暴疾命旦馳還權留守事旦曰願宣寇準臣有所陳寇準至旦奏曰十日之間未有㨗報時當如何帝黙然良乆曰立皇太子嗚呼澠池之㑹强偶不可不備其危也澶淵之行强敵不可不折其驕也我備其危而後彼之非望塞我折其驕而後彼之暴鋭阻為社稷之權與為君之道宜無出於此者天下之大難曷患其不濟哉噫非天下之至變其孰能與於此其次則惟居徳以順民合黨以懼敵若劉𤣥徳艱難許潁之間逃遁荆吴之際劇踖甚矣然能與操為水火操以急我以寛操以暴吾以仁操以詐吾以誠雖操之强莫能害也卒之與吴為合赤壁一勝而鼎足遂成人心屬而天命昭矣古之英雄所為盖如此易曰盤桓利居貞利建侯六二屯如邅如乗馬班如匪寇婚媾女子貞不字十年乃字何也葉子曰三軍之衆可以奪帥匹夫之微志不可取是故古之君子不遇真主則亦已矣夫茍一定君臣之交正其無所逃之義則終其身而不變厯九死以不回雖值艱難而窘廹夫安能以易其志乎曹操壯闗侯之為人而察其心神無乆留之意使張遼以其情問之侯嘆曰吾極知曹公待我厚然吾受劉將軍恩誓以共死不可背之吾終不留卒於厯九闗斬諸將間闗百計求遂君臣之契曹操以周瑜為心腹之疾宻遣蔣幹往説之瑜立謂幹曰子翼良苦逺涉江湖為曹氏作說客耶大丈夫處世遇知已之主外托君臣之義内結骨肉之恩言行計從禍福共之假使蘇張更生安能移其意乎謝安于桓温初則伐其壁人之謀而卒之寢其九錫之命强臣自斃而王室以寧樂夀兵馬使𫝊良弼博野鎮遏使李寰所戍在幽鎮之間朱克融王庭湊互加誘脇二人不從各以其衆堅壁賊竟不能􅂑故曰黄鵠反故鄉狐死正首丘壯夫之志也又曰寒士之妻弱國之臣各安其正而已生民之理也惟王導則不然遲回邪正之間狐疑順逆之際幸則王氏為天子不幸則王馬共天下天命不祐而大逆鬼誅然後哭而廹之愚者以為忠而哲人知其賊矣寧能逃其誅於九地之下哉王敦初據石頭勢甚猖獗其主有願歸瑯琊以避賢路之語刁協劉隗等又屢敗廢晉自立在其掌中王導盖與隂謀所以絶無半語片札勸止敦逆及敦以吕猗之譛欲殺戴淵周顗問導導又以私憾三問而不答竟使賊殺忠良震蕩社稷其與王彬先哭周顗而後見敦者相去逺矣及後敦病至江寧知其决不能起事不可成乃率子弟為之𤼵哀又移書與王含稱明目張膽為六軍之首等語豫為不黨之地吾誰欺乎且其書曰先承大將軍已不諱兄此舉謂可如昔年之事乎昔年佞臣亂朝人懐不寧如導之徒心思外濟今則不然夫劉隗果奸邪也亦當如謝琨城狐社䑕之喻為周顗不可舉兵脅天子之言敦果可除君側之惡也亦當奉元帝方朕太甲欲見幽囚是可忍也孰不可忍之詔而乃欲思若此之濟乎此其反心不覺自露奸情鬼使章明不謂導之與敦同謀吾不信也及温嶠辭敦至建康盡以敦逆謀告帝與庾亮畫計討之敦聞之大怒曰吾乃為小物所欺與導書曰太真别来㡬日作如此事當募人生致之自拔其舌此其往来告報彼此犄角不謂敦之與導同謀吾不信也又詔贈譙王承戴淵周顗等官周札故吏為札豁寃尚書卞壺議以札開門延宼不當贈諡王導以為往年之事敦奸逆未彰自臣等有識以上皆所未悟與札無異郄鑒曰敦之逆謀履霜日乆若以往年之舉義同桓文則先帝可為幽厲耶嗚呼再觀此情猶有以導賊為忠者可謂心䘮而神瘚矣安得起其腐骨使臯陶子路跽鞫而寸斬之乎易曰屯如邅如乗馬班如匪寇婚媾女子貞不字十年乃字六三即鹿无虞惟入于林中君子㡬不如舍往吝何也葉子曰天下無事豪傑若庸人天下多難庸人逞豪傑何則覩湯武之龍躍謂戡亂在神功聞孔墨之挺生謂英睿擅竒響視韓彭之豹變謂蟄猛致人爵見張桓之朱紱謂明經拾青紫此皆不知義命之談才徳之説而妄意富貴功名者也又安知其有所以致之者乎而又安知斗筲之子不秉帝王之器節梲之材不荷棟梁之任者乎齊儋趙歇起於秦之末公孫述隗囂王郎起於漢之微公孫瓉劉淵袁術之徒起於三國之未定皆此類也已噫知㡬審已者其竇融之歸光武乎易曰即鹿无虞惟入于林中君子㡬不如舍往吝六四乗馬班如求婚媾往吉无不利何也葉子曰君子貴平天下之難然不必其自我平之也我欲平之奈無才何君子貴成天下之功然不必其自我成之也我欲成之奈無力何吾不能平吾與女平之吾不能成吾於女成之天下之至明也知此者其唐之許逺乎位本在廵上授之柄而處其下卒為唐氏之保障天下稱才焉卒為臣道立彝極後世稱忠焉孰謂逺也而固非廵匹耶彼張浚自執己見不聽王彦劉子羽吴玠郭浩之諫而輕師失律致富平之敗不聽岳飛之言而致酈瓊之叛吕祉之死不制李顯忠邵宏淵之不協而致符離之潰君子謂其量狭而不能下士知暗而不能知人且富平之役李綱尚在浚忌之而不能用淮西之舉岳飛在管浚惡之聽其歸終母䘮而不能留符離之戰虞允文逺在川陕浚雖聞其賢而不能舉以自副乃以桀傲争利之人自隨與圖大事夫安得不敗噫浚之為將如此其視趙奢之下許厯韓信之拜李左車相去固亦逺矣而曷知廵逺之事耶易曰乗馬班如求婚媾往吉无不利九五屯其膏小貞吉大貞凶何也葉子曰昔者先王之於民也有風行草偃之勢焉故其施之祿也若澤之下於天潰決而不可禦也其導之利也若髙屋建瓴而注之水奔流而莫能止也是故以勞以佚以生以死无往而不利焉耳故曰沛然徳教溢乎四海者其為政不難若曰有所施焉而不果有其徳澤而不下則威權去而利柄亡其何以行之哉雖非嗇施吝賞至刻印刓而不忍與鄙心陋志以敝袴而待有功者矜資惜費戔戔焉如販夫販婦然為天下守財虜然澤泥而不能施與無澤同惠塞而不得下則如無惠大勢已去天下事其尚得為之乎是故姑為有漸之謀以延垂亡之命僅守安常之分以俟馴致之休則髙之可為盤庚周宣之修徳用賢復先王之政而諸侯朝卑之亦不失為周之平桓漢之元成桓靈不然而强徇决起欲復王者之氣勢收天子之威權驟而為之妄意而圖之不為魯昭曹髦之自孽則為靚赧之亡周燕丹之不祀矣可不戒哉易曰屯其膏小貞吉大貞凶上六乗馬班如泣血漣如何也葉子曰否窮反泰反之者克斷之才也非其才則濡首矣難極復亨復之者果毅之資也無其資則入穴矣進之無敢為之能退之為無益之悼亡而已矣將何以乆長於天地之間哉唐末諸帝苦宦官之逼每對左右泣下或悲不自勝昭宗强杜讓能討李茂貞卒之誅貶讓能以為解至涕下不自禁既為朱全忠逼幸洛陽促百官東行驅徙士民號哭滿路至華州民夾道號萬嵗昭宗泣曰勿呼萬嵗朕不復為女主矣館於興徳宫謂侍臣曰諺云紇干山頭凍殺雀何不飛去生處樂朕今飄泊不知竟落何所因泣下沾􅁭左右莫能仰視東都宫闕未成留止陕朱全忠来朝延入寢室見何后后泣曰大家夫婦委身全忠矣嗚呼哀哉而况帶汁孔明也哉易曰乗馬班如泣血漣如蒙亨匪我求童蒙童蒙求我初筮告再三瀆瀆則不告利貞何也葉子曰天生昏亦生明天生愚亦生哲伊尹曰天之生斯民也使先知覺後知使先覺覺後覺也予天民之先覺者也予將以先知覺後知以先覺覺後覺也覺之矣而有不明不哲者乎上能覺下能學天下其無昏與愚矣何也上智通乎下愚善學不如善教是故學之道嚴師為難師嚴然後道尊道尊然後民知敬學故太學之禮雖詔於天子無北面尊師尚道也孟嘗君請學於閔子使車往逆非嚴師矣善歌者使人繼其聲善教者使人繼其志不憤則不啟不悱則不𤼵故子夏問詩學一而知二子貢論學問一而得三敬學遜志也樊遲未逹而不悟非尊道矣不嚴則狎玩之心生弗尊則暴棄之儆寡雖與聖賢處何自而入聖乎雖然陸象山有言學者不求師與求師而不能虚心退聽此固學者之罪學者知求師矣能退聽矣所以道之者或非其道又誰之過乎故程子曰學者必求師記問文章不足以為人師以所學者外也所謂師者何也曰理也義也然則道必足以師世而範俗徳必可以繼往而開来信非孔孟不足以當之矣東漢而下師道益嚴皆不足以勝其任雖以韓愈之賢且不足為籍湜範况其他乎宋朝理學逺過漢唐胡安定公首倡體用之學以淑其徒使學者明于經義講于時勢篤于踐履而不為口耳之習故一時賢士大夫多出其門師道之立盖昉乎此是後周子建圖屬書以覺来學而程子兄弟實紹其傳文公又從而光大之淵源所漸徧及海内有志之士探討服行而推其所得以尊主庇民者不絶于時能使大義既乖而復正公道乆屈而復伸皆夫人之力也師道之立於是為盛嗚呼孔孟之後非是曷庶㡬耶易曰蒙亨匪我求童蒙童蒙求我初筮告再三瀆瀆則不告利貞初六𤼵蒙利用刑人用說桎梏以往吝何也葉子曰設刑罰以齊衆明教化以善俗者聖王為治之大要也威嚴以惕衆志在寛以敷五教者聖人教人之大法也故曰庶頑讒説若不在時侯以明之撻以記之又曰夏楚二物收其威也君子開𤼵天下之㝠頑也而可以徒然已乎不威不懲無法則惰非聖人之得已也故曰君子以情用小人以形用榮辱者賞罰之精華也故禮樂刑辱以加君子化其情也桎梏鞭撲以教小人治其形也雖然繼之曰工以納言時而颺之格則承之庸之否則威之又曰君子之於學也藏焉修焉息焉㳺焉夫然故安其學而親其師又豈一於法之嚴哉猛而糾以寛使不致其困拘而加以縱使不苦其難此堯舜三代之世所以無頑民也後世不棄則廹矣何以底于善諸葛孔明殆庶㡬焉其佐𤣥徳治蜀頗尚嚴峻法正諫之亮曰秦以無道政苛民怨匹夫大呼天下土崩髙祖因之可以洪濟劉璋暗弱徳政不舉威刑不肅蜀士人士專權自恣君臣之道漸以陵替寵之以位位極則殘順之以恩恩竭則慢所以致弊實由于此吾今威之以法法行則知恩限之以爵爵加則知榮榮恩並濟上下有節為法之要于斯而著矣噫孔明其足以知此哉易曰𤼵蒙利用刑人用說桎梏以往吝九二包蒙吉納婦吉子克家何也葉子曰善教人者有廣收而無細擇故曰有教無類三后無忿疾于頑孔子思狂又思狷此之謂有容徳乃大善世之謀謨也若之何其選人以為教哉善教人者有翕茹而無却吐故曰未嘗無誨孔子之與其進也孟子之来者不拒此之謂歸斯受之先覺之門户也若之何其阻人之自進哉詩曰菁菁者莪在彼中阿又曰芃芃棫樸薪之槱之此周王之夀考而作人乎作人如此則大以成大小以成小無棄物矣成人有徳小子有造無枉器矣作人如此則養不中而養不才天下其化成矣模不模而範不範斯民其寡過矣天下殆可封乎而豈曰小補之哉此伊尹先覺之任周公代辟之功契之敬敷之責也其諸所謂口代天言心代天工身代天事行代天化者乎噫信非聖人不足以語此易曰包蒙吉納婦吉子克家六三勿用取女見金夫不有躬无攸利何也葉子曰女以順為正順也者順乎夫也順夫則不茍於從正以守為大守也者守夫義也守義則不茍於利顧利而不順其行順者非夫也輕身而不正其守守者非義也若之何其取之晉獻公欲以驪姬為夫人史蘇曰有男戎必有女戎若晉以男戎勝戎戎必以女戎勝晉矣不吉子反欲取夏姬巫臣曰是不祥人也是夭子蠻殺御叔弑靈侯戮夏南出孔儀䘮陳國何不祥如是人生實難其有不獲死乎天下多美婦人何必是巫臣自取之叔向欲取於申公巫臣其母曰甚美必有甚惡尤物足以移人茍非徳義則必有禍趙飛燕姊妹之入也姿質醲粹見者歎賞獨宣帝時披香博士淖方成立帝後唾之曰此禍水也滅火必矣武曌在襁褓袁天綱相而驚曰是大孽也取之必禍稔卒之獻公殺其子巫臣䘮其家叔向滅其族漢成殞其身唐髙失其天下萬世之明鑒也噫安得後魏兒氏者而取之乎惜老生取之而不卒也兒氏許嫁彭老生居貧家自舂汲以奉父母老生輙往逼之女曰與君聘命雖畢然二門多故未及相見何由不禀父母擅見凌辱若茍行非禮正可身死耳不從老生怒而刺之女曰所以執節自固者正欲奉君耳今反為君所殺言終而絶噫若是乎老生之不道哉雖然若兒氏者吾見亦罕矣而不吉之女不祥之夫天下可勝數乎遇功名則忘道徳見富貴則棄功名若賂以美官而張説許証元忠之罪附㑹新法而葉祖洽得蒙首選之擢天下之滔滔者皆是也誠齋曰陳相下喬而入幽公孫曲學以阿世斯女不可取也斯士獨可用乎易曰勿用取女見金夫不有躬无攸利六四困蒙吝何也葉子曰蓬生麻中不扶自直子賤之所以成徳也内無賢父兄外無嚴師友倀倀茫茫夫何所之豈非斯人之不幸乎淮南子曰今使人生於僻陋之國長於窮櫩陋室之下長無兄弟少無父母目未嘗見禮節耳未嘗聞先古獨守專室而不出門使其性雖不愚其知者必寡矣故曰斯道之顯晦係于人物之盛衰盖禮義以講習而明徳性以相觀而善孑然獨立而無與為侣則學問廢而識見淺繩約弛而怠慢生古人所以重朋来之樂者不以此歟雖然待文王而興者凡民也若夫豪傑之士雖無文王猶興彼且烏乎困哉此陳良南宫适司馬牛之所以可貴也易曰困蒙吝六五童蒙吉何也葉子曰君取其為蘭茁不欲其為狐精君欲其為穉昧不欲其為聖明故曰聰明睿知守之以愚又曰冕旒蔽目黈纊塞耳貴純一也聲色不雜而道徳之必親狗馬不為而忠亮之必近土木不圖而樸素之必用神仙不事而直諒之必庸斷斷乎他技之無有蠢蠢乎純一而未𤼵以此下人奈之何其不治哉成王之聽於周公漢昭之聴于霍光千古之振主也侈心一動而雜然攻之賢棄不保矣昔唐明皇思九齡之先見為之流涕遣中使至曲江祭之厚恤其家胡致堂曰李覯有言使管仲而不死雖内嬖六人庸何傷君子非之曰未有蠱其心於女色而又能盡其心於賢人者也於明皇見之矣明皇忽九齡之言及身履危亡而後思之亦奚及哉正使向也用九齡之言禍亂不自范陽可耳太真在宫林甫在朝九齡必見逐殺一祿山亦無救于播遷之禍是故太平之君必無欲然後能守成也而况知出庶物有輕待人臣之心思周萬機有獨御區宇之意謀吞衆略有過慎之防明照羣情有先事之察者天下㡬何而不亂乎此唐徳宗之所以再辱而不悟也易曰童蒙吉上九撃蒙不利為寇利禦寇何也葉子曰勢也昔者聖人之教天下何其忠厚之至哉勞之来之匡之直之輔之翼之又從而振徳之民生其間卒未有為不善者若失𤼵之不已而至於包包之未已而猶復困焉民斯為下矣生十九年而猶有童心自暴自棄孰甚乎是故赭衣之衣嘉石之坐國門之驅以至四夷之迸無所不至者非過虐也不欲其為良民害而實為良民以驅害也彼未為害而我先驅之天下有不順焉者乎禹之征三苗周公之治三監是已易曰撃蒙不利為寇利禦寇葉八白易𫝊卷一
