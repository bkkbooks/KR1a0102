body:
  text: 葉八白易𫝊卷十一明葉山撰損有孚元吉无咎可貞利有攸徃曷之用二簋可用享何也葉子曰厚天下之生者聖人利天下之大也是故益道興焉防天下之變者聖人慮天下之深也是故損道備焉過中正之制浚我生之源聖人之不得已焉耳不信民弗從可乎管子有言一農不耕或為之饑一女不織或為之寒故事再其本則無賣其子者事三其本則衣食足事四其本則正籍給事五其本則逺近通死得藏今事不能再其本而上求之焉無止是使奸塗不可獨行遺財不可均止隨之以法則是下罔民也且君朝令而求夕具有者出其財無有者賣其衣屨農夫糶其五榖三分賈而去是君朝令一怒布帛流越而之天下君求焉而無止民無以待之亡走而棲山阜持㦸之士顧不見親家族失而不分民走於中而遯於外此不戰而内敗矣嗚呼取民之不可無具如此况唐括商括僦匱錢宋括金銀至倡婦家於事安足濟於民安所措乎不可行之於一時又可通之為再舉乎此非聖人之意鬼神所不享也詩曰豐年多黍多稌亦有髙廩萬億及秭為酒為醴烝畀祖妣以洽百禮降福孔皆記曰上輕損則用下牲下牲則祭不備以其舛之為不樂也嗚呼鬼神可以薄而况其他乎故曰天下國家一體也君為元首臣為股肱民為手足下有憂民則上不盡樂下有饑民則上不備膳下有寒民則上不具服徒跣而垂旒非禮也故足寒傷心民怨傷國又曰君以至美之道道民民以至善之物養君君隆其恵民升其功此無徃不復相報之義也故太平備物非極欲也物闕損禮非儉約也其數云爾易曰損有孚元吉无咎可貞利有攸徃曷之用二簋可用享初九已事遄徃无咎酌損之何也葉子曰民輸粟於君分也士輸道於主義也輸道於主而不止吾事則分其心猶不輸也止吾所有事而不徃之極則怠若事猶不徃也已其事則為主之心専去之速則報主之事果其斯君子之盛事賢士之逹節乎絀囂囂既而幡然改舍草廬遂許先帝以馳驅古之人有行之者伊尹孔明是已然忠在我受在彼量而後入時然後言君子之哲也事畢而不言曰王怒未怠子先諌不入我將繼之若仲孫湫士㑹者其斯為知斟酌之道矣不然薦圭璧於泥塗固已疎矣觸虎狼以取死庸得為智乎此洩冶之忠而尚不免於古人之惜而譏之也易曰已事遄徃无咎酌損之九二利貞征凶弗損益之何也葉子曰志於貞節者浮雲不足以累其真志於恬澹者好爵不足以亂其性是以子陵樂富春之耕千木辭於陵之聘雖然桐江一絲扶漢九鼎西河之上道風至今彼豈塊然無與於世故者哉其守彌强其風彌揚其節愈著其操益勁其徳益盛不然其不為張楷之所譏者寡矣初南陽樊英少有學行名著海内隐於壺山之陽州縣前後禮請不應公卿舉賢良方正有道皆不行安帝賜策書徴之不起順帝又以策書纁帛備禮徴英待以師傅之禮衆皆以為必不降志南郡王逸勸使就聘及後應對無竒謀深䇿談者以為失望河南張楷與英俱徴謂英曰天下有二道出與處也吾前以子之出能輔是君也濟斯民也而子以不貲之身怒萬乘之主及其受爵祿又不聞匡救之術進退無所據矣然則遯世而不終其身是為虚遯樊英种放不免君子之議隐身而無益於世是為素隐仲子華士將罹聖王之誅可不慎乎可不慎乎易曰利貞征凶弗損益之六三三人行則損一人一人行則得其友何也葉子曰恒物之大情固利於益而不利於損特其處物之大分則専於兩而雜於三是故二人同心以牽復則好遯者不可以不亡爾我攜手以偕行則觀光者不得而不去我既以類而聚彼必以羣而分自然之勢也然損其一固所以専夫兩之謀而不有兩又何以為一之致是故彼既允升以為志則天下自有尚徃之儔吾方反就以為安則天下亦有内喜之願物不可以孤而立則機必以類而從自然之理也然則九官十二牧濟濟推讓而一許由不得居乎其中非巢父者其誰與歸乎易曰三人行則損一人一人行則得其友六四損其疾使遄有喜无咎何也葉子曰風寒暑濕攻其外隂陽虚實作於内是故身之疾生焉去身之疾不可以無醫富貴功名交於前喜怒忿懑動於中是故心之疾作焉去心之疾不可以無師疾不去身心必死故莊生曰衆人焚和生火甚多去不亟身心日蝕故文子曰宿善不祥亟而去心中自喜故淮南子曰人欲知髙下而不能教之用管凖則悦欲知輕重而無以予之權衡則喜欲知逺近而無能教之以金目則快射又况知應無方而不窮哉喜疾去則惡不履故五峯曰能攻人實病者至難也能受人實攻者為尤難人能攻我實病我能受人實攻朋友之義其庶幾乎誠齋曰子産容國人之議已以自藥而不毁鄉校可謂能損其疾而懲忿魏獻子聽閻沒女寛之諷諫以自警而辭梗陽人可謂能損其疾而窒慾得之矣楚莊王始以偷竊之計紿陳謂陳人無動繼以刼奪之威加陳因縣陳由叔時復命不賀一言而取諸其懐以予之乃復封陳吐突承璀領功徳使盛脩安國寺奏立聖徳碑先搆樓請勅學士撰文欲以萬緡酬之憲宗命李絳為之絳言堯舜禹湯未嘗立碑自言聖徳惟秦始皇刻石髙自稱述未審陛下欲何所法上命曵倒碑樓承璀言樓大不可曳請徐毁撤上厲聲曰多用牛曳之承璀乃不敢言凢用百牛曳之乃倒亦可謂勇於從善而過勿憚改矣不然魯隐公欲讓桓而曰将秦穆稱改過而曰尚則君子者聽其言之不果而豫知其心之有貳矣傳曰君子見幾而作不俟終日夫何将之有語曰過則勿憚改夫何尚之云乎故魯隐公去位不亟而貪慕之形見於外是以羽父得進弑桓之謀宋太祖立皇太弟不早而顧惜之私逮於終是以光義亟發好為之舉向使隐公遜讓之意速逹於外則髙蹈之風凛然在人不仁不義者且不敢望其門墻而况敢以殘賊之謀狗彘之行凂之乎藝祖金匱之盟早告天下則季札之行義章章較著不孝不弟者方将安於必貴而何至喋血之禍推刃之惡及之乎是故為義而不早與不義者等改過而不亟與不改者同耳其為疾也不益深乎易曰損其疾使遄有喜无咎六五或益之十朋之龜弗克違元吉何也葉子曰崔實有言臯陶陳謨而唐虞以興伊箕作訓而殷周再隆則人君之福利莫大於得賢才得賢之徴莫急於獲善論語曰善行興邦嘉言作則法縁之以格奸人依之而建徳是以聞一言之當如得萬人之兵獲一士之言如得千乘之國又曰要域荒城重譯而獻珍非寳也腹心之人匍匐而獻善寳之至矣唐太宗亦曰朕貴為天子所乏者非財也但恨無嘉言可以利民耳與其多得數百萬緡何如得一賢才嗚呼此二典三謨所以為治天下之要道保天下之蓍龜萬世之竒寳也而非堯舜禹之為君則亦莫之有也然則以山嶽配天之徳宅大中至正之位懐空洞寛廣之心挹謙柔抑損之氣則天下賢人君子不有出其嘉謀嘉猷以為保國安民之計陳其忠言讜論以為奉天勤民之圖方且言之而欲其聽聽之而欲其行致􅇆情之懇惻極實念之勤拳者乎其為受天下之益孰大於是舜之罔攸伏禹之得昌言無以過此易曰或益之十朋之龜弗克違元吉上九弗損益之无咎貞吉利有攸徃得臣无家何也葉子曰事以順為便物以適為安為猿賜者非負之而升木為魚徳者非挈之而入淵是以夏蠲冬繇民不以為怨春貸秋賦民常以為恩君子之居民上而何以歡娱小道為哉大禹力溝洫而天下無饑民文王善養老而天下無凍餒漢文躬節儉而有煙火萬里之富用是道也故曰所謂西伯善養老者敎之樹畜導其妻子使養其老固非家賜而人益之也然則身為大臣分居民上必若是而後徳不忝位必若是而後道不違紀必若是而後行不碍成必若是而後民不違志不然将不免於煦煦嫗嫗如覇者之所為矣寜不上負君而下自負哉昔者齊桓公之平陵見家人有年老而自養者公問其故對曰有吾子九人家貧無以妻之吾使傭而未返也桓公取外御者五人妻之管仲入見曰公之施恵不亦小乎公曰何也曰公待所見而施恵焉則齊國之有妻者少矣公曰若何令國丈夫二十而有室女子十五而嫁噫仲其足以知此矣若李泌之處蕃使復府兵蓋亦庻幾焉唐河隴既沒於吐蕃安西北庭及西域使人在長安者歸路阻絶皆仰給於度支泌知胡客皆有妻子買田宅安居不欲歸命停其給凢四千人皆詣政府訴之泌曰此皆從來宰相之過豈有外國使者留京師數十年不聽歸乎今當假道回紇各遣歸國不願者當於鴻臚寺自陳授以職位給以俸禄人生當乘時展用豈可終身客死乎於是諸客無一人願歸者泌皆分𨽻神策兩軍禁旅益壮嵗省五十萬緡徳宗復問府兵之法曰今嵗卒戌京西者十七萬人嵗計食粟二百四萬斛今粟直斗百五十為錢三百六萬緡國家比遭饑荒經費不充就使有錢亦無粟可糴未暇議復府兵也吐蕃久居原蘭之間以牛運糧糧盡牛無所用請發左藏惡繒染為彩纈因党項以市之計十八萬疋可致六萬餘頭命諸冶鑄農器糴麦種分賜縁邊諸鎮募戍卒耕荒田而種之約麦熟倍償其種其餘㨿時價五分增一官為糴之來春種禾亦如之沃土久荒所收必厚戍卒獲利耕者浸多糴價必賤名為增之其實比今嵗所減多矣且邊地官多闕請募人入粟補之可足今嵗之糧上皆從之因問卿言府兵亦集如何對曰舊制戍卒五年而代今既因田致富必不思歸及其將滿下令有願留者即以開田為永業家人願來者本貫續食遣之不過數畨則戌卒皆土著乃悉以府兵之法理之是變闗中之疲弊為富强也郭汭為荆南留後荆南兵荒之餘止有一十七家汭厲精為治撫集凋殘通農務商晚年殆及萬户時藩鎮各務兵力相殘莫以養民為事獨華州刺史韓建招撫流散勸課農桑數年之間民富軍贍時人謂之北韓南郭嗚呼此誠元臣之職分大光之事業而無負牧民之精忠也彼何曽不恤國危而但知萬錢之食楊素坐視國亡而日收㕓市之利王戎身為司徒而執籌㑹稽如或不足者固不足道而子文之自毁其家以紓楚國之難者視此亦末矣不亦淺之乎其為丈夫已乎甚至魏博節度使田悦事朝廷恭順河北黜陟使洪經綸不曉時務聞悦軍七萬人符下罷其四萬人令還農悦陽順命罷之而集應罷者謂曰女曹久在軍中有父母妻子今一旦為黜陟使所罷将何以自衣食乎衆大哭悦乃出家財以賜之使各還部伍於是軍士皆徳悦而怨朝廷夫經綸固不足言而悦之所為則去陳氏季孫宋鮑無幾矣可不戒乎易曰弗損益之无咎貞吉利有攸徃得臣元家益利有攸徃利涉大川何也葉子曰天下無不可使之民患無有以利之耳亦無不可殺之民患無有以感之耳利之則行感之則奮孰知夫我而孰知夫民焉河間獻王曰禹稱民無食則我不能使也功成而不利於人則我不能勸也故䟽河以導之鑿江通於九𣲖灑五湖而定東海民亦勞矣然而不怨者利歸於民也利歸於民故惟其所動天下無事則下令如流水隨所使而不鬲天下有事則涉險如夷途捐其生以赴難𫝊曰悦以使民民忘其勞悦以犯難民忘其死孟子曰以佚道使民雖勞不怨以生道殺民雖死不怨殺者其是之謂乎噫非堯舜通天下為一身百姓皆以堯舜之心為心者不足以語此易曰益利有攸徃利涉大川初九利用為大作元吉无咎何也葉子曰以利利天下者大君之設施也以忠忠朝廷者良臣之報效也臣有報主之忠而後君無虚空之恵矣雖然管子有言飛蓬之問不在所賔燕雀之集行道不顧君子之於天下不為則已為而止於以小事塞焉猶不為也何以為急君之義盡一己之責乎故曰撰良馬者非以逐狐貉将以射麋鹿砥利劒者非以斬縞衣将以斷犀兕雖然任天下之大事者報上之忠善天下之大事者塞任之責居然受上之益而不知報物之㝠也徒然報上之徳而弗克善忠之末也故曰日月不髙則光不赫水火不積則輝潤不愽珠玉不覩乎外則王公不以為寳禮義不加乎國家則功名不白是以古之君子謀人之國者福於己而禍於人則事有所不立利於今而害於後則功有所不成何也為其必有大作為也為其作君之大謨而後作為始大作君之大謨者忠激而慮淺則咎生故稽天質人欲潜以深考古騐今欲參以伍審時制變欲完以堅則大謨不紛而天下隂受其利矣是之謂以其言報君斯之謂忠言不謂之罪言矣作天下之大政者志廣而才疏則咎生故可繁而弗可使亂弗治可勞而弗可使治弗興可速而不可使弊易生則大政不擾而天下隂受其福是之謂以其身報君斯之謂委身不謂之愛身也庶幾乎此者其董生賈誼諸葛亮郭子儀之流乎不然若晉殷浩承重徴厚聘而出欲以經畧中原為己任而無故輕襲姚襄以開首禍輕師北伐兵敗糧盡乖繆若此非惟不克成功而反致禍亂矣又若唐崔造少與韓㑹盧東羙張正則為友以王佐自許時人謂之四夔徳宗以造敢言故不次用之滋映多讓事於造造久在江外疾錢榖諸使罔上之弊奏罷水陸度支轉運等使諸道租税悉委觀察使刺史遣官送京師令宰相分判六曹映判兵部李勉决刑部劉滋判吏禮部造判户工部造與户部侍郎元琇善使判諸道䀋鐡榷酒韓滉奏論其過失罷之夫四夔以王佐自許獨造至宰相所設施者罷轉運一事而所以易之者卒於無成虚名而少實夫豈足以副委任之意乎他如石敬瑭拒命唐發兵討之契丹将兵救敬瑭唐兵大敗唐主懼發洛陽謂盧文紀曰朕排衆議用卿今禍難如此嘉謀安在乎文紀但拜謝不能對馮延巳與其黨談論常以天下事為己任及唐主去帝號降周世宗延已之黨相與言有謂周為大朝者常夢錫笑之曰諸公常言致君堯舜何意今日為小朝邪夫君不能量材而受任臣不能自量以膺責卒之交尤争怨此姍彼笑胡為者哉易曰利用為大作元吉无咎六二或益之十朋之龜弗克違永貞吉王用亨于帝吉何也葉子曰嘉謨嘉猷足以永天禄而保國家者君之寳也尊官大爵足以立功名而澤天下者臣之寳也秉虛中謙益之貞而蒙股肱心膂之寄極林鳥魚水之歡将有推之而不可得解之而不可使去者則功成而無忌道行而不阻其為人臣之福慶何如哉太甲頼匡救之徳髙宗資舟楫霖雨之用是也伊尹傅説之所謂益不亦大乎雖然臣為上為徳為下為民其難其慎惟和惟一尹之允執其中也敢不祇若王之休命敢對揚天子之休命説之終始典於學也克念不怠服膺勿失其臣道之大常乎如此而君臣之感通是為幽明之孚逹可以歆上帝可以蠲明神矣故曰惟尹躬暨湯咸有一徳克享天心又曰非天私我有商惟天祐於一徳嗚呼盛哉不然若魯雖僣請郊於平王至僖公四卜而不從宣復覬焉愈卜愈違而天心終莫之與矣明神之交可畏也哉易曰或益之十朋之龜弗克違永貞吉王用亨於帝吉六三益之用凶事无咎有孚中行告公用圭何也葉子曰慶賞爵禄上之所以勞有功也警戒飭罰上之所以勵不及也古之人重材何重乎其材試之而未振則敲之敲之而未成則作之是故雨露之潤不先震擊蕙蘭之煽常繼嚴霜故古之王者必立牧方二人使窺逺牧衆也若之何窺逺而牧衆也逺方之民有饑寒而不得衣食有獄訟而不平其寃有失賢而不舉者入告於天子天子於其君之朝也揖而進之曰噫朕之政敎有不得爾者邪何如乃有饑寒而不得衣食有獄訟而不平其寃失賢而不舉然後其君退而與其卿大夫謀之謀之不臧而戒飭不喻而罰及矣三約五需必使二人之告曰衣食給矣獄訟折矣進賢而有衆用矣然後天子嘉績而燕饗焉此勸羣辟而登百姓之道也故古之明王天下有不順者必諄諄而告教之多方而訓飭之再三不可然後黜責征討加焉則負義者知罪加刑者有辭矣觀之唐末自失河朔或討伐之或姑息之不聞有文告之命戒飭之辭也是以兵加而不服恩厚而愈驕自武宗以削平渾一為志李徳裕以裁成輔相為宜故於河北三鎮再遣使者至京師徳裕嘗面諭之曰河朔兵力雖强不能自立須藉朝廷官爵威命以安軍情語女使與大将要勅使以求官爵何如自奮忠義立功立事結知明主乎且李載義為國家平滄景及為軍中所逐不失作一節度使楊志誠遣大将遮勅使馬求官及為軍中所逐朝廷竟不赦其罪此二人禍福足以觀矣由是三鎮不敢有異志而朝廷制之如運掌易曰益之用凶事有孚中行告公用圭六四中行告公從利用為依遷國何也葉子曰無所逃於天地之間者君臣之分也不可解於手足腹心之際者君臣之情也義也是故患吾立身之不臧耳不患其聞言而不入患吾陳言之不善耳不患其聞善而不行患吾聞命而不告耳不患其入告而不聽何也告者分也從者義也情也是故時平而陳天下之謨若舜禹之洪濟董賈之經綸有急而鳴一時之變若祖已之奔告於王鄭商弦髙之使遽告於鄭彼豈好為是紛紛喋喋以媚其君哉忠臣之分也堯舜之俞文武之允商紂鄭穆之為備夫亦情義之不容己者乎若夫曲沃叛昭公於晉而我聞有命不敢以告田氏召陽生於魯而國人知之不敢言是君之賊而國之蠧矣雖然告而不以利民猶不告也利民而不以安國猶不利也桑𢎞羊孔僅之開導利源權萬紀韋堅王珙楊慎矜王涯孔循之浚民以生孟子所謂諸侯罪人也又何以告為哉吾有取於元凱焉晉大水詔以災問主者何以佐百姓杜預上疏以為今者水災東南尤劇宜勅兖豫等州留漢時舊陂以畜水餘皆决瀝令饑者得魚菜蝦蚌之饒此目下日給之益也水去之後填淤之田畆取數鍾此又明年之益也典牧種牛有四萬五千餘頭可給民與耕種責其租税此又數年以後之益也晉主從之民賴其利唐張平叔欲於大旱中徴三十六年前逋欠李渤以一言而悉免嗚呼其亦知所以告矣利於民而亦利於國故時平而安堵如故有急而遷徙如那不特韓獻子十世之利而實在邾文公養民之命矣豈必水深土厚阻山帶河堯之平陽舜之蒲坂禹之冀湯之亳周之鎬漢之闗中唐之長安其深足以畜其厚足以載其阻足以塞其帶足以滙天地之所合四時之所交風雨之所㑹隂陽之所和然後其本固而其勢壮為天下之大利哉雖然利而遷遷可也不遷而利可無遷矣楚大饑羣蠻叛之於是申息之北門不啟楚人謀徙坂髙蒍賈曰不可於是以秦人巴人㓕庸而楚益大蘓峻之亂宗廟宫室盡為灰燼温嶠欲遷豫章三吳之豪欲遷㑹稽司徒王導曰孫仲謀劉𤣥徳俱言建康王者之宅古之帝王不以豐儉移都茍務本節用何憂凋敝若農事不脩則樂土為墟矣且北冦游魂伺我之隙一旦示弱竄於蠻域求之望實懼非良計今宜鎮之以静羣情自安由是不復徙都而晉始安蘓子曰平王之初周雖不能如楚之强顧不愈於東晉之㣲乎使平王有一王導蒍賈定不遷之計收豐鎬之遺民而脩文武成康之政以形勢臨東諸侯諸侯雖强未敢貳也而秦何自覇哉是故無故而遷未有不削若魏恵王之遷於大梁楚昭王之遷於郢頃襄王之遷於陳考烈王之遷於夀春李景之遷於豫章皆不復振有亡徴焉嗚呼盤庚而下其可以易言哉其可以易言哉易曰中行告公從利用為依遷國九五有孚恵心勿問元吉有孚恵我徳何也葉子曰君臣一體休戚相通感之而即應者機之真也倡之而即和者衷之孚也管子曰民惡憂勞我佚樂之民惡貧賤我富貴之民惡危墜我安存之民惡滅絶我生育之能佚樂之則民為之憂勞能富貴之則民為之貧賤能安存之則民為之危墜能生育之則民為之㓕絶又曰莫樂之則莫哀之莫生之則莫死之何也欒共子曰報生以死報賜以力人之道也君子者能以人道待其民則民亦必以人道報其君矣故晁錯曰三王主臣俱賢故合謀相助計安天下莫不本於人情人情莫不欲夀三王生而不傷也人情莫不欲富三王厚而不困也人情莫不欲逸三王節其力而不盡也其為法令也合於人情而後行之其動衆使民也本於人事然後為之取人以已内恕及人情之所惡不以強人情之所欲不以禁人是以天下樂其政歸其徳望之若父母從之如流水陸贄曰當今急務在於審察羣情羣情之所甚欲者陛下先行之羣情之所甚惡者陛下先去之欲惡與天下同而天下不歸者未之有也又曰當違欲以行已所難布誠以除人所病竊聞輿議頗究羣情四方則患於中外意乖百辟又患於君臣道鬲郡國之志不達於朝廷朝廷之情不升於軒陛上澤壅於下布下情壅於上聞欲無疑阻其可得乎誠宜總天下之知以助聰明順天下之心以施敎令則君臣同志何有不從逺邇歸心孰與為亂噫非二帝三王曷足以及此故曰寗戚擊牛角而歌桓公舉以大政雍門子以哭見孟嘗君流涕沾纓歌哭衆人之所能也一發聲入人耳感人心誠之至也故唐虞之法可效也其諭人心不可及也其是之謂乎雖然楚師伐宋師人多寒王循三軍撫而勉之三軍之士皆如挾纊楚人有饋簞醪者莊王投之於河令将士迎流而飲之三軍皆醉夫楚子不能使皆挾纊而三軍為之煖煖其言也莊王不能使河為醪而三軍為之醉醉其賜也不勞之以虚辭詭説而與之以心則有不貴而恵者矣嗟乎後世如此而况唐虞三代者乎不然停税之詔是謂恵民以耳也民将塞其耳罷役之議是謂恵民以目也民将閉其目夫何相恵之有易曰有孚恵心勿問元吉有孚恵我徳上九莫益之或擊之立心勿恒凶何也葉子曰善可求也利不可求也求善不已則四海之内皆将輕千里而來告之以善求利不已則妨者争病者角天下之禍不知其所終矣荀氏之書曰太上不空市其次不偷竊其次不掠奪上以功恵綏民則下以財力奉上是以相與空市則民不與不與則為巧詐而取之謂之偷竊則民備之備之而不得則暴迫而取之謂之掠奪民必交争禍亂作矣程子曰利者衆人之所同欲也専欲益已其害大矣欲之甚則昏蔽而忘義理求之極則侵奪而致仇怨嗚呼可不戒哉虞公求璧於虞叔已而又求其寳劍知伯求地於韓魏已而又求蔡臯狼於趙卒之身不保而禍敗隨矣唐李罕之據河陽張全義據東都二人刻臂為盟相得甚歡罕之勇而無謀性復貪暴意輕全義聞其勤儉力嗇笑曰此田舍一夫耳屢求榖帛全義皆與之少不如所欲輙械主吏杖之河南将佐皆憤怒全義竭力奉之罕之益驕所部不耕稼専以剽掠為資至是悉衆攻絳州降之進攻晉州王重盈宻結全義以圖之全義潜發屯兵夜襲河陽黎明入之罕之踰垣走奔澤州嗚乎貪求之禍豈惟商紂之鹿臺董卓之郿塢唐徳宗之大盈不免悖出之患乎故曰非道而行之雖勞不至非其有而求之雖强不得故知者不為非事廉者不求非有是以逺害而名彰雄雉之卒章不忮不求何用不臧其是之謂乎是故管子曰君有三欲於民三欲不節則上位圯三欲者何也一曰求二曰禁三曰令求必欲得禁必欲止令必欲行求多者其得寡禁多者其止寡令多者其行寡求而不得則威日損禁而不止則刑罰侮令而不行則下陵上故未有能多求而多得者也未有能多禁而多止者也未有能多令而多行者也故曰上苛則下不聼下不聽而强以刑罰則為人上者衆謀矣為人上而衆謀之雖欲毋危不可得也易曰莫益之或擊之立心勿恒凶夬揚于王庭孚號有厲告自邑不利即戎利有攸徃何也葉子曰未嘗無小人者隂陽升降之機也慎重以圖之者君子芟荑之道也衆君子之中而間一小人焉去之若易易矣孰知易易者勢也而不敢以易易者機之所伏不得而不然也何者急之則變生一時緩之則禍釀數世徒恃我則力懼其不足假之人則亂恐其有餘王曹未誅而陳竇先誅張叚未死而何進先死漢之去宦官以袁紹而漢亡亦以紹唐之去宦官以崔昌遐而唐亡亦以昌遐去小人豈易易乎哉剛中有柔然後剛不敗怯中有勇然後怯不葸舜有十六相矣所去者四凶也周公有十夫之助矣所誅者三監也宜其甚易而無難者然而聖人寧有惕志焉無易舉也是故去小人有四道名其為賊敵乃可服三老所以説髙祖也人衆虎寡虎為人勝常安民所以勸吕公著也各為朋黨以相訾議史臣所以誚宋賢也紛召外兵事必先露曹操所以譏何進也嗚呼戒之哉昔者荆楚之僣逆横行江漢馮陵中夏駸駸有逼周之勢齊桓起而圖之不茍然也責包茅之不貢討王祭之不供楚罪著矣結江黄以為八國之援好鄭魯以為東西之助齊力併矣不受子華之叛不貪天子之命自治嚴矣按兵於陘脩文告之詞退舍召陵謹㑹盟之禮威武絀矣然後楚人帖服而周室奠安二十年間中國得以晏然無事齊桓曲盡抑夷之道故也覇者尚然况欲以王道行之哉易曰夬揚于王庭孚號有厲告自邑不利即戎利有攸徃初九壮于前趾徃不勝為咎何也葉子曰天下之不可不為者事也而不可不審者幾也兵法曰知彼知己百戰百勝𫝊曰度徳而動知難而退善之善者矣然則君子於天下之事可不知所以處之乎不然以都尉之微而决然當乎一隊無後援之救而以孤軍深蹂戎馬之地鋭於行而壮於徃欲以单刀决强敵敵其可勝乎此李陵所以有浚稽之敗也是知天下事果不可以奮志而為之矣故古之君子視天下之有小人觀國家之有奸宄若吾有大患焉豈不欲一决而快吾之志哉然而必若有所待然不敢茍且以發大難之端者恐不勝也向戌乞盖華臣之不順子産弗討駟黑之强盟不以是乎不知此不度徳不量力不觀時不審勢無故而發大難之端則大之禍國家若南蒯之强公室庾亮之徴蘓峻小之禍一身若陽處父之抑狐射姑宋義之排項羽深思而淺謀邇身而逺志家臣而君圖千古之鑒矣雖然詩之言曰民今方殆視天蒙蒙既克有定靡人弗勝陸東坤氏曰觀水之克火而知漢之於楚衆有以勝寡觀火之克金而知晉之於苻秦精有以勝堅觀金之克木而知秦之於胡剛有以勝柔觀木之克土而知曹之於袁專有以勝散觀土之克水而知光武之於莽實有以勝虚故曰近取諸身仁不勝道逺取諸物妖不勝徳君子亦審其所以勝彼者天下之事果終不可徃乎易曰壮于前趾徃不勝為咎九二惕號莫夜有戎勿恤何也葉子曰天下之事甚不可以易心為之也易者則必傾鄭伯請成於陳陳侯不許五父諫曰親仁善鄰國之寳也君其許鄭陳侯曰宋衛實難鄭何能為君子曰善不可失惡不可長其陳桓公之謂乎長惡不悛從自及也雖欲救之其将能乎亦不可以单力為之也单者則必蹶黄巢屯信州遇疾疫卒徒多死張璘擊之乃請降於髙駢駢欲誘致之許為求節鉞時昭義感化義武等軍皆至淮南駢恐分其功奏悉遣之賊知之乃告絶請戰駢怒令璘擊之兵敗璘死巢勢復振陷睦婺二州渡江踰淮大為世患然則天下事其可茍然而已乎而况小人之决乎唐人有言去河北賊易去中朝朋黨難王允誅董卓卓誅而氾傕興五王誅二張二張誅而三思起趙汝愚立嘉王嘉王立而􅇑胄至熈豐小人退休散地怨入骨髓隂伺間隙而諸賢不悟各為朋黨以相訾議不旋踵而為紹聖之禍向使諸公内懐兢懼霍然若臨大敵而慮之周外謹呼招翩然若集大衆而處之宻早聽士孫端薛季昶常安民葉適先見之言而引用其人糾集其衆則有備無患過防莫戕必無一旦之禍而禍起一旦不足憂必無倉卒之變而變起倉卒不足慮矣何至殺身亂國之敗哉昔盧把貶遇赦欲用為饒州刺史給事中袁髙不草制更命他舍人制出而髙執之不下且奏把極惡窮兇何可復用使補闕陳京趙需等亦上書論之上大怒諫者稍却京顧曰需等勿退此國家大事當以死争之上怒稍解以為澧州别駕把竟死澧州敬宗欲討王承宗以吐突承璀為神策河中等道行營兵馬諸軍招討處置等使白居易諌以為國家征討當責成将帥近嵗以中使為監軍已非令典今徴天下之兵専令中使統領則諸道耻受指揮心既不齊功何由立引度支使李元素鹽鐡使李鄘及許孟容李夷簡諫官孟簡李元膺穆質獨孤郁等極言其不可上不得已削承璀四道兵馬使改處置為宣慰此庶乎得去小人之道矣易曰惕號莫夜有戎勿恤九三壮于頄有凶君子夬夬獨行遇雨若濡有愠无咎何也葉子曰君子之去小人不在色而在志不以迹而以心以迹而色徒取禍焉耳李懐光自蒲城引兵敗朱泚於醴泉救奉天之難初志亦忠矣不知降軫之道顧數與人言盧杞趙賛白志貞之奸佞且曰吾見上當白誅之卒使把知而䜛譛行隨為叛逆之鬼徴色發聲之禍可不戒哉故君子不幸而遇小人棄同而即異叛正而附邪若張奐從宦官而敗正直段紀明助閹尹而害忠烈固不足道矣若能决而又决以斷諸心似和非和以成其事如温太真之處王處仲以全朝廷顔杲卿之著金紫以討禄山則迹雖似穢而心實無怍始雖見疑而終則無污去汚以自潔舍故以自新天下孰不與之然則君子之於小人又何事於聲色之為也哉唐馮行襲宋安丙亦庶幾焉賊帥孫喜聚衆攻均州刺史吕某不知所為都将馮行襲伏兵江南自乘小舟迎謂喜曰州人得良牧無不歸心然公卒從太多州人懼其剽㹁尚以為疑不若置軍江北獨與腹心輕騎俱進請為鄉導告諭州人無不服者矣喜從之既渡江伏兵發行襲手擊喜斬之吳曦反豪傑付之撫髀歎息資政殿學士安丙奮由儒生獨能周旋其間濡迹以就事部分既定即矯詔誅曦以聞易曰壮子頄有凶君子夬夬獨行遇雨若濡有愠无咎九四臀无膚其行次且牽羊悔亡聞言不信何也葉子曰螳螂奮臀以當車轍青蛙怒目而視吳王此其志之勇也而不知其材之不美而力之不勝也何為者哉是故衆方彈冠而吾獨不甘於掛冠衆方肉食而吾獨不安於藜藿以為食衆方號君子去小人而吾愧齒於碌碌之庸人此人情也然天下之事不可以菲材濟天下之功不可以弱質成天下之小人不可以寡徳去則又天下之定理也又何貴於徒以其情為哉其惟乗天時藉人力彼當勞吾處佚安然不動聲色而成天下之大事則功成而無阻矣嗚呼此非常人所及也雷霆之聲徧達天下而不能使聾者卒有聞日月之明徧照天下而不能使盲者卒有見是之謂也昔者宋襄公乘齊桓之卒欲襲覇統而急於合諸侯偲偲然不安於從令而必欲出令不肯為衆諸侯而必欲霸諸侯何其志之厲而進之猛也然而以暗弱之才冒雄豪之事借小道之詐犯虎狼之威卒之執於盂釋於薄敗死於泓為天下笑不審己力不量彼勢不乘天時不藉人力之禍也向使不虐二國之君重結齊魯之好使天下諸侯不我疾而我親然後因其勢而動乘夫時而起得霸不難矣不知此術夫何益哉雖然無闕然後動子魚勸其以徳攻於始小國争盟君欲己甚子魚戒其以禍敗於終而兹父聽之為麈談草説也何以得死易曰臀无膚其行次且牽羊悔亡聞言不信九五莧陸夬夬中行无咎何也葉子曰堯舜在上懼䜛説殄行震驚朕師也而堲之禹臯陶之相為股肱懼驩兠有苗之巧言令色孔壬也而畏憂之何也鼷䑕食牛能貫心徹骨而莫之覺小人蠱惑其君使身弑國亡而不自知其禍之大而害之深者也可不奮然而去之乎然惑之必已近近之必已寵寵之必已尊既尊則必僣既僣則必强既强則難動决之又易為乎急之則禍不測緩之則患益深故必待其發而乘其隙推其墜而扼其絶然後用力約而無後患功成而天下安之矣此根之難㧞者不輕動以激其變惡之既稔者不緩治以失其機有勸懲之公而無忿疾之道者子産之所以為善也然則人君可使小人得以近而惑之乎晉之王敦其初不過一總戎其後至於共天下逆已行而元帝不敢名征之至病而哭其䘮唐之李輔國其初不過一家奴其晚至於稱尚父惡貫盈而代宗不敢顯戮之至遣盜以竊其首决之雖不暴而典刑則不存矣是豈光明正大之業哉甚而憲宗誘執盧從史失之詭征討王承宗失之遽其罷吐突承璀也迫於裴度李絳之奏皆非處置得宜之道心愈勞而事愈拙矣是故求善於其終不若致謹於其始致謹於其始莫若决之使不得而近嗚呼聖人之慮逺矣易曰莧陸夬夬中行无咎上六无號終有凶何也葉子曰小人之在天下之間也其始也翩翩不富毒痡於四海其終也壁立一身七尺不能存何也方其勢之盈也醯酸而蚋集及其勢之衰也睍見而雪消理也張讓叚珪之徒田令孜劉季述韓全誨之軰則亦威脅天子毒流縉紳矣而卒不免於羣之殲而黨之㓕寃號之聲徹於内外盧攜初倚髙駢崔𦙍初倚宣武昭緯初倚邠岐田令孜自知不為天下所容自除西川監軍徃依陳敬瑄其後星散漚滅卒為虀粉不亦可悲之甚乎夫亦可以戒矣易曰无號終有凶姤女壮勿用取女无攸利何也葉子曰此聖人所以獨靈於心而髙超於世也傳曰象事知器占事知來又曰知幾其神乎幾者動之微吉之先見者也君子見幾而作不俟終日斷可識矣故辛有適伊川見被髮而祭於野者曰不及百年此其戎乎其禮先亡矣杜鵑鳴於洛陽邵雍聞之不樂客問其故雍曰洛陽舊無杜鵑今始至天下将治地氣自北而南将亂自南而北今南方地氣至矣禽鳥飛類得氣之先者也不二年用南人作相天下自此多事矣辛有觀事而知其兆邵雍觀物而知其幾古之哲人其前知而豫憂類如此况於一隂之生成剥之形一小人之興大亂之徴君子可以為微而親䁥之哉養虎而需其成狎虺而俟其振禍始迫矣子西䁥白勝以為莫我親也而卒死於白勝五王䁥三思以為几上肉也而卒死於三思可不戒哉故彼雖有及我之機而我宜避之於早彼雖有合我之意而我當絶之於先不然則為狐所惑而蒙妖所迷矣是故有仍氏之女𤣥妻黰而甚美光可以鑑后夔取之生伯封而后䕫遂以不祀申公巫臣之女美而不妒聞於諸侯叔向不知甚美必有甚惡也取之而生伯石狼子野心以滅羊舌氏之族故曰三代之亡共子之廢皆是物也美而艶冶而嬌是常人之所好而聖人之所甚憂也如之何而引以自配焉易曰姤女壮勿用取女无攸利初六繫于金柅貞吉有攸徃見凶羸豕孚蹢躅何也葉子曰水火之始甚弱也其終至於燎原而滔天也必至之勢也何也不遏之故也遏之則水由地中行火然為世用矣雖然遏之於㣲而㣲不可遏圖之於細而細不可圖君子可無慎乎是故小人之始進也能自止而知分則為小人之利君子遇小人之進也能自止而知幾則無君子之災魯肅素知吕蒙陸遜有隂圖闗侯之志嘗勸孫權以曹操尚存宜且撫輯闗侯與之同仇不可失也固亦以正道柅而止之矣其如小人之本性何哉雲長昧於知幾之哲忘其奔突之兇顧以力稱功美之詐深自屈抑之奸盡忠自托之詭使意大安無所復嫌是以撤兵赴樊卒為所圖豈非萬世之鑒哉易曰繋于金柅貞吉有攸往見凶羸豕孚蹢躅九二包有魚不利賔何也葉子曰君子之於民也彼不我遘則視之如浮雲未嘗求之而使比既與我遇而合矣則保之如赤子防之如處女有棄焉而使為他人所魚肉縱焉而使為仇敵之愚弄者哉是故既歸一則理無兩屬我為主則義不及賔劉琮舉荆州降曹操昭烈将其衆去過襄陽州人多歸之比到當陽衆十餘萬人輜重數千輛日行十餘里或曰宜速行保江陵昭烈曰濟大事以人為本今人歸吾吾何忍棄之夫君子之保愛而顧惜之者固如此魯襄如㑹聽政孟獻子請屬鄫既而狐駘之敗不能復庇乃以屬鄫為不利使鄫大夫聽命於㑹金人陷宋京議割中山太原河間三鎮及兩河之地以畀之而三鎮固守不下何㮚曰三鎮國之根本奈何一旦棄之河北之民皆吾赤子棄地則并其民棄之為民父母而棄其子可乎竟以畀敵及髙宗即位仍勅刑部不得報赦文於河東河北陜之蒲解嗚呼棄願屬之國與固守之民曽是而為英君誼辟之道哉甚者吕蒙陸遜襲闗侯得侯及將士家屬皆撫慰之令軍中不得干歴人家有所求取旦暮使親近存恤耆老問所不足給醫藥賜衣糧侯數使人與蒙相聞輙厚遇其使周遊城中家家致問或手書示信使還人知家門無恙見待過於平時皆無闘心卒為蒙所圖楊行宻畏孫儒之衆欲退保銅官戴友規以為望風棄城正堕其計淮南士民及儒軍來降者甚衆宜遣将先䕶送歸使復生業儒軍聞淮南安堵皆有歸思人心既揺安得不敗卒擒斬儒嗚呼儒不足道蒙遜小人亦何掛齒而雲長忠勇義烈貫日月照古今者何不思之甚而以已家衆使他人得撫而愚弄之邪是可歎矣其去齊景魯哀宋昭坐視陳氏季孫宋鮑竊其民而利之者相去曾幾何哉然則太王之屬其耆老捐邠民而與狄自㧞而遷之岐山非與曰太王固知吾民之我懐而從者之如市特要民以去所不為焉耳易曰包有魚不利賔九三臀无膚其行次且厲无大咎何也葉子曰民不我屬非久居之地也何以展驥足而立宏功此先主無用武之地而逃遁以至荆依劉表以從事而慨然流涕是不安於下者也權非我有無可挾之資也何以令諸侯而行天下此獻帝已為曹操所得而中原不可圖江東已為呉所有而秖可以為援皆不遂其行者也保全三蜀姑成鼎足斯其為不幸矣夫易曰臀无膚其行次且厲无大咎九四包无魚起凶何也葉子曰古之王者之得民也中心恱而誠服也如七十子之服孔子也故曰王者往也天下之所歸往也環而視其域中無匹夫焉可乎淮南子曰孔子弟子七十人養徒三千人皆入則孝出則弟言為文章行為儀表敎之成也墨子服役者百八十人皆可使赴火蹈刃死不旋踵化之所致也夫孔墨匹夫之㣲耳而其從如水况為天下君而可使無民乎書曰民之戴商厥惟舊哉孟子曰太王去邠邠人曰仁人也不可失也從之者如歸市春秋書齊宋次郎以見齊霸之難書楚蔡次厥貉以見楚霸之難而說之者曰於此可以見人心也不茍於從齊是人心猶有周不茍於從楚是人心猶在晉焉耳燕樂毅以秦魏韓趙之師破齊與楚淖齒共殺齊湣王分其地未期年而王孫賈一呼齊人皆􅃝右攻賊劉𤣥徳走江陵而荆州之民􅂝老扶幼從之者數百萬家為君而無民大事去矣傳曰無民而欲逞其志者未之有也國君是以鎮撫其民魯君失民矣焉得逞其志又曰無民孰戰無民孰守無民其誰與我亡無日矣此魯昭處於鄆鄆潰而自是削於魯尺地一民皆非其有而客死乾侯狄攻衛懿公欲戰而民皆曰使鶴與狄人戰而殺於熒澤晉主夏盟威服天下及大夫専政賄賂公行内外離叛示威平丘而齊叛請辭召陵而蔡叛盟於沙鹹而鄭叛次于五氏而衛叛莅于鄭㑹于夾谷歃于黄而魯叛諸侯叛於外大夫叛於内故奔于晉陽而趙鞅叛入於朝歌而荀寅士吉射叛以晉之大天下莫强焉邦分崩離析而不能守也襄之末年享范獻子而功臣不能具三耦昭之末年禘于襄公萬者二人其衆萬于季氏魯君若贅旒其何以托國也故栁伉上徳宗疏曰犬戎犯闗度隴兵不血刃而入京師刼宫闈焚陵寢武士無一人至者此将帥叛陛下也自十月朔召諸道兵盡四十日無隻輪入闗此四方叛陛下也内外離叛陛下以今日之勢安邪危邪噫此可以觀矣易曰包无魚起凶九五以把包𤓰含章有隕自天何也葉子曰慎也慎之至也夫以君治民何不服以正治邪何不順以徳治佞何不散然必静俟而深計委曲而周旋非煩之也臣也邪也佞也人也消也息也盈也虚也天也天不可違其惟人定足以勝之乎嗚呼人豈易定哉昔魯昭公欲去季氏告子家子子家子曰讒人以君儌倖若不克君受其名不可為也舍民數世以求克事必不可也且政在焉其難圖也公不聽而反為季氏之所逐說之者曰昭公即位雖久而民不見徳則無徳以叔孫婼子家駒之賢而不能専任以聽其言則無人􅆇孫子家皆以為不可而遽信羣小之言以圖之則無謀公徒釋甲執氷而踞莫有鬬心則無兵四者無一焉而奮然怒螳螂之臂以當轍其不為曹髦之刃出於背者幸而免耳使昭果能修徳用賢俟其信孚於人而援之者衆然後審謀治兵一舉而戮巨奸誰曰不可潁濵亦曰魯侯之失國也久矣至昭公不忍其逼未能收民而舉兵攻之遂以失國哀公孤弱甚於昭公又欲以越人攻之終亦出死於越嗟夫棄民五世而欲以一朝收之難哉昔齊晏子告景公以田氏之禍惟禮可以已之景公稱善而不能用齊卒以亡語稱哀公問社於宰我宰我對曰夏后氏以松殷人以栢周人以栗曰使民戰栗孔子聞之曰成事不說遂事不諫既往不咎以為哀公将去三桓而不敢正言古者戮人於社其托於社者有意於誅也宰我知其意而亦以隐答焉其曰使民戰栗以誅告也孔子知其不可也此先君之所為植根固矣不可以誅戮齊也蓋亦有意於禮乎不然何咎予之深也嗚呼此可以知去禍之道矣是故東坡有言國之有小人如人之有癭癭必生於頸而附於咽是以不可去有賤丈夫者不勝其患而决去之是以癭去而得死漢唐之亡由此故也漢唐末世議者以為天下之患在宦官宦官去則天下無事故漢之竇武何進唐之李訓鄭注擊之不勝止於身死袁紹崔𦙍擊之而勝漢唐遂因之而亡方其未去是累然者癭而已及其既去則遂潰裂四出而死繼之矣噫後之人自謀其國者其尚思所以消導解散之無使癭生吾之頸而至於不可去謀人之國者亦無快吾之一决而傷人之命庶幾於此者其唐徳之任李泌乎陜虢兵馬使達奚抱暉鴆殺節度使張勸代攝軍務邀求旌節且邀求李懐光将達奚小俊為援徳宗謂李泌曰若河陜連横則卒不可制而水陸之運皆絶矣不得不煩卿一往乃以泌為都防禦水陸運使欲以神䇿軍送之泌曰陜城三面懸絶攻之未可以嵗月下也臣請以单騎入之且令河東全軍屯安邑馬燧入朝願勑燧與臣同辭皆行使陜人知之亦一勢也許之泌見陜州将吏在長安者語之曰主上以陜虢饑故不授泌節而領運使欲令督江淮米以賑之今當使抱暉将行營有功則賜旌節矣抱暉稍自安泌與馬燧疾驅而前将佐不俟抱暉之命來迎泌笑曰吾事濟矣去城十五里抱暉亦出謁泌慰撫之抱暉喜泌視事賔佐有請屏人白事者泌曰易帥之際軍中煩言乃其常理泌到則自安帖矣不願聞也由是反仄者皆自安泌但索簿書治糧儲明日召抱暉語之曰吾非愛女而不誅恐今日有危疑之地朝廷所命将帥皆不能入故丐女餘生女為我賫版幣祭前使慎無入闗自擇安處潜來取家保無他也抱暉遂亡命不知所終不然若昭宗决策討李茂貞命杜讓能専掌其事崔昭緯隂結邠岐為耳目讓能朝發一言二鎮夕必知之以至卒不能討而敗誅讓能以為悦嗚呼討亂若此幾何而不敗哉詩曰於鑠王師遵養時晦救敗之道也易曰以把包𤓰含章有隕自天上九姤其角吝无咎何也葉子曰牝牛所以為麗陽剛不為物先桓公曰人臣剛朋友絶此寗嬴之所以去陽處父乎夫人之情柔和則易親落落則難合雖以程伊川之賢顧壁立萬仞不如明道之和風慶雲也則入門之際明道雲從而伊川孑立况華而不實怨之所聚犯而聚怨不可以定身者乎人懼不獲其利而罹其難安得而不去也雖然亦有貞孤絶俗介性所至者物莫與羣仇莫能即亦君子之所不廢焉蜀中常侍黄皓用事諸葛瞻等不能矯正士大夫多附之惟樊建不與往來秘書令郤正久在内職與皓比屋周旋三十餘年澹然自守以書自娱既不為所愛亦不為所憎故官不過六百石而亦不罹其禍易曰姤其角吝无咎葉八白易傳卷十一
