body:
  text: 葉八白易𫝊卷三明葉山撰小畜亨宻雲不雨自我西郊何也葉子曰畜止其君者人臣愛君之心乎不以堯舜之道陳於前不以責難陳善為恭敬不格之以心而姑適之以人間之以政者人臣柔弱之過乎夫使人臣而大盡愛君之心大止人君之過則何唐虞之不可復致何堯舜之不可復爲使人臣卒無剛毅之資强健之氣盛徳至善之化而區區小道之補則雖可以扶危亡之禍成粗治之安而膏潤天下浸滛萬物生民以来未之能致意是故陸賈能止馬上之治而未能進之以聖賢大學之道二十篇之新語何以爲霖雨之施也叔孫通能止擊柱之呼而不能進之以先王之道之美習野外之緜蕞何以爲膏澤之下也又况止江漢之横而不止四姬之蔽止支解之刑而不止陳氏之禍止西南夷之役而不止匈奴之師守黎陽之節而不止立武后之問則功烈如彼其卑而大行不可以望不言可知矣孟子曰君仁莫不仁君義莫不義君正莫不正一正君而國定矣然則不知大人之道格心之化而規規𤨏𤨏争得失於刀錐之㣲又豈足以承天之治乎雖然不盡大止之道者是固人臣之罪而不受正大之止者獨非人君之過乎張良漢祖言聴計従矣廢長之私使之忌而不敢言趙王之禍何以免孔明先主歡若魚水矣而伐呉之行使之憾死於法正則陸遜之折何所辭又况王𤓰之摘止之矣而大内之遷累言之而不聴姜公輔之誅止之矣而裴延齡之相雖百計而不能則其道益卑其治益替其止益細膏益屯誠不可以大有爲於天下而稱大過人之主矣然則君臣上下可不交修而互勉哉易曰小畜亨宻雲不雨自我西郊初九復自道何其咎吉何也葉子曰枉己者未有能直人者也幸進者未有能進諫者也然則人臣欲止君之欲而進不以道守不以正将何以正君哉何也進不以道無復畏而敬守不以正無復孚而信荀息曰宮之竒少長於君君暱之雖諫将不聴是不能使之畏而敬唐敬宗曰驪山若此之凶邪朕當一徃以試其然是張權輿不能使之孚而信夫何以行其説哉昔者晉士蒍與獻公周旋十年之間所以謀去羣公子者至矣宻矣無不聴且従矣其後乃明知太子之廢而不能囘獻公之心雖能勉太子以孝而不能止獻公於慈豈非平日所以𨗳君心而持己物者非親義之本歟始之以殘忍之説行而終之以仁厚之言入難矣是故東方之諷諌而武帝以之爲詼諧則雖悦而不能繹魏徵之忠直而太宗不覺其娬媚則雖従而不能改不然何漢髙之嫚罵而一見四皓太子卒不易漢武之侈肆而望見汲黯使人可其奏龎綂之廢孔明一言而即起長安令之斬長孺一言而即止乎敬而畏畏而信已正物正道固然也易曰復自道何其咎吉九二牽復吉何也葉子曰人臣進止其君之欲也與衆則説盛而易従黨孤則言凉而難入是故唐虞之陳謨也禹臯陶益稷相爲吁且咈而况其他乎劉向京房同心而輔漢王珪魏徵並諫以佐唐蘇軾范祖禹聫名以諫宋知是道矣晉靈公不君趙盾士季患之而将諫士季曰諫而不入則莫之繼會請先不入則子繼之由是三進及溜而莫之視矣卒何以補靈公之闕乎雖然此猶可也唐髙宗一日召長孫無忌李勣于志寕禇遂良於内殿遂良曰今日之事多爲中宫上意既决逆之必死太尉元舅司空功臣不可使上有殺元舅功臣之名遂良起於草茅無汗馬之勞且受顧命當以死争遂使李勣等稱疾不入卒之遂良寡特髙宗得以遂其無忌憚之心異日無人李勣得以逞其長君惡之計竒禍立成而大事去矣向使率三子而同入則大庭顯設之中非小人無所不至之地而稠人廣衆之際亦豈暴君斬艾忠良之時耶惜也知不出此遂使世勣之奸得肆於獨而高宗之禍可中於孤嗚呼悲夫故劉聰時河間王易素忠直陳元達倚之爲援及聰無道殺陳休王忱等易上䟽極諫聰大怒手壞其䟽易憤恚而卒元逹大慟歸而自殺以此知諌諍之所賴者君子同道以爲朋也易曰牽復吉九三輿脫輻夫妻反目何也葉子曰人臣進止其君之欲也合君子以爲交猶懼其臨利而巧趨遇害而詭避况小人乎變計百出不知其禍之所終矣管子曰與人交多詐偽無情實偷取一切謂之烏集之交烏集之交初雖相驩後必相咄故曰烏集之交雖善不親然則君子有畜君之心者不擇正人以圖事而或昵僉夫以爲助其不洩其機而沮其謀害其身而傾其身者未之有矣不慎於始終而忿然與之争失之於初後乃霍然與之鬬又何益於事哉汲黯與張湯約至上前皆背之黯詰責湯曰齊人多詐而無情實果然必湯也張九齡與李林甫約諌牛仙客實封及進見而林甫抑然陸贄引趙憬入相與憬約至上前極論延齡奸邪上怒形於色憬黙而無言又宻以贄所譏彈延齡事告延齡故延齡益得以爲計上由是信延齡而不直勢雖悔憤痛絶亦復何及矣嗚呼君子其慎無與小人處也哉易曰輿脱輻夫妻反目六四有孚血去惕出无咎何也葉子曰荀氏之書曰大臣之患常立於二罪之間在職而不盡忠直之道罪也盡忠直之道焉則必矯上而拂下罪也然則臣而必欲止君之欲不亦禍之伏憂之集而罪之招也乎自非堯舜安保無虞然則奈之何劉聰太保劉殷嘗戒子孫曰事君當務幾諫凡人尚不可面斥其過况萬乗乎夫幾諌之功無異犯顔但不彰君之過所以爲優耳此一道也而非其本也蘇老泉曰龍逄比干吾取其心不取其術蘇秦張儀吾取其術不取其心以爲諫法又一道也而猶其末也其惟至誠以感神一德以格天乎伊尹之於太甲繾綣以圖囘周公之於成王恐懼以彰德上也鄭崇之曳履趙普之補牘范鎮之章凡十九上鬚髪盡白次也如是則不待其臣之止而君有汝弼之勸不惡其臣之直而諫有弦韋之重矣何田舎翁之欲殺何曉人不當如是之爲謫何招君之過而播揚毁垣之爲諐罪也哉無所憂而禍不及自然之勢矣茍不知此誠不至而術行道不篤而權設鬻拳之止至於兵師經之止至於撞趙盾之止至於逆豈人臣之願哉甚而至如楊偓既得江西驕侈益甚以故怨殺判官劉隠將佐皆不自安居喪酣飲作樂然燈擊毬或單騎出逰從者不知所之張顥徐温泣諌偓怒顥温一日率牙兵三百露刃直入庭中數偓所親信十餘人之罪曳下擊殺之謂之兵諌盖臣道至是而天下之亂不可支矣易曰有孚血去惕出无咎九五有孚攣如富以其隣何也葉子曰有孚𤼵若至誠以感動乎君心者人臣之分也誠實下交虚懐而樂受乎人善者大君之宜也故使説有所進信之而不疑事有所陳行之而不惑則手足腹心之契無所解於其心而雲龍風虎之㑹斷金如蘭而莫之間矣天下萬邦有不如身之使臂臂之使指也哉又安事乎督責驅役之勞也哉書曰元首起哉股肱喜哉孚信之交也又曰臣哉隣哉隣哉臣哉身臂之使也唐虞三代而下惟蜀之先主呉之孫權有焉其次唐憲宗嘗謂裴洎曰以太宗𤣥宗猶藉輔佐以成其理况如朕不及先聖萬倍者乎故洎亦竭誠輔佐嘗問爲理之要何先曰先正其心君臣交孚所以確信杜黄裳李絳白居易諸賢用能斬劉闢梟李錡擒呉元濟使田興束身歸命承宗歛手削地韓𢎞輿疾討賊威行兩河藩鎮奉命武宗遣御史中丞李回宣慰河北令幽州早平回鶻鎮魏平澤潞回至河朔𢎞敬元逵仲武皆具􅐤鞬郊迎立於道左不敢令人控馬讓使先行不惟三鎮不敢助逆更因以爲臂使之用由信委李德裕而德裕所以告之者能盡其心故也易曰有孚攣如富以其隣上九既雨既處尚德載婦貞厲月幾望君子征凶何也葉子曰盛世小臣言大臣論言則行論則聴膏澤下於民天下底於定矣其斯君德之至滿乎然君積退聴之德而臣加强諌之威上有下從之勢而下忘逼上之忌是國之福抑亦臣之禍也何也婦盛疑抗夫月盛疑敵日隂盛疑匹陽臣盛疑逼君皆不幸也漢武謂乆不聞汲黯之戅今又妄𤼵矣唐太宗嘗罷朝怒曰㑹須殺此田舎翁德宗退謂左右曰蕭復輕朕宗光宗謂左右曰朱熹本欲置之經筵今乃事事欲聞嗚呼慎之哉易曰既雨既處尚德載婦貞厲月幾望君子征凶履虎尾不咥人亨何也葉子曰物有所或暴者遇也勢必有所馴者理也荀子曰事强暴之國難使强暴之國事我易事之以貨寳則寳殫而交不結約契明誓則約定而反無日割國之疆垂以賂之則割定而欲無厭事之彌順其侵愈甚必致寳殫國舉而後已明君不道也必修禮以齊朝正法以齊官平政以齊下然後禮義節奏齊乎朝法則度量正乎官忠信愛利平乎下行一不義殺一無罪而得天下不爲也故近者競親而逺者願至拱揖指麾而强暴之國莫不趨使如赤子歸慈母又曰君子審禮以旁皇周浹於天下動無不當嗚呼禮其可以須臾離也哉故呉季札一見鄭子産曰子爲國慎之以禮不然鄭國將敗子産以區區之鄭立於晉楚之間而不懾卒免大國之難非禮何以當之何也司馬氏曰禮之爲用大矣用之於身則動静有法而百行修焉用之於家則尊卑有别而九族睦焉用之於鄉則長幼有倫而俗化美焉用之於國則君臣有序而紀綱正焉豈直几席之上户庭之間得之而不亂哉故曰行天下而莫禦者莫若禮禮一行焉暴斯恭慢斯順争斯遜矣虎哉虎哉角而翼也雖猛何爲大哉禮乎黄帝堯舜所以垂衣裳而天下治者乎奚越志横行之出其間焉是故猶秉周禮則齊不敢圖魯齊猶有禮則魯必徃朝齊晏子謂景公惟禮可以已强家之禍季札謂子産慎禮可以救小國之敗鄭有禮則北宮文子知其爲數世之福呉棄禮則季康子知其無能爲也禮乎禮乎生民之急乎不然何伯石之汰也一爲禮於晉國猶荷其賜祿之州田韓起之貪子産一訓之禮則有以止其玉環之求而知其過不惟不怒而且私覲玉與馬齊靈無道以十二諸侯圍之而環其郛至欲遷避而終不服及士匄聞喪而還遂屈己求服出盟澶淵唐鎮南節度使鍾傅圍撫州天火曉其城士民讙驚諸將請急攻之傅曰乗人之危不仁也刺史危全諷聞之謝罪聴命至哉禮之可以服人也修德來逺豈誣也哉然則譚無禮而爲齊所滅鄭不禮而爲楚所伐未必盡彼强大之罪也雖然禮云禮云亦豈茍焉而已哉昭公如晉自郊勞至於贈賄無失禮者晉平公亦以善禮重之然如晉凡七而見止者一及河不至者五則又何哉盖昭公習於威儀之節而不知禮之本屑屑焉習儀以亟而實逺於禮者也如之何其免於危哉猶之漢成帝美風度善容儀升車正立赫然王者之概然而政權之失外家之漸帝實召之則是禮之虚文焉耳將何頼焉惟晏子對景公所以己强家之禍子太叔對趙簡子揖讓周旋之問是則禮之大者易曰履虎尾不咥人亨初九素履徃无咎何也葉子曰記禮者之言曰甘受和白受采忠信之人可以學禮茍無忠信禮不虚道則爲禮不在繁華而在簡樸不在文章而在質淡矣何也是禮之初也禮之本也禮始諸飲食其燔黍捭豚汙樽而抔飲蕢桴而土鼔若之何其爲禮哉故曰素以爲絢兮又曰無體之禮禮之至也孔子曰如用之則吾従先進以是而徃可以無大過矣不然禮繁而僞生文勝而質滅其何以行之哉魯昭公習儀以亟趙簡子問揖讓周旋之禮漢成帝美風度善容儀升車正立赫然王者之概是禮之弊而已易曰素履徃无咎九二履道坦坦幽人貞吉何也葉子曰禮主其素不欲繁禮率於易不欲難不繁則直徑不難則和平詩曰周道如砥其直如矢又曰神之聴之終和且平不繁不難也是何賢士大夫之驅馳道途冠盖輿馬之紛拏絡繹者乎禮曰太上貴德子路爲季氏宰季氏祭逮暗而祭日不足繼之以燭雖有强力之容肅敬之心皆倦怠矣有司跛倚以臨祭其為不敬也大矣他日祭子路與室事交乎户堂事交乎階質明而行事晏朝而退孔子聞之曰孰謂由也而不知禮乎易曰履道坦坦幽人貞吉六三眇能視跛能履履虎尾咥人凶武人爲于大君何也葉子曰君子齋莊而中正猶懼禮節之不和君子恭敬而撙節猶懼禮讓之不協其可以易爲乎故曰忠信之人可以學禮又曰人而不仁如禮何不能行而行則狙縛急而裂周公之冠裳鳥震飛而逃文王之鐘鼔其爲禮之禍大矣荀卿之非毁以結其凶端始皇之滅棄以収其禍本豈非古今之明戒哉孔子曰民之父母必達於禮樂之原然則撫劍之徒天奪之鑑者也其何以爲皇極之主殘賊之人天却其歩者也其何以辯天澤之分乎故曰誦詩三百不足以一獻一獻之禮不足以大饗大饗之禮不足以大旅大旅具矣不足以饗帝毋輕議禮易曰眇能視跛能履履虎尾咥人凶武人爲于大君九四履虎尾愬愬終吉何也葉子曰孔子有言事君盡禮人臣以禮而事君則何髙位之足危何滿福之足懼何暴猛之足畏何剛峻之足憂乎何謂禮履信思乎順禮也有孚在道以明禮也匪其彭禮也有孚𤼵若禮也馬匹亡禮也无成有終禮也善則稱君過則稱己禮也諫不以强以和不以戅不以直以諷禮也過位色勃禮也攝齊升堂禮也鞠躬屛氣禮也戰色踧踖禮也嗚呼事君以禮從下勿泰以君成禮不繼以􅁋數世之福也尚何危其身而傾其位哉舜事堯禹事舜臯䕫稷契事禹伊尹事太甲周公事成王上也陳敬仲以禮而飲齊桓晏平仲以禮而節齊景魏徴以禮而約太宗次也郭曖肆言子儀囚之待罪代宗曰鄙語有之不癡不聾不作家公兒女房闥之言何足聴也是以君臣各處以禮而相保以全矣若蔡謨除司徒三年不親職詔書屢下終不受命於是穆帝臨軒遣侍中黄門徴之謨辭疾篤自旦至申使者十餘反時帝方八嵗甚倦問左古所召何人何以至今不来臨軒何時當竟太后乃詔罷朝會稽王昱令曹曰蔡公傲違上命無人臣之禮若人主卑屈於上大義不行於下亦不復知所以爲政矣公卿乃奏請送廷尉謨率子弟素服詣闕稽顙自赴廷尉殷浩欲加謨大辟荀羡曰蔡公今日事危明日必有桓文之舉乃止謨雖非偃蹇跋扈不臣之甚然亦可謂不能事君盡禮而亦不能以禮自防矣豈非天下之大戒哉然則随武子不知殽烝而講求典禮以修晉國之法孟僖子病不能相禮乃講學之苟能禮者従之亦不失困而能學識而亟反也此其所以爲賢與易曰履虎尾愬愬終吉九五夬履貞厲何也葉子曰兩觀大輅朱干五磬天子之禮在諸侯塞門反坫素衣朱襮諸侯之禮在大夫先王之制浸掃地而天下學者亦失其傳若范武子不知殽烝孟僖子不知相禮范獻子不知問諱曽子不知奠方魯不知尚羔衛不知立市禮之不達於天下甚矣茍有人君者起而奮然爲之不亦可乎然而禮惡其徑情而直遂也故三千三百猶懼其不足也禮取其恭敬而撙節也故退讓雍容猶懼其率爾也决而行之不亦苟於禮乎故曰民之父母必達於禮樂之原以致五至而行三無苟於禮非所以示之敬示不敬非所以教之忠邦其殆矣嗟乎先王之禮不行於天下而復率意行之宜天澤之分未明而民志所由以忒也則夫叔孫通之綿蕞禮儀徒規一時之近功而其法失於太卑齊魯二生之論禮樂必欲百年然後興而其言失於太髙賈誼有修禮之志而困於絳灌曹褒有定禮之議而沮於酺敏傅咸極論於晉而誚於流俗劉蕡𤼵策於唐而廢於一時有由然矣夫有禮而茍殆於不可况曰馬上得之安事詩書者乎夫禮不可茍而爲也猶且慎之况於乗快悞决一事者夫是故鋭然而斷躍然必行若漢景之殺亞夫東京之錮名士苻堅之伐江左梁武之納侯景隋文之廢儲君太宗之征髙麗德宗之和吐蕃有亡而已矣夫何以獨斷爲哉故曰君子食和羹以平其氣聴和聲以平其志道和言以平其心履和行以平其德夫鹹酸甘苦不同嘉味以濟謂之和羹宮商角徵不同嘉音以章謂之和聲臧否損益不同中正以訓謂之和言趨舎動静不同雅度以平謂之和行人之言曰惟其言而莫予違則幾於喪國焉易曰夬履貞厲上九視履考祥其旋元吉何也葉子曰禮主其盈盈極或溢禮貴於進進極或繁禮樂其多多極或詐曷亦察其事幾之動乎溢而陋繁而亂詐而僞去禮道也逺矣旋歸極反不亦幾於禮乎孔子従先進周公尚白賁有由然矣故曰鳥之飛也必還山集谷不還山則困不集谷則死易曰視履考祥其旋元吉泰小徃大來吉亨何也葉子曰天運有極隆隂陽之交是也故曰天地變化草木蕃世道有極治上下之交是也故曰唐虞者其中天而興乎堯舜者其應運而生乎以是興也應是運也君子進而小人退矣昔髙陽氏有才子八人齊聖廣淵明允誠篤天下之民謂之八凱髙辛氏有才子八人忠肅恭懿宣慈惠和天下之民謂之八元此十六族也世濟其美舜之時八凱主后土以揆百事莫不時叙地平天成八元布五教於四方父義母慈兄友弟恭子孝内平外成帝鴻氏有不才子掩義隠賊好行凶德醜類惡物頑嚚不友是與比周天下之民謂之渾敦少昊氏有不才子毁信廢忠崇飾惡言靖譖庸囘服䜛蒐慝以誣盛德天下之民謂之窮竒顓頊氏有不才子不可教訓不知話言告之則頑舎之則嚚傲狠明德以亂天常天下之民謂之檮杌此三族者世濟其凶増其惡名縉雲氏有不才子貪於飲食冒於貨賄侵欲崇侈不可得厭聚歛積實不知紀極不分孤寡不恤窮匱天下之民以比三凶謂之饕餮舜臣於堯投諸四裔以禦魑魅故曰慎徽五典五典克従無違教也曰納於百揆百揆時叙無廢事也曰賓於四門四門穆穆無凶人也嗚呼其斯以爲唐虞之世乎志士彈冠貞人掉臂剛德庸庸大道沛沛其斯以爲極治之世乎過此而飛亷惡來誅十人亂王也下此而晉悼初立逐不臣者七人而魏相士魴魏頡趙武爲卿荀賔荀會欒黶韓无忌爲公族大夫訓卿之子弟恭儉孝弟士渥濁爲太傅修范武子之法右行辛爲司空修士蔿之法弁糾禦戎校正屬焉訓諸御知義荀賓爲右司士屬焉訓勇力之士時使祁奚為中軍尉羊舌職佐之魏絳爲司馬張老爲候奄鐸遏寇爲上軍尉籍偃爲之司馬訓卒乗親以聴命程鄭爲乗馬御六騶屬焉訓羣騶知禮而六官之長皆民譽也霸也所以次王也天下所歸徃而使國共聴治其亦世道之逓昌乎易曰泰小徃大來吉亨初九拔毛茹以其彚征吉何也葉子曰物之類起以根應以拔人之類隨以感應以時九官十二牧並列於堯朝元凱十六相齊舉於舜世思皇多士克生於周室濟濟多士克廣乎魯心固以類感亦以時應也故曰投綸負鼎之賢争伸引業委輅請纓之士競奮深機樂哉其惟時乎慶哉其惟類乎諗諸此則夫江東之百六掾崔祐甫之八百人未可謂之濫也宋蔡襄言於仁宗曰陛下罷竦而用𤦺仲淹士大夫賀於朝庶民歌於路且退一奸進一賢豈能闗天下輕重哉盖一邪退則其類退一賢進則其類進衆邪並退衆賢並進海内有不泰乎故唐憲宗問宰相𤣥宗之政先理而後亂何也崔羣對曰𤣥宗用姚崇宋璟盧懐慎蘇頲韓休張九齡則理用宇文融李林甫楊國忠則亂故用人得失所係非輕人皆以天寳十四年安禄山反爲亂之始臣獨以開元十四年罷張九齡専相李林甫此理亂之所分也易曰拔茅茹以其彚征吉九二包荒用馮河不遐遺朋亡得尚於中行何也葉子曰自古翼運之臣必建維皇之極以經太平之治是故寛而有制不欲其玩愒也周而不比不欲其廢業也何也度不寛則人不容而事綻裂於是乎生亂然少過焉則弊矣故糾之以猛照不逺則事不給而人多壅於是乎起奸然太過焉則荒矣故反之於近昔者管仲寢疾桓公徃問之曰鮑叔牙之爲人何如對曰鮑叔君子也千乘之國不以其道予之不受也雖然不可以爲政其爲人也好善而惡惡己甚見一惡終身不忘桓公曰然則孰可對曰隰朋可朋之爲人好上識而下問於國有所不知政於家有所不知事居處不忘公門居公門不忘其家事君不貳其心亦不忘其身問之消息盈虚與百姓屈伸然後能以國勿已隰朋其可乎朋之爲人也動必量力舉必量技言終喟然而歎曰天之生朋以爲夷吾舌也舌死焉得生哉嗚呼仲其有以識此矣裴度之相憲宗盖庶幾焉不討王承宗以違勸沮之理必討呉元濟以収獨斷之功一切用省估以蘇江南之困不私其故人以傷朝廷之公此憲宗所以有元和之治也歟若王導則易占之賊矣路永匡術賈寧皆蘇峻之黨先歸朝廷王導欲賞之温嶠曰永等首爲亂階晚雖改悟未足贖罪得全首領爲幸多矣乃止後又官庾亮不討卞敦夫亮以外戚輔政首𤼵禍機國破君危竄身茍免敦位列方鎮兵糧俱足朝廷顛覆坐視勝負人臣之罪孰大於此既不能明正典刑又以禄寵報之大臣爲國舉措如此豈所謂玉鉉在上剛柔能節者耶原其心無非假爲包容之度以救已與王敦同反之罪焉耳又周札開門延王敦札死而加以贈諡郭黙殺劉𦙍又畏黙梟勇難制梟𦙍首於大航以黙爲江州刺史陶侃以書刺之然後収𦙍首侃則舉兵斬黙夫黙導之所用也始違侃等之議而故用之又畏黙而處之如此可謂不忠之臣而無能之賊矣而自以謂三朝元老也耶至於遣従事行事揚州郡國還則使各言二千石官長得失獨顧和無言導問之曰明公作輔寧使網漏吞舟何縁采聴風聞以察爲明哉觀此可以識其心而誅其意矣世以謝安並稱豈不悮哉易曰包荒用馮河不遐遺朋亡得尚於中行九三无平不陂无徃不復艱貞无咎勿恤其孚于食有福何也葉子曰日中則昃月盈則食天地盈虚與時消息而况於人乎是故沙羅無常盛之期䖍劉有必至之候鈞臺之享未幾而距河之兆已作任賢之政方殷而諸侯之叛已基保釐之忠方懇而水月之怪已見嗚呼三代已然而况後世乎内憂起於平呉毆除來於極盛竄逐本於時平覆禍興於難削此固人事亦天運也何也伸與屈相推則如砥者必踦感與應相待則己去者必來必然之勢也天下豈有不亂之治不反之隂乎雖然大禹有無怠無荒之戒臯陶有兢兢業業之勤少康有布德兆謀之舉武丁有反己思道之志宣王有側身修行之勞亦曰人定可以勝天志一可以帥氣義勝可以制命不殫人謀而曰天耳天耳氣數一定桑道茂盖己豫言之則建中之亂乃所以副其期而徵其言耳何以享天心而受休祉哉易曰无平不陂无徃不復艱貞无咎勿恤其孚于食有福六四翩翩不富以其鄰不戒以孚何也棄子曰尺蠖之屈其極也伸不止於屈鷙鳥之伏其𤼵也擊必致其力哲宗之初髙后之崩未幾而條然有㫖召内侍六人復職諸賢甫退而楊畏首疏章惇呂恵卿鄧温伯李清臣而一時邪佞羣起矣豈特爲其雙雙而至者歟又何力驅言約之繁焉故曰左􅃝罕聞其歸漢同聲皆效於吠堯昔者管仲寢疾桓公問之既舉隰朋以自代矣又曰東郭北郭西郭有狗嘊嘊旦暮欲囓我猳而不可使也今夫易牙子之不能愛將安愛君豎刁其身之不愛將焉愛君衛公子開方去其千乗之太子而臣事君是所願得於君者是將欲過其千乗也君必去之桓公曰諾管子遂卒十月隰朋亦卒桓公去易牙開方豎刁已而五味不至於是乎復返易牙宮中亂復返豎刁利言卑辭不在側復返開方與數子處期年三子作難圍公一室不得出分其齊國而桓公自絶矣嗚呼小人之復也豈惟人事抑天道矣雖然唐璐王従珂謀叛移檄鄰道言朱𢎞昭馮贇等専制朝權懼傾社稷今將入朝以清君側而力不能獨辦願乞靈鄰藩以濟之以西都留守王思同當東出之道尤欲與之相結遣使詣長安説以利害餌以美妓思同執其使以聞他使亦多爲鄰道所執此其叛逆之惡心雖起以動而消息之數候尚未及期鄰不爲役也君子諗時而察機何凶禍之不可除乎易曰翩翩不富以其鄰不戒以孚六五帝乙歸妹以祉元吉何也葉子曰世之亂也君日上而臣日下君日尊而臣日卑君日驕而臣日謟故曰列侯尚公主使男事女夫屈於婦逆隂陽之位故王陽條奏世務指此爲失而長樂王回亦以其弊至父母不敢蓄其子舅姑不敢蓄其婦此人倫悖於上風俗壞於下而天下日益亂也世之治也君降而下臣交而上君上而不尊臣卑而不抑故舜爲匹夫妻帝二女而其書曰嬪子虞西周王姬嫁於諸侯亦執婦道以成肅雍之德其詩曰曷不肅雍王姬之車而春秋書王姬歸於齊與列國之女同辭而不異此所以陽唱隂和夫先婦從而天下日以治也故帝女而嫁民間屈其尊而順從乎陽則夫婦之道不廢天子而友匹夫輕其身而下從乎善則朋友之義斯敦不如是不足以盡人倫之極而應天命之正也孟子曰舜尚見帝帝館甥於貳室亦饗舜是天子而友匹夫也書曰爾交修予罔予棄予惟克邁乃訓堯之所以致治而髙宗之所以中興也不其然與人主之致泰其道奚以加於此何也擁篲先驅終足以救患車騎虚左亦足以邀功而况輕身先於道徳之士屈節而下夫行義之人乎故曰正誼之臣設則朝廷不頗諌諍輔弼之人信則君道不過爪牙之士施則仇讐不作邉境之臣處則疆陲不喪嗚呼此非人主之大福乎雖然不可以不審也悮用其禮於賊臣之前過孚其心於鄙夫之腹如王導之在晉元帝即位欲與之同坐御榻既即位每見導必拜與導手詔則云皇恐言中書作詔則曰敬問有司議元㑹則曰欲盡敬禮可謂曲盡下接之禮矣而詎知導乃反賊之黨則不惟不足以致福而幾於禍畏强藩之跋扈而假優詔之答懼權奸之逼脅而渥寵異之私若唐山南道節度使于頔憚憲宗英成爲子季友求尚主憲宗以普寧公主妻之李絳諌曰頔異族季友庶孽不足以辱帝女憲宗曰此豈卿所知頔大喜憲宗使人諷之入朝頔遂奉詔此與齊景魯文無幾不惟不足以獲祉而反爲辱而乃曰以貴下賤道本如是可乎嗚呼悮矣悮矣易曰帝乙歸妹以祉元吉上六城復于隍勿用師自邑告命貞吝何也葉子曰傳有之曰重門擊柝以待暴客城圯而崩暴客旅登矣又曰髙城深池以偹不虞隍復而平跛牂坦升矣治復而爲亂存化而爲亡安傾而爲危其何以力争而言鬭哉是故天子而國國則可伐諸侯而家家則可毁卿大夫而庶庶則可侮闒然僝然坐以待斃而已矣興師祇自蹙𤼵命祇自辱此周衰秦盛之六國劉興石起之懐愍乎何可長也易曰城復于隍勿用師自邑告命貞吝否之匪人不利君子貞大徃小來何也葉子曰水道竭則怪物生人道絶則小人㑹管子曰谷之不徙水之不絶者坐慶忌慶忌者其狀若人其長四寸衣黄衣冠黄冠載黄盖乗小馬好疾馳以其名呼之可使千里外一日反報此涸澤之精也涸川之精者生於蟡於蟡者一頭而兩身其形若蛇其長八尺以其名呼之可以取魚鱉此涸川水之精也然則凶德叅㑹之期世道非常之變矣以天地則番覆以人情則叛離以世運則板蕩怪物怪人之禍可勝言哉怪物生則隂勝而禍陽怪人出則邪勝而禍正是故危言者取禍危行者殺身忠諌者謂之誹謗深計者謂之妖言矣斯桀紂幽厲秦始皇之世乎伯竒孝而棄於親隠公慈而弑於弟叔武賢而殺於兄比干忠而誅於君人道絶矣將何以君子之正爲哉白居易上䟽唐憲宗曰牛僧孺等直言時事而遭斥逐楊於陵等以収直言而坐譴謫盧坦以舉職事而出庶子此數人皆今之人望天下視其進退以卜時之臧否者也一旦無罪悉謫棄之上下杜口衆心洶洶陛下亦知之乎范鎮上䟽宗神宗曰李定避持服遂不認母壊人倫逆天理而欲以爲御史御史臺爲之罷陳薦舎人院爲之罷宋敏求呂大臨蘇頌諌院爲之罷胡宗愈王韶上書肆意欺罔以興造邉事事敗則置而不問反爲之罪帥臣李師中及御史謝景温一言蘇軾則七路掎摭其過執政不悦孔文仲則遣之歸任以此二人况彼二人事理孰是孰非孰得孰失其能逃聖鑒乎而賀邵諌吴皓亦曰正士摧方庸臣苟媚人執反理之説士吐詭道之論遂使仕者以退爲幸居者以出爲禍於乎是可以觀時矣易曰否之匪人不利君子貞大徃小來初六拔茅茹以其彚貞吉亨何也葉子曰趨也淮南子曰物類之相應𤣥妙深微知不能論辯不能解故東風至而酒湛溢蠶餌絲而商絃絶或感之也畫随灰而月暈闕鯨魚死而彗星出或動之也然則一君子進衆君子亦以類而進一小人來衆小人亦以類而來豈非天機之不容或己者乎故韓𤦺范仲淹用而杜衍章得象晏殊賈昌朝同時登用歐陽修蔡襄余靖王素並爲諌官唐德宗相盧杞而把引裴延齡宋哲宗擢楊畏而楊畏薦章惇章惇引蔡卞林希黄履來之邵張商英周秩翟思上官均等此天下之定理亦天下之大勢也故曰驩兠入而四凶集賈充不㽞而羣小憂又曰十月播鼗而池蛙鳴三更吹竹而鰒魚集不其然乎但君子進不憂其變而爲小人小人進則惟恐其不變爲君子李吉甫不得在端亮之列然於陸敬輿能忘纎芥之憾於裴垍能輸訪問之悃此亦君子之高致也唐坰之於王安石始則附之以自售終則劾之以自新君子惡其始而恕其終所以勸改過也淮南賊將丁士良爲李愬所擒衆請剖其心愬釋其縛士良請盡能以報德乃爲之擒陳光洽降吴秀琳取李佑龎勲將張元稔斬張僑張實及符離守將而平徐州劉季述謀廢立出告宰相崔𦙍𦙍不能違已幽昭宗立太子裕乃宻致書朱全忠使興兵圖反正又因神策指揮孫德昭憤惋不平遣判官石戩説之卒討季述復昭宗位亦庻幾能改於其德者易曰拔茅茹以其彚征吉亨六二包承小人吉大人否亨何也葉子曰未嘗無順上之恭者小人巧慧之機心未嘗失持身之正者君子履方之正道小人之尚德小人之自爲計耳君子曽亦以是而亂其羣哉何也噬人之犬不吠吠人之犬不噬李林甫城府深宻人莫窺其際好以甘言㗖人不露辭色凡上所厚者則親厚之李義府容貌温恭與人語必嬉怡微笑李輔國能随事齪齪謹宻取人主親信而内深賊未敢肆不啖葷時時爲浮屠詭行人以爲柔良不忌也嗚呼此小人之深情所以掩覆其惡巧竊其權自爲之深計所謂鼷䑕之口甘而卒食其角食其肉食其心而不自知者也曽謂君子而可以忘情乎是故宋璟之於二張温嶠之於王敦挺挺乎若神明之不能爲累者所以爲千古之英傑也不然知不􅈒而昧若陸遜爲書與闗侯稱其功美深自謙抑爲盡忠自托之意侯意大安無所復嫌稍撤兵以赴樊而遜遂發兵擒侯劉瞻南遷劉鄴附於韋路共短之及瞻爲相鄴懼止瞻置酒盡其歡情瞻歸而薨人以爲鄴所鴆司馬光復差役之法爲期五日同列病其太迫知開封府蔡京獨如約悉改畿甸雇役無一違者詣政事堂白光光喜曰使人人奉法如君何不可之有而京卒附惇忭托紹述之名以斥元祐諸老韓侂胄𫝊命恭謹定䇿機宻趙汝愚以爲外戚同國難而不言功卒致謀圖社稷之誣一網打盡守不介而溺若魏元忠受三司實封百户遂至感咽涕泗而容容循黙坐視五王之夷滅而亦卒爲三思之所䧟李晟受張延賞詣第之謝遂與酣飲盡歡且表薦延賞爲相復爲子求婚其女延賞不許乃謂人曰武夫性快釋怨於盃酒間則不復貯胸中矣非如文士難犯外雖和解蓄憾如故吾無懼哉李訓奨㧞狂險之士然亦時取天下重望以順人心裴度令狐楚鄭覃皆累朝耆俊乆在散地故皆引居崇秩而度楚受之不辭終其身為所牽縛嗚呼君子受小人之啗小者敗名而喪節大者殺身而亡家則亦何利之有哉孰知天下之物至有順逆而君子之明哲貴反觀東萊曰天下之禍不生於逆而生於順以䧟我者而厚我以仇我者而親我此理之不當然也理不當然而然不亦豢我而納之於禍乎牛羊犬豕醉於豢養身日肥而死日逼人也而坐視小人仇敵之所醉久而自赴刀几也愚亦甚矣故曰魚鱉黿鼉猶以淵爲淺而堀其中鷹鳶猶以山爲卑而巢其巔及其得之也必以餌故君子茍能無以利害義則恥辱無由生矣易曰包承小人吉大人否亨六三包羞何也葉子曰君子志於道德道德盛而降階則愈明其辭讓之節小人茍於富貴富貴極而患失則愈藏其羞惡之心甘受爾汝之實而不辭知取笑罵之辱而不顧此祝欽明所以有八風之舞鄧綰所以有從人之罵趙師睪所以有林間之吠也哀哉易曰包羞九四有命无咎疇離祉何也葉子曰謀事在人成事在天古之訓也天命至而人事之不臧雖成而必敗王謝之不能克復中原而偏安江左君子之所甚憾也人事臧而天命之不至雖爲而無成孔明之不能勦除漢賊而先隕其身君子之所深悼也其為吉甫之輔宣王傅說之相髙宗鄧禹諸人之佐光武乎承再昌之景運抱上智之宏略無突如之患而有徧德之福則肇造天下其功多洪濟蒼生其業廣矣故曰大臣有道羣工以休雖然髙歡襲秀榮殺爾朱兆後表辭王爵不許請分封邑十萬以頒義勲許之郭威克李守貞至大梁入見勞賜甚厚辭曰臣將兵在外凡鎮安京師􅉆億兵食皆諸大臣居中者之力也臣安敢獨膺此請徧賞之乃徧賜宰相樞宻宣徽三司侍衛使九人如一諸大臣議以執政既溥加恩恐藩鎮觖望亦徧加恩有差夫不專有其功而推以分之人此固大臣勞謙之美開泰之功也然國家爵祿以一人之功而及天下則亦濫矣况有不臣之心將以要結人心而爲之者乎則非所謂使人獲福之道也君子慎之易曰有命无咎疇離祉九五休否大人吉其亡其亡繫于苞桑何也葉子曰戡天下之禍亂致天下之太平者聖人之能事身致太平身失太平者亦賢君以下之常病也聖人不以己之能事自怠而恒以賢君以下之常病自戒是故當堯之時治定功成禮樂大備和氣浹洽於天壤之間鳯獸儀舞於宫庭之内可謂中天而興應運而治矣而舜旋規之以勅天之命惟時惟幾葢言天道難諶理亂安危相爲倚伏斯須畏敬之不存則怠荒之所自起毫髪幾微之不察則禍亂之所自生此所以爲唐虞之治也無逸亦曰其在髙宗嘉靖萬邦殷至於小大無時或怨夫以興衰撥亂之主而能使禮樂教化蔚然於安居樂業之中信非庸君世主所可覬矣然必聽傅說之戒而事事有其備始延商祚二百年以成中興之盛功下至鄢陵之戰楚大敗矣而范爕立於戎馬之前以致戒蕭魚之㑹鄭已服矣而魏絳且以安樂思終而致規覇者知此而况帝王之治哉周宣内修政事外攘夷狄復文武之境土亦可謂難矣而卒不免庭燎􅃆水之規祈父黄鳥之刺宣后樂色之戒齊桓欲服楚而楚人未怗尚以爲憂也致勤於鄭振中夏之威㑹於陽糓敦逺國之信按兵於陘修文告之辭退舍召陵謹㑹盟之禮存此心以進善則桓有王德而邦其永孚於休矣惜乎楚方受盟志已驕溢陳大夫一謀不恊其身見執其國見伐而怒猶未怠循至葵丘九國叛而萌震矜管仲死而放繩墨城把貶於城邢救徐怠于救許伐黄而外叛起㑹卞而家法虧則桓德益衰而政日斁矣魏武才得荆州而張松見忽唐莊宗自矜取汴而髙氏不朝梁武自我得之自我失之而卒壞天下唐憲宗誅劉闢斬李錡擒吳元濟赫然中興之英主未幾而有麟德承暉殿之修龍首池之浚張奉國李文恱裴度為之逺憂而力諫漢隱帝三叛既平浸爲驕縱與左右狎暱與飛龍使後匡賛荼酒使郭允明爲廋辭醜行大后屢戒及張昭切戒而不聽何也勤於始而怠於終戒於前而肆於後常人之情也善乎後唐明宗與馮道從容語及年穀豐登道曰臣昔在先王幕府奉使中山歴井陘之險臣憂馬蹶執轡甚謹幸而無失逮至平路放轡自逸俄至顛隕凡爲天下者亦猶是也而先達亦曰舟之師嘗浮積石道瞿唐渉狂飈怒濤而克濟者其乘順風蹈平川固敖然若閨門几席之上然衣袽之不戒而檣櫓之就偃者不鮮矣故君子圖易若難謹終若始然後業樹而不隳名彰而不朽不然則不免石讐所言春秋有忽然而足以亡其國者矣國君不可以不慎也易曰休否大人吉其亡其亡繫于苞桑上九傾否先否後喜何也葉子曰古之君子以其身當乎天下也順流而更化卷領而坐嘯幸之幸也其能以剛方果毅之才輔興衰撥亂之主排天下之溺㵼天下之亂固云天道抑亦人事始於憂勤終於逸樂不亦不幸之大幸乎山甫之慰心懷於補闕魯侯之燕喜得之復宇古今人情量同斯揆矣出師未捷身先死長使英雄淚滿􅁭今同於古直抵黄龍府方與諸君痛飲耳事不如心斯則可哀之甚矣噫雖然順天乘時濟羣生於艱難者固英傑之事而勞心焦思勤經綸於不懈者又忠哲之心君有覆滅之憂而臣無辱死之志天下奈之何其望治哉馮異謂陛下無忘在河北時臣不敢忘巾車之恩郭崇韜謂無忘戰於河上之時當使煩暑生清凉然則君有兢惕之小心而臣無先事之勤略可乎此又人臣者之所當知也不然若李德裕銳意討劉稹卒成收平澤潞之功亦可謂大臣之已亂矣然三鎮未平河湟未復天子偏惑方士宰相逃憂免責之不暇而德裕乃請上尊號是以滿假矜伐勸其君豈所謂引君當道得憂樂之宜者哉故曰才氣謀略誠髙一時而道則萬分未得其一者也此又人臣者之所當知也易曰傾否先否後喜葉八白易傳卷三
