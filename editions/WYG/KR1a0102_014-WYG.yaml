body:
  text: 葉八白易傳卷十四明葉山撰漸女歸吉利貞何也葉子曰君子之守身也若女子之處也暗室屋漏豈容一髪之㸃汚哉故曰青天白日以為心高山大川以為行君子之進身也若女子之嫁也禮儀恭敬豈容一物之不備哉故曰七介以相見不然則已慤三辭三讓而後至不然則已蹙故行路之人許嫁矣然而未徃也見一物不具一禮不備守節貞禮守死不徃君子以為得婦道之宜耕莘之人膺聘矣然而未行也見一禮不誠一誠不至守道固窮寧死不就君子以為得始進之正得婦道之宜然後可以絶無道之求防汚道之行于是而奉神靈之統理萬物之宜為有望也得始進之正然後可以禁禮貌之衰絶饑飽之病于是而獲乎上以成功正其身以及國為有望也不然索家而凶國則有之矣何利之圖哉雖然不奔而行以聘女歸之善矣不知其行為何如孔姞之歸大叔不無聘焉君子以為汚也不茍而進以禮士行之善矣不知其進為何如王猛之從苻堅非無禮焉君子以為亂也其惟孔明之于𤣥徳孟光之于梁鴻乎君子慎之易曰漸女歸吉利貞初六鴻漸于干小子厲有言无咎何也葉子曰語曰鬼矙高明世疵俊厲又曰實藝確行人未必信纎瑕微累十手争指此言君子處世之難也又况位卑而無自固之權始進而乏素交之托者乎是故操心危而慮患深恒存乎疢疾塗利害而域憂患動得乎凶危勢之所不免者也彼燕雀安知鴻鵠之志鷃與鷽鳩方且猶然笑乎鵾鵬之飛矣雖然此非君子之過時命之不幸也我何病焉賈誼始進而絳灌毁之龎綂守耒陽而丞尉詬之彼二賢者猶然而况其他乎君子處此付之莞爾自勉可也易曰鴻漸于干小子厲有言无咎六二鴻漸于磐飲食衎衎吉何也葉子曰君子之進而為三公也坐而論道進而為宰相也與天子相起居非亢也道居之則安而不危也其食萬鍾之禄也受祼獻執饋之禮非侈也徳受之則樂而不憂也若此者豈徒然而已哉其君資之以安富而尊榮其士賴之以孝弟而忠信其民仰之以富壽而康寧其國家倚之以苞桑而磐石是之謂爵之榮而禄之光矣不然則無道以鰥官寡徳以浮禄王衍所以見責于石勒而無辭何曽所以取譏于當世而不免劉景升千觔之牛㗖芻豆十倍于常牛而負重致遠曽不若一羸㹀魏武所以入荆州而殺以享士也詩之言曰不稼不穡胡取禾三百㕓兮不狩不獵胡瞻爾庭有懸貆兮彼君子兮不素餐兮可不監乎故曰于伐檀見賢者之先事後食也古之人有居之而不歉者伊尹周公是已郭汾陽裴晉公抑亦可以為次焉范文正居官每計一日奉養之費與所為之事相稱則無復愧恥茍或不然終夜不能安寢其有以知此矣易曰鴻漸于磐飲食衎衎吉九三鴻漸于陸夫征不復婦孕不育凶利禦冦何也葉子曰革剛則裂金剛則崩行衰寡黨道毁獨成焚和生火居處弗寧不利其行不全其生剛而無禮不克髙明不賀蒍賈亟走寗嬴强敵在前大盗入庭勿過防戒從或戕刑古之人有似之者其闗雲長之在荊州乎矜其驍氣陵轢于人意驕志溢專務北進而𤣥徳孔明遠入漢川吕蒙陸遜隂狐狡計漠然無有與之相謀相議者是以卒為所圖荊州不復我有𤣥徳半生之勞竟為枉然而不就其禍可勝言哉使其知强敵之在前狡計之方毒防之深而備之豫則剛雖過而彼無所入黨雖孤而計不能行亦何至于此噫惜哉易曰鴻漸于陸夫征不復婦孕不育凶利禦冦六四鴻漸于木或得其桷无咎何也葉子曰君子生于多賢之世而升于㧞茅之朝也何其幸而安也不幸而乘小人之上則處非其地而動得危禍矣故曰騰猿得柟梓豫章也攬蔓其枝而生長其間雖蒙羿不能睨也及其得柘棘枳枸之間則危行側視而震動慄慄矣此觔骨非有加急而不柔也處世不便未足以遂其能也故昔者顔闔問于蘧伯玉曰有人于此其徳天殺與之為無方則危吾國與之為有方則危吾身若然者吾奈之何伯玉曰善哉乎問戒之慎之形莫若就心莫若和就不欲入和不欲出嗚呼通于此道者知所以處患矣故紀渻子為王養鬭鷄十日而問雞已乎曰未也方虛驕而恃氣十日又問曰未也猶應影響十日又問曰未也猶疾視而盛氣十日又問曰幾矣雞雖有鳴者已無變矣望之似木雞矣異雞無敢應者反走矣故老子曰柔之勝剛也弱之勝强也天下莫不知而莫之能行越王親行之故霸中國夷之蒐晉使狐射姑將中軍趙盾佐之陽處父至自温改蒐于董易中軍趙盾于是為國政已為太傅而以剛賈季怨陽子之易其班也而知其無援于晉也使續鞫居殺處父厲公無道三郤横而伯宗悻悻于其間每朝其妻必戒之曰盗憎主人民怨其上子好直言必及于難三郤卒譛而殺之故自古未有傲視小人而能免者知此道者楚令尹子文乎成得臣帥師伐陳討其貳于宋也遂取焦夷城頓而還子文以為之功伯叔曰子若國何對曰吾以靖國也夫有大功而無貴仕其人能靖者歟有幾易曰鴻漸于木或得其桷无咎九五鴻漸于陵婦三嵗不孕終莫之勝吉何也葉子曰聖主必待賢臣而宏功業俊士亦俟明主以顯其徳上下俱欲歡然交欣千載一㑹論説無疑翼乎如鴻毛遇順風横四海沛乎若巨魚縱大壑徙南溟其得意如此則胡禁不止胡令不行化溢四表横被無窮矣不幸而有讒邪交搆其問魚水離矣君欲下交而游談之士居旁以間其臣如蒯通之説韓信蔣幹之説周瑜其不乃亂而乃萃者幾希矣臣欲上交而讒慝之人近君以間其主如管蔡之流言乎周公臧倉之沮厄乎孟子其能引吉无咎者幾希矣嵗乆而未易合時過而功不成其如横絶騰徙何哉然君臣之義無所逃于天地之間則雲龍風虎之㑹自不間于聲應氣求之合彼小人者胡為乎于其間哉成王反周公平公賢孟子韓信不背乎高帝周瑜骨肉乎孫權彼反覆百端而君心不信臣志益堅然則游談讒慝者果胡為于其間哉易曰鴻漸于陵婦三嵗不孕終莫之勝吉上九鴻漸于陸其羽可用為儀吉何也葉子曰有二八之升則必有潁陽之高有八百之㑹則必有孤竹之潔介性所至而甘心畎畆之中憔悴江湖之上豈固親魚鳥樂草木哉各行其志各尊所尚而已然而蟬蜕汚泥之中以自致區宇之外則不降不辱既得以遂其高蹈遠引之志而亦不失為百世之師不友不臣既自得其肥遯髙尚之志而亦不失為清者之聖亦豈得為無用也哉是故安劉之功必有望于四老而三傑之所不能圖重漢之業必有資于客星而二十八將之所不能與其次龔壮之終身不至成都辛謐之不就劉石徵辟亦可謂潔白不汚一世之士矣其視王猛之隨世以就功名者不亦遠乎易曰鴻漸于陸其羽可用為儀吉歸妹征凶无攸利何也葉子曰長兄嫁少妹不幸之遭也世有是事也不待伯仲之命媒妁之言以己歸人而自徃焉淫醜之奔也理當有是乎淫惡之大奔行之醜以是而徃惟家之索矣其何以為中饋之主奉神靈之統而理萬物之宜哉故程子曰隂陽之配合男女之交搆理之常也然從欲而流放不由義理則淫邪無所不至傷身敗徳非人理矣是故必也魯成公歸伯姬于宋然後有以成貞烈之行四岳歸舜于堯然後有以成格天之功徐庶歸孔明于先主然後有以復明堂之祀反此則大義熄而亂天下矣是故齊以姜氏歸于魯桓以成昏㑹于嬴似合禮之經矣而春秋謹之蓋以匪媒而昏昏不以正也越境而㑹㑹不以正也使其私人徃逆逆不以正也為齊侯而親逆逆不以正也則以基禍敗之原而肇喪亂之本矣故復使荘公效之納幣於齊以盛飾而尸女恣為淫行無復羞惡昏姻之際可不謹哉則夫枉道而求合􅃷玉而求售其為失利又何如哉易曰歸妹貞凶无攸利初九歸妹以娣跛能履征吉何也葉子曰薦賢者大夫之偉烈也薦色者妾婦之順事也薦賢者興國化薦色者蠧君身薦色下矣不猶愈于妬害而賊禍者乎楚樊姬之事荘王也常遣人之梁鄭之間求美人而進之與同列者十人賢于己者二人姬則亦欲擅王之寵矣然而不敢以私願蔽衆美欲王之多見則娯也又况賢女淑姬猶有可與晤言者乎推其心亦可以自廣嗚呼女子而薦娣不嫌于逼己人臣而廣求天下之士以進于君則己不足而人有餘我不逮遠而天下之賢人君子為我遐到逖及而無窮矣其功可勝既乎斯可以免臧文仲之譏斯可以來孟子輿之喜易曰歸妹以娣跛能履征吉九二眇能視利幽人之貞何也葉子曰窺觀女子之正也視遠則眯矣無攸遂婦人之分也為大作則泥矣視以禮作以道猶且不可况禮道之外哉不為宋伯姬陳孝婦而為霍顯梁壽之邪不為漢明肅宋宣仁而為吕雉武媚娘之狡山林而市販矣可乎哉斯有閨門之修無境外之志孟母所以為千古之婦凖也然則身居山林之下而心馳魏闕之表行假賁趾之飾而身怒萬乗之主如樊英王良之徒不亦士君子之鄙哉易曰眇能視利幽人之貞六三歸妹以須反歸以娣何也葉子曰有徳而待者時過則行無徳而俟者時至則廢宋大災共姬待姆不至卒于火公子重耳謂季隗曰待我二十五年不來而後嫁對曰我二十五年矣又如是而嫁則就木焉請待子婦道之貞也譙周老而不死竟以兩賣其國何其賤哉噫享年八十三而不七十九嗚呼夏相公萬代名不朽自古人皆死惜公遲四年問公今日死何似四年前此其待之而卒為可醜者也何貴于待哉易曰歸妹以須反婦以娣九四歸妹愆期遲歸有時何也葉子曰明妃不賂畫工而自待卒為異域之鬼時命之不幸也孟光三十不嫁而自待卒為梁鴻之配豈非遭遇之有時乎是故君子幸則為三聘之尹三顧之葛不幸則為沒世之管寧終身之范粲吾何意焉易曰歸妹愆期遲歸有時六五帝乙歸妹其君之袂不如其娣之袂良月幾望吉何也葉子曰男生而有室女生而有家帝女之嫁民間不足異也服飾之不華媵粧之獨盛非婦道之大異乎后非賢不乂賢非后不食天子之下交于臣不足善也吾乆不見賈生自謂過之今不及也非君道之大善乎是故岐陽廣徳二主之恭儉世有之也練素不與婢妾同世無之也創業之英傑守成之純良世所有也自謂三傑之不如賈生之不及世所無也彼以五帝其臣不及其聖者不亂道乎易曰帝乙歸妹其君之袂不如其娣之袂良月幾望吉上六女承筐无實士刲羊无血无攸利何也葉子曰夫婦之道不可以不乆是故禍莫大于約婚而不終詩曰之子于歸百兩將之女之盛也一物無有安在其為嫁哉禮曰為酒食以召鄉黨僚友男之慶也一事不舉安在其為娶哉婚姻不終大為世敝此氓之詩所以刺衛國之風徐吾犯之妹所以釀鄭國之禍外黄富人之女所以貽千古之耻也與雖然鍾離權以女許許氏矣及買婢得前令女欲以女装嫁之而請緩期許氏請以令女配其子而令權别求良奥以配其女東坤氏責之曰兩人之徳厚矣獨不為其子女地乎自行媒下達各相知名婚姻之懷曰信著纓之禮明係心也鍾離之女無故而改嫁要其終非其人纓胡義而脱也合卺之禮明合禮也許氏之子無故而改娶原其始非其人卺胡義而酳也詩曰女也不爽士貳其行鍾離女之爽許氏子之貳首惡者誰與嗚呼彼耻獨為君子者尚曰犯義如此而况肆為小人者其於義命何如哉詩曰乃如之人兮懷婚姻也大無信也不知命也其斯之謂與故曰男女居室人之大倫也婚姻之道苦而淫僻之罪多矣復相棄背喪其配偶氓之詩所以刺衛日以衰薄室家相棄中谷有蓷所以閔周春秋内女出夫人歸凡男女之際謹書于册所以正人倫之本此義行何有婚姻不終重貽天下之耻者乎易曰女承筐无實士刲羊无血无攸利豐亨王假之勿憂宜日中何也葉子曰應中天之期者帝徳廣運而無疆撫盈成之運者禮樂刑政四達而不悖書曰帝光天之下至于海隅蒼生萬邦黎獻共惟帝臣庶績咸寧百志維熙孟子曰巨室之所慕一國慕之一國之所慕天下慕之故沛然徳教溢于四海嗟乎此大君之盛事而理道之亨嘉光昌之景㑹也盛不已極乎然而盛者衰之根盈者虛之原趙獲二城臨饋而憂陶朱既富妻妾悲號唐僖宗末年自懷孟晉絳數百里州無刺史縣無令長田無麥禾野無煙火者殆將十年蓋兆起于天寶開元之盛也因著而察微由事而審幾則夫庸君之所喜豈非聖人之所憂乎雖然常人不知憂若晉武平呉政怠遊宴不息唐𤣥寵奸眩色不克有終其為身後之禍末年之亂不足言也知之而徒憂為漢獻之抱伏后而哭為唐文對周墀泣下沾襟卒簒强臣而終困家奴則亦何益之有矣聖人則不然知之有幾處之有道則始雖豫憂而終復何憂焉何也欹器之道滿則覆聖人一持其中而勿使滿覆何由促月之行空盈則食聖人一持其中而勿使盈食何由得昔者舜禹之世重華協帝文命敷于四海而益為之戒曰儆戒無虞罔失法度罔游于佚罔淫于樂無怠無荒四夷來王成湯肇造萬邦以開有商乃曰兹朕未知獲戾于上下慄慄危懼若將隕于深淵凡我造邦無從匪彛無即慆淫各守爾典以承天休文王有天下三分之二自朝至于日中昃不遑暇食用咸和萬民不敢盤于遊田以庶邦惟正之供剛以持其盛而勿使過于盛遏其衰而勿使及于衰是之謂聖人之哲也齊桓有憂中國之心為經營之舉于是盟幽而諸侯協獻捷治戎存邢衛却狄盟召陵怗楚而中國安盟首止㑹于洮而王室寧及乎葵丘而霸業盛矣奈之何不知持盈之道而易生驕吝之心陽榖為㑹而寵樂肆城杞無功救徐怠緩伐黄不恤謀鄫無成而簡書忽霸業之衰不待其身之死而索然矣其何以語于聖人之治邪易曰豐亨王假之勿憂宜日中初九遇其配主雖旬无咎徃有尚何也葉子曰物以兩而軋是故兩相與則專兩以資而成是故謀與㫁則協何則非極天下之深者不能研天下之幾然惟果而毅也始有以成天下之務惟㫁天下之疑者為能定天下之業然非資之深者不能逄左右之原是故兩貴不相事而惟彼此之相資則可以共事兩賢不相戹而惟爾我之相藉則無所為亢淮南子曰冦難至躄者告盲負而走兩人皆活得其所能也故使盲者覩躄者走失其所矣又曰有千金之璧而無錙錘之礛諸受光于隙照一隅受光于牖照北壁受光于户照室中無遺物况受光于宇宙乎天下莫不藉明于其前矣照則兵農之相為役農末之相為濟蝦與水母之相為依蟨與蛩蛩巨虛之相為賜其事勢使然也昔者鄭國之大夫馮簡子能㫁大事裨諶能謀謀于野則獲謀于邑則否鄭國將有諸侯之事子産與裨諶乗以適野使謀其可否而告馮簡子使㫁之是以應對賔客鮮有敗事房𤣥齡明達吏事輔以文學與杜如晦引㧞士類常如不及至于臺閣規模皆二人所定太宗每與𤣥齡謀事曰非如晦不能决及如晦至卒用𤣥齡之䇿蓋房善謀杜能㫁故二人深相得同心狥國唐世稱賢相者推二人焉易曰遇其配主雖旬無咎徃有尚六二豐其蔀日中見斗徃得疑疾有孚𤼵若吉何也葉子曰君子幸而事明君則堯舜之功可成不幸而事庸君則身家之禍猶免大不幸而事暗君則天下之事去而亡無日矣君臣不兩敗乎何也君以昏瞶之氣而塞其聰明睿知之質以盲瞽之性而蔽其虛靈不昧之真則是非之心失而决擇之知亡矣照一隙照一隅且不可得而曰光天之下乎故彼昏而我明則我是而彼必以為非忠諌而誹謗矣彼昏而我哲則我利而彼必以為害深計而妖言矣此蹇叔襲鄭之諌所以屈于杞子田蚡救越之議所以難于嚴助韓安國和親之説所以罷于王恢者有由然也嗚呼君臣明暗之際難言哉難言哉昔者光武北征尤來兵敗軍中意王沒矣呉漢曰王兄子在何憂光武不以為嫌晉王克用與梁軍戰于胡栁陂李嗣源不知王所之或曰北渡河矣嗣源遂乗水北渡克用進攻濮陽據之嗣源復來見克用不悦曰公以吾為死邪嗚呼君臣明暗之際難言哉難言哉雖然臣子之道不貳其心至誠在我鬼神可格諍之以言説則氣方驕而禍福不能使之畏説雖盛而窮矣心已塞而義理不能使之信言雖多而格矣故舉天寶之亂而不能輟敬宗驪山之行舉臺城之圍而不能囬憲宗佛骨之惑論朝㑹之禮而不能正荘公之觀社論律吕之本而不能已景王之鑄鐘先之以不軌不物之禍繼之以蒐狩治兵之禮而卒不能罷隱公畧地之徃亦何益矣其惟悟之以真心而感之以至誠乎昔者太甲不惠于阿衡伊尹作書以告之王未克變既乃克終允徳拜手稽首曰既徃背師保之訓弗克于厥初尚賴匡救之徳圖維厥終武王崩成王幼周公相管叔及其羣弟流言于國公曰我之弗辟我無以告我先王周公居東二年則罪人斯得王泣曰昔公勤勞王家惟予冲人弗及知今天動威以彰周公之徳惟朕小子其新迎我國家禮亦宜之和靖每在經筵前夕必沐浴更衣設香案以來日所當講書置案上朝服再拜拈香又再拜齊于燕室初夜乃寢次日入赴講筵學者問焉曰必欲以所言感悟君父安得不盡誠敬人君其尊如天必須盡已之誠意嗚呼君臣之義無所逃于天地之間而卒亦有不可解之命要在臣子自盡其誠而已矣故荀子曰事暴君有補削無矯拂調而不流順而不屈從容而不亂曉然以至道而無不調和也而能化易時開納之是事暴君之義也若馭撲馬若養赤子若食餧人故因其懼也而改其過因其憂也而辯其故因其喜也而入其道因其怒也而除其怨曲得所謂焉書曰從命而不拂微諌而不倦為上則明為下則遜此之謂也孔明之於後主陸贄之事徳宗庶幾伊周之次乎易曰豐其蔀日中見斗徃得疑疾有孚𤼵若吉九三豐其沛日中見沫折其右肱无咎何也葉子曰清明在躬志氣如神所貴乎君之徳也今茅塞之矣踧踧周道鞠為茂草何其錮蔽之深乎明哲煌煌旁燭無疆所貴乎明之用也彼昏不知矣民今方殆視天夢夢何其幽暗之甚乎君之為徳如此朝之為政如彼賢人君子夫何大事之可為哉薦圭璧于泥塗聞言而莫之信探虎狼以潤喉吻授命而末如之何矣此洩冶之所以不保其身而子胥之所以入江不化也夫亦可哀也哉劉向王嘉之于漢陸贄蕭復之于唐李網趙鼎之于宋拱手太息而已矣夫何為哉雖然忠而見疑信而得謗上不負君下不負學時不可為而心則無愧道斯無病矣吾何尤哉吾何尤哉易曰豐其沛日中見沬折其右肱无咎九四豐其蔀日中見斗遇其夷主吉何也葉子曰君子之仕也行其義也是故代天有終者義之經同寅協恭者義之協君子亦惟成君事而已矣無廢義而已矣他何計焉雨無正之詩曰正大夫離居莫如我勩三事大夫莫肯夙夜邦君諸侯莫肯朝夕桑柔之九章曰瞻彼中林甡甡其鹿朋友已譛不胥以榖人亦有言進退維谷君子已不得明君為之賛襄而先後矣又不幸而際此焉復何望哉其或同官誼而朋友良心志協而感應起天下之事抑尚有瘳矣吕后之强狠吾且奈之何哉下謀陸賈而交歡平勃則復漢有期武則天之淫逞吾末如之何矣下引柬之以及崔袁敬桓則反周有日嗚呼此君子之不幸也亦不幸中之大幸也易曰豐其蔀日中見斗遇其夷主吉六五來章有慶譽吉何也葉子曰管子曰一年之計莫如樹榖十年之計莫如樹木終身之計莫如樹人一樹一穫者榖也一樹十穫者木也一樹百穫者人也又曰収天下之豪傑有天下之俊雄故舉之如飛鳥動之如雷電𤼵之如風雨莫當其前莫害其後獨出獨入莫能禁圉故淮南子曰臧武仲以其知存魯而天下莫能亡也蘧伯玉以其仁寧衛而天下莫能危也然則天下無不可為之事得人則興失人則廢耳故齊桓公有管鮑隰寗九合諸侯一匡天下晉文有舅犯趙衰取威定霸以尊天子秦穆有由余五羖攘却西戎始開帝緒楚荘有叔孫子反兼定江淮威振諸夏勾踐有種蠡泄庸克㓕强呉雪㑹稽之耻魏文有叚干田翟秦人寢兵折衝萬里燕昭有郭隗樂毅夷破强齊困閔于莒夫以諸侯之細功名猶尚如此而况帝王選于四海羽翼百姓哉故有聖賢之君而得明智之士則欲以積徳天下不足平也欲以立威百蠻不足攘也無聖賢之君而得明智之士則植衆木可以支傾厦也壅大土可以障河决也昔者齊桓公殺兄而立非仁義之人與婦人同輿馳于邑中非恭儉之主閨門之中無可嫁者非清潔之君此三者亡國失身之行也然而九合諸侯一匡天下畢朝周室為五霸長以得管仲隰朋爾桓彛避亂過江見司馬睿㣲弱謂周顗曰我以中州多故來此求全而單弱如此將何以濟既而見王導共論世事退謂顗曰向見管夷吾無復憂矣得賢之功蓋如此何也乘衆人之知則無不任也得衆人之力則無不勝也千鈞之重烏獲不能舉衆人相一則百人有餘力矣是故任一人之力者則烏獲不足恃乘衆人之勢者則天下不足有也昔者苻堅治秦一惟王猛之是聴至猛死而猶下詔以新失丞相置觀以聴訟至兢兢也繼踵而張掖酒泉之捷交至其心始縱謂天下之事止此耳迄自用而至淝水之辱使其少聴人言不敢遽輕天下曷至有是楚屈瑕亦然當其與鄖師相距于蒲騷惟鬬亷之是聴及其伐絞蓋見用竒之功而欲竊效自試之䇿幸而偶勝遂謂天下事不必資人乃至忘其幸而矜其能此其所以堅其自用之意而蹙其荒谷之縊也可不戒哉易曰來章有慶譽吉上六豐其屋蔀其家窺其户闃其无人三嵗不覿何也葉子曰㓕徳作威以敷虐于爾萬邦百姓者桀之無道也惟宫室臺榭陂池侈服以殘虐于萬姓者紂之無道也無道之極明神所殛昔者齊桓公曰仲父語我昔者亡道之君乎管子對曰夷吾聞之于徐伯曰昔者亡道之君大其宫室髙其臺榭良臣不使讒賊是舍有家不治借人為圖政令不善墨墨不夜譬若野獸無所朝處不修天道不監四方有家不治譬若生狂衆所怨詛希不滅亡進其俳優繁其鐘鼓流于慱塞戱其工瞽誅其良臣敖其婦女燎獵畢弋暴遇諸父馳騁無度戱樂笑語忒政既輮刑罰則烈内削其民以為攻伐譬猶漏釡豈能無竭斯亦可謂亡道之君矣趙文子問于叔向曰晉六將軍其孰先亡乎對曰中行智氏文子曰何乎對曰其為政也以苛為察以切為明以刻下為忠以計多為功譬之猶廓革者廓之大則大矣裂之道也故老子曰其政悶悶其民醇醇其政察察其民缺缺然則小人之自髙乃所以自下小人之自亢乃所以自卑小人之自侈乃所以自亡語曰髙明之家鬼矙其室炎炎之夫烏啄其髗昔者楚靈王合諸侯于申而示之侈既又為章華之臺與諸侯落之誅齊慶封求周九鼎志小天下卒餓死申亥之家晉成虒祁之宫諸侯畢賀既而歸者皆有貳心叔向曰諸侯不可以不示威乃治兵于邾南甲車四千乘建而復斾卒之諸侯叛于外大夫叛于内邦分崩離析而不可保也子産曰汰而愎諌不過十年史趙曰甚哉其相蒙也可弔也又賀之嗚呼操行之不謹失恒徳而亢不􅇆㓕亡而已矣司馬侯曰子容專司徒侈皆亡家之主也專則斃侈則以其力自斃豈不信然也哉豈不信然也哉易曰豐其屋蔀其家窺其户闃其无人三嵗不覿凶旅小亨旅貞吉何也葉子曰不家居而館覊者變之所遭也不易地而存亡者道之在身也君子不以羇孤患難而離道豈以覊紲之故而茍其身哉何也失其居而外處在下謂之喪人在上謂之蒙塵矣非常居而不以常徳恒之何以避災而自免乎是故動之以禮而不茍則下人而人不㣲其躬狥之以道而不妄則求人而人不㣲其故雖非門庭之棲而必無泥中之淖矣是道也其惟孔子乎上交而不謟下交而不瀆微服避宋難爼豆答靈公主顔讐由而不主彌子瑕主司城貞子而不主癰疽侍人是為處已以和平禦强暴以機知以類為聚而不以暗為羣居外之正無過是者矣其次齊侯使陳敬仲為卿辭曰覊旅之臣幸若獲宥及于寛政赦其不閑于教訓而免于罪戾弛于負擔君之惠也所獲多矣敢辱髙位以速官謗請以死告使為工正飲桓公酒樂公曰以火繼之辭曰臣卜其晝未卜其夜不敢秦后子在晉楚子干奔于晉使后子與子干齒辭曰鍼懼選楚公子不獲是以皆來亦惟命且臣與覊齒無乃不可乎史佚有言非覊何忌二子有道是以敬仲大于齊后子旋反國彼魯昭之處鄆處乾侯處野井衛獻之處夷儀曽有是乎否也易曰旅小亨旅貞吉初六旅𤨏𤨏斯其所取災何也葉子曰粗鄙者戰蝸角而不休窮極者競蠅頭而未已小人之通患也荘生有言簡髪而櫛數米而炊竊竊然又何足以濟世然君子之居易鄙屑所不為也不幸而外處不坦坦而蕩蕩可乎弦歌不絶仲尼畏匡而適情賦詩識事子美居䕫以見志此旅之道君子之正也以卑末之志繄𤨏細之為當棄逐之餘無髙遠之識是豈劉𤣥徳之學圃于許蘇子卿之牧羊于匈奴乎銖銖而計至石而亦不能替寸寸而爭至丈而愈不能平猥鄙賤陋計較封植誠齋曰是為慶封之居呉而致富息夫躬之寄丘亭而詛盗矣楚子之誅祝詛之告其能免乎易曰旅𤨏𤨏斯其所取災六二旅即次懷其資得僮僕貞何也葉子曰孔子曰言忠信行篤敬雖蠻貊之邦行矣而况中國乎何也忠信篤敬則中正以立己而處不失當柔順以下人而衆皆仰之是故所至廓如而可以安身已可以適資用可以得使令何所徃而不獲哉公子重耳廣而儉文而有禮則奔狄而狄妻之及齊而齊妻之有馬二十乘及曹而負覊饋食致璧及楚而享以送秦及秦而納之五女其五臣負覊執紲而莫之有違也是非旅之至善乎劉𤣥徳負仁抱義則所至傾心劉安至殺其妻以為食闗雲長大節昭著則聞聲欵納胡華父子至殺身以免其難是故旅之時處之雖難而旅之道為之在我君子亦朂之而已矣易曰旅即次懷其資得僮僕貞九三旅焚其次喪其僮僕貞厲何也葉子曰傳曰旅而無所容故受之以巽此言為客依人宜有下人之心而不可有上人之氣也一有上人之氣則大者有所不屑將黜我而使無所依歸小者有所弗堪將叛我而使無所順助困于旅而禍敗隨矣衛獻出于郊臧紇如齊唁衛侯衛侯與之言虐退而告其人曰衛侯其不得入矣其言糞土也亡而不變何以復國魯昭公孫于齊齊不禮焉而享以大夫之禮公遂如晉將如乾侯子家子曰有求于人必先下之而即其安人誰與我其造于境弗聴豈非剛戾之氣猶有未盡者乎及其請逆于晉而晉又不答則茫無所依矣乃至魯之歸馬者又執之魯自是不歸馬季孫將如乾侯見公而欲與之歸國而公不見自是無復旋踵客死乾侯不得免也悲夫易曰旅焚其次喪其僮僕貞厲九四旅于處得其資斧我心不快何也葉子曰子夏曰君子敬而無失與人恭而有禮四海之内皆兄弟也四海之人有兄弟之愛而有不得其所依歸不防其為患害者哉雖然恭敬在我而人不可與為交地不可以乆處則所遇使然矣君子奈之何其得志而為家邦之必達也曹操自擊劉備于汝南備奔劉表表聞備至自出郊迎待以上賓之禮益其兵使屯新野可謂得其所處而自備固矣然嘗于表坐起至厠慨然流涕表怪問之備曰平常身不離鞍髀肉皆消今不復騎髀裏肉生日月如流老將至矣而功業不建是以悲耳然則此地又豈英雄豪傑之所能乆處乎心之悲而志之傷誠有所不能已焉耳易曰旅于處得其資斧我心不快六五射雉一矢亡終以譽命何也葉子曰君子之事君也以身方其未仕也身吾之身也可以事吾之事也及其一見君也身乃君之身矣吾安得而有其身哉申鳴謂其父曰始吾父之孝子今吾君之忠臣矣吾不得而顧父矣不其然乎君子遇文明之君出其身而事之則時平而為左右先後時艱而為奔走禦侮誠不得而復顧其私矣雖然立身行道揚名于後世為天下之大忠成天下之大孝亦何惜夫一身之致哉伊尹耕于有莘之野誰得而勤之及其承三聘之繁為幡然之舉則與湯戮力造攻鳴條無復昔日之樂矣然而克享天心咸有一徳佐商事業功照千古其為聲聞不既多乎孔明臥于草廬之中孰得而有之及其感三顧之勤為應時之起則竭其忠精鞠躬盡瘁無復昔日之吟矣然而三分鼎足虎視呉魏佐劉功勲垂光萬載其為名聲不已甚乎君子曷其以身為靳哉故曰天下之洪鐘鑄以萬鈞之金而懸之岑樓之上寂無聲也遭遇鼎士手巨杵而擊之則鐘不得而與焉然而鑑然鳴訇然震如扶揺號而萬竅怒霹靂作而崇山破前聲未盡猶韻相及聞于四遐之境矣易曰射雉一矢亡終以譽命上九鳥焚其巢旅人先笑後號咷喪牛于易凶何也葉子曰少康逃虞思之圃宣王匿石公之家其後也卒為中興之君昭公之寄乾侯煬帝之走江都其卒也卒為客死之鬼何也禍亂之作天所以開聖人能者儆戒以為福不能者安肆以㓕身理也既已失其居而為旅矣而復窮大以自恣髙亢以自驕安得不毁其寄生之室哉毁其室而不保則困其身而益窮是故始以縱自處常快其意而不顧矣終則隕而亡雖啜其泣而何嗟及乎衛荘公示州人以璧而不受秦胡亥求為黔首而不許所謂乞為旅而不可得者悲哀能自己耶驕而不順其禍乃如此安能覺之使悟而反之使正乎故曰天奪之鑒則昏瞶其是非之心是故安危利災而樂其所以亡天奪之魄則渙散其恭敬之心是故驕泰傲惰而謂人莫己毒則虢公之所以滅而趙同之所以亡非不幸也易曰鳥焚其巢旅人先笑後號咷喪牛于易凶葉八白易傳卷十四
