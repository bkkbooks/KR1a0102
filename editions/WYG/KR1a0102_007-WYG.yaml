body:
  text: 葉八白易傳卷七明葉山撰无妄元亨利貞其匪正有𤯝不利有攸徃何也葉子曰天地以實理而運于氣則為誠通誠復之本然聖人以實心而見于行則為誠精神應之妙道故曰神也者妙萬物而為言者也又曰至誠而不動者未之有也然惟天下之至誠為能盡其性能盡其性則能盡萬物之性書曰惟德動天無遠弗届帝初于歴山徃于田日號泣于旻天于父母負罪引慝祇載見瞽瞍䕫䕫齊慄瞽瞍亦允若至誠感神矧兹有苗其斯為大舜之誠乎其斯為動而不窮乎子路之仕衞非以其口實也申生之雉經非以其畏懼也而君子不道焉逃乎理之常越乎義之正非聖行也故曰願言思子不瑕有害嗚呼死非其所不得為無瑕陷父不義不得為無害其何以行之哉非法于天下不傳于後世君子不道也下此則抱柱之信證父之直思獻其兄之友從井之仁害乎義而傷乎教亂大倫而天理所不直矣何以誠為哉何以徃為哉易曰无妄元亨利貞其匪正有𤯝不利有攸徃初九无妄往吉何也葉子曰雷之動也以至和故行于天而不驚不怨君子之動也以至誠故行于天下而無惡無射孔子告子張曰言忠信行篤敬雖蠻貊之邦行矣其告仲弓曰出門如見大賔使民如承大祭已所不欲勿施于人在邦無怨在家無怨然則天下無不可徃之地特患吾無至誠之德焉耳不然何暴慢者獻其恭狡偽者致其誠于程子之前乎昔楚莊王圍宋宋華元夜見子反以析骸易子告之子反亦以七日之糧告莊王怒子反曰區區之宋猶有不欺之臣可以楚國而無之乎吾是以告之華元以誠告子反得以解圍全二國之命況身心之極誠者乎故曰伯夷非以死之日而有名也其前行多修也武王非以甲子之朝而後勝也其前故多善矣不然將無所容于天地之間無徃而非殺身之地矣昔爾朱世隆反魏主元子攸以城陽王元徽總統内外及兆輕兵渉河騎叩宫門宿衞散走魏主歩出雲龍門外遇徽乘馬走屢呼之不顧而去徽持金百斤馬五十匹以前洛陽令㓂祖仁一門三刺史皆已所引㧞故徃投之祖仁私謂子弟曰今日富貴至矣乃怖徽云捕將至令其逃于他所使人于路要殺之送首于兆兆不賞而夢徽謂已曰我有金二百斤馬百匹在祖仁家卿可取之兆即捕祖仁依夢徵之不得殺之夫元徽棄君祖仁賣友不誠不信亦甚矣卒之皆喪其元不亦宜乎易曰无妄徃吉六二不耕穫不菑畬則利有攸徃何也葉子曰董子曰仁人者正其誼不謀其利明其道不計其功是故湯放桀武伐紂非以其商周之可王也順乎天而應乎人以為義之在我者不得不若此其正之者也不然是天之逆子也仲尼孜孜顔子好學非以其天下萬世之可王也崇夫德而廣其業以為道之在我者不得不如此其明之者也不然是天之戮民也乘乎其所當然順乎其所自至若天地之無心而成化焉此其所以為王者之業而聖賢之事也齊桓欲復楚先侵蔡而伐楚晉文欲勝楚先伐衞以致楚求諸侯莫如勤王成霸安强自宋始是借濟人之功以為已利也後之人將敬奉德義而申固其命若之何待之彼將悔前日之非改過恤下而撫其民則難慮矣是乘人之憊以為已功也若虞人之設機而布伏焉此豈足以窺聖人之藩界哉雖然惟湯武然後能應天順人惟孔孟然後能德崇業廣彼齊晉之功欲使與天壤同敝而不知身未死而已索然矣詩曰見晛曰消豈不信然是故不昏作勞惰農自安君子不能也閔其苗之不長而揠之芒芒然歸君子不為也四體不勤五穀不分倬彼甫田歲取十千君子不敢也率乎性分之固有盡其職分所當為没身而已矣易曰不耕穫不菑畬則利有攸徃六三无妄之災或繫之牛行人之得邑人之災何也葉子曰天下固有不測之事非望之過也唐張亮過建安城下壁壘未固高麗兵奄至亮素怯據胡床直視不言將士見之更以為勇相與擊髙麗兵破之適然之福葢如此則夫適然之禍世豈少之乎城門火而池魚殃楚猿亡而林木災越國兵而獻魯女宋魋出而􅕁園葵武氏王而君羨死魯酒薄而邯鄲圍老龜韌而枯桑禍天長陷而黄鍔摧天下不又有外至之禍不期之變乎所以修身以俟正命矣而不免于桎梏之凶守道以禦外物矣而不免于雉罹之死古今之可憾者多矣誠齋曰横逆不宜至孔子以貎似陽虎而見圍盜竊不可誣不疑以身與同舍而償金君子柰之何順受其正而已矣易曰无妄之災或繫之牛行人之得邑人之災九四可貞无咎何也葉子曰一手獨拍雖疾無聲空柯無刃公輸難斵故曰事廢于獨成行衰于寡黨又曰一手不能舉鴻鼎一臂不能推大車天下大事而以一人為之鮮不仆矣斯匠石之所以悲亡質而𤣥德死闗張死趙雲死而孔明自將以出祁山卒使英雄有滿襟之淚與然則君子於此柰之何闔門以俟時守已以聴命愼密不出而已矣易曰可貞无咎九五无妄之疾勿藥有喜何也葉子曰人君動作以袪孽猶之醫者用藥以攻病然而孽有無故而自生則亦無待動作而自定是故疾一也有所以致之而生者有無所致而生者壅閉湫底昏亂百度如是而得疾者有所致之而生者也不治者死喜怒哀樂思慮必得其中以養神寒暄盈虚消息必得其中以養體如是而偶疾者無所致而生者也治者亦死齊景公不去田氏之逼不治有致之疾者也漢武帝逺救甌越之爭治不致之疾者也其惟聖人乎何也誠齋有言養生者主粱肉而冦藥石藥石固無害矣吾无妄焉用藥藥無害猶不可試而況有害者乎故聖人曰未達不敢嘗夫聖人不試无妄之藥而秦人以未富强為疾補之以商鞅之烏喙晉人以未清虛為疾下之以王衍之甘遂藥之禍何可勝言哉易曰无妄之疾勿藥有喜上九无妄行有眚无攸利何也葉子曰傳曰山鋭則不髙水徑則不深仁磏則其德不厚志與天地擬者其人不祥是伯夷叔齊卞隨介子推原憲鮑焦袁旌申屠狄之行也雖枯槁不舍也淮南子曰子路拯溺而受牛謝孔子曰魯國必將救人于患子貢贖人而不受金孔子曰魯國不復贖人矣子路受而勸德子貢讓而止善孔子之明以小知大以近知遠通于論者也由此觀之㢘有所在而不可公行也故行齊于俗可隨也事周于能易為也矜偽以惑世抗行以違衆聖人不以為俗故曰恭而無禮則勞愼而無禮則葸勇而無禮則亂直而無禮則絞易曰无妄行有眚无攸利大畜利貞不家食吉利渉大川何也葉子曰人臣莫大于愛君而愛君莫急于止其欲傳曰國之犬臣榮其寵祿任其大節有災禍興而無改焉必受其咎晉平公内有四姬滛以生疾將不能圖恤社稷禍孰甚焉而趙武身為正卿以主諸侯不能禁禦是以先平公而死齊桓公姑姊妹不嫁者數人宫中七市女閭七百滛汚臭穢莫甚于此而管夷吾身為仲父任專且久不能遏止是以身没之後不復見于齊則不畜其君者不愛之罪可知矣雖然禽荒色蠧之必絶峻宇雕墻之必袪神仙土木之必禁闢土服逺之必遏是愛也非大愛也愛之大者有大止焉其惟格君心之非已乎君仁莫不仁君義莫不義君正莫不正一正君而國定矣然而未易易然也非聞望之隆不足以弭其邪心非容色之盛不足以消其逸志故曰惟大人為能格君心之非又曰非重華協帝者不能事帝非邁種徳者不能成君之徳也荀息曰宫之奇懦而不能强諌又曰少長于公宫君暱之雖諫將不聽唐敬宗曰驪山若此之凶邪朕當一徃以騐其然又曰彼叩頭之言何足信是素履積行不能使之信而敬敬而畏矣又安望其潛消而黙奪也哉雖然聽祈招之詩者不食不寐能使之信矣而克己復禮之道不行急幃中之避者使人可其奏能使之敬矣而多欲之累如故恐韓休之知死懷中之鷂者望風恐懼能使之畏矣而禽荒遊宴之不除夫安在其為止君之欲而愛君之大哉而況管氏身有三歸則桓公之内嬖我何尤焉何曾日食萬錢則晉武之窮奢吾末如之何矣何也已正物正之道信哉其不可誣也夫君心正矣正人任焉吾言聽矣吾身用焉太甲賴匡救之徳圖惟厥終成王彰周公之德親迎國家蜀後主終師傅將相之禮于諸葛孔明之身上也唐憲宗以奏罷蚶蛤拜孔戣嶺南節度使穆宗以太子時索馬不與用李聽為河東節度使敬宗以前日廷爭拜劉栖楚諌議大夫文宗以諫納李孝本二女拜魏謩為補闕武宗以不從選娼女召杜悰同平章事次也嗣一代之丕基守配天之大業支累世積集之宏功其功業亦逺矣哉易曰大畜利貞不家食吉利渉大川初九有厲利已何也葉子曰臣之立身重始進始進而比君後與王言如響矣臣之畜君防事初初事而不塞終成江河莫已矣君萌禍本國兆危機可謂不足煩禁戒乎㫖酒糟丘之濫觴漆器象箸之根柢哲人之所懼也從是而止之君安而國家可保矣曷犯天下之大難也乎李沆為相日取四方水旱盜賊奏之王旦以為細事不足煩帝聽沆曰人主少年當使知四方艱難不然血氣方剛不留意于聲色犬馬則土木甲兵禱祀之事興矣吾老不及見此參政他日之憂也神宗從容訪富弼以治道弼知帝果于有為對曰人主好惡不可令人窺測則奸人得以附會當知天之鑒善惡皆所自取然後誅賞隨之則功罪皆得其實矣又問邊事對曰陛下臨御未久當先布徳澤願二十年口不言兵亦不宜重賞邊功干戈一起所係禍福不細嗚呼忠臣愛君必防其漸類如此安得有若人者而與之言畜君之道哉噫此良臣之上禁于未發之謂豫者也不能豫防于未然而重禁其已然若許孟容之封還詔書胡安國之封還詞頭李沆之對使焚詔勞矣拂矣易曰有厲利己九二輿説輻何也葉子曰正君之道莫先于自正其身止君之欲莫先于自止以道是故欲止君之驕心則莫若自止以節廉退以明節驕斯下矣欲止君之吝心則莫若自止以質簡素以明質吝斯敦矣欲止君之慢心則莫若自止以禮莊重以明禮慢斯恭矣此臣道之正常而愛君之急務也宋眞宗以官爵驕其臣而錢若水則示之急流勇退唐代宗以鄙嗇矜其臣而楊綰則示之以冲淡朴素宋太宗以怠䙝臨其臣而竇儀則示之却立不進此揚雄所謂君子之準繩先自治而後治人者也使為之而呶呶口舌疏札以爭其末禁其為其亦不思之甚乎其次楚莊王好獵而樊姬不食鳥獸之肉齊桓公好滛樂而衞姬不聽鄭衞之音五代間葉翹博學質直閩主昶以師傅禮待之多所裨益宫中謂之國老昶既嗣驕縱不與翹議國事一日昶方視事翹衣道士服趨出昶召還拜曰軍國事殷久不接對孤之罪也翹頓首曰老臣輔導無状致陛下即位以來無一善可稱願乞骸骨昶曰先帝以孤屬公政令不善公當極言柰何棄去爰賜金帛令復位是皆知所以自止以止君知先務矣齊桓公宫中七市女閭七百國人非之管仲不能諫而故為三歸以掩公宋平公築臺妨于農收築者謳之而子罕親執扑以行築者而抶其不勉者以成君過於斯為下矣易曰輿説輻九三良馬逐利艱貞曰閑輿衞何也葉子曰不知則已知之則必直言之前事未已後事方且沓繼之君將曰可而以否替之君將曰否而以可成之此人臣之職分而治世之良會也不曰正人君子之深願乎然而有犯顔敢諫之風則又患其過于直有仗節死義之氣則又患其過于激君子不可以不審矣不愼則率意不正則强君不思安其身則輕謀而挑禍不知防其變則疎脫以召災自敗之道也將何益于國哉是故使君畏吾之言不若使君信吾之言使君信吾之言不若使君樂吾之言不徒懼之以法而必開之以理不惟本之以理而必悟之以心然後君能容而臣說入不以為謗而以為忠不以為妖而以為哲矣此田錫李沆之所以動人主也不然李泌陸贄不免代德之疏孫奭不免使仁宗嘉其言而不能用剛勁切直事事欲聞朱子亦致寧宗之遠矣而况其他焉者乎嗚呼此臨終寄命受托不疑繼體納之無貳情武侯受之無懼色矣南北興師千里辭别前後二表暴白孤忠所以為壯當年而光後世也豈淺之乎其夫者所能得而測識其度量者哉易曰良馬逐利艱貞曰閑輿衞六四童牛之牿元吉何也葉子曰小臣之畜君也以著大臣之畜君也以微小臣之格君也以事大臣之格君也以心遏未萌之欲則欲無所恣防未動之邪則邪無自侈聲色不見於天下而福慶已流于四海矣其惟伊尹周公以道德黙成乎君志以禮義潛養其君心者乎成王將崩乃召太保奭芮伯彤伯畢公衛侯毛公師氏虎臣百尹御事曰爾尚明時朕言敬保元子釗𢎞濟于艱難柔逺能邇安勸大小庶邦思夫人自亂于威儀爾無以釗冐貢于非幾嗚呼其有以知此矣恒人識不遠而謀不豫于是乎君臣交敝矣可勝歎哉趙盾不禁靈公于未發卒至驟諌不入三進及溜而後視欒書不防厲公于未然卒至棄親暱近欲去諸大夫而立其寵人憂其君而遂戕其君憂其國而遂危其國憂其身而遂陷其身負天下萬世之大逆皆起于始之不知豫也可不戒哉易曰童牛之牿元吉六五豶豕之牙吉何也葉子曰臣以畜君為良君以自畜為聖畜君者格君心之非自畜者剔正人之蠧聲色臭味心之非也讒邪諂佞正之蠧也去其蠧而正人安正人安而君心正矣一正君而國有不定乎何也均是人也而忽生小人小人生即毒心具矣具毒心者専欲而妨善善畏妨而儉夫德矣故曰歸父家遣緣季氏也朝吳出奔因無極也王章殺身忤王鳳也鄴侯就館避元載也若是而大君不孤且危乎均是豕也忽生怪豕怪豕生即患牙具矣且患牙者囓乳則傷母母畏傷而禁其乳矣是故不忍已之痛即不暇顧其兒之饑欲全已之身即紓其死于子之衆若是而諸豕不餒且死乎故善飼豕者怪豕生而犗其牙犗其牙而衆豕存善用人者小人進而絶其類絶其類而衆正安自畜之良無是過矣嗚呼世不知凡豕不囓物而囓物不以牙而以唇又豈知有怪豕者邪世不知怪豕有患牙而患牙不害母則害衆又豈知有犗之者邪宜小人之多而君子之寡也知此者其惟堯舜乎故曰朕堲讒說殄行震驚朕師易曰豶豕之牙吉上九何天之衢亨何也葉子曰臣能畜君一正君而國定矣君能自畜上下交而德業成矣書曰股肱起哉元首喜哉百工熙哉又曰元首明哉股肱良哉庶事康哉此黎民之所以於變而萬邦之所以協和者也是之謂天下康寧是之謂四海永清是之謂堯舜之治成易曰何天之衢亨頤貞吉觀頥自求口實何也葉子曰上之所養不可以不愼也食之而弗愛豕交之也愛之而弗敬獸畜之也其惟大烹乎或者以已養養鳥而不以鳥養養鳥也孟子曰以君命將之再拜稽首而受其後廩人繼粟庖人繼肉不以君命將之然則堯之于舜也九男事之二女女焉百官牛羊倉廩備以養舜于畎畝之中庶幾得之矣乎下之自養不可以不愼也以德詔爵德則或不競矣以功詔祿功則或不庸矣其惟後食乎或者食人之食而未必人浮于食也是以君子愼之焉伐檀之詩曰坎坎伐檀兮寘之河之干兮河水清且漣漪不稼不穡胡取禾三百㕓兮不狩不獵胡瞻爾庭有懸貆兮彼君子兮不素餐兮若後漢徐孺子家貧常自耕稼非其食不食范文正居官每計一日奉養之費與所為之事相稱則無復愧恥茍或不然終夜不能安寢庶幾近之矣乎不然亟問亟餽曾不如晉平之蔬食菜羮九鼎三牲曾不如伯夷之采薇采蕨矣烏乎可易曰頥貞吉觀頥自求口實初九舍爾靈龜觀我朶頥凶何也葉子曰孟子曰是非之心人皆有之辭讓之心人皆有之夫曰是非謂其審于義利之分夫曰辭讓謂其嚴于取與之節其明足以研天下之幾其辨足以立天下之介是之謂秉􅂜之心良能之淑焉耳有是心也則必窮而不受嘑與蹴之簞豆黔敖不得無禮于餓者達而不受無禮義之萬鍾三公不得易介于柳下此君子之所以可生可殺而不可使為無恥可饑可死而不可使為不義者乎昔者曾子褐衣緼􅀈未嘗完也糲米之食未嘗飽也義不合則辭上卿彼豈以我賤彼貴而動其心哉守道以禦外物貞固而却紛拏天下之物舉不足以入之矣擲挺挺之良貴而羨津津之腐䑕此劉歆之頭不如子陵之足紀逡唐林之舌不逮淵明之腰矣嗚呼彼豈知一絲之為貴而五柳之為富哉雖然少時忍慾今忍貧此苦海之所以難逃而利波之所為易溺也不然何子路之剛勇而不免楮師氏之慕閔子騫之賢德而不免有菜色之見魯隠公其先葢賢君也得位之初慨然視千乘如鴻毛將舉而遜其弟締交四鄰息民和衆自啗鄭莊公歸祊之利則君臣掃境以從伐宋貪戀魯國而假曰將老菟裘卒不見信于桓而公子得行其僭君子所以貴自克也易曰舍爾靈龜觀我朶頥凶六二顚頥拂經于丘頥征凶何也葉子曰君子之于天下也亦惟謹其身而已矣謹其身淑其德退之遇同道之朋則有萬鍾之養進之遇同升之主則有衎衎之食何所徃而不得哉惟不以道律其身不以身凝乎德則進退維谷天下莫之矣齊慶封為亂于齊而欲走越其族人曰晉近奚不之晉慶封曰越遠利以避難族人曰變是心也居晉而可不變是心也雖逺越其可以安乎君子曰慶封叛類之梟也請以梟喻梟逢鳩鳩曰子將安之梟曰我將東徙鳩曰何故梟曰鄉人惡我鳴以故東徙鳩曰子能更鳴可矣不能更鳴東徙猶惡子之聲由是觀之有教無類善善惡惡天下之心一也孔子曰言忠信行篤敬雖蠻貊之邦行矣言不忠信行不篤敬雖州里行乎哉是故狥之以德義則劉𤣥德所至而破家相容行之以非道則商鞅投諸民舍而不納歸之故國而車裂矣可不戒哉易曰顛頤拂經于丘頤征㓙六三拂頤貞凶十年勿用无攸利何也葉子曰明明德者親民之具也知所以修身者治天下國家之本也不以天德養其體將何以究王道之施不以内聖養其身將何以致外王之業攻之雖勤而無補業之雖專而無用彼以為是而終不可措之天下國家矣是故鄧析之竹刑秖足以殺其身李斯之法律徒足以滅其族故曰愼子有見於後無見於先老子有見於屈無見于伸墨子有見于齊無見于畸宋子有見于少無見于多有後而無先則羣衆無門有屈而無伸則貴賤不分有齊而無畸則政令不施有少而無多則羣衆不化若之何其濟人而利物哉没世無所措也已易曰拂頤貞凶十年勿用无攸利六四顛頤吉虎視耽耽其欲逐逐无咎何也葉子曰明四目者以天下之明為已明也達四聰者以天下之見為已見也堯舜且然況常人乎是故養賢以及萬民用賢以養天下恩不必已出惠不必已施吾求萬民之濟天下之寧而已矣他何顧焉然賢者可以及萬民吾不壹其心志以待之或者讒不去而色不遠賢者去矣賢人可以養天下吾不繼其恭敬以求之或者禮貌衰而言不行賢弗留矣然則施下惠者大臣之光而侈上權者豈非大臣之過哉子賤之治單父所父事者二人所兄事者四人所友者十人宋鮑之當國國之才人無不事也子皮聽鄭國之政雖家事亦莫不聽子産之裁焉葢有以識此矣其所以敬而畏之者可知矣若晉平公内有四姬則亥唐為徒尊薳子馬有寵八人則申叔不敢見奚以賢者之施為哉雖然養賢固當專矣不知其賢而養之可乎若戰國四豪皆稱養士而孟嘗君至以鷄鳴狗盜出其門為天下之所嗤陋亦甚矣雖然鷄狗畜之賤且汙者而待之誠養之厚尚能出其死而逃其生猶不愈于養虎者乎春申養李園而卒剸其胸平原養韓益而卒醢其族彼勝與歇者豈愛其身不若孟嘗哉失所養也雖然文亦不足道也信陵雖悍而自用其于侯生則庶幾焉易曰顛頥吉虎視耽耽其欲逐逐无咎六五拂經居貞吉不可渉大川何也葉子曰臣道無成而代有終君權獨奮而無多藉不能任天下之事養天下之民而區區賢臣之是賴庸君也是故可與守常難與慮變可與保安境土懷綏臣民不可與振長策于宇内包八荒而臣諸侯昔者六朝五季諸人上之不足為開基之聖主立數百年之宏勲次之不足為闢土之英君振千萬里之聲教奄奄世界而茍竊一時何也江東之人知有江東而不知有天下是以屢有戰勝之功而卒無北窺之志五季之主惟知賂以得國而不知道以濟民是以雖有號位之竊而卒之並為驅除之借焉耳嗚呼知不足而才未勝道弗宏而德彌下果不足以大有為也易曰拂經居貞吉不可渉大川上九由頤厲吉利渉大川何也葉子曰天下由我而為養可以得民心我能盡養乎天下可以沃君寵此君子之能事大臣之宏業也雖然黿羮染指鄭靈見弑羊羮遺御華元見囚戒食不召衞獻出奔設享不遍中山替走飲食人之大欲也或得或失人情之所不能忘也我以大欲濟人而忽其所不及人必以恒情責我而萃其所不平葢德我者未必報而怨我者則必讐是故所貴乎君子之在位也施舍可愛而已矣詩曰民之失德乾餱以愆可不愼乎愼之而光大其設施施之而得其臣無家則不惟平居之養滿飽而已矣卒然有變可使食足而信孚不幸有方二三千里之水旱可使民無菜色此周公召公相與協和共理號稱共和之事而子孟君實葢亦庶幾焉者也易曰由頤厲吉利渉大川大過棟橈利有攸徃亨何也葉子曰惠風扇和朝菌與椿松並煦嚴霜降寒芝蘭與蕭艾同凉聖人以發强剛毅之氣震雷厲風飛之為用肅殺果毅之威批馮河決澤之勢秖見天下莫能當而舉世為懼恐矣故曰神龍滃翻四海鼎沸迅雷轟擊英豪落七其勢使然已乎何也有夷難之才則造難者肉潰有戡禍之力則始禍者骨枯天下之定理也昔者三監叛王周公弗用姑息之愛而固縱尋斧之利少正卯亂魯孔子不盖不順之恥而實亢助天之虐彼三監虀粉而正卯糜爛不足言也成王幽憂而三桓駭懾周人震驚而魯國奔走則亦豈得而堪之乎故曰牛雖瘠僨于豚上其畏不死又曰當之者碎觸之者焦然而私不恤而道惟存情不徇而義則立威不猛而行乃中則不為震主而尊主非以亂民而庇民天下之志可以通天下之業可以定而天下之疑可以斷周室以寧而魯國大治當時不以忌周孔而周孔之道萬世其永昌矣何所施而不可哉噫非天下之至精其孰能與于此易曰大過棟撓利有攸徃亨初六藉用白茅无咎何也葉子曰知莫明于量力禍莫大于違時蔡謨有言大亂將興非命世之才不能克之鮑信謂曹操曰夫畧不世出能撥亂反正者君也茍非其人雖强必斃是故四海鼎沸而聞雞起舞者豪傑之為也天下亂離而破帽終身者自靖之道也然則彼以干戈芟大難而吾以詩書禮樂腐吾身彼以爵祿分人憂而我則貧賤煢煢之在疚若之何而可哉傴僂而俯循墻而走饘粥于是以糊其口戒于聖人儆乎欹器無縱于逸以墜厥世敬天之怒無敢戲豫敬天之渝無敢馳驅其殆庶幾乎觀之古人亦畧可見矣郭林宗曰大厦將傾非一木之支故明哲保身不忤羣小而卒免于黨錮之禍范滂等非訐朝政自公卿以下皆折節下之太學生爭慕其風以為文學將興處士復用申屠蟠獨歎曰昔戰國之世處士横議列國之主至為擁篲先驅卒有坑儒焚書之禍今之謂矣乃絶迹于梁碭之間因樹為屋自同傭人二年滂等果罹黨錮之禍惟蟠超然免于評論易曰藉用白茅无咎九二枯楊生稊老夫得其女妻无不利何也葉子曰天地交而泰日月會而蘇隂陽合際之餘百務由成之道也邵子曰一動一静之間者天地人之至妙至妙者與誠哉是言矣是故剛强擊斷之方嚴而遽接之以柔則廣心浩大之所容剛得其調而平矣陽威震奮之始肅而即承之以隂則寛裕温柔之所涵陽得其濟而和矣神氣伸而元氣不索枯槁及而生意勃然天下之衰可以興而廢可以舉出入動靜蔑不濟矣鞌之戰晉大勝矣而怒猶未怠曰必以蕭同叔子為質使齊之封内盡東其畆魯衞從而諌曰齊疾我矣其死亡者皆親暱也子若不許讐我必甚惟子則又何求子得其國寶我亦得地而紓于難其榮多矣齊晉亦惟天所授豈必晉晉人許之遂為袁婁之盟諸葛亮治蜀頗尚嚴峻人多怨歎者而法正即以願緩刑弛禁以慰民望勸之暴勝之為直指使所誅殺二千石以下尤多而雋不疑即以太剛則折威行施之以恩然後樹功揚名以終其祿戒之韓滉性苛暴方為德宗所任百官羣吏救過不贍而柳渾即以作福非人臣所宜讓之哲宗起司馬光為相銳意為治將盡改熙豐之法而蘇軾即以法相因則事易成有漸則民不驚范純仁則以去其太甚更當熟講而緩行規之晉不失霸蜀成鼎足而哲致大治暴無禍敗而韓保功名有由然矣易曰枯楊生稊老夫得其女妻无不利九三棟撓凶何也葉子曰陽剛不可以先物猛勇不足以成功桓公曰金剛則折革剛則裂人君剛則國滅人臣剛則朋友絶晉陽處父聘于衞過甯甯嬴從之及温而還其妻問之嬴曰以剛商書曰沈潛剛克髙明柔克夫子壹之其不没乎天為剛徳猶不干時況在人乎予懼不獲其利而離其難是以去之項羽喑啞叱咤止一范增而不能用而韓信陳平竟歸漢祖苻堅虺蝮劈截舉國諫之而不肯聽而慕容垂為之坐觀剛之為禍槩可知矣何也剛而不和不和則不可用是故四馬不和取道不長而況君子任天下之大事者乎暴而陵人哲人之所逃避猛而愎諫忠臣無可如何其不凶于而家害于而國者幾希矣易曰棟撓凶九四棟隆吉有它吝何也葉子曰大臣國家之柱石而剛柔不偏則大臣之要道昔者楚子木問于趙孟曰范武子之德何如對曰夫子之家事治言于晉國無隠情其祝史陳信于鬼神無媿辭子木歸以語王王曰尚矣哉宜其光輔五君以為盟主也伯宗以剛敗孔光以柔廢棄寵名而壞梁木矣何以承天下之重而懋官方之榮也哉其惟孔明乎以嚴治蜀而又盡時人之器用以寛役民而又適位分之治體所以中興漢帝而定業三分天下後世稱雄傑也彼房琯迂而庾亮踈矣濟以劉秩之鄙殷浩之浮敗而䘮功何其陋哉易曰棟隆吉有它吝九五枯楊生華老婦得其士夫无咎无譽何也葉子曰君德以剛為主是故貴陽也而陽不可過也過極者畏首畏尾身其餘幾而無用以不情遇無用則耳目無所加手足無所措天下之事欲為而卒不為求成而竟無成矣齊景公耄年狂悖挾魯衞之僝弱乃欲力政經營以定霸統抑晉代興然而次五氏次垂葭會于牽又會于蘧拏徘徊睥睨卒不敢以伐晉終五十八年之久漫無一事也劉裕欲經略中原有封狼居胥意而與白面書生輩謀之由是伐魏無功而元嘉之政衰矣北兵再敗䘮名損望孰與不為之無過哉是故幸不為大不幸為而無成誠齋曰以魯昭公誕妄而倚公衍公為季后以去季氏邵陵厲公之狂悖而倚曹爽以抑司馬懿唐文宗之無能為而倚訓注以除宦官何可久也易曰枯楊生華老婦得其士夫无咎无譽上六過渉滅頂凶无咎何也葉子曰天下之不可為者時也其不能為者材也而不可不為者義也時適所遇而材稟于天吾將如之何哉獨有吾義所當為不可廢焉者君子為之而已矣材之不足而時之不濟吾何計焉昔者孔子觀于吕梁之水懸流三十仞流沫四十里黿鼉魚鼈之所不能遊也見一丈夫遊之數百歩而出披髪行歌而游于塘下孔子從而問焉曰蹈水有道乎曰亡吾始乎故長乎性成乎命與齊俱入與汨皆出從水之道而不為私焉此吾所以蹈之也夫有是丈夫之能則齊入而偕出矣不然其不葬魚腹而享鼈靈者不亦鮮乎故曰江湖所以濟舟亦所以覆舟仁義所以全身亦所以害身然而先賢玉摧于前來哲攘袂于後豈非天懷衷發名教拘束者乎雖然身罹大戮矣而心不虧載胥及溺矣而義則取古今之士葢不少焉昔宋之末元師渡江天下勤王詔至贑江西提刑知贑州文天祥捧之涕泣使陳繼周發郡中豪傑并結溪洞山蠻使方興召吉州兵諸豪傑皆應有衆萬人遂入衞其友止之曰今敵兵三道鼓行破郊畿薄内地君以烏合萬餘赴之何異驅群羊而搏猛虎天祥曰吾亦知其然也苐國家養育臣庶三百餘年一旦有急徵天下兵無一人一騎赴者吾深恨之故不自量欲以自徇庶幾忠臣義士將有聞風而起者義勝者謀立人衆者力濟如此則社稷猶可保也卒之功雖不成而凜凜大節照映千古雖曰不幸而于義何疵故曰無求生以害仁有殺身以成仁又曰生我所欲也義亦我所欲也二者不可得兼舍生而取義者也雖然此其才之不足耳仲遂殺惡及視而立宣公以君命召惠伯其宰公冉務人止之曰入必死叔仲曰死君命可乎公冉務人曰若君命可死非君命何聽弗聽乃入殺而埋之馬矢之中齊崔杼弑莊公殺賈舉州綽邴師公孫敖封具鐸父襄伊僂堙祝佗父申蒯鬷蔑而晏子立于崔氏之門外其人曰死乎曰獨吾君也乎哉吾死也曰行乎曰吾罪也哉吾亡也曰歸乎曰君死安歸君民者豈以陵民社稷是主臣君者豈為其口實社稷是養故君為社稷死則死之為社稷亡則亡之若為已死而已亡非其私暱誰敢任之且人有君而弑之吾焉得死而焉得亡之將庸何歸卒與崔慶盟于大宫然則嬰伯將何歸曰伯也過其蔽也愚嬰也不及其蔽也蕩愚何尤焉而蕩幾賊矣易曰過渉滅頂凶无咎葉八白易傳卷七
