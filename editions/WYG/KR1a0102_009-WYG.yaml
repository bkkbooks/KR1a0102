body:
  text: 葉八白易𫝊卷九明葉山撰遯亨小利貞何也葉子曰天下之禍福兆於幾聖人之進退見於幾而决幾動於禍矣聖人之去也何俟終日哉此其神龍之不可得而縻日月之不可得而踰鳳凰􅃋於千仞之上夫孰得而樊籠之也哉何也極其閔窮之念不過微𦕈之斡旋勉其救世之心不可大行其中正則亦何益之有是故為而無成則如勿為無成而留則如勿留攝行相事魯國大治女樂一受行不脱冕嗚呼淵哉微乎非聖人不足以語此黄皓亂蜀姜維言於帝曰皓奸巧専恣将敗國家請殺之帝曰皓趨走小臣耳徃董允每切齒吾嘗恨之君何足介意維見皓枝附葉連遜辭而出帝勑皓詣維陳謝維由是疑懼返自洮陽因種麥沓中不敢歸成都夫黄皓小臣姜維手握强兵權統一國而尚畏忌不前輕身逺避如此况其下焉者乎而况君子之見幾明决介如石焉不用終日者乎是以雖有可為之機而必無茍為之志使卒莫可如何也易曰遯亨小利貞初六遯尾厲勿用有攸往何也葉子曰君子進以禮故七介以相見三辭三讓而後至退以義故一决而即行未始濡滯遲留以為去劉文定詩休庵君昔名戅手拉奸臣九天上即今却以休為名無乃勇氣非少壯君不見健帆髙掛乘剛風一日千里無留踪歘然卸落艤洲島知進識退無途窮丈夫處世當如此眷戀富貴非英雄此言不休則已休則宜决不去則已去則宜先故曰進處後則逺利明退處先則逺害早遯而在後安能遂其髙蹈逺引之志哉𫝊曰或譛成虎于楚子成虎知之而不能行遂殺之春秋書曰楚殺其大夫成虎懷寵也然則隠公菟裘可以避矣而曰吾將老焉幾不早斷安免桓之簒而弑揚雄三世不徙官可以去矣而曰有所解焉明不復哲奚逃莽之縻而汚昔者或謂吳郡陸喜曰薛瑩於吳士當為第一乎喜曰孫皓無道吳國之士沉黙其體潜而勿用者第一也避尊居卑禄以代耕者第二也侃然體國執政不懼者第三也斟酌時宜時獻微益者第四也温恭修慎不為諂首者第五也過此以徃不足復數故彼上士多淪没而逺悔吝中士有聲位而近禍殃觀瑩之處身其四五之間乎嗚呼此足以觀矣是故東萊之責蕩意諸曰意諸親則公族官則司城坐視昭公之失道襄夫人之畜怒公子鮑之隂謀凶徳恭會待釁而𤼵上不聞有正救之諫中不聞有調䕶之功下不聞有擊斷之勇見亂而始去去何晚也見弑而始死死何補也想夫亂機之將兆弑械之將成通國之内外舉知之曽謂意諸之賢而不知邪其所以徘徊濡滯不能翻然髙舉者蓋懷其父去官則族無所庇之言顧位茍禄日復一日其意以為無難則忍恥以庇宗有急則捐身以雪恥以後之節贖前之非耳殊不知君子不忍一日置其身於可愧之地今日為善尚恐他日為惡詎有身居可愧之中而可豫指他日之節以贖今日之非乎易曰遯尾厲勿用有攸徃六二執之用黄牛之革莫之勝脱何也葉子曰抱道自髙不與世汚之謂中與時偕行不顧榮禄之謂順以此自守則富貴利達之紛華不能易其志事業功名之烜赫不足動其心矣昔周之興有孤竹二子伯夷叔齊相謂曰吾聞西方有人似有道者試徃觀焉至於岐陽則文王已殁矣武王聞之使叔旦徃見之與之盟曰加富二等就官一列血牲而埋之二人相視而笑曰嘻異哉此非吾所謂道者樂與政為政樂與治為治不以遭時自利也今周見殷之亂而遽為之政與治是推亂以易暴也與其並乎周以塗吾身不如避之以潔吾行二子北行至首陽之下而死焉易曰執之用黄牛之革莫之勝脱九三係遯有疾厲畜臣妾吉何也葉子曰君子之進也不以亟而以禮故曰七介以相見三辭三讓而後至君子之退也不以遲而以决故曰無罪而殺士則大夫可以去無罪而戮民則士可以徙然則沉溺於包承之利而依違於去就之間係戀其賁濡之私而遲滯於退避之際則豈知幾之哲介石之操也哉詩曰雄雉于飛泄泄其羽我之懷矣自詒伊阻此所以為名行之疵身家之辱也何也係戀之私恩懷女子小人之道也孔子曰惟女子與小人為難養也近之則不遜逺之則怨不怨不遜之間惟慈與莊以畜之蒞之而已矣華元殺羊享士而羊羮不遍則與入鄭師邾閽人求肉而夷射姑以杖敲之則以缾水沃庭小人之不可不畜也如此顧榮之分炙而袁絲之忍辱也蓋有由焉若以是而施之出處進退之大節吾道卷舒通塞之要會則病甚矣故曰紀逡所以愧龔勝機雲所以愧張翰而急流勇退錢若水獨為一世之髙士乎唐司空圖棄官歸山谷昭宗屢徴不起栁燦以詔徵之圖懼入見陽為衰野墜笏失儀燦下詔放還君子曰唐末進退不汚者惟圖一人其猶在韓渥之右乎迹近而意逺情疏而罪微此蔡邕伍瓊周毖之所難也詳味其事想見其人可謂賢哉少不决焉未有不墮其豢坑而落彼利塹矣易曰係遯有疾厲畜臣妾吉九四好遯君子吉小人否何也葉子曰君子以道為卷舒不以其情之愛好為係戀君子以義為進退不以其人之承奉為羈縻是故幾不動則已見幾則明决而必有莫之陵之永貞禍不兆則已知禍則速避而必有不亂羣之髙操是誠以天命之窮通為吾道之興廢以吾道之興廢為一身之行藏者乎此豈小人之所能哉嗚呼兹明道雖為安石之所重而力求罷宋璟雖為二張之所憚而必解相者非夫人之可及也魏元忠不能絶三思李晟不能絶延賞裴度令狐楚不能絶李訓身敗而志未矣易曰好遯君子吉小人否九五嘉遯貞吉何也葉子曰君子不溺於利是故以見幾為明决不離於道是故又以天理人心為正常夫茍觀天祥察地兆驗事幾可以去矣從而不留矣為鳳翔為豹隠為龍潜此其時之美乎然不知其義分之何若耳義安而分宜道貞而時適善之善者也夫茍身潔而倫亂禍免而義虧病則甚焉夫何以去為哉是故知國家之必亡念宗祀之為大不在乎髙蹈逺引之為潔而顧惟至誠惻怛之不忘者箕子之正也知吾道之終廢念君徳之難忘見幾明决之中而不失忠厚之意超然逺去之下而恒存不得已之心者孔子之正也其次髙哀之去宋子臧之去曹不失貴愛其身以存道庶幾免焉耳不然主憂臣辱主辱臣死君子豈輕於一决哉易曰嘉遯貞吉上九肥遯无不利何也葉子曰犧牲之被以文繡而食以稻粱也豢日肥而死日迫君子之逺於榮􅂠而脱於患害者行無碍而志無牽從容而閒雅維裕而維休若鳳凰翔於千仞之上斥鷃得而笑之痀瘻丈人不得而掇之也若應龍潜於千仞之淵蝦蟇得而狎之劉累不得而豢之也故曰蛟龍能神於雲雨不能為人用鳳凰能瑞於王者不能為人畜李太白以天成之才能神於為文異人之表能瑞於當世始投袂而来竟解組而去所謂不能人用與人畜也噫非介石洗心者安得而與於此乎孔子不脱冕而行孟子浩然有歸志是以申屠蟠前知黨錮之禍後識董卓之敗而獨確守清操不移髙潔之志故處亂世而介然不汚其亦可謂一世之髙士矣司馬孚武攸緒亦庶幾焉易曰肥遯无不利大壯利貞何也葉子曰明明在朝穆穆布列不患吾道之不行惟患吾氣之太盛昔者唐虞之世中天而起應運而興二十二人時亮天工盛亦至矣而究其所為則惟在璣觀衡以察天文之變巡狩朝覲以正人事之常封山濬川以會地理之紀謹刑屏惡以清世道之機而多事無擾焉四兇可罪也而流之放之殺之殛之三苗可征也而分之北之未始恣情而侈氣焉何也乗時以作威則威起而時蹶依勢以生事則事擾而勢傾循環之理也曷觀唐宋之事乎唐末士大夫深疾宦官事有小相渉則衆共棄之建州進士葉京嘗與武宣軍宴識監軍面既而返第遇之於途馬上相揖因之謗議諠然沈廢終身其不相悦至此卒至水火之怨搆而白馬之禍不可解矣宋慶厯之治未幾而元老大臣相繼罷去熈豐用事之臣退休散地怨入骨髓隂伺間隙而諸賢不悟各為朋黨以相訾議卒致熈豐紹聖之禍然則君子之道不長盛豈盡小人之罪哉易曰大壯利貞初九壯于趾征凶有孚何也葉子曰動凶而静吉躁危而順安君子之戒也荀子曰螾無爪牙之利觔骨之强上食埃土下飲黄泉用心一也蠏六足二􅢗非蛇蟺之穴無所寄托者用心躁也是故無㝠㝠之志者無昭昭之明無痻痻之事者無赫赫之功然則君子具强毅之資當盛陽之世强征而果成孰曰不宜者而不免於困焉何也在下而妄動祗以罔困也南蒯之欲去季氏賈誼之欲去絳灌去乎哉易曰壯于趾征凶有孚九二貞吉何也葉子曰畏天者不犯難樂天者不侈私君子所以順理勢之宜也是故居得致之位操可致之權挾能致之勢宜其暢然為之以展才猷之施矣然乃循循然以中道而自持守常分而不越非魏元忠之再相而依違無所建明裴度之晚節浮沉而為自安之計也天下之事勢未盛可以振威勢已盛矣不宜太侈大勢在我而復震矜之不幾於敗天下之事乎昔者齊桓公合八國之師而聲罪致討以振中國之威舉江黄之衆而按兵不動以為八國之援師已强矣然惟以律用之而不暴及楚人已服使屈完來盟又必以禮下之而不驕晉悼公圍彭城而天下懷其義城虎牢而天下畏其威宜可横行江漢以肄楚矣然乃用智武子之謀而不與楚戰聽魏絳之計而專務息民良有以也不然若晉錮欒盈以叛曲沃楚迫巫臣而疲於奔命則激亂召災取禍之道矣唐代宗之於僕固懷恩不能慎之於始以結其忠義之心至於懷恩反而重恤其母猶念其子雖其姑息之政不足以振天下之威而寛仁之念其所以羈縻險陂之心者良亦多矣不然其不増亂而益敵者不亦希乎易曰貞吉九三小人用壯君子用罔貞厲羝羊觸藩羸其角何也葉子曰和順於道徳而理於義徳性之用事也不以徳性而以血氣不由道徳而由剛勇幾何不率意以妄行肆然而無所忌憚乎故曰君子有勇而無義為亂小人有勇而無義為盗喜於鬭而狃於勝釁於勇而嗇於禍盗也視天下之人不足與惟其意而莫之禁畏焉亂也其不折而屈敗而撓者天下有是理乎行之以道義所當行而意氣不免焉若司馬光忿然於蘇軾之諫拂意於范純仁之議而持之益堅猶不免於畢仲游之憂而况行之以不正加之以暴厲者乎動焉而必括進之不足以解天下之紛拏欲罷而不能退之不足以遂一身之髙致斃焉而已矣斯陽處父灌夫之徒之所以卒為禍也與周虓亦然苻堅遣楊安宼梓潼太守周虓固守涪城遣歩騎送母妻趣江陵朱彤要而獲之虓遂降堅欲以為尚書郎虓曰蒙晉厚恩但老母見獲失節於此母之獲全秦之惠也雖公侯之賞不為榮遂不仕每見堅或箕踞而坐呼為氐賊常值元會儀衛甚盛堅問之曰晉朝元會與此何如虓攘袂厲聲曰么麽相聚何敢比擬天朝秦人以虓不遜屢請殺之堅待之愈厚此雖心不能屈然非堅之能容則不足以成殺身之仁而亦非所以為仁親保母之道矣易曰小人用壯君子用罔貞厲羝羊觸藩羸其角九四貞吉悔亡藩决不羸壯於大輿之輹何也葉子曰聖人與世推移而俗士苦不知變是故世之衰也剛為主不剛而柔則為佞姚崇之通不可以語宋璟之正者此也世之治也柔為主不柔而剛則為激魏相之直終不如丙吉之寛者此也然則當盛陽之世主治道之盟其可不知柔和平易之道乎昔者酆舒問於賈季曰趙衰趙盾孰賢對曰趙衰冬之日也趙盾夏之日也夫冬日之可愛孰與夏日之可畏然而盾衰之政則後人能先後之故漢之賢相稱蕭曹而清净寧壹之外無他事唐之賢相稱房杜房杜之所為不過用法寛平聞人有善若已有之不以求備取人不以己長格物而已至於宋趙普張齊賢王旦呂夷簡諸公所以培一代之元氣而開數百年之基業者大要以含宏寛厚為設施奉布而已故當其時小人之怨不作君子之難不興出入无疾而朋來无咎豈非世道之慶而物莫能格者邪彼昏不知而倖倖自得其去理道逺矣此好剛使氣雖以㓂凖之賢而猶不滿於仁明之主也易曰貞吉悔亡藩决不羸壯于大輿之輹六五䘮羊于易无悔何也葉子曰魚不可脱于淵國之利器不以假人老氏之名言也是故淮南子曰衛君役子路權重也景桓臣管晏位尊也怯服勇而愚制知其所托勢者勝也故攝權勢之柄者其於化民易矣是故古之人君以經邦國則有治典以安邦國則有教典以平邦國則有政典以詰邦國則有刑典故曰惟辟作威惟辟作福威福既亡何以抵觸鄭莊公既無徳政又無威刑不能觸子都鄭簡公不明大典不舉大辟不能觸駟黑漢元帝牽制文義優柔不斷不能觸恭顯唐文宗好賢文雅優游不斷不能觸良𢎞晉元帝恭儉有餘而明斷不足不能觸王敦其何以為天下君哉唐代宗茸然非英主也然能殺李輔國以攄二帝之忿逐程元振以紓四方與諸將之怨其視肅宗之姑息蓋少瘉矣故曰王命壅廢竊位專邑而不能討嫡庶混淆基禍産亂而不能辯國柄下移擅興專决而不能収敗綱隳紀卑心狹志則逺近聞之而解體奸雄見之而窺伺謀動其國家禍亂四起而亡無日矣故曰君徳貴剛惟剛則勇於進徳力於行道明於見善力於改過主善必堅去惡必果建天下之大公以破天下之衆私聲色不能惑隂邪不能奸矣故亡漢不以成哀而以孝元亡唐不以穆敬而以文宗皆不剛健之過也昔者桓公問於管仲曰寡人有大惡三其尚可以為國乎寡人不幸而好畋晦夜而至禽側寡人不幸而好酒日夜相繼寡人有汚行不幸而姑姊有不嫁者對曰惡則惡矣然非其急者也公作色曰此三者且可則烏有不可者矣對曰人君惟優與不敏為不可優則亡衆不敏則不及事又曰人主猛毅則伐懦弱則殺輕誅殺人謂之猛重誅殺人謂之懦輕誅者殺不辜重誅者失有罪上殺不辜則道正者不安上失有罪則邪行者不變道正者不安則才能之人去亡邪行不變則疑有外難羣臣朋黨則疑有内亂又曰萬物尊天而貴風雨者為其莫不受命焉為其莫不待風而動待雨而濡也若使萬物釋天而更有所受命釋風而更有所仰動釋雨而更有所仰濡則無為尊天而貴風雨矣今人君之所尊安者為其威立而令行也其所以能立威行令者為其威利之操莫不在君也若使威利之操不專在君而有所分散則君日益輕而威利日衰矣故曰三經既飭君乃有國嗚呼仲蓋有以識此矣雖然與其為唐徳也寧為代與其為秦政項籍也寧為周平易曰䘮羊于易无悔上六羝羊觸藩不能退不能遂无攸利艱則吉何也葉子曰天下無必可為之事也知道者静以俟時焉而已楚伐鄭欒書救鄭與楚師遇於繞角楚師還知武子不與之戰而侵蔡知俟時而動不妄也志狠而冥行則為趙同趙括之請戰矣徒怒楚而不能克不能敗其二縣而辱已甚不幾於吳師之不能退乎天下無必不可為之事也有志者竟成焉耳楚圍鄭晉師救鄭楚子北師次於郔將飲馬於河而歸伍參欲戰曰此行也晉師必敗君而逃臣若社稷何改轅而北遂成勝邲之功能竟成而無待也才弱而質柔則為子反孫叔敖之不進矣成師以出聞敵强而避之不幾於晉之餘師不能軍乎能者無是也是知天下事固非狠志者所能理亦非弱才者所能成既無先見之知不能引身以養恬徒壯其趾而已矣旋歩不可得狠志無益也又無克亂之才不能允升以畢志徒熱其中而已矣一步不可行弱才足恥也始之不能自靖以収量已之明終之又不足以自獻而成及物之利是為兩敗而俱傷矣古之人有犯之者殷浩是也君子夫亦自反而已乎詩曰思其終也思其反也困而反於法則反而得其本心其庶幾焉易曰羝羊觸藩不能退不能遂无攸利艱則吉晉康侯用錫馬蕃庶晝日三接何也葉子曰遇也語云功蓋天下者不賞若之何而不賞乎時之暗則忠不揚君之愎則誠不達臣工之多忌則心不宣是以子胥劔刎韓彭葅醢裴寂劉文静譛死岳飛矯殺而况其他乎張華以文學才識名重一時又有伐吳之謀其功益懋而以忤㫖出為幽州都督華循撫華夏譽望益著晉武欲徵之而復為馮紞之所沮康承訓敗賊將於鹿塘進平徐泗功蓋一時朝廷且以帥河東而宰相路巖韋保衡乃誣其逗撓不進又貪擄獲不時上功貶為恩州司馬五代梁王瑱遣王檀襲晉陽晉代北故將安金全退居太原徃見張承業請受庫甲擊却之李嗣昭亦遣牙將石君立將騎救之朝𤼵上黨夕至城下夜與安金全等分出諸門擊梁梁兵死亡十二三晉王存朂以䇿非己出故不行賞唐莊宗滅梁功臣有百戰未得刺史者而伶人陳俊儲徳源以周匝一言與之噫信非舜之覲四岳大禹之㑹萬國安能大舉旌颺甄録之典乎是故晉侯捍王於艱賜之秬鬯一卣彤弓一彤矢百盧弓矢千馬四疋上也漢髙之元功十八位光武之雲臺二十八將唐太宗之凌煙閣二十四人次也雖然屯膏吝賞固不足以成功予取予求不女瑕疵亦不可以馭世惟盡變通之利以盡鼓舞之神固不掩人之功使之忿且懟亦不輕我之賞使之怠而驕斯則善之善者耳子房之相漢髙至矣其次吾有取於王猛苻氏焉猛入晉陽遣將軍徐成覘燕軍失期將斬之鄧羌固請弗許羌怒將攻猛猛赦之羌詣猛謝猛執其手曰吾試將軍耳於郡將尚爾况國家乎既而望見燕兵之衆謂羌曰今日非將軍不能破勍敵將軍勉之羌曰若能以司𨽻見與者公勿以為憂猛曰此非吾所及也必以安定太守萬戸侯相處羌不悦而退俄而兵交猛召羌羌寢弗應猛馳就許之羌乃大飲帳中與張蚝徐成等躍馬運矛馳赴燕陣出入數四旁若無人卒破燕而滅之此正駕馭之術靳之非所以為吝予之非所以宣驕者也明此而後知養虎養鷹之説酬徳報功之典易曰晉康侯用錫馬蕃庶晝日三接初六晉如摧如貞吉罔孚裕无咎何也葉子曰適來時也適去順也安時而處順哀樂不能入者君子也何則昔者孔子論詩至於正月之六章戄然曰不逢時之君子豈不殆哉從上依世則廢道違上離俗則危身世不為善己獨由之則曰非妖則孽也故賢者不遇時嘗恐不終焉雖然君子道窮命矣故潜龍不見是而無悶闗雎哀周道而不傷蘧瑗持可懐之智寗武保如愚之性咸以全命逺害不受世患故大雅曰既明且哲以保其身若屈原之廢不平其心而露才揚已競乎危困羣小之間責數懷王怨惡椒蘭神苦恩强非其人忿懟不容沈江而死君子以為褊潔狂狷之士而非中行之哲矣豈樂天知命之道哉故揚子有言山梁之肥其得意乎或曰囬之簞瓢臞如之何曰明明在上百官牛羊亦山雌也闇闇在上簞瓢捽如亦山雌也何其臞千鈞之輕烏獲力也簞瓢之樂顔氏徳也然則樂天而知命者知之深安土而敦仁者仁之篤夫亦何熱心而壯趾哉仲尼所以抗浮雲之志顔子所以甘飲水之樂孟子所以養浩然之氣者有由然矣不然其不為周之老叟漢之顔駟矣乎周人有仕數不遇年老泣於塗者人或問之何為泣乎對曰吾年少時學為文文徳就吾主好用老及嗣王立用武吾更為武武節甫就而少主又嗣立好用少吾年又老是以未嘗一遇漢武帝輦過郎署見顔駟龎眉皓髪上問曰叟何時為郎何其老也答曰臣文帝時為郎文帝好文而臣好武景帝好美而臣貌醜陛下好少而臣已老是以三世不遇上擢拜會稽都尉嗚呼此君子所以貴特立不變至老而不肯狥時好也故曰君子得時則大行不得時則龍蛇遇不遇命也詩曰邂逅相遇適我願兮何以狥時為哉昔者卓茂為密令上下皆嗤其不能河南郡至為置守令茂不以為嫌治事自若數年治行大著尋遷京郡丞及王莽居攝以病免歸光武即位訪求茂詔曰夫名冠天下當受天下重賞遂以為太傅褒徳侯夫一茂之身始而上下皆嗤其不能者此一人也終而名冠天下以明天子為知己者亦此人也則君子亦求其在我而已矣何必計區區者於旦夕哉易曰晉如摧如貞吉罔孚裕无咎六二晉如愁如貞吉受茲介福于其王母何也葉子曰小人進而喜其心曰爵禄可以肥其家也威福可以行乎人也君子進而愁其心曰道不足以澤天下力不足以進君子退小人吾何以進為哉漆雕開辭孔子之使閔損逃汶上之招道不足也薳子馮辭令尹之位蔡謨辭司徒之職富弼辭翰林學士之拜司馬光辭樞宻之命力不足也若曰寧曳尾於塗中君子亦弗為之矣昔者魯欲使樂正子為政孟子曰吾聞之喜而不寐府檄以毛義守安陽義奉檄而入喜動顔色嗟乎君子豈固不樂於一行哉然則若之何而可脩夫徳而畜其道増其能而益其智待其時而乘夫㑹進无咎矣不曰伸者屈之推藏者顯之致乎和氏之璧韞於石隨侯之珠藏於蛤乆將含景曜吐英精曠千載而流光也應龍之神潛於淵北溟之鯤伏為魚乆將奮靈徳合天地超忽荒而據蒼昊也古人之言曰山髙而不崩則祈羊至矣淵深而不涸則沉玉極矣豈不信乎然則亦何終患其不能澤天下進君子而退小人乎是故始晦而後光者異物之神時暗而乆章者君子之道易曰晉如愁如貞吉受兹介福于其王母六三衆允悔亡何也葉子曰道毁于獨成行衰于寡黨故曰騰蛇逰霧而動應龍乘雲而舉猿得木而㨗魚得水而騖又曰田里相併木蘭同行知勇相咄雄豪困屈公孫𢎞側目而視固則轅生亟謝病歸蘇子瞻玩侮伊川伊川遂罷經筵故雖君子而為衆所嫉不足以成功才不足以自㧞行未足以專成茍有英傑之推引衆類之援助亦足以自効於尺寸矣蒼蠅之飛日不過歩得驥尾而附之不知其幾千百里也然則取信於善類者同升諸公之㑹見與於時髦者牽復在中之機不信於友不獲於上矣豈不信哉韓信不信於三軍而信於蕭何之輩郤缺不信於晉國而信於胥臣之徒然後得以行其志而殫其才耳彼二人者尚然而况其他乎故曰心志通矣而名譽不彰友之罪也名譽彰矣而有司不舉有司之罪也有司舉之而王者不用王者之過也易曰衆允悔亡九四晉如鼫䑕貞厲何也業子曰古之大臣以身狥國者處爵位若𫝊舍故曰令尹子文三仕為令尹無喜色三已之無愠色若鄙夫之事君則一得而患失之矣故曰以富貴為事者不能讓禄以榮顯為事者不能讓名親權者不能與人柄操之則慄舍之則悲而一無所鍳以闞其所不休者是天之戮民也何也一恐賢者之形其短一恐寵人之奪其權一恐衆人之攻其惡一以鈎注之憚黄金注之昏以操其心臧文仲知栁下惠之賢而不與立元稹無惡於裴度但以度先達重望恐其復有大功妨已進取故與魏𢎞簡深相結於度所奏軍事皆從中沮之此懼其短之形也李斯恐趙髙之奪其位也拱手以聽髙之所為惟其言而悉唯唯孔光以董賢之寵能談笑移人主意遂以丞相之尊望風下拜此畏其寵之奪也李林甫欲蔽人主視聽自専大權明召諫官謂曰今明主在上羣臣將順之不暇烏用多言諸君不見立仗馬乎食三品料一鳴輙斥去皇甫鎛拜相制下朝野駭愕至於市道負販者亦嗤之鎛自知不為衆論所容益為巧諂以自固此懼其惡之見攻也張禹身為師傅朝廷所敬信末年深畏王氏乃諂言詭道以相結郭崇韜出將入相寵極畏誅則諂立劉美人為后以自樹黨而敗防此金注者之昏也無所徃而不畏無所為而不可斯天下所以傾覆而不覺也故曰事君有大忠者有次忠者有下忠者有國賊者不恤君之榮寵不恤國之臧否偷合茍容以之持禄養交而已若曹觸龍之於紂是國賊也夫何利哉易曰鼫䑕貞厲六五悔亡失得勿恤徃吉无不利何也葉子曰君徳以剛為主而柔道亦可以致治安明君以徳為務而先業亦所賴以馮藉周之成康漢之恵文乏剛毅矣而寛裕温柔其臨民也簡成康在周恵文在漢非至徳矣而流仁遺澤其在人也深則其履太平之盛業而為周漢之賢君使後世稱仁焉亦宜矣故曰善人為邦百年亦可以勝殘去殺矣又曰三代之主豈無僻王賴前哲以免之也而劉頌上䟽晉武曰創業之君在於立教定制使遺風淑人心餘烈匡幼弱後世憑之雖昏猶明雖愚猶知乃足尚也噫此常徳亦可以臨民而先澤亦足以憑藉也歟然不患柔之不可有為也而患其柔而躁動不患時之不足得民也而患於乘時而妄動古今墮是良亦不少是故周降一代則為穆滿之八駿南征徐偃西伐犬戎而荒服不至矣漢下一君則為武帝之雄畧西開牂牁越巂北置酒泉張掖而天下騷然矣嗚呼彼豈知休養生息乃併包八荒之規模恊順懷柔即囊括四海之度畧邪此成康恵文之所以超古今而猶盛而韋貫之屢請先取吳元濟後討王承宗謂憲宗曰陛下不見建中之事乎始於討魏及齊而蔡燕趙皆應之卒致朱泚之亂由徳宗不能忍數年之忿欲望太平之速成故也嗚呼貫之有以識此矣易曰悔亡失得勿恤往吉无不利上九晉其角維用伐邑厲吉无咎貞吝何也葉子曰君子不病乎剛而病於剛之不中乎義理不絀乎威而絀乎威之不行於荒陬昔者齊宣王謂孟子曰寡人有疾寡人好勇孟子對以王請無好小勇亦如文武大之以安天下之民則民惟恐王之不好勇也嗟乎君子臨民之上而有赫然之怒也則雷霆所撃無不摧折何所當而不勝哉然怒不𤼵之義理而逞於血氣則怒雖盛而及不逺矣其剛不行天下之廣而秪貫包中之魚夫豈君子之光乎是故桓王之伐鄭定公之圍成君子以為陋矣而何大勇之足言故曰成師以出而敗楚之二縣何榮之有焉下至晉景公不能討陳救宋而滅赤狄潞氏不能攘楚争霸而滅甲氏留吁魯成公不能强於自治而㑹齊伐萊不能興師克敵而㑹晉伐郯春秋所不貴也易曰晉其角維用伐邑厲吉无咎貞吝明夷利艱貞何也葉子曰天運之升降有晦明世道之隆污為治亂危言而危行直躬而履方君子所以順治亂焉道傷而不保其身真替而不有其仁君子亦將如之何哉飾知以驚愚修身以明污昭昭乎掲日月而行過也舉世皆濁掘其泥而揚其波衆人皆醉餔其糟而歠其醨鄙也其惟聖人乎諗消息盈虗之運察進退存亡之幾遇變而通行權而不失其正者其惟聖人乎是故含章而可貞沉晦以免患於土皆安而無所避於我皆真而無所妄斯其所以通天下之變而不失其常適順時之宜而歸於道者也昔者紂之無道極矣逺而傷天下以及文王近而傷一家以及箕子文王箕子不以恧免難亦不以固傷生也内達夫吉凶禍福之原外盡夫化裁變通之道身蒙夫塵垢汚辱之耻而心即乎天理人心之安潔其道而穢其迹清其質而濁其文弛張而不為邪進退而不離羣其所以思周變通而用心之極以處亂世而解傷狀者其道為何如邪故曰濁世不可以富貴也故薄遊以取位苟出不可以直道也故頡頏以傲世傲世不可以垂訓也故正諫以明節明節不可以久安也故詼諧以取容不然幸則為王允之不幸則為鄭小同去死無幾矣詭則為祭仲之以知巧則為里克之中立違道則逺矣故曰鐸以聲自毁燭以明自爍虎豹之文來射猿狖之㨗來捕子路以勇死萇𢎞以知困能以知為知而未能以知為不知也故行險者不得履繩出林者不得直道夜行瞑目而前其手事有所至而明有所不害故曰人能貫冥冥入於昭昭可與言至矣嗚呼斯文王箕子之所以為聖乎詩曰民之多辟無自立辟權也𫝊曰聖達節幾也權與幾其殆庶幾乎非天下之至精其孰能與於此易曰明夷利艱貞初九明夷于飛垂其翼君子于行三日不食有攸往主人有言何也葉子曰危邦不入而亂邦不居者君子去就之潔也既明且哲而災及其身者時義適然之遭也忠而見疑賢而得謗世䘮道而時賤士君子則亦超然而逺遯翻然而髙舉矣豈知物不我貴則莫之與而傷之者之必至乎是故鴻鵠髙飛一舉千里羽翼既就横絶四海是曰冥冥弋者何簒焉而蒼冥决起挾彈相驚非意之擾卒不成其千仞之志矣是故不舍爵不食炙不枕輿浩然而長徃是曰蟬蜕污泥之中以浮逰塵埃之外矣而議於宋惡於吳嘖有煩言舎者争席棼紛乎所如之不合終安能遂其脱然之願哉故明日遂行知幾其神矣而絶糧於陳有馬十乗棄而違之矣而猶吾崔子固知聖人不能違時時不避聖人故程子曰穆生去楚避胥靡之禍也而申公白公以為忘先王而責小禮袁閎潛身土室避黨錮之禍也而人笑以為狂君子之不免於傷也如是哉易曰明夷于飛垂其翼君子于行三日不食有攸往主人有言六二明夷夷于左股用拯馬壯吉何也葉子曰君子避傲色非樂諂也惰容之著鉗市之漸也其次避違言非説諛也煩言之咋及腕之幾也是故一支之傷猶可行也不行則遍四體而及心腹死亡不立至乎死亡之患當速救也不速則自貽戚而坐待斃知者固若是乎孟子曰無罪而殺士則大夫可以去無罪而戮民則士可以徙故簡子殺鳴犢孔子臨流而不濟商紂剖聖心微子去之而不顧蓋生全出於明哲而死亡由於沉溺也嗚呼快馬負健兒秦公子得以横絶乎荒漠瘡痍得快馬飛將軍不亦奔死而逃生乎古之人有行之者錢若水是已太宗每見若水謂之曰呂蒙正望得眼穿矣又曰曽見蒙正否曽涕泣否若水知太宗之驕而待其臣下之薄他日必有城旦之禍遂致其仕去嗚呼穆生之後舎斯人吾誰與歸乎易曰明夷夷于左股用拯馬壯吉六三明夷于南狩得其大首不可疾貞何也業子曰暗君在上而有順事之臣者人也君暗於上而有伐暴之師者天也人以常處天以變處故曰伊尹卷道於夏而建功於殷非昧君臣之分也道正天下而不狥乎邪或違或從不得已而就制事之義焉耳桀如能從而不必求之湯則一徳之恊湯且効為徳為民之美矣其如謂人莫已若何哉箕子輟諫於殷而陳法於周非反親疎之屬也道公天下而不秘於私或拒或納不得已而就行權之巽焉耳紂如能納而不必得之武王則九疇之授武王且遵作福作威之戒矣其如罔有悛心何哉是故易窮則變變則通通則久是以自天祐之吉无不利雖然君臣之分等之天地天人之間間不容髮於應天順人之際而實寓不得已之心於救民水火之中而猶懷冠履之念斯聖人之所以為聖也故曰恭行天罰殺商勝紂觀兵孟津須暇五年豈有一毫仁不至而義不盡哉然必以甲子至者非與武王伐紂至鮪水殷使膠鬲候周師武王見之鬲曰西伯將何之武王曰將之殷也膠鬲曰朅至武王曰將以甲子至殷郊子以是報矣膠髙行天雨日夜不休武王疾行不輟軍師皆諫曰卒病請休武王曰吾以令膠鬲以甲子之期報其主矣今甲子不至是令膠鬲不信也其主必殺之吾疾行以救膠鬲之死也武王果以甲子至殷郊殷已先陳矣因戰大克之夫掩襲而取之不義也悞報致期而使賊其使不辜也行一不義殺一不辜而得天下武王又肯行於當日命絶之時哉雖然征誅大事也兵戈凶器也宜慎重而不宜亟肆豈特施之君臣之大分而己哉晉文始入而教其民二年欲用之子犯曰民未知義未安其居於是乎出定襄王入務利民民懷生矣將用之子犯曰民未知信未宣其用於是乎伐原以示之信民易資者不求豐焉明徵其辭公曰可矣子犯曰民未知禮未生其恭於是乎大蒐以示之禮作執秩以正其官民聽不惑而後用之吳伐州來楚令尹子旗請伐吳平王不許曰吾未撫人民未事鬼神未脩守備未定國家而用民力敗不可悔既而使然丹簡上國之兵於宗丘且撫其民分貧振窮長孤幼養老疾収介特救災患宥孤寡赦罪戾詰奸慝舉淹滯禮新叙舊録勲合親任良物官使屈罷簡東國之兵於召陵亦如之好於邊疆息民五年而後用師夫敵國之師不敢擅興如此而况施之天澤之際哉霸者之兵不敢輕舉如此而况出之聖人之身哉易曰明夷於南狩得其大首不可疾貞六四入于左腹獲明夷之心于出門庭何也葉子曰適也何則君子之避亂也入山惟恐其不深不得深山而居之而後入山之初志乖矣入林惟恐其不宻不得宻林而居之而後入林之初志爽矣何也𤼵足之辰翺翔萬里以為志出門之時肥遯天涯以矢願莫有衡門以棲遲不得泌水以樂饑其初心始志果安在哉子臧去曹之亂逃奔於宋避非其地而去國不逺故國人得以授子臧而請曹伯晉人得以據曹伯而求子臧卒之復歸其國致邑與卿而不出豈臧之本心哉碩䑕之首章曰逝將去汝適彼樂土樂土樂土爰得我所其卒章曰逝將去汝適彼樂郊樂郊樂郊誰之永號君子之避患也得幽居安土而居之初心安有不得而素志安有不愜哉災禍所不及徵求所不加其梅福之吳市管寧龎萌之遼東夏馥之林慮山中乎邵平髙於四皓以商山有帝書而𤓰田非束帛之所加也申屠蟠賢於郭泰則以梁碭為絶迹而口舌乃倒履之所及也是故東坡漸喜不為人所識而菰米蓴羮鱸魚膾為豪傑之所適志者與易曰入于左腹獲明夷之心于出門庭六五箕子之明夷利貞何也葉子曰君子亦欲潔其身而未嘗忘大倫亦欲成其知而未始乖大義君臣父子之謂倫君臣可去也而父子不可離也貴戚異姓之謂義異姓可違也而貴戚不可舎也守不泥而變設經不執而權行聖人有微幾焉是故宗社傾覆身與其難知貴戚之義當如此被髮徉狂甘為囚奴知宗臣之分當如此晦其外而固昭其内明可晦而必不可息此所以蒙内難而不失其正也傳曰比干諫而死箕子曰知不用而言愚也殺身以彰君之惡不忠也二者不可然且為之不祥莫大焉遂被髪徉狂而去君子聞之曰勞矣箕子盡其精神竭其忠愛見比干之事免其身仁知之至詩曰人亦有言靡哲不愚易曰箕子之明夷利貞上六不明晦初登于天後入于地何也葉子曰天作孽猶可違自作孽不可活書曰夏王滅徳作威敷虐于爾萬邦百姓爾萬邦百姓罹其凶害弗忍荼毒並告無辜於上下神祗天道福善禍淫降災於夏以彰厥罪又曰商王受昏棄厥肆祀弗答昏棄厥遺王父母弟不迪乃惟四方之多罪逋逃是崇是長是信是使是以為大夫卿士俾暴虐於百姓奸宄於商邑今予發恭行天之罰嗚呼自古及今始也不仁而在髙位遺患於下終也壅罪而天降罰卒為獨夫者豈一二乎故曰信明聖者皆受天賞使不能為惛為忘而忘也者皆受天禍昔者魯哀侯棄國而走齊齊侯曰君何年之少而棄國之早魯哀侯曰臣始為太子之時人多諫臣臣受而不用也人多愛臣臣愛而不近也是則内無聞而外無輔也是猶秋蓬惡於根本而美於枝葉秋風一起根且㧞矣不撫其民不可以五稔虢君之所以亡汰而愎諫不可以十年楚圍之所以死太史公曰楚靈王方會諸侯於申誅齊慶封作車􅂠臺求周九鼎之時志小天下及死於申亥之家為天下笑操行之不得悲夫勢之於人可不慎與易曰不明晦初登于天後入于地葉八白易𫝊卷九
