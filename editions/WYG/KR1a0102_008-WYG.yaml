body:
  text: 葉八白易傳卷八明葉山撰習坎有孚維心亨行有尚何也葉子曰順境之値也君子未始不履平康正直之事而操坦夷寛廣之心也迫患難而行險儌倖之機起遭險釁而閔窮畏禍之心生矣以戚戚之憂心而出瑣瑣之危機難不已甚乎孰知安土而敦仁是為誠其身樂天而知命是曰無心病處險之道誠無過是者傳曰素患難行乎患難不其至乎昔者葉公子髙問于仲尼曰事若不成則必有人道之患事若成則必有隂陽之患若成若不成而後無患者惟有德者能之子其有以語我乎仲尼曰天下有大戒二其一命也其一義也子之愛親命也不可解于心臣之事君義也無適而非君也無所逃于天地之間是之謂大戒夫是以事其親者不擇地而安之孝之至也夫事其君者不擇事而安之忠之盛也自事其心者哀樂不易施乎前知其不可柰何而安之若命德之盛也為人臣子者固有所不得已行事之情而忘其身何暇至于悦生而惡死是故焚廩實井舜之遭變亦極矣而牀琴之樂不塞喜樂之常不失坐見頑嚚格而傲蒸蒸為天下君矣舜豈久于患難者哉孔子圍于匡七日而弦琴不輟匡人其如孔子何故曰困而不失其所亨徃有功也下至晉文公罹外之患十有九年艱難險阻備嘗之矣然且劬劬然以仁親為寶而不以得國為心秦召之而不敢入也方懷安溺處若將為没世之羈者何其行之脫然而心之廣浩矣及其時至而運起則一戰而勝歸為霸主功在王室澤在生民何其偉也然則新亭之傷心而揮淚杜陵之歎老而嗟卑志亦末矣豈知聖人所以處憂患之道哉易曰習坎有孚維心亨行有尚初六習坎入于坎窞凶何也葉子曰居患難之時無行乎患難之道生極亂之世無撥亂反正之才其何能淑載胥及溺而已矣晉王衍奉東海王䘮還𦵏石勒率輕騎追之無一人得免者執衍等坐之幕下問晉故推墻而殺之唐末朝士三十餘人貶官于白馬驛而朱全忠一夕盡殺之其殆類是乎易曰習坎入于坎窞凶九二坎有險求小得何也葉子曰易以成天下之功者才也才具矣而功之不易成者時也易以溺天下之才者難也難殷矣而猶有可以紓者機也時者運之遭機者道之濟是以未脫戰鬭擾攘之禍而尚在播遷流離之中適際天與人歸之會而暫得弛擔息肩之地古今不可謂無是也劉𤣥德爭荆州未得而法正來迎其殆才以時厄而難以機紓者乎然可以棲一身而未可以窺中原可以息一時而未可以定四方又安得出險之中哉易曰坎有險求小得六三來之坎坎險且枕入于坎窞勿用何也葉子曰昏暗而不足以審幾柔脆而不能以振拔行乎太平之世有蹶歩焉況重險之地乎進之逢猛虎之咥人退之遇深淵之滅頂前有兇嘯而不可支後有讒賊而不克避左右皆坑谷也將何用哉終身憂辱以陷于死亡而後已其漢末黨人之儔乎黨人生昏亂之世値閹人切齒之秋遇靈帝不辨菽麥之主不知藉茅儉德之道而漫為口說之騰臧否人物汚穢朝廷撩蛇虺之頭踐虎狼之尾以至身被滛刑家成破毁不亦悲乎易曰來之坎坎險且枕入于坎窞勿用六四樽酒簋貳用缶納約自牖終无咎何也葉子曰君臣之義無所逃于天地之間而咸有一德自不必乎儀文之侈故多儀不享也而禮之薄者誠自存文飾不尚也而誠之益者道自寓然則多難之地患合之無自耳同心同德又何七介以相見三辭三讓而後至邪淮南子曰强哭者雖病不哀强親者雖笑不和情發于中而聲應于外故釐負覊之壺飱愈于晉獻公之垂棘趙宣孟之束脯賢于智伯之大鍾何也禮豐不足以效愛而誠心可以懷近此事君之節也知事君之節則知進言之方是故攻其所蔽者說雖百而不行因其所明者語未畢而已悟故溺愛之私不足煩談說也而善端之𤼵見所當知過正之失不必費詳辨也而本心之明覺所當識然則多故之秋患未有所遇耳既戒既孚又何强之以所不欲聞而聒之以所不能察耶何也程子曰訐直强勁者率多取忤而温厚詳明者其說多行故四老人之力孰與張良羣公以及天下之士其言之切孰與周昌叔孫通然而不從此而從彼趙王太后愛其少子長安君不肯使質于齊大臣諫之雖强而不聽左師觸龍以自托于趙長久富貴之說通之則受命如響漢文思頗牧之為將馮唐因言魏尚之廢而復其守晉武思諸葛之為臣樊建因白鄧艾之寃以官其孫崔𤼵獲罪中人李渤張仲方屢千百言不省而李逢吉從容一語敬宗閔然他日欲幸東都給事中諫議積百十疏不聽而裴度從容數語即罷其徃楊炎片言移人主意蔣伸獨對取宣宗相何也心之易為感通而攻其蔽者說不入通其明者言自行爾故曰三老之悟武帝不如千秋之一言五王之復唐嗣不如王慶方之一對易曰樽酒簋貳用缶納約自牖終无咎九五坎不盈袛既平何也葉子曰天下之不能遽平者天也而撥亂以為正壞險以為平者人也愚公之移山精衞之塡海雖其材力之所不能勝而天已哀其誠人已壯其志矣況材力果能勝之者乎是故難之未已者時也漸次除治芟夷而剪除之者才也唐憲宗之初劉闢驕志于三川王承宗負固于河北田興詭順于魏博吳少誠逆志于淮西其時之險尚在也然剛明果斷志平僭亂能用忠謀不惑羣議卒收成功唐之威令幾于復振豈非志力兼舉將能塞其陷以就于平乎易曰坎不盈袛既平上六係用徽纆寘于叢棘三歲不得凶何也葉子曰亂之極天命去而不可挽才之微人事隳而不可支此漢獻帝一刼于董卓而乘輿棄草莽中再刼于汜㴶而饑餓不得食三刼于曹操而惴惴涕泣度日如年卒于華歆之逼而身死不知其處變所從來久矣嗚嗚傷哉易曰係用徽纆寘于叢棘三歲不得凶離利貞亨畜牝牛吉何也葉子曰惟后非賢不又惟賢非后不食君臣之相麗天地之大義也然而有道焉爾惟麯糵爾惟鹽梅期望之正也姑舍女所學而從我則瀆矣責難于君陳善閉邪恭敬之大也事是君以為容恱則媚矣可不愼乎雖然望臣以正君之道也徒持以正而不順之以情不幾于求之太過責之太慇乎漢宣之嚴急唐德之苛迫又君之戒也是故温言以相接和顔色而受之因其飲食聚會而制為宴享之禮式歌鹿鳴湛露以通夫上下之情禮意之凝厚藹然其可掬矣事君以貞臣之分也徒執其貞而不通之以順不幾于强之太甚迫之太深乎鬻拳之以兵諌師經之以琴撞又臣之罪也是故盡禮以為恭有孚以為發因其入告于后而乃順之于外有所將順其美而固曰我后之德心迹之恭純隤然其樂易矣是可以不知乎是以君子愼之焉其惟唐虞之世矣君曰予違女弼而臣即儆之曰毋怠毋荒都俞喜起藹然一堂之上不啻家人父子之相親焉斯後世之所弗及也已嗚呼觀于此而父子之相親兄弟之相叙夫婦之相合朋友之相與道可知矣易曰離利貞亨畜牝牛吉初九履錯然敬之无咎何也葉子曰入危邦而升亂世小人之干祿也無恥不足言也伾文之黨君子黜之久矣居文明之世動觀光之心其君子之急于功名者乎急功名者鎭之以道德之說則可以動其心趨事會者開之以時勢之宜則可以忍其性韓退之三上宰相書而陸敬輿勉之卒為天下斯文之主張横渠獻兵論事而范希文勸之卒為一世大儒之宗廣微魁天下于少年敬仲戒之必念千里生民之計希元以命訊日者和叔教以須忘富貴利達之心是故建安青田俱為百世師此君子之所以貴儆戒也儆而戒之能無進乎曾南豐之論劉向曰向之學博矣其著書及建言尤欲有為于世忘其枉已而為之者有矣何其徇物者多而自為者少也葢古之聖賢非不欲有為也然而曰求之有道得之有命故孔子所至必聞其政而子貢以為非夫子之求之也豈不求之有道哉子曰道之將行也與命也道之將廢也與命也豈不得之有命哉令向知出此安于行止以持其志能擇其所學以盡精微則其所至未可量也是以夫子稱古之學者為已孟子稱君子欲其自得之則取諸左右逢其原豈汲汲乎外哉向之得失如此亦學者之戒也王猛不知此道而以功名事業為急是以桓温一不見知即甘心苻氏為之盡忠奮武幾有中原之地許衡不知此道而敢于以道學之授受為說是以不知間關歸宋而甘心元氏為之慇懃啓導所謂權門之忠公室之賊也嗚呼萬世罪人而豈特一時之悞哉易曰履錯然敬之无咎六二黄離元吉何也葉子曰天子黜𡨕㝠之行士大夫申昭昭之節百官吏人恥舞弄之詐衆庶百姓無奸􅬝之俗君子居其門而不為維皇之極不協于中可乎是故居堯舜之世為堯舜之民者曰百姓昭明協和萬邦黎民於變時雍也居三代之世為三代之民者曰舊染汚俗咸與維新也曰四海之内咸仰朕德時乃風也曰羣黎百姓徧為爾德也然則以三極之矩自持以中庸之道自執非矯戞也居化成之天下率吾性之本然而已矣孔子中行于春秋孟子執中于戰國此則聖賢之出㧞無待而自興者夫故曰衣裳服者不昧于塵途愛也愛衣裳而不愛其容止愛焉而不愛其言行末矣言行愛矣而不愛其明神淺矣故君子本仁為貴神和德平而道通是謂保眞易曰黄離元吉九三日昃之離不鼓缶而歌則大耋之嗟凶何也葉子曰達死生之分者死期將至而不憂劉元城夜半聞鐘聲酣寢而熟睡是也不達死生之分則必畏死畏死則必貪生貪生則必有非望之冀反道之圖儌倖茍免之計矣此豈能免于禍哉鳩摩羅什臨死而令外國弟子誦三番神呪其何益于死乎何也有可挽之天命有當聽之天命目入地而出貞下有元也是可挽也夏少康之崎嶇亂離以期復禹之迹而還舊都商武丁之求賢訪事内反諸已以思王道周宣之撥亂反正命召公伐淮夷申伯仲山甫順天下是也日既中而昃昃盡必夕所當聽也自邑告命延其殘喘則已矣燕丹不知大命之近止而遣荆卿姜維不知炎漢之已替而九伐魏侂胄不知失則之在宋而復金仇曹髦不知血食之非魏而戰闕下旋踵滅矣奚為者哉易曰日昃之離不鼓缶而歌則大耋之嗟凶九四突如其來如焚如死如棄如何也葉子曰善繼者必有遜讓之誠善遜者必有順承之道湯武代虐以寛漢髙除秦苛法興之亟也奚疑焉秦政一夷六國遂滅百王之法項籍逐殺子嬰裂天下以封諸侯獨為霸王何暴惡哉而秦政項籍豈能久也再若劉裕既平南燕忿廣固久不下欲盡坑之以妻女賞將士韓範極諫而止然猶斬王公而下三千餘人没入家口萬餘夫晉自濟江以來威靈不振戎狄横騖虎視中原劉裕始以王師剪平東夏不于此際敬禮賢俊撫慰罷民使羣士嚮風遺黎企踵而更恣行屠戮以快忿心迹其設施曾姚苻之不如宜其不能蕩一四海成美大之業一再傳而即滅也聖人明訓豈茍然而已哉易曰突如其來如焚如死如棄如六五出涕沱若戚嗟若吉何也葉子曰劉向有言存亡禍福其要在身聖人重誠敬愼所忽諺曰誠無垢思無辱夫不誡不思而以存身全國者亦難矣況才不足而時已過者乎何也生于憂患而死于安樂一定之理也故成王興不造之悲則三監之勢自撲勤集蓼之思則殷民之亂旋平齊頃公尊驕蹇怠于其前則敗師而蹙國憂勤悲戚于其後則聲問振諸侯故曰福生于隠約而禍生于得意不可誣也不然何以曰聖王以天下為憂天下以聖王為樂凡主以天下為樂天下以凡主為憂乎易曰出涕沱若戚嗟若吉上九王用出征有嘉折首獲匪其醜无咎何也葉子曰帝王之用兵也若雷霆之擊殺大者逆小者妖螻蟻不及焉是故湯誅其君武取其殘而旁牙小醜誠不足以血聖人之刅也何也天下之大勇所以梟天下之渠雄渠雄滅而天下定矣天下之大知所以照天下之潛慝潛慝察而草薙彌矣奚事纎纎之瑣屑為哉伯者不知此義徃徃遺其大而事其小察于近而昧于逺若齊桓不責鄭突之弑君簒國而為宋伐郳不讓狄人之入衞滅溫而山戎是伐是謂釋斬關而問穿窬不務德而勤逺略晉人不執元咺之訟君乃合十二國而圍許不問商臣之弑父且會諸大夫而伐沈是謂不能三年之喪而緦小功之是察已則流且放而有無齒决之是問其去聖人之知勇不亦逺乎易曰王用出征有嘉折首獲匪其醜无咎咸亨利貞取女吉何也葉子曰大矣哉感應之道乎神矣哉感應之機乎自天地之巨以至螻蟻之微其道貫而不能廢其機神而不自知是故天地交而萬物通君臣交而其志同父子兄弟夫婦朋友交相感應而其情意之相協心志之相諧有不言之妙焉斯天地之大義也雖然感而應應其感者情也天地萬物之所不能外也以理感以理應者其天地萬物之所不可廢者與是故明良之喜起若堯舜之君臣慈孝之流通若文武之父子友恭之篤棐若武周之兄弟唱隨之和協若舜與二妃之夫婦恩義之兼盡若孔顔之朋友斯不失其感應之常矣若曰君臣之媚恱父子之阿諛兄弟之邪佞夫婦之滛姣朋友之燕溺又豈所以為感哉斯不可以語感則有感而必通感通而必正矣斯道也求其天地萬物男女之所由寄君臣上下禮義之所由出舍夫婦奚以哉是故以感通而格有家則為琴瑟之友鐘鼓之樂夫婦之道不苦而室家無相棄之患以亨貞而用女歸則為窈窕之淑君子之逑滛僻之罪不多而居室有交愛之休矣媯汭之降關雎之諷不亦有明徵矣乎不然徇情則有宋伯子之私而不由其道守節則為彭老生之刺而不諧其情矣烏乎可易曰咸亨利貞取女吉初六咸其拇何也葉子曰感于時而欲進者君子觀光尚賔之心也乘其時而上升者資適逢世之會也舜之𤣥德升聞帝曰予聞久矣而復有四岳之共舉太公之鷹揚磻石文王曰我知之舊矣而復有初夜之夢是故厯數在躬而後車以載不終日焉然則才知之士雖有君民之志而草茅無廟堂之雅雖有觀光之願而諸公乏同升之人則亦何所能為也哉日月之就徒切而不脫烟霞之與居塵埃之外之浮㳺徒勤而不免汙泥之與處矣其諸賈誼有經濟之略治安之志而絳灌不讓能方且為長沙之擯仲舒明王道正人心而公孫不推位方且有膠東之行者乎噫此中山公子牟身處江湖之上而心在魏闕之下詹子所以教之重生輕利也易曰咸其拇六二咸其腓凶居吉何也葉子曰不媒而自嫁貞女不為也無召而自行貞士不屑也伊尹有囂囂之志孔明抱槁死之心古之人葢有感之而未遽動者矣況無感而應者乎其為士累孰甚焉傳曰鐘不叩而鳴則妖石非言之物而言則怪士不待感而動枉已甚矣枉已者未有能直人者也張師德兩及相門王拱宸夜過政府其視韋澳之不為呈身御史何如故曰動不如靜之為安進不若退之為潔易曰咸其腓凶居吉九三咸其股執其隨徃吝何也葉子曰君子所以貴于匹夫者不可奪志也其所以大過人者獨立不懼也身則隨人而動不知有吾之身志以隨人為主我不知有吾志若瞽者之附躄若水母之依蝦行止坐起無特操若影之有所待而然而我無與焉曾是以為君子乎古之人有行之者尤仕莽歆仕莽雄以儒者而亦仕莽其視龔勝之義為何如攸從操嘉從操彧以王佐而亦從操其視孔融之節為何若詩曰齊子歸止其從如水士君子不能持挺挺之節而從人之志如水委地而不可收何其負天下之義哉嗟乎彼豈以富貴貧賤懷其志死生利害怵其𠂻以為隨衆者生而富利而貴若祭仲潘崇胡廣馮道之顯榮忤時者死而賤害而貧若洩冶伯宗王嘉陳東之戮辱則遷延苟且之計果為媒福去禍之道乎殊不知守道無一朝之患而秉義者非殺身之資也吕伯恭曰孔叔始終主齊不變其說而卒無纎芥之禍申侯反覆趨利且齊且楚而竟殺之以說于齊附丁傅者皆貴于哀帝之朝而朱博以丁傅敗獻符命者皆侯于王莽之世而劉芬以符命誅則君子亦介然自守獨立不懼而已矣奚中正若里克原繁詭隨若裴矩士及哉易曰咸其股執其隨徃吝九四貞吉悔亡憧憧徃來朋從爾思何也葉子曰莊生有言方舟而濟于河有虛船來觸舟雖有褊心之人不怒焉有一人在其上則呼張歙之一呼而不聞于是三呼邪則必以惡聲隨之向也不怒而今也怒向也虚而今也實人能虚已以遊世其孰能害之語云弦有常音故曲終則改鏡無畜景故觸形則照是以虚已應物必究千變之容挾情適事不覩萬殊之妙何則心體本虛空虚空能應物虚空則不思不思得物應故曰聖人感天下之心如寒暑雨𤾉無不通無不應者貞而已矣貞也者虚其中以無我者也若以思窮物適以物窮思若以物應心適以心殢物梁惠王小惠未幾而即欲百姓之加多桓温征討未效而逺責三秦豪傑之不至不多不至何足怪哉故曰以一人之聽覽而欲窮宇宙之變態以一人之防慮而欲勝億兆之奸欺役知彌精失道彌逺此唐德宗之所以多擾擾也然則若之何養心莫如虚虚則能盡心原思之不行于欲是能制心矣未可以語治心也衞武之無斁于神是能治心矣未可以語養心也仲弓之敬恕而無怨是能養心矣未可與語存心也顔淵之克復而無悔是能存心矣未可與語盡心也其惟孔子乎無意無必無固無我與天地相似然斯之謂太虚易曰貞吉悔亡憧憧徃來朋從爾思六五咸其脢无悔何也葉子曰爵祿束帛者上之所賞也出于口而無窮鞭笞殺戮者上之所罰也行于天下而莫禦是人君之威福也是故不令則已令則雷厲而風飛不禁則已禁則風行而草偃昔者齊宣王欲闢土地朝秦楚蒞中國而撫四夷也而孟子告之以發政施仁使天下仕者皆欲立于齊之朝耕者皆欲耕于齊之野商賈皆欲藏于齊之市行旅皆欲出于齊之塗天下之欲疾其君者皆欲赴愬于齊之王嗟乎此英君之事而大有為之主之常務也神散而昏不能鼓舞四方之豪傑志卑而陋不能招徠天下之臣民塊然死肉而已其何以號令天下而子奪域中哉周平漢元晉惠之流誠不足數而道也雖然其亦異乎曹伯陽之所為矣曹伯陽好弋而公孫疆以弋說進于是曹伯陽欲圖霸而公孫疆以霸說陳庸其材而逺志弱其力而宏舉淺其謀而深圖卒之亡曹國而振鐸之祀忽諸此又悔之不能追者也易曰咸其脢无悔上六咸其輔頰舌何也葉子曰君子感人以德小人感人以言忠臣感君以心佞臣感君以口傳曰繁文以相假飾辭以相悖數譬以相移外人之身使不得反其意則論便然後害生也文中子曰榮華其言小成其道難矣哉是故王孫滿之雄辨足以立摧楚莊問鼎之兇矣而東萊尚責之曰遂使周人以强楚之兇尚畏吾之文告而不敢前則異日復有跳梁畿甸者政煩一辨士足矣是狃宼而儌倖直以三寸舌為可恃也自後相習成風治國則先文華而後德政禦冦則先辨說而後甲兵交鄰則先酬對而後信義下逮戰國吞噬之際猶用滿之餘策虚張九九八十一萬之數以譎齊左欺右紿自矜得計一旦秦兵東出辨不能屈說不能下稽首不遑甘心俘虜矣向之虚辭浮說果可恃乎是開其端者滿之說也揚雄王通之著書立言足以垂訓于後足成一家之言矣而東坤尚議之曰揚雄作法言而言未必可法何也論語非所準也而準之夫理宗夫聖而發不必同體而均謂之成訓何事于準以陷于僭王之誅而不自知也君子行法以俟命無少僭也王通作中說而說未必中何也六經非所續也而續之夫言由乎􅇆而出不必同貫而均謂之常道何事于續以犯于亂華之計而不自省也君子擇中而服善無少亂也雄也不知行法從何以言通也不知擇中從何以說古語有之滛文破典其是之謂與嗚呼以滿之據理析辨而為禍如此雄與通之明道翼聖而不經如此況于公孫衍張儀淳于髠陳賈之流乎眞所謂國賊也哉故蘇子由曰吳自泰伯至夀夢七世不通諸侯自巫臣入吳教吳乘車戰射與晉楚力爭七世而亡燕亦國于蠻貊之間禮樂微矣春秋之際未嘗出與諸侯會盟至于戰國亦以耕戰自守安樂無事未嘗被兵文公二十八年蘇秦入燕始以縱横之事說之自是交兵中國無復寧嵗六世而亡夫燕吳雖南北絶逺而興亡之迹大略相似彼策士說客借人之國以自快于一時可矣而為國者因而徇之猖狂恣行以速滅亡何哉夫起于僻陋之中而奮于諸侯之上如商周先王以德服人則可不然皆禍也嗚呼口舌之患一至此哉雖然公子目夷以辭得國要離以辭得身齊使以辭得為楚上客鄭元璹以口伐可汗富鄭公以辭折契丹亦顧其言之何如耳易曰咸其輔頰舌恒亨无咎利貞利有攸徃何也葉子曰周公之言曰冬日之閉凍也不固則春夏之長草木也不茂天地且然而況于人乎是故有三十年之久道然後有天下之化成有世積之忠厚然後有仁及之草木有十年之生聚十年之教訓然後有十年之吳沼有十年發憤然後有三策之天人有九年之面壁然後有億千萬刼之定慧有三萬刻之沭浴抽添然後有九轉之神丹動生于靜神啓于窮嗚呼逺矣乎微矣乎不畜而發妄矣不信體而順達妄而已矣古之欲明明德于天下者先治其國欲治其國者先齊其家欲齊其家者先修其身欲修其身者先正其心欲正其心者先誠其意欲誠其意者先致其知致知在格物物格而后知至知至而后意誠意誠而后心正心正而后身修身修而后家齊家齊而后國治國治而後天下平是豈有一毫之不達而一物之扞且格哉故曰有天德便可語王道天德不德欲達而塞塞而不達王道壅閼申韓之功名管商之功利楊墨之為我兼愛面牆而已矣易曰恒亨无咎利貞利有攸往初六浚恒貞凶无攸利何也葉子曰不拯其隨君子所不快也而交之淺深亦當量切切偲偲朋友之職分也而情之可否所當裁徒執天下之大分而不顧危言之難受徒貴天下之大義而不思大欲之難奪寸寸而爭之至丈不釋銖銖而計之至石不遺不將求榮而反辱求親而反疏乎說雖足以福天下之蒼生而無所用言雖足以損一身之疾病而無所補君子所不貴也昔者宋寧宗語朱子于人曰本以致之經筵今乃事事欲聞朱子尚然他可知矣噫安得如布衣栢耆以策干韓愈而韓愈即以之說裴度卒使承宗破膽而歛手削地乎不然將為叔帶之召仲孫湫不敢發于十年之前而富辰一諫卒得之十年之後君子以為時然後言人之所樂聞矣易曰浚恒貞凶无攸利九二悔亡何也葉子曰性焉安焉之謂聖則誠者之道難于得天復焉之謂賢則誠之者之功成于固執成康與文武俱稱聖王文景與髙光同號賢君曹參與蕭何同名賢相仲尼與顔子同歸至人之數君數臣者豈可同日語哉然而守成不變之操較若畫一之軌强立不反之功非後世之所及也是故得一善則拳拳服膺而勿失之者其殆庶幾乎守之而俟化矣三月不違仁者其庶乎循之而不違則誠矣日月至焉者逺矣哉執之而不失則仁矣故曰德惟一動罔不吉德二三動罔不凶又曰執德不恒焉能為有又曰人而無恒不可以作巫醫是故不息則久久則徵徵則悠逺悠遠則博厚博厚則髙明者聖人之業也强而毅毅而執執而守者賢人之事也聖則心通道賢則行罔諐然則自愚而明由不肖而賢者可以自得矣易曰悔亡九三不恒其德或承之羞貞吝何也葉子曰晏子曰一心可以事百君而百心不可以事一君淮南子曰兩心不可以得一人一心可以得百人君子立身天地間而無常德焉則不可以為巫醫矣況處人倫之大道義之懿也哉鮑永守義于故主斯可以事新主矣屈突通盡節于亡隋斯不失為唐忠臣矣何則惟其心之一故事兩君而無嫌惟其為彼也忠故其在此也純一而不貳不然事君盡禮既闕於夙心不愛其親遽彰乎物議在周靡忠貞之節奉隋愧竭命之誠若劉昉鄭譯之為者寧不兩棄之乎是故齊桓侵蔡伐楚功亦偉矣而執濤塗伐陳旋踵見惑不免揚子思斁之譏楚莊伐陳討少西氏名亦正矣而縣陳貪富轉目為盜以致申叔奪牛之誚季文子之責韓穿亦曰信以行義義以成命小國所望而懷也信不可知義無可立四方諸侯其誰不解體詩曰女也不爽士貳其行士也罔極二三其德七年之中一予一奪二三孰甚焉士之二三猶喪其偶而況霸主將德是以而二三之其何以長有諸侯于是諸侯貳于晉晉人懼會于蒲以尋馬陵之盟桓𤣥發江陵至歴陽劉牢之自恃才武擁强兵欲假𤣥以除執政復伺𤣥隙而自取之參軍劉裕請擊𤣥牢之不許𤣥使何穆說之牢之遂與之通入京師除百官斬元顯尚之庾楷張法順以牢之為會稽内史牢之曰始爾便奪我兵禍其至矣告劉裕曰今將北奔髙雅之于廣陵舉兵以匡社稷卿能從義乎裕不應于是牢之大集僚佐議據江右以討𤣥參軍劉襲曰事之不可者莫大于反將軍徃年反王兖州近日反司馬郎君今又反桓公一人三反何以自立語畢趨出佐史多散走牢之懼率部曲北走至新州縊而死嗚呼執德之不可不恒如此故鄧析之兩可里克之中立鄭朋之靣從吕布之屢叛皆無所容于天地之間也故曰忽欣驟忿父不能以安其子初正終譎士不能以孚其朋易曰不恒其德或承之羞貞吝九四田无禽何也葉子曰莊子曰水之積也不厚則其負大舟也無力覆杯水于坳堂之上則芥為之舟置杯焉則膠水淺而舟大也傳曰枳棘非鸞鳳所棲百里豈大賢之路然則函牛之鼎以烹雞多汁則淡而不可食少汁則熬而不熟大器之于小用豈在所宜也哉古今聖賢厄此者多矣身居抱關擊柝之任誠不可以有夫參贊彌綸之功故曰孔子嘗為委吏矣則曰會計當而已矣嘗為乘田矣則曰牛羊茁壯長而已矣以兹寶鼎未受犧牛太羮之和久在煎熬臠割之間則于掀天揭地之功尊主庇民之業何有哉嗚呼此張釋之十年不得調揚雄三世不徙官以為可哀也已易曰田无禽六五恒其德貞婦人吉夫子凶何也葉子曰家語曰女子順男子之教而長其理者也是故無專制之義而有三從之道郊特牲曰婦人從夫者也幼從父兄嫁從夫夫死從子是婦人者從一以終其身者也故伯姬以成九年歸宋共公十五年共公卒嫠居三十有四載其時葢六十矣雖無姆傅避火全生未害其正也然而不以已可全之故而違天下之常義則禮之重于生辱之甚于死葢審乎死生之度而辨乎榮辱之境矣求仁得仁未可謂之女而不婦若夫夫也者以智率人者也夫而從婦將何以率教為哉噫三綱一理也夫而從婦其弊甚矣君而從臣禍敗可勝言哉故管子曰主有三術愛人不私賞也惡人不私罰也置儀設法以度量斷者上主也愛人而私賞之惡人而私罰之倍大臣離左右專以其心斷者中主也臣有所愛而為私賞之臣有所惡而為私罰之倍其公法損其正心專聽其大臣者危主也故明主之所操者六生之殺之富之貧之貴之賤之此六柄者主之所操也主之所處者四一曰文二曰武三曰威四曰德此四位者主之所處也藉人以其所操命曰奪柄藉人以其所處命曰失位嗚呼奪柄失位而國其國矣乎昔周公戒成王以自今我其立政夫不自為政而委于臣下是以國之利器示人而不知寶也故三家横于魯文之世而東門氏又甚于三家之横其原皆由于文公怠懦不君之所致即位之初伯主之會鄰國之好未嘗親之卒以大夫徃閏月不告月常月不視朔怠惰昏懦不出寢門舉手以聽强臣之所為卒使諸大夫互相結援外恃大國内懷國人而自封殖公室漸弱而權歸一人也一身未􅉂二子為戮妃妾不能相保齊簡公釋其國之柄而專任其大臣將相攝威擅世私門成黨而公道不行故使陳成田常䲭夷子皮得成其難使吕氏絶嗣而陳氏有國司城子罕相宋謂宋君曰夫國家之安危百姓之治亂在君行賞罰夫爵賞賜予民之所好也君自行之殺戮刑罰民之所怨也臣請當之君曰善寡人當其美子受其怨自知不為諸侯笑矣國人皆知殺戮專制之在子罕也大臣親之百姓畏之居不至朞年子罕遂劫宋君而專其政故曰權者大物也上不能制而授之下則下彊而上弱中國不能制而授之夷狄則夷狄彊而中國弱晉平公尊為邦君而授權于大夫此湨梁之會内有變而不知身主夏盟而授權于夷狄此宋之盟外有患而不悟雖然尤有甚焉周公將與王孫蘇訟于晉王叛王孫蘇而使尹氏與􅅨啓訟周公于晉夫周公大臣王孫蘇卿士也二臣有訟不之王而之晉已非人道匡王非惟不之罪反使人于晉助所厚者之訟惴惴然恐其不伸以天子之尊顧乃企足翹首待晉之予奪以為輕重是尚為能君天下乎又有甚焉唐山南西道節度使于頔因討淮西大募戰士繕甲厲兵聚斂財貨有據漢南之志誣鄧州刺史元洪贓罪德宗為之流端州頔復奏洪責太重德宗復以洪為吉州長史又怒判官薛正倫奏貶之比勅下頔怒已解復奏留為判官德宗一一從之漢隠帝時西京留守王守恩雖貪鄙聚歛而郭威即以投子命白文珂代之文珂守恩皆漢大臣而威以一樞宻使投子更置之如更戍卒文珂不敢違守恩不得拒威既處之不疑而隠帝亦卒置之不問嗚呼此豈所謂詔王以八柄御羣臣者乎故曰自隠至昭二百年而尹氏世執周政故有子朝之難而專廢立之權自宣至襄五十餘年而崔氏世為大夫故有莊公之弑而有簒殺之禍春秋之時尊莫如周强莫如齊而世卿之禍乃如此其所由來逺矣嗚呼積勢之所刼固如此哉然則君固不貴自用而威福則惟辟作之君固貴乎從臣而斷制則已由之以順為正以一守順丈夫而為婦人之事大君而假利器與人則凶于而家害于而國亡失乎而天下而不知矣嗚呼政由甯氏祭則寡人大政在家寄生之君王與馬共天下其亦可哀也哉易曰恒其德貞婦人吉夫子凶上六振恒凶何也葉子曰垂成之功非震撼擊撞之所能勝久安之業豈播蕩摇動之所可犯故曰處靜者如捧盈懼其動也處動者如操舟願其靜也處動者猶願其靜靜而頻動也可乎傳曰貫澤之會桓公有憂中國之心故不召而至者江人黄人也葵丘之會桓公震而矜之叛者九國震之者何猶曰振振然矜之者何猶曰莫我若也靜之極守之終震而矜之振而駭之不幾于功虧一簣乎習鑿齒曰齊桓一矜其功叛者九國曹操暫自矜伐天下三分此皆勤之于數十年之内而棄之于俯仰之頃此之謂也易曰振恒凶葉八白易傳卷八
