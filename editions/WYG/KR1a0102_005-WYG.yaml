body:
  text: 葉八白易傳卷五明葉山撰隨元亨利貞无咎何也葉子曰王者往也天下之所歸往也中天下而立定四海之民君子樂之而已矣其次得天下之英材而教育之乎亦君子之三樂也然而君天下有道益之戒于舜曰罔失法度罔㳺于佚罔淫于樂罔違道以干百姓之譽罔咈百姓以從己之欲是故徳惟善政政在養民水火金木土穀惟修正徳利用厚生惟和九功惟叙九叙惟歌戒之用休董之用威勸之以九歌俾勿壊熈熙皥皥而百姓忘于帝力者帝王撫衆統物之大權也師天下有徳周公之戒于商子曰無以學術禍天下無以功利熾人心無以刑名亂四海無以權謀術數擾人人是故禮義以養其心威儀以淑其質忠信以崇其徳禮法以道其行精一以嚴其軌聖賢以要其歸光明正大而開来學以善道者君子成徳達材之正常也不然則詭隨而阿比矣而可以不慎乎昔者容成問于木子曰三王五霸之治民何如木子曰三王以佚道使民以生道殺民五霸以死道役民秦氏以死道養民而後世以死道戯其民矣陶𢎞景謂註易誤不至殺人註本草誤則有不得其死者而唐子西駁之曰註本草誤其禍疾而小註六經誤其禍遲而大前世儒士引經誤國其禍至于伏屍百萬流血千里學術不明之故也然則有君師之責者非堯舜孔孟誠不足以當之矣漢之治也雜霸唐之治也雜夷仲淹有其才而未得其道退之循其名而未責其實降是焉可知已易曰隨元亨利貞无咎初九官有渝貞吉出門交有功何也葉子曰就有道而正焉者君子好學之功因不失而可宗者君子擇交之志然則誠不惡于變其心以求友亦惟貴于謹其始以慮終焉耳蔡沒入楚垂二百年不同中國之㑹盟不向桓文之信義鄭成公不背楚徳臨終而謂其羣臣曰棄力與言人誰暱我免寡人惟二三子其臣子駟不聽諸大夫之從晉而固曰官命未改騑也受其咎君子初不以其恒乆不變為盡善也陳成公既為鷄澤之㑹而卒則曽子以為變于夏曰改于尸未晚也吾何求哉犧牲玉帛待于二竟以待强者而庇民必于惟强與有禮者是從而不敢有異志君子亦不以非鄭之二三其徳而外之也然則君子不病于事人之有更而特貴于正人之是與如其道事之終身無改可也如其非道朝從而暮易又何負于義哉朱子初從劉屏山繼事胡籍溪劉白水而晚師李延平君子不病其有變程子門人一聞偽學之禁而絶口不言其師甚至改事他師以圖進用則去陳相無㡬何矣雖然從正固矣而聞見不廣交㳺不衆亦非多聞多見之資也指引者師之功嚴憚切磋者友之益雖朱子之學而猶有吕張諸公之助况其他乎孟子所以貴尚友也易曰官有渝貞吉出門交有功六二係小子失丈夫何也葉子曰昵于暱則逺者不麾而自退從于邪則正者不間而自疎出此入彼之機一定而不容髮者也故羿用寒浞則棄武羅伯因熊髠尨圉曹乗軒者三百人則不用僖負覊酆舒恃雋才而昵羣小則棄仲章棄賢保佞狂瞽之所從来乆矣豈特陳相聞許行之言盡棄其學而學之卒為聖世之亂民治國之蟊蠧以負天下之大義哉善乎誠齋之説曰薳子馮初嬖八人而申叔退避以逺罪郭子儀初信張曇而幕僚相率以求去而况不為薳郭者乎雖然尤有可憾者焉盖勲為京兆尹左將軍皇甫嵩將兵三萬屯扶風勲宻與嵩謀討董卓卓素怨嵩徴為城門校尉欲因殺之嵩將行長史梁衍說之曰卓寇掠京邑廢立從意今徴將軍大則危禍小則困辱今卓在洛陽天子来西以將軍之衆迎接至尊奉令討逆袁氏廹其東將軍廹其西此成擒也嵩不從而就徴卒為董卓所辱陶謙與諸守相共奏記推朱㒞為太師因移檄牧伯欲以同討李傕奉迎天子㑹李傕用尚書賈詡策徴㒞入朝㒞乃辭謙議而就徴復為太僕後憤懣發病死范蔚宗曰皇甫嵩朱㒞並以上將之畧當倉卒之時而舍格天之大業蹈鄙夫之小諒卒狼狽虎口為智士笑豈天之長斯亂也何智勇之不終易曰係小子失丈夫六三係丈夫失小子隨有求得利居貞何也葉子曰善與惡為仇邪與正相敵入芝蘭之室則腥膻之氣自不能近友直諒多聞之士則便佞善柔之類自不為親親道徳功名之上臣則庸碌卑鄙之下流豈不在所舍乎薳子馮親申叔而退八人管夷吾登隰朋而謝豎刀聮其巨而散其細君子之致為則然也雖然大人者爵祿束帛之所擅也上交者言聽諫行之所由也昔者楚文王謂申侯曰惟我知女予取予求不女瑕疵鄧禹杖䇿謁劉秀秀曰生逺来寧欲仕乎我得專封拜則君子之貴㳺而達仕也不曰隨有獲而求得之者乎嗟夫求也者請也古之人重請又何言乎重請人之所以為人者讓也請道去讓也則是舍其所以為人也而可以不重乎是以春秋譏来求車言上不得干取于其下也書殺成虎言下不得懐寵于其上也故古之為上者必昭儉徳以照臨百官古之為下者必執清修以勵介節然後上下辨而民志定各安其分而天下治矣不然侈心一動莫為防制必至抗不衷官失徳㢘恥道䘮寵賂日章淪于危亡而後止可不戒乎是以古之有道者得之不得曰有命其道之將行曰命也其道之將廢曰命也因所依而竊之以利幸馮所附而假之以足欲不為也故孔子之主貞子不以其陳侯周之可以通也其主蘧伯玉不以其靈夫人之可以言也君子其亦安于義寧道之不行聽于天寧功之不立守乎已寧泯泯沒沒以終其身焉可矣奚以匄人為哉雖然士則不可求矣為宗子之家相擅詔王之大權乃不行士道而顧使求其道之行不已過乎周公下白屋勤吐哺以見天下之士不茍然也若王子明使張師徳兩及其門韓魏公使客求見以希用而為程子之所責師德與客固不足論其為二公之累大臣之歉亦已多矣雖然尤有主政不綱知人不哲使之可以罔而求與求之不得方且使之得以怒而報若晉魏錡求為公族未得而怒趙旃求為卿未得而怒非惟不能平其志而又俾之使于楚召楚盟卒致邲之大敗其為國家之禍可勝言哉易曰係丈夫失小子隨有求得利居貞九四隨有獲貞凶有孚在道以明何咎何也葉子曰樹功立業以光榮富貴乎一世者君子之福也致福有基得君道焉耳孚嘉信志以順聽俯從乎一人者人臣之禍也轉禍有道不及其君焉耳何則在昔賢者之未遭遇也圖事揆策則君不用其謀陳見悃誠則上不然其信進仕不得施效斥逐又非其愆是故伊尹耕于鼎爼太公困于鼓刀百里自鬻甯子飯牛離此患也及其遇明主遭聖君也運籌合上意諫諍即見聽進退得闗其忠任職得行其術去卑辱奥渫而升本朝離疏釋蹻而享膏粱剖符錫壤而光祖考傳之子孫以資㳺士建徳樹功以華當年立身揚名以顯後世所得不既多乎噫多則多矣而非人臣之福也挟震主之威者負不賞之罪位極人臣而功盖天下者起芒刺之機宰相之有權怏怏非少主臣果非人臣之福也雖然監于日月星辰之行者得遲留順逆之序明乎消息盈虚之運者諗進退存亡之㡬君臣上下之際豈盡禍敗死亡之㑹哉子曰下之事上也雖有庇民之大徳不敢有君民之心仁之厚也是故君子恭儉以求役仁信讓以求役禮不自尚其事不自有其功尊其身儉于位而寡于欲讓于賢卑已而尊人小心而畏義求以事君得之自是不得自是以聽天命詩曰莫莫葛藟施于條枚豈弟君子求福不回其舜禹文王周公之謂歟然則以忠信不欺為主本以鞠躬盡瘁為當然以明哲保身為順事則履信思順而自天祐之吉无不利矣伊尹放太甲于桐太甲賢乃勤勤懇懇陳戒于徳而申誥于王終之拜手稽首以率于訓曰既往背師保之訓弗克于厥初尚賴匡救之徳圖惟厥終武王崩成王幼不能踐阼周公踐阼而治管叔及其羣弟流言于國曰公將不利于孺子周公誅武庚殺管叔而蔡蔡叔天下震恐乃告二公曰我之弗辟我無以告我先王于是成王涕泣以言曰昔公勤勞王家惟予冲人弗及知今天動威以彰周公之徳惟朕小子其親迎我國家禮亦宜之諸葛武侯身都將相手握重兵出入二十餘年既而臨終顧命受遺作相劉后授之無疑心武侯受之無懼色繼體納之無貳情百姓信之無異辭君臣之際良可詠矣郭汾陽校中書令考凡二十四月入俸錢二萬緡私産不在焉府庫珍貨山積家人三千人八子七壻皆為顯官然身擁重兵詔書以一紙徴之無不即日就道故程元振魚朝恩讒毁百端終不能行天下以其身為安危者殆三十年功盖天下而主不疑位極人臣而衆不疾裴晉公出將入相威望逺達四夷亦以其身係國家輕重如子儀者二十餘年而考終令後今古罕及李聽為河中節度使文宗嘗歎曰付之兵柄不疑置之散地不怨惟聽為可以然嗟乎彼二聖四賢豈不遭人臣之極哉而卒之諐咎不及其身盖必有不道之道不言之辨徳休乎道之所為而言休乎知之所不知者矣夫豈茍然而已哉霍子孟擁昭立宣朝野倚望非不偉然髙且顯也而不學無術去徐偃王無㡬矣肉未寒而族無噍類不亦可哀也哉易曰隨有獲貞凶有孚在道以明何咎九五孚于嘉吉何也葉子曰激楚揚阿至妙之容臺妝者之所貪飛兔騕褭絶足奔放良樂之所急百里之才超乗之喆明君之所契何也劉向有言浮江湖者托于船致逺道者托于乗欲霸王者托于賢伊尹吕尚管夷吾百里奚此霸王之船乗也釋父兄子弟非疏之也任庖人屠釣與仇讐僕虜非阿之也持社稷立功名之道不得不然也信于善而不遷聽于君子而不惑上智以為謀不使詐参焉大勇以為斷不使怒間焉至仁以為施不使貪貳焉以純心任純徳夫然後其位髙而不危存而不亡治而不亂安而無彊通于道約于事佚于已勞乎人永昌于天下此堯舜所以三代都俞吁咈于一堂之上而治隆俗美非後世之所及也孔明先主其殆庶幾焉漢昭帝年十四而識上官桀之詐知霍光之忠燕主慕容暐年十二而知慕容恪之忠辯慕輿根之詐此亦天資之近者矣若蜀欲攻吴吴人或言諸葛瑾别遣親人與漢相聞者孫權曰孤與子瑜有死生不易之誓子瑜之不負孤猶孤之不負子瑜也昔孔明至吴孤嘗與子瑜曰卿與孔明同産何不留之子瑜言亮已委質于人義無二心弟之不留猶瑾之不往也其言已貫神明非外言所能間蜀敗于吴之後黄權降魏有司請收權妻子先主曰孤負權權不負孤也待之如初後魏人或言漢已除權妻子丕令𤼵䘮權曰臣與劉葛推誠相與明臣本心竊疑未實後得審問吴曦反豪傑付之撫髀太息惟四川轉運安丙周旋其間計圖誅曦方反書之上朝論大震寧宗與羣臣計事咸謂無出安公右賜書勉以圖曦書未至而丙誅曦之㨗聞夫詔書下頒露布上騰以其時考之盖項背相屬于道地之相去若此其逺而君臣一心如合符節可謂相信之深而孚契之篤矣唐祿山之亂河朔二十四郡獨有一顔真卿而𤣥宗乃不知其作何狀李克用破王行瑜欲遂取李茂貞昭宗以為茂貞復滅則沙陀太盛朝廷危矣下詔止之及欲入朝而蓋寓以為天子還未安席人心尚危若引兵渡渭都驚駭郡邑迤􅆔歸鎮而茂貞遂驕横不可支卒致犯闕播遷之禍夫克用于三鎮非有父兄之怨特為王室雪恥故仗義而来昭宗不仗君臣之大義而任術數終疑克用而黨茂貞自取困殆之辱而克用兵方强盛義聲宏振亦不能以義扶主挺身入覲力陳不可不除之義或徑自勦滅以明安社稷利國家之義釋此不為乃坐致唐祚移而晉陽危不亦君臣胥失之乎何也信小人易信君子難是故用賢如轉石去佞如拔山世主之通患也姜公輔言朱泚必反蕭復言鳳翔必亂何其明也而徳宗略不以為意雖暫使為相不旋踵而斥之盧把以百口保泚而泚反請遣大臣宣諭而吴淑没又悮援軍奉天益危謀國乖刺如此其人可知矣而至死且以為賢李晟渾瑊馬燧忠勇剛正有大功于國徳宗不之信任反猜忌焉使其懼不保朝夕至于張延賞之讒言一𤼵則疎晟不終日吐蕃歸馬弇之奸謀一聞則惡馬燧若響應夷狄憸夫則推誠而信之元老柱石則百慮而疑忌下至石敬瑭為楊光逺而出桑維翰為杜重威而出劉知逺夫契丹之事翰逺任之有餘者而委任不專設施不乆使他日契丹入寇維翰無權而知逺顧望盖晉祖使然也若之何其不敗乎易曰孚于嘉吉上六拘係之乃從維之王用亨于西山何也葉子曰白頭如新語相貳也交雖極乆而無所要其終傾盖如舊語相投也始雖不戒而未可卜諸乆其惟擇而交乆而敬不以富貴貧賤易其情不以利害禍福褫其氣不以存亡變故移其心為左杜為管鮑為陳雷以死相從而不解然後為友道之全也故曰聖人之與人結約也上觀其事君也内觀其事親也必有可知之理然後結約結約而不襲于理後必相倍故曰不重之結雖固必解是故不擇而交則為戎夷之苟謬戎夷違齊如魯天大寒與弟子宿郭外謂其弟子曰子與我衣我活也我與子衣子活也我國士也為天下惜死子不肖人不足愛也子與我子之衣弟子曰夫不肖人也又烏能與國士并衣哉夷歎曰嗟哉道其不濟夫解衣與弟子夜半而死擇而不乆則為管華之薰蕕管寧少時與華歆為友嘗與歆共鋤菜見地上有金寧揮鋤不顧歆捉而擲之人以是知其優劣矣寧則終身不仕而歆為魏逼漢惡不可言神鬼誅戮萬世不宥矣友道可易言哉嗚呼吾有傷于燕之左伯桃羊角哀焉二人相為友也聞楚平王善待士乃同入楚值雨雪山道阻絶糧少桃度不能俱生乃併衣食與哀令往事楚自餓死空樹中哀至楚為上大夫乃言于平王備禮以葬伯桃畢自殺下從之嗚呼推其情豈可一日而異處此之謂上不愧皇天下可望四嶽易曰拘係之乃從維之王用亨于西山蠱元亨利涉大川先甲三日後甲三日何也葉子曰君臣一心治可乆尋上下之情兩隔而不通則有處堂之勢而莫之或知君臣一徳治道無惑上下之才兩弱而不立則有絫卵之危而莫知所措天下之事積弊而壊者其勢然也雖然不亂不治不壊不知所有事多難所以開國無患足以䘮邦故曰齊有無知之禍而桓公以興晉有驪姬之難而文公用霸禍亂之作天所以開聖人也又曰屈伸之數隠而昭有仍之困復夏之萌也鼎雉之異興殷之符也邵宫之難隆周之應也㑹稽之棲霸越之機也子噲之亂强燕之徴也盈虛消息天豈茍然而已哉雖然亂不自治治之有綱壊不自起起之有方胡五峯曰欲撥亂興治者當正大綱知大綱然後本可正而末可定大綱不知雖或善于條目有一時之功終以大綱不正而生亂然大綱無定體各隨其時事故魯莊之大綱在于復讐衛國之大綱在于正名也讐不復名不正雖有仲尼之徳不能聽魯衛之政矣然則治秦之壊以恩澤治漢之壊以法治唐之壊以辨華夷治宋之壊以懲退怯君子慎其所有事而已是故天下之事不能無敗也而不可棄其敗也當救敗以為新因其終而謀乎始務使為可大之規則後事因之而起其端而曷至于大傾覆乎天下之事今始有成也而不可恃其成也當慮敗于其成永乎終而知其敝務使為可乆之業則前事因之而弭其失而奚至于遽傾壊乎此因中寓夫革革而可常因者也革中寓夫因因而不必革者也循天運之自然騐盈虚消息之一定其武王周公之事乎反商政政由舊因而因者因而革者也百世之利其一世之利乎立周政命周官革而革者革而因者也一世之利其萬世之利乎噫非聰明聖智神武而不殺者其孰能與于此故程子曰善救則前弊可革善備則後利可乆此古之聖王所以新天下而垂後世也後世不明此義故勞于救世而亂不革功未及成弊已生矣至哉言乎易曰蠱元亨利涉大川先甲三日後甲三日初六幹父之蠱有子考无咎厲終吉何也葉子曰君子所以樂夫後之有人者為其昌増光前烈之志也君子所以貴于前之能光者為其持憂勤惕厲之心也書曰爾尚盖前人之愆甯殖出其君臨死謂其子曰若能掩之則吾子也故蔡叔以仲免郤芮以缺免公孫敖以文伯惠叔而得書其奔卒與䘮歸子之善父之善也豈惟是哉穆姜棄位而姣者也而其女伯姬以共婦顯沈充叛臣也而其子勁以守節著李義府奸臣也而其子湛以忠義聞譙周賣國其子居巴西為成太守馬脱所殺其子登詣劉𢎞請復仇𢎞表登為梓潼内史攻脱斬之食其肝遂據涪城成人攻之三年無一人離叛城陷見獲成主雄欲宥之登辭氣不屈乃殺之史𢎞肇之子徳珫頗讀書嘗不樂父之所為有舉人呼譟于貢院門蘇逢吉命執送侍衛司欲其痛笞而黜之徳珫言于父曰書生無禮自有臺府治之非軍務也此乃欲彰大人之過乎𢎞肇即破械遣之嗟夫此類猶不失有子也况其他乎夫父之諐尚可以盖家之壊猶可以圖則夫魁人傑士以道徳勲業啓之于前而後生小子以刻厲淬磨承之于後使其家聲赫奕乆而益昌若虞之元凱周之召尹漢之袁楊其慶當何如哉不然若齊桓公征楚而孝公與之盟于國齊桓公攘夷而孝公與之盟于邢書曰厥父菑厥子乃弗肯播厥父基厥子乃弗肯堂其為先徳之累亦既多矣叔孫昭子曰忠為令徳其子弗能任罪猶及之難不慎也䘮夫人之力棄徳曠宗以及其身不亦害乎故先縠之累友軫越椒之累子文歆之累向把之累奕其去李陵㡬何哉而况欒郤狐慶之後者抑又不足言矣故曰以功名相付者謂之世濟以富貴相承者謂之世祿金張許史重侯累將窮富極貴不足為世輕重而六龍三鳳之流聮飛並騖垂芳于無窮而唐袁利貞族祖誼為蘇州刺史自以其先世宋太尉淑以来盡忠帝室瑯琊王氏導雖奕世台鼎而為厯代佐命恥與為比常曰所貴于名家者為其世篤忠貞才行相繼故也彼鬻婚姻執利祿者又烏足數乎噫此類誠足嘉矣雖然幹之固矣幹之而少不克慎焉未有不遺天下之大患者唐代宗優寵宦官奉使四方還問其所得頗少則以為輕我命由是中使所至公求賂遺重載而歸徳宗素知其弊遣中使邵光超賜李希烈旌節希烈贈之僕馬及縑七百段上怒杖光超而流之于是中使之未歸者皆潛棄所得于山谷雖與之莫敢受夫徳宗矯代之失而深懲宦者之蠧可謂明也已矣然其終也舉不信羣臣而惟宦官之從至委以禁兵而其後人主廢置遂出于其手則其為害有甚于代矣何哉不知明王改其先過之道而乗之以輕銳之氣不能守之以忠信誠慤之心而出之以率意妄動之情夫是以初年之矯所失愚人以為喜而明哲以為憂也孔子曰三年無改於父之道可謂孝矣有以哉易曰幹父之蠱有子考无咎厲終吉九二幹母之蠱不可貞何也葉子曰父之壊常也母之壊天下之大變也治父之壊可守常也治母之壊而不通天下之變可乎吕后死而平勃誅諸吕以安劉吕后則無及矣武曌之禍古所未有也張柬之等第知反正廢主而不能以大義處非常之變為唐室討罪人君子安得而不謂其膠常守故不學無術而無以善其終始乎是故處天下之大變者不可不執天下之大義知天下之大義者然後不泥天下之大常不泥天下之大常者然後為得天下之大中故文姜與弑魯桓莊公即位外之不能復父之仇内之不能禁母之淫復使㑹于禚㑹于師享于祝丘再次如莒公卿大臣不能使之討齊車馬僕從不能使之不出魯此不過匹夫之行而非達孝之道也是故觀于夫子春秋所書文姜哀姜而幹母之大權可以得之矣易曰幹母之蠱不可貞九三幹父之蠱小有悔无大咎何也葉子曰弊之當革也則革之革之而不力則有趙抃之過然雖革其所當革也革之而過焉則有熙豐之禍君子可无慎乎是故有撥亂反正之盛心者常存觀變察㡬之智抱有能有為之大略者當知從容順應之常不然悔吝生而過責歸矣向戍来聘且尋盟見孟獻子尤其室曰子有令名而美其室非所望也對曰我在晉吾兄為之毁之重勞且不敢聞夫獻子于兄之所為無大過焉者寧居之不改如是則魯文公之必毁泉臺者宜春秋之所譏也昔者唐宣宗初立時君臣務反㑹昌之政至僧尼之弊皆復其舊熙寧之法病民者將二十年司馬君實起而為政毅然以天下自任開言路進賢才凡新法之害民者一切取而更張之海内之民歡欣鼔舞甚于更生一變而為嘉祐治平之治君子稱其有旋乾轉坤之功矣然而法相因則事成無漸則民病范純仁言之而不聽不㡬于激天下之亂耶特其情雖過而心則無尤氣雖張而理則不拂君子于是乎有通論焉耳不然見天下之弊不勝其忿一決而去之此其禍不為晁錯則為景延廣可勝悔哉噫能剛能柔不過不激吾于管仲之定襄王子房之安太子仁傑之反唐祚有取焉易曰幹父之蠱小有悔无大咎六四裕父之蠱往見吝何也葉子曰拯溺者不俟河之涸救焚者不需雨之落七年之病而求三年之艾者不俟時日之良故曰天之方難無然憲憲天之方蹶無然泄泄不然板蕩之禍夫豈紆徐迂濶者之濟乎趙盾輔靈公繼襄業以大芘中夏正當力攘荆楚急扼其始横而大宣其威力可也顧于狼淵之舉方且視為泛常而諸大夫之㑹緩不及事師及鄭而楚已囚公子去矣悼敬之難子朝之亂霸者所當亟辨邪正戮力靖之而二年之後晉始使士景伯莅問周故辭子朝之使又踰年趙鞅激于太叔嫠婦恤緯之言感于瓶罄惟壘之恥始為黄父之㑹以期明年之師不求急難纓冠之義而姑問揖讓周旋之禮是豈拯溺救焚之道哉楚子聞宋殺申無畏也投袂而起屨及于窒皇劒及于寢門之外車及于蒲胥之市蠻貊之敏于猾夏如此而盾則怠緩鞅則坐視春秋安得不譏之乎故曰救鄭不及楚師卿不書緩也以懲不恪又曰王室之亂五年而未平傷天下之無霸也嗚呼軍旅之事夫子以為未學而春秋所書戰伐之事無有以為合于義而許之者獨于救兵皇皇汲汲如此不可以知拯難之義乎故胡文定曰凡書救者未有不善之者也救在京師則罪列國子突救衛是也救在夷狄則罪諸侯狄救齊吴救陳是也救在逺國則罪四鄰晉陽處父帥師伐楚以救江是也救而不速救者則書所次以罪其慢叔孫豹救晉次于雍榆是也救而不能救者則書所至以罪其怯齊侯伐我北鄙圍成公救成至遇是也書法若此聖人之情見矣若夫狄以閔之元年伐邢後二年而邢始遷于夷儀狄以閔之二年滅衛後二年而齊始封衛于楚丘則是長人之亂而以張吾之惠多宼之虐而以明吾之勲以千萬人之命而易吾一身之名尤為聖人之所惡矣故東莱之説曰王者之所憂霸者之所喜也夫不經桀之暴則民不知有湯不經紂之惡則民不知有武功因亂而立名因功而生要非聖人之本心也若霸者則異是亂不極則功不大功不大則名不髙故將隆其名則必張其功將張其功則必養其亂養其亂而使社稷已傾都邑已頽屠戮已酷流亡已衆然後徐起而收之拔之于危蹙顛困之中致之于豐樂太平之地則深仁重施力大而名赫矣嗚呼是誠何心豈非聖人之所深惡而痛絶者哉甚至楚圍宋而告急于晉伯宗以為天方授楚未可與争不敢出師却使解揚如宋使無降楚則又鼠之行而賊之心劉曜逼長安瑯琊初無救援之意及聞長安不守則姑出師露次移檄四方假漕運稽期斬督運使淳于伯及劉隗上言其寃不過引咎自責則秦人之肥瘠而越人之視田令孜遣朱玫李昌符攻河中李克用救之進逼京城僖宗奔鳳翔明年田令孜劫帝如寳鷄宰相朝臣皆不知翰林承㫖杜讓能獨追及之乃有太子太保孔緯等數人繼至緯令百官赴行在辭以無袍笏緯召三院御史泣謂曰布衣親舊有急猶當赴之豈有天子蒙塵而臣子屢召不往耶御史請辦行裝數日而行則又坐觀其至親骨肉之溺而談笑以道之者嗚呼其罪尚可得而勝誅也哉易曰裕父之蠱往見吝六五幹父之蠱用譽何也葉子曰飭治振起者英君自奮之志左右奔走者羣雄並翼之功昔者桓公在位管仲見立有間有二鴻飛而過之桓公歎曰仲父今彼鴻鵠有時而南有時而北有時而往有時而来四方之逺所欲至而至焉非有羽翼之故是以能通其意于天下乎寡人之有仲父也猶飛鴻之有羽翼也若濟大水之有舟楫也然則以羣材之幹而支大厦之傾則支之也若張盖以多驥之力而起廣車之僨則起之也若反掌矣髙宗之夢卜傅説而嘉靖殷邦宣王之錫命樊侯而王猷允塞晉文公之得五人而歸為霸主燕昭王之賢士歸往而頓復齊仇漢光武之延攬英雄而恢復故物業所從来乆矣豈庸常淺陋之所能與哉彼宋襄公有一子魚而不能聽魯昭公有一子家駒而不能用漢靈帝有一陳蕃而斥且免唐文宗有一裴度方將屏棄而不録夫何為哉易曰幹父之蠱用譽上九不事王侯髙尚其事何也葉子曰天下不可無此等人亦不可無彼等人天下不可無此等事亦不可無彼等事與君偕出孰與立節與我偕遯孰與撥亂十八侯司其事矣四皓可與紫芝而同老二十八將成其能矣嚴光可與富春而同歸是故王者有事事者則不待吾事衆人無尚事者吾安得不尚吾事乎此其志盖將立天下之人極建世道之綱維者歟何其義也孟子曰聖人百世之師也故聞伯夷之風者頑夫㢘懦夫有立志信乎易曰不事王侯髙尚其事臨元亨利貞至于八月有凶何也葉子曰權盛則動而如意勢昌則為無不成君子能進而凌逼于物矣而其志有不行哉所貴者壯而能正健而能説決而能和不于頄而于心不于氣而于理焉耳惟舜之去四凶為能誅而不怒惟周公之去三監為能怒而不撃惟孔子之去少正卯為能撃而不恣陽球磔王甫之屍未嘗不快也而識者早知禍機之已伏石介慶夏竦之去未嘗不幸也而君子先諗禍本之已存宋哲宗幼冲嗣位太后髙氏臨朝任用賢相政事修舉國内大治號曰女中堯舜太后崩熙豐黨人得志横行追貶元祐正人殆無虚日卒致禍亂内變外寇乗釁而起中原卒不支矣權之盛勢之昌夫豈易處乎雖然此人事也有天道焉極盛者則必衰極昌者則必萎君子知必至之天運而委曲周旋以圖之庶㡬自保之道矣人事以速亂而天運適遭其所窮豈知禍之所終哉此常安民所以有薛季昶之慮也易曰臨元亨利貞至于八月有凶初九咸臨貞吉何也葉子曰君子之居世也時不遇而道廢焉則無以斬豺狼之當道遇其時而身屈焉亦無以問狐狸之野嘷有其時居其位矣凡有小人何者不在其凌逼之中乎子路初仕衛不敢委曰小臣不問大事也其質之孔子也不敢忌曰下官無侵上職也方墮郈又墮費既墮費又墮成必欲公家之强而私室之弱豈敢安乎其位一事置之不問哉若曰事之不濟則天也吾如彼何哉殫其心而竭其力率以正而臧其謀神其機而妙其𤼵此則君子之所自盡也不然則志邪而意肆矣君子為之乎易曰咸臨貞吉九二咸臨吉无不利何也葉子曰未嘗不欲凌小人者君子之心也欲凌之而卒不能凌者所遇之不同也有其位矣而徳不足則釁生李懐光欲誅盧把趙賛白志貞之奸而卒為所圖陷身為賊君子之所憾也有其徳矣而權不侔則説費劉蕡論宦官之禍而廢于唐陳東歐陽澈極言黄潛善汪伯彦之奸而廢于宋君子之所痛也其惟司馬君實乎放李定貶范淵竄惠卿免蔡確去一時之小人而活萬人之命罷數十年之患政而興一時之利以其徳實而才充位尊而望重耳不然能無困蹶之患乎故曰去河北賊易去中原朋黨難易曰咸臨吉无不利六三甘臨无攸利既憂之无咎何也葉子曰罔拂百姓以從己之欲者君子悦以先民之道也罔違道以干百姓之譽者君子悦以利貞之戒也不以正而以邪天生民而樹之君之意固若是乎使司牧之無失其性其道固如是乎君子不由也曷之何其弗禁焉荀子曰順州里定㕓宅養六畜間樹藝勸教化趨孝弟以時順修使百姓順命安樂處鄉鄉師之事也論禮樂正身行廣教化美風俗兼覆而調一之辟公之事也垂事養民撫循之唲嘔之冬日則為之饘粥夏日則與之瓜瓞以偷取少頃之譽焉是偷道也可以少頃得奸民之譽然而非長乆之道也事必不就功必不立是姦治者也嗚呼此五霸之道易盈易涸終不足以語于仲尼之門有由然哉下此而假君之惠以濟其民竊上之寵以和其下若陽生之入而不敢言語欒孺子而皆泣陳氏厚施于國宋鮑禮于國人季氏世修其勤是謂並其守國之器而竊之于以遂其終身之詐而成其滔天之惡而不容于堯舜三代之世者矣况以之而制小人乎以肉飼虎終為所吞以蜜餵蜂必為所螫光明正大之道不如是也易曰甘臨无攸利既憂之无咎六四至臨无咎何也葉子曰君子之治民也以平易安靜為極功而其制小人也以必咨于周為切務漢章帝之詔曰夫俗吏矯飾外貌似是而非朕甚厭之甚苦之安靜之吏悃愊無華日計不足月計有餘如襄城令劉方吏民同聲謂之不煩雖未有他異斯亦殆近之矣夫以苛為察以刻為明以輕為徳以重為威四者或興則下有怨心章帝此詔意何為哉俗吏之為患甚矣其可惡也以辦事為功以稱職為能以刻為威以察為明以政化為髙論以風俗為迂濶當其初也百姓畏其威令行禁止所求者遂所欲者得有所任使不避劇易皆能成功故朝廷之上翕然以為能而天下之士争慕效之翕然成風民心離散國體破壊元氣消喪而風俗自然耗矣彼豈知善人君子安静不擾悃愊無華其政悶悶若不足以快人意而豈弟慈祥寛宏廣大不自知其感化民心扶植教徳薰蒸和氣與一世共躋于仁夀之域其功之至極孰有加于此哉若夫其制小人也則不然未始以疏視之也識到計到以折其奸心未始以慢治之也威到力到以摇其厲氣未始泄泄沓沓以加之也謀到聽到以專其成事然後小人得而去之矣視之以疏則彼得以玩我迂治之以慢則彼得以格我怯加之泄沓則彼得以間我漏夫可茍焉而已哉唐敬宗遣中使賜朱克融時服克融以為疎惡執留勑使奏以春衣不足乞度支給三十萬端疋又奏欲將兵馬及丁匠五千助修東都敬宗患之欲遣使臣宣慰仍索勑使裴度對曰克融無禮已甚殆將斃矣譬如猛獸自于山林中咆哮跳踉乆當自困必不敢輙離巢穴願勿遣宣慰亦勿索勑使旬日之餘徐賜詔書云聞中官至彼稍失去就俟還朕自有處分時服有司製造不謹朕甚欲知之已令區處其將士春服非朕所愛但素無此例不可獨與所稱助修工匠皆是虚語若欲直挫其奸則云丁匠宜速遣来若欲且示含容則云不假丁匠逺来如是而已不足勞聖慮也不二月幽州軍亂殺克融並其子昭義節度使劉從諫卒其子稹自為留後武宗欲討之宰相諫官多不可李徳裕以澤潞事體與河朔三鎮不同獨請討之武宗問計對曰稹所恃者三鎮但得鎮魏不與之同則稹無能為也若遣重臣往諭王元逵何𢎞敬得其聽命不從旁阻撓官軍則成擒矣遂決意討稹羣臣之言不復入矣二鎮果聽命徳裕又恐劉悟有功稹未可亟誅上曰悟廹于救死耳非素心狥國也借使有功父子為將相二十餘年國家報之足矣先是河北諸鎮有自立者朝廷必先有弔祭贈使宣慰使繼往商榷然後用兵故常及半嵗軍中得以為備至是宰相亦欲遣使上即下詔討之稹使牙將薛茂卿抜河陽科斗寨距懐州十餘里議者鼎沸以為澤潞不可取上亦疑之徳裕曰小小進退兵家之常願陛下勿聽則成功矣上乃謂宰相曰為我語朝士有上疏阻議者我必于賊境上斬之議者乃止及洺州刺史李恬以書與從弟石云稹願舉族歸命石以聞徳裕言今官軍四合賊勢窮蹙故偽輸誠欵冀以緩師宜詔石答恬書云前書未敢聞奏若郎君誠能悔過面縛境上則石當往受降䕶送歸闕若虚為誠欵則石誠不敢以百口保人仍望詔諸道乗其上下離心速進兵攻討上皆從之稹果擒斬此皆老臣知周萬物而道濟天下無所不用其極者也以是而制小人小人其有不去者乎髙駢使僧景仙説驃信馮寳使妻洗氏使李遷仕致其溺而怠啓其信而驚亦庶㡬切計極務者矣易曰至臨无咎六五知臨大君之宜吉何也葉子曰治天下有要道也達者知之衆人昧焉何也淮南子曰古者法設而不犯刑措而不用非可以刑而不刑也百工惟時庶績咸熙禮義修而任賢徳也故舉天下之髙以為三公一國之髙以為九卿一縣之髙以為二十七大夫一鄉之髙以為八十一元士故知過萬人者謂之英千人者謂之俊百人者謂之豪十人者謂之傑英俊豪傑各以小大之才處其位得其宜由本流末以重制輕上唱而民和上動而下隨四海之内一心同歸背貪鄙而向義理其于化民也若風之摇草無之而不靡傳曰先王之宰天下也律天時因地利協人和如此而已矣是故知天之道者拜以為師矣知地之道者進以為友矣知人之道者任以為臣矣燮理隂陽而四時以叙知天道也經畧剛柔而庶土以平知地道也啓沃仁義而五品以遜知人道也雨𤾉愆期寒暑無節郊焉而天神有弗格則師贊之考其道如此而不復其常則免其官曰官天之命也山冢崒崩川流不蹟社焉而地祇有弗歆則友助之修其徳如此而不復其常則削其祿曰祿地之産也教化晦塞風俗不美廟焉而神鬼有弗享則臣詔之省其功如此而不復其常則褫其服曰服人之章也三才有定職也三事有成能也此先王所以不勞而成治也故曰上必無為而用天下下必有為為天下用昔者舜明四目達四聰咨十二牧盖舍己從人樂取諸人以為善此舜之所以為大智也何也以天下之目為視則何所不明以天下之耳為聽則何所不聞以天下之心為思則何所不得茍不集人之衆而惟任己之獨則必有遺視遺聽與遺思矣是豈帝王之髙致哉故曰去聽以無聞則聰去視以無見則明去知以無知則公三者不任則治三者任則亂是以舜恭己而正南面神而明之以成至治非天下之大知其孰能與于此降而知是道者周公也記曰篤仁而好學多聞而道慎天子疑則問應而不窮者謂之道道者尊天子以道者也常立乎前是周公也誠立而敢斷輔善而相義者謂之充充者充天子之志者也常立于左是太公也㢘潔而切直匡過而諫邪者謂之弼弼者拂天子之過者也常立于右是召公也博聞强記佞給而善對者謂之承承者承天子之遺忘者也常立于後是史佚也故成王中立而聽朝則四聖維之是以慮無失計而舉無過事然則人君而獨任其知其斯以為不知乎故管子曰明主不用其知而用衆人之知不用其力而任衆人之力故以衆人之知思慮者無不知也以衆人之力起事者無不成也能自去而用天下之知力則身佚而福多獨用其知而不用衆人之知獨用其力而不用衆人之力則身勞而禍多故曰獨任之國勞而多禍故曰雷霆草木人不能為之舟車陶冶天亦不能為之也威福玉食人臣不當為之簿書期㑹君亦不當為之也又曰無代馬走反盡其力無代鳥飛反蔽其翼夫萬機庶務皆當不自用而任人况制小人乎唐憲宗用杜黄裳之獨對任髙崇文討蜀卒梟劉闢之首威行兩河用武元衡之壯謀任王鍔討吴卒斬李錡父子藩鎮惕息用裴度之獨斷任李愬討淮西卒擒吴元濟于蔡州天下震慴雖以李吉甫故罷裴垍學士然寵信彌厚未㡬復擢為相謂之曰以太宗𤣥宗猶藉輔佐以成其理况如朕不及先聖萬倍者乎每有軍國大事必與諸學士謀之嘉翰林學士崔群讜直命學士自今奏事必取群連署然後奏之故再用李絳之謀未敢輕動河北而魏博果亂推田興為留後率衆聽命復用絳謀遣裴度宣慰魏博頒賞軍士六州百姓給復一年軍士受賞歡聲如雷成徳兖鄆使者數輩見之相顧失色歎曰倔强者果何益乎鄆蔡恒遣㳺客間説多方興終不聽李師道使人謂韓𢎞曰我世與田氏約相保援今興非其族又首變兩河事公之所惡也我與成徳合軍討之𢎞曰我不知利害知奉詔行事所臨如是其知不亦大乎不然將不免于譚忠之所窺矣田季安聞吐突承瓘討王承宗聚其徒曰師不跨河二十五年矣今一旦越魏伐趙趙虜魏亦虜矣為之奈何其將有超伍而言者曰願借騎五千以紓君憂季安欲從之牙將譚忠使魏知其謀入謂季安曰如某之計是引天下之兵也徃年王師取蜀取吴筭不一失是皆相臣之謀今王師越魏伐趙不使耆臣宿將而專付中臣不輸天下之甲而多出秦甲君知誰為之謀此乃天子自為之謀欲將誇服于臣下也若師未叩趙而先碎于魏是上之謀反不如下能不恥且怒乎既恥且怒必任知士畫長策伏猛將練精兵畢力再舉鑒前之敗必不越魏而伐趙較罪輕重必不先趙而後魏矣季安曰然則若之何忠曰王師入魏君厚犒之而悉甲壓境號曰伐趙隂遺趙書使解陴障遺魏城持以奏㨗則魏之霸基安矣季安曰善遂隂與趙計得其堂陽嗚呼若是而㡬何不為人之所愚弄乎易曰知臨大君之宜吉上六敦臨吉无咎何也葉子曰君子之抱道守貞也有險夷不易之心其憂國愛民也有死生不變之節則其與小人固不容一日比以至終其身而不能少間與之合者况當國家之任係天下之故而臨之有不厚且長乎史魚之于子瑕死且不置必以尸而斥去之宋璟之于二張雖君父之意有不恤終不可得而少假焉可謂處小人之上而臨之終始如一矣魏元忠再相之後依阿取容任三思之惡而不言元稹一經挫折不克固守後遂自毁與賢人君子為仇敵焉李晟以盃酒間遂釋張延賞之怨而且求其女與子為婚裴度令狐楚鄭覃受李訓之豢而不知辭避則不克有終矣君子志在潔身而貞行保國而和民者不免若是二三其徳也而可乎易曰敦臨吉无咎觀盥而不薦有孚顒若何也葉子曰君者人則也是故其儀不忒而後可以正是四國也君者非則人者也是故其為父子兄弟足法而後民法之也管子之言曰民不可稍而掌也可井而牧也不可暴而殺也可麾而致也衆不可户説也可舉而示也然則舉天下而示之則奈之何其輕且茍哉書曰惟㡬惟康其難其慎詩曰敬慎威儀惟民之則禮曰王者中心無為以守至正傳曰洗心以退藏于宻齊戒以神明其徳不輕于自用不果于有為不茍于𤼵設夫然不失正是四國之道下觀而化之則也不有以立君道之準乎故曰成王之孚下土之式又曰為政以徳譬如北辰居其所而衆星共之又曰人主之術處無為之事行不言之教清浄而不動一度而不揺因循而任下責成而不勞又曰橋梓直立而不動俛仰取則焉人主静黙而不躁百官得修焉又曰上無事而民自試抱獨不言而廟堂既修鴻鵠鏘鏘惟民歌之濟濟多士殷民化之是所以為示天下之道乎是故觀諸天下堯舜率天下以仁而民從之是也觀諸其國顔淵為政而由賜無所施其能是也觀諸其家萬石君家不言而躬行是也嗚呼其可以易言乎易曰觀盥而不薦有孚顒若初六童觀小人无咎君子吝何也葉子曰童子觀畫知其備五采耳雜山川草木人物焉耳而不知其圖古蹟也童子觀戯知其備詞曲耳雜喜怒悲歡離合耳而不知其示忠孝也是故知其通變之利知聖人服民之心而不知其神道之教百姓日用而不知童眸矇䁾而無見也孔子曰民可使由之不可使知之吾何尤焉若夫老子之言曰不出户知天下不窺牖知天道管子曰行其田野視其耕耘計其農事而饑飽之國可知也行其山澤觀其桑麻計其六畜之産而貧富之國可知也入國邑視宫室觀車馬衣服而侈儉之國可知也課凶饑計師役觀臺榭量國費而虚實之國可知也入州里觀習俗聽民之所以化其上而治亂之國可知也入朝廷觀左右求本朝之臣論上下之所貴賤者而强弱之國可知也置法出令臨衆用民計其威嚴寛惠行于其民與不行于其民可知也計敵與量上意察國本觀民産之所有餘不足而存亡之國可知也本其著知其微察其迹得其㡬君子之秉哲達人之通觀也矇矇昧昧短見而瞽窺斯十九年而有童心矣亦可鄙之甚乎易曰童觀小人无咎君子吝六二闚觀利女貞何也葉子曰以門外為等閒不出户而无攸遂此女子之道也大丈夫以天下為一家中國為一人畏天命而悲人窮吾分内事矣内之為女貞可乎哉是故觀文明之盛而不思啓天下于文明仰康樂之安而不思躋天下于康樂享和平之福而不思納天下于和平深入門庭而不出偷鄙之極矣昔者天王使劉定公勞趙孟于潁館于洛汭劉子曰美哉禹功明徳逺矣微禹吾其魚乎子盍亦逺績禹功而大庇民乎對曰老夫罪戾是懼焉能恤逺吾儕偷食朝不謀夕何其長也劉子歸以語王曰諺所謂老將至而耄及之者其趙孟之謂乎為晉正卿以主諸侯而儕于𨽻人朝不謀夕棄神人矣穆叔至自㑹見孟孝伯語之曰趙孟死為政者其韓子乎吾子曷與季孫言之可以樹善孝伯曰人生㡬何誰能無偷朝不及夕將焉用樹嗚呼此食租衣税止願為太平之民者之所為而君子為之不亦淺之乎其為丈夫乎易曰闚觀利女貞六三觀我生進退何也葉子曰不顧其身而必進趾之壯者也是謂忘其身不顧其君而必退節之苦者也是謂忘其君二者則有間矣以言乎失道則均焉是故士君子懐才抱器未嘗不欲行道濟時致君澤民為心然才器雖已有而道之通塞則係于天用舍行藏尤在于時君子得時則大行不得時則龍蛇安于所遇俾身名俱全斯為處世之善矣不然若漢末陳蕃李膺范滂諸賢始履虎尾之危幸脱虎口之厄復捋虎鬚之險卒抉虎吻之噬不亦可悲也哉雖然不為數子而飾偽以要譽釣竒以驚俗不食君祿而争屠沽之利不受小官而規卿相之位名與實反心與迹違斯又聖王之所必誅而不足與于士林之列矣尚何出處之為道哉善乎李固之勸黄瓊欲其一雪當世之議也易曰觀我生進退六四觀國之光利用賔于王何也葉子曰横政之所出横民之所止則伯夷太公不忍居三綱絶人道忘則逢萌為之掛冠梅福為之去亂然則禮樂文明之炳曜紀綱法度之昭彰大明在上聖化光颺君子豈固為蒙澤之叟巖壑之棄也耶傅説對揚天子之休命箕子親近天子之耿光山東之民願少須臾無死以觀漢室徳化之成感于時也故曰蟋蟀俟秋吟蜉蝣出以隂又曰明天子在上可以出而仕矣嗚呼世不喪道而道不喪世如此君子其能不為之一慶哉易曰觀國之光利用賔于王九五觀我生君子无咎何也葉子曰元筮以自審者人君比天下之道皇建其有極者人君立成王之孚𫝊曰詩云豈弟君子民之父母君子為民父母何如曰君子者貌恭而行肆身儉而施博故不肖者不能逮也殖盡于已而區畧于人故可盡身而事也篤愛而不奪厚施而不伐見人有善欣然樂之見人不善惕然掩之有其過而兼包之授衣以最授食以多法下易由事寡易為是以中立而為人父母也是故君子之行也記曰在朝廷則道仁義禮知之序燕處則聽雅頌之音行步則有環珮之聲升車則有鸞和之音居處有禮進退有度百官得其宜萬事得其序詩曰淑人君子其儀不忒其儀不忒正是四國此之謂也淮南子曰人主之居也如日月之明也天下之所同側耳而聽延頸舉踵而望也是故非澹泊無以明徳非寧静無以致逺非寛大無以兼覆非燕厚無以懐衆非平正無以斷制是君子之行也有是君子之行以臨其兆民庶㡬其不疚乎舍堯舜三代不足以與此宋祖之言曰洞開重門正如我心少有邪曲人皆見之其亦庶㡬于此易曰觀我生君子无咎上九觀其生君子无咎何也葉子曰天下有達尊三爵一齒一徳一爵不在而齒在則天下之所讓年也為天下所讓年而徒以其年可乎齒不在而徳在則天下之所尊道也為天下所尊道而不以其道可乎是故居事外而有事之志不可忘不為觀而反觀之心不容己何也爵者政之所出而齒徳也者俗之所趨也故曰觀政在朝觀俗在野又曰政之所及者淺而俗之所得者深善政未必遽移薄俗而美俗則足以救惡政昔者閔公之難齊使仲孫湫省焉湫歸而桓公問曰魯可取乎對曰猶秉周禮未可動也夫閔公為君生甫八嵗哀姜君母棄位而奸慶父大臣弑逆而賊周禮大禁舉皆犯之而湫曰云云則不于其政而于其俗也嗚呼俗其可以苟焉而已哉為天下風流之所趨而民俗之所效者又可以輕忽云乎哉是故子賤之治單父而入其郛者見棄魚之俗魯恭之治中牟而履其郊者見馴雉之風有由然矣其分彌尊其節彌厲其身彌退其道彌髙其事彌閒其徳彌盛其位彌逺其行彌堅振其清穆之風以養禮義之俗敦其一時之行以為百世之師此君子之所不容懈者也古之君子子思之在魯子夏之在西河之上子方之在魏嚴子陵之在富春裴晉公之在綠野與夫洛社耆英之在洛陕也若之何其為觀哉而若之何其自考哉故曰舟車鹽鐵何如採蕨期㑹簿書莫忘採薇易曰觀其生君子无咎葉八白易傳卷五
