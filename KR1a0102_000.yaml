  text: 欽定四庫全書經部一
  hash: sha256:5111095677a17a819f758c15b1f1277a321ca96156d9a58f561e94ee59984d92
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1a0102_WYG_000-1a, image: WYG0032/WYG0032-0585a.png}
body:
  text: 葉八白易傳易類提要臣等謹案葉八白易傳十六卷明葉山撰山字八白里貫未詳朱彞尊經義考引張雲章之言曰八白本末無所考見詳其自序當是一老諸生是書屢易其稿自序凡四其略云豫十嵗讀周易越十年能厭學究語又十四年為嘉靖丁卯又六年從鹿田精舍見楊誠齋易傳又九年為今壬子云云再序題癸丑六月三序題丁己三月四序題嘉靖三十九年七月考壬子為嘉靖三十一年由壬子逆數十六年當為丁酉嘉靖無丁卯序云丁卯者蓋傳寫誤也書始于壬子迄于嘉靖三十九年為庚申凡九年而成以自序年月考之山當生于𢎞治十七年甲子至庚申書成時為五十七嵗其書専釋六十四卦爻詞而於彖象文言十翼皆不之及大旨以誠齋易傳為主出入子史佐以博辨蓋借易以言人事而不盡為經義之所有易道廣大無所不包即其所言固往往可以昭法戒也乾隆四十二年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀葉八白易傳自序蓋豫十嵗讀周易云而盲聾未之覺也越十年能厭學究語顧其所自為説絫七八十萬而終之流弊於科舉三五讀之自省其不可以知新也又十四年為嘉靖丁卯下第將北出關故人王君留之清話踰月其子廷卿門人也間問易猛然欲援筆焉未幾而方外之士翩然至談元解妙令人飄飄忽忽羽化在掌回瞻六籍我將曷之籍焉又六年從鹿田精舍見楊誠齋易傳乍頃欣喜戚戚北關之念適以科舉廢又九年為今壬子復適科舉期而春二月早為校文先生之所擯不知此果豫厭學究科舉之為纍乎抑於聖人之旨猶未精也夏四月門人陳言忠偶遺誠齋易傳得厭觀焉悅之而未盡是因著八白易傳一十六卷云五越月得脫稿為之陳序其所以夫説天之撰未辨而感心之故良勤積日之思屢損而象罔之得一旦雖雍門之琴以末而微飈之俟維深嗚呼悲夫古今有旃毛錐不橫野草天憐汁盡金壺橫目眯眇繭章畏壘陳列爼豆追誦罪我之言以蘄筆削之再九月五日葉山書重改易傳序八白易傳成十越月又易稿初説幾略盡焉夫聖人之畫確定不易而天地之變化無窮聖人之言自古以宣而吾心之應感萬起溫由故用則知以時新心同化感故神隨精入莊生之言曰其應於化而解於物也其理不竭其來不蛻芒乎昧乎未之盡者豈不信哉追感韋編之絶以為歎息癸丑六月二十六日又書重改易傳序豫小子不顓世業妄意襟𢃄遂逃牧田子乃自家孰迤邐鄉之校私竊經史百家與諸子二三十年之間遂無一間日子焉昨年入兖州拜吾夫子南還出彭城考霸業之灰廢傷重瞳子秋復往返三吳施從於戈中觀夷夏之戰鬬又爾參錯孫武子吳子尉繚子磨墨盾上為人草劄子冬乃逃遁走趙如內黃乞買山錢於慕泉子嗚呼突斯不得黔於墨子矣無乃非得已而崇伯子已乎坐越月荒怖略定柴骨且復胔而關門面壁摩衲穿榻若禪子却耳目之聞見若聾瞽子不出閾若女子入春半來未有一草一木之色以牽動其悲懷愁思若癡絶子而時聞縧鷹羇馬凄然出其鳴飈嘶冽之聲則泣下沾襟若孟嘗之遇雍門子便欲騷賦積滿擲地作聲以震四壁鄰人之子則恐奏韶充耳無所用之其愚若宋人適越覔章甫之子亦欲荒湛一醉眯亂其天地古今上下四方而忘彼小人君子則縱心敗矩不可以其身為乾坤不肖之子將飬木雞之鬭於紀渻子而魯雞自謂能伏鵠子將運斤以刋堊鼻子觀濠梁之逰魚以偕五六七子而質亡久矣徒哭惠子棼紛外務不得其情均之為風波之民若擊鼓而求亡子嗚呼樹功揚名進之乏其公侯伯子而耕田鑿井退之離其庶民小子官齋坐食吾其益愆集亢以自墮於陳人廢子乎孟子曰乃所願則學孔子而孔子之言曰加我數年五十以學易則可以無大過矣易道微矣不惟九師子後有作者負荷未堪多尾雅之子吾懼於數十百子焉乃取舊著易傳刋削詳定以究大始于希夷子凡四十日斷不敢傲羲皇而效文學子亦曰説聖人之言發聖人之藴庶幾顔氏之子則已矣嗚呼日居月諸閔豫小子則吾豈誕曰翻七十二經以説老子乎始以為溫故知新庶可以告夫二三子而亦使夫二三子自今無曰不言如子則何述小子已矣丁己三月晦日書於內黃官舍之後東小廳改録易傳序夫機衡立極而雨風露雷之變現時出鰲極不動而走飛草木之呈吐刻殊何則敦化攸厚而川流四奔渾爾者融而繽紛雜起其理然也故曰藏諸用顯諸仁又曰富有之業大無外日新之德久無窮豈不信哉巳未之秋豫逰金陵客久稍暇則取易傳改修之未幾而東返易春再至而再業則踰月而復歸雖間畢業於家孰而亦略略矣六月七日再既至越八日乃行行改削而手謄之積四十日而止束之錦囊藏之石匱云夫薰椒木蘭蔽乘之照文姝雅女賤公之女經生之通患乃自古而記之矣吾我之間烏獲其免然而敝帚之享靳靳千金百朋之丐嗇啓十襲豈固周公之驕吝哉亦端木之所不得而聞者矣蜉之撼夫何尤焉傳曰苟不固聰眀聖知逹天德者其孰能知之則夫啓天奪祕之奧非仲尼人皆大笑之而韋編不絶則羲皇文旦之誥亦鬼語童諺而已矣故曰百世以俟聖人而不惑太史公曰伯夷得孔子而名益彰吾於羲皇文旦亦云嘉靖三十九年七月二十五日書於都城西北偏之民舍葉八白易傳原序
