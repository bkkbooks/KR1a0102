body:
  text: 葉八白易傳卷十三明葉山撰革已日乃孚元亨利貞悔亡何也葉子曰日往則月來寒往則暑來天道之變遷也夏忠而商質秦急而漢寬人道之推移也世豈能無更革乎哉但非聖人之得已傳曰易窮則變變則通通則久不窮而遽變聖人無是矣是故上古穴居而野處後世聖人易之以宫室上棟下宇以待風雨古之葬者厚衣之以薪葬之中野不封不樹喪期無數後世聖人易之以棺椁上古結繩而治後世聖人易之以書契百官以治萬民以察去其舊而為新非聖人之得已也所以通變而使之久也雖然民不可慮始權不可使知朝發而夕喻暮改而旦通非所以望天下之蚩蚩也是故盤庚既遷而民始喻周書多誥而民始知不得已之深意豈能遽喻諸人哉人不喻諸我而可遽責之人哉夫不得已而後動動而徵諸民是為考三王而不謬建天地而不悖質鬼神而無疑俟後世而不惑是為動而世為天下道行而世為天下法言而世為天下則遠之則有望近之則不厭經而黃帝堯舜之通其變而使民不倦神而化之使民宜之垂衣裳而天下治者是也權而為商湯周武之革命順乎天而應乎人身不失天下之顯名者是也秦始皇大變舊章漢武帝紛紛制作宋神宗泥古而更今變革之罪人矣昭烈定漢中實兵諸圍以禦外敵敵若來攻使不得入其後皆承此制及薑維用事建議以為諸圍適可禦敵不獲大利不若斂兵聚谷退就漢樂二城聽敵入平重關頭鎮守以折之敵攻關不克千里運糧自然疲乏引退之日然後諸城並出搏之此殄敵之術也於是詔漢中兵守漢樂二城蜀卒以破嗚呼誰為此更易變作也其始若為經國之遠猷其卒竟為亡國之亂道知者弗為之矣凡有天下深根固本之慮者其尚慎之也哉其尚慎之也哉易曰革已日乃孚元亨利貞悔亡初九鞏用黃牛之革何也葉子曰動生于靜靜不極不可以輕動通生于守守不固不可以遽通東坤氏曰尺蠖之屈以求伸也豈惟蠖哉鵠將飛則伏其翼鶻將噬則縮其爪牛將鬭則抑其尾虎將奮則局其足是以君子前乎思養其睿前乎動養其敬前乎言養其信前乎行養其順孟子曰人有不為也而後可以有為夫不為者養于屈也有為者伸其養也詩曰於鑠王師遵養時晦此之謂乎然則君子將欲大變天下之風俗必先于其風俗而固守之俟其自敝而變可通君子將欲大變天下之紀綱必先于其紀綱而持循之俟其自壞而舊始革故周官立政未遽行也必反商政政由舊斯為變殷之機興衰撥亂未遽動也其始必仍舊貫秉周禮斯為革魯之漸易曰鞏用黃牛之革六二已日乃革之征吉無咎何也葉子曰易窮則變變則通通則久自然之序也未窮而變雖變不通急變而通雖通不久夏之忠商之質周之文非一日之故也其所由來者漸矣故曰聖人慎動又曰寧失之遲毋失之速寧失之緩無失之亟遲遲而後動則驗之消息盈虛之理果出于天道之窮緩緩而後行則考之出入動靜之宜果出于人心之厭然後自天祐之吉無不利三代之所以同民心而出治道者豈無故與蘇軾告司馬光曰法相因則事易成有漸則民不驚范純仁曰差役當熟講而緩行不然滋為民病役議或難回則可先行之一路以觀其究竟蓋有以識此矣雖然革而因者循常之治革而革者急變之權也商政反於武成之日不為亟三章約於入關之初不為早不然宋神宗諭執政罷青苗法曽公亮陳升之欲即奉詔而趙抃獨曰新法皆安石所建不若俟其出既出安石一起而持之益堅天下擾擾不可支矣一言誤國禍豈淺哉是故君子貴審幾也易曰已日乃革之征吉無咎九三征凶貞厲革言三就有孚何也葉子曰天下有不可輕易之舉動而亦未有不可開道之人心桓溫之請遷都外示強威以震天下而中實虛聲以動朝廷此固不足言矣祖乙圮于耿盤庚欲遷以避之然而民未易喻也安土之情蹙然無我將去之之願從康之傲囂然有嗤其君上之心則動而或括民莫之與斯秦孝公商鞅之所切齒者矣然而非民之罪也動不可遽也是以盤庚不怒也引咎自責益聞衆言未遷之前有以昭利害之原悉存亡之勢達吾不得不動之心明爾安土重遷之意既遷之後有以申彼此之情釋疑懼之意明吾前日之用謀略彼既往之傲惰反覆告喻以口舌代斧鉞之誅而委曲忠厚之意藹然于言詞之表此三篇之所以不能已于陳也三篇之書陳而如歸之意起有適之居那矣而何傷于遷哉嗚呼此殷之所以不亡也與易曰征凶貞厲革言三就有孚九四悔亡有孚改命吉何也葉子曰三分天下有其二以服事殷者聖人安貞之本心也明夷于南狩得其大首者聖人達變之微權也權行而聖人之心始不能釋然于其間矣雖然天與之至也非人之所能為也人歸之極也非我之所能與也傳曰身不失天下之顯名又曰聞誅一夫紂矣未聞弒君也則名雖逆而事實順迹雖犯而心實恭吾何歉乎哉雖然君臣之分亦大矣天人之際亦嚴矣茍有一毫民心之未孚是為一日未絶之天存而可茍焉已乎民之戴商厥惟舊哉然後可以革夏正不期而會八百餘國然後可以著戎衣故曰湯一征自葛始天下信之又曰為其殺是童子而征之四海之內皆曰非富天下也為匹夫匹婦復讐也何也必如是而後為應天順人必如是而後為向明除害不然是未免為萬世之罪人矣故曰革之時義大矣哉又曰有伊尹之志則可無伊尹之志則篡也易曰悔亡有孚改命吉九五大人虎變未占有孚何也葉子曰有奉天伐暴之功則必有反政施仁之治為繼天立極之主則必作遐方下土之孚昔者黃帝堯舜垂衣裳而天下治書之言曰克明俊德以親九族九族既睦平章百姓協和萬邦黎民於變時雍又曰帝光天之下至於海隅蒼生萬邦黎獻共惟帝臣又曰戞擊鳴球搏拊琴瑟以詠祖考來格虞賓在位羣后德讓下管鼗鼓合止柷敔笙鏞以間簫韶九成鳯凰來儀又曰東漸于海西被于流沙朔南暨聲教訖于四海其稱商周之治曰天命弗僣賁若草木兆民允殖曰若日月之照臨光于四方曰重民五教惟食喪祭惇信明義崇德報功垂拱而天下治則其所以維新一代之治而文炳天下者果何如耶而其謳歌之所詠朝覲獄訟之所之堯舜三代之所以彰信兆民者又果何如邪何也聖人之興民之望也故漢祖之興也張良見之曰沛公殆天授光武之興也第五倫謂之曰聖主也一見決矣唐太宗之興也竇建德諸人莫不推服宋太祖之興也張光憲言于高繼沖曰宋帝規模宏遠不若早以疆土歸之則可以免禍而公亦不失富貴蜀相李昊亦勸其主曰臣觀宋氏起運不類漢周一統海內其在此乎若早通職貢亦保安三蜀之長䇿也英雄為人所信服蓋如此豈待説之而後喻哉故曰猛虎在山威震千里不然羊質虎皮如五季之君徒為驅除傳舍反物為妖如公牛哀之轉病也七日化為虎其兄掩户而入覘之則虎搏而殺之嗟乎文章成獸爪牙移易志與心變神與形化遭反物為妖之天遂反德而為亂若莽懿溫操與夫苻劉石乞之類其為生民禍也可勝言哉易曰大人虎變未占有孚上六君子豹變小人革面征凶居貞吉何也葉子曰安享太平之業者是為好德之錫福卷懷厠齪之才者是為安分之履亨郁離子曰螢之明微微也昏夜得之可以燭物取而置諸燭下則倐然亡矣燭亦明矣哉而不能不晦于月也太陽出矣月之明又安在哉然則八駿並駕駑蹇自無所措其足雲漢為章天孫亦無所逞其能巍乎成功之已立煥乎文章之已炳而將何用其黼黻之功薄海已盡稽首之誠呼韓尚致款塞之懇而安用其毛錐之輩為哉是故四門穆穆之後無復紛然之為天下大定之餘即為垂拱之治有以哉雖然漢業已定三傑無所施其能矣而婁敬脫挽輅建遷都關中之䇿唐業已成元功無所用其計矣而馬周釋草萊建以明佐聖之功此又觀其才何如耳未可以為天下定而果無用也易曰君子豹變小人革面征凶居貞吉鼎元吉亨何也葉子曰大功者聖人之所造大器者聖人之所資也傳曰聖人之大寶曰位又曰王天下有三重焉其寡過矣有聖人之位然後得以行聖人之道制禮作樂而天下之耳目新心志一矣心志一耳目新然後參天地贊化育而裁成輔相之功成矣大哉聖人之新民乎至哉聖人之寶位乎斯堯舜禹湯文武所以立人倫之極為萬化之原者乎孔孟則亦末如之何矣秦政沸竭而自融者也六朝多汁小雞淡而無味者也五季多雞少汁熬而不熟者也十六國死狐腐鼠起臭積穢以自潤者也漢唐宋抑庶幾焉而要之未可以享天地養聖賢振頺風滌汚俗重開天文地理之紀再整三綱五常之懿使經正而庶民興道昌而天地立其惟聖人乎其惟聖人乎易曰鼎元吉亨初六鼎顛趾利出否得妾以其子無咎何也葉子曰莊生有言鵲上髙城之危而巢于髙榆之顛城壞巢折凌風而起故君子之居世也得時則蟻行失時則鵲起此言顛沛之際未必非奮揚之機也何則順逆者外物之遇也反觀者入德之務也天下之事豈能皆順而無逆哉逆而以順行君子之哲也語云三折肱而成良醫豈不信哉何也士君子之處世也名行之未成者躁心為易起躁心起而茍且以赴功名之會者多矣豈知所謂世無呈身御史者哉然而郎君當以聖賢為師不宜發足便輕枉己之説則愧赧流汗之際抑亦動心忍性之資也况所遇之不善則輕經生而賤文士亦因之為反躬自悼之地改過遷善之門乎故曰苦海無邊回頭是岸又曰前失腳後把滑從古及今良不少矣栁子厚附王伾王叔文名行挫矣敗貶之後大有進益張橫渠早年意氣橫放論兵獻䇿恆若不足一見范文正教之名教之樂遂為當世大儒信哉一跌之不可以自廢也易曰鼎顛趾利出否得妾以其子無咎九二鼎有實我仇有疾不我能即吉何也葉子曰好女之色惡者之孳也公直之士衆人之瘞也修乎道之人汚邪者之賊也君子小人之際豈非不觸而自怒不犯而自惡者乎雖然秉德在我釁孔不開孔子之教子路曰君子以忠為質以仁為衛不出環堵之內而聞千里之外不善以忠化寇暴以仁固何必持劍是故天生德于豫桓魋其如豫何佛肸召子欲往磨不磷而涅不淄聖人之事也若閔子汶上之逃曽參藜藿之食其自守之高亦足以却非義之凂焉雖然杜林高蹈而不副隗囂之望囂固惡之矣然身挽鹿車載致弟喪則刺客知其行義而假其命于志寧極諌而不從承乾之欲承乾固忌之矣然親喪致哀憔然苫塊則張思政見其篤于孝思而不忍殺仁義在我彼雖欲即之其何能即之乎易曰鼎有實我仇有疾不我能即吉九三鼎耳革其行塞雉膏不食方雨虧悔終吉何也葉子曰胡為乎君子以道君子胡為乎以道以君不君其君而改其所以為君不從命世之士而更從避世之士其何以行之哉巢父許由沮溺丈人晨門荷蕢楚狂接輿之流非不充然道也然而山林非沛澤之所煙霞非光被之資則亦黯焉沕泥焉窒而已矣豈如伊尹處畎畝之中樂堯舜之道若將終身焉而幡然改畫然起則君臣之義于是乎行亂倫之咎于是乎免而伐夏救民之功咸有一德之盛後世不可及乎然則天下有道以道殉身君子亦觀其時而已矣胡為乎往而不反哉是故不病于始之隱而病乎終之迷雖然為司空圖魏野則可為盧藏用种放則不可假捷徑丐良媒大之藉五就小之稱兩截叛道甚矣豈非名教之罪人乎易曰鼎耳革其行塞雉膏不食方雨虧悔終吉九四鼎折足覆公餗其形渥凶何也葉子曰君子之于天下也才過其任則為大車之載而積中不敗力不能勝則為棟橈之凶而不可有輔天下事豈易為之哉班彪之論曰駑蹇之乘不騁千里之途燕雀之儔不奮六翮之用粢梲之材不荷棟梁之任斗筲之子不秉帝王之器然則君尊者必有高天下之德然後能無傾任重者必有過天下之力然後能不踣乎己德薄矣而又濟之以小人幾何而不敗國家之事貽天下之患哉楊駿以斗筲下愚之材當柱石難堪之任雖小智猶慮不免而乃比昵小人踈遠君子宰相以知人善任使為賢而馮道先薦杜仲威復引景延廣此二人者實喪晉國德宗任房綰而房綰任劉秩元顯與反復之牢之圖靈寶袁粲與惜身之禇淵圖蕭道成取敗之道也劉摯上疏神宗曰陛下夙夜厲精以親庶政天下未至于安且治者誰致之即陛下注意以望太平而自以太平為已任得君專政者是也二三年間開闔動搖舉天下無一得安其所者蓋議財則市井屠販之人皆召至政事堂政府謀議經畫獨與一掾屬決之然後落筆同列與聞反在其後故奔走乞丐之人其門如市輕用名器混淆賢否忠厚老成者擯之為無能俠少儇辨者取之為可用守道憂國者謂之為流俗敗常害民者謂之為通變聖人憂勤念治之時而政事如此皆大臣誤陛下而大臣所用者誤大臣也非是之謂乎若已不能勝而任賢人為之則亦何至僨事之深也唐鄭從讜為河東節度使奏以王條劉崇龜崇魯趙崇為參佐時人謂之小朝廷言名士之多也宋張浚在關陜三年訓新集之兵當方強之敵以劉子羽為上賓任趙開為轉運擢吳玠為大將蓋庶乎知大臣之道矣易曰鼎折足覆公餗其形渥凶六五鼎黃耳金鉉利貞何也葉子曰治天下有本執大中是也先后所以經世宰物者非乎而堯舜禹湯相傳之心法可見矣不然則雜霸而雜夷非所以語天德王道之純也治天下有道用剛直是也先王所以知臨神馭者非乎而堯舜禹湯弼咈之氣象可見矣不然則説諛而孚剝非所以言從繩格心之正也何也真西山曰人君一念之不純一動之失中皆足以姦隂陽之和故洪範以雨暘寒燠風為肅乂謀哲聖之應五者之不時為狂僣豫急蒙之應人主之一心與天地相為流通而善惡吉凶之符甚于影響蓋如此其可以不執大中乎羅豫章曰士之立朝以正直忠厚為本正直則朝廷無過失忠厚則天下無嗟怨二者不可偏也一于正直而不忠厚則漸入于刻一于忠厚而不正直則流入于懦汲黯正直所以闢公孫之邪諛忠厚所以闢張湯之殘刻武帝享國五十年其臣之賢獨此一人而已其可以不任剛直乎雖然執中可矣執而弗恆猶弗執也故曰允執其中伊尹戒于太甲曰德惟一動罔不吉德二三動罔不凶惟吉凶不僣在人惟天降災祥在德今嗣王新服厥命維新厥德始終維一時乃日新可不諗乎唐憲宗初年之政動中機會處置得宜可謂服強暴之膽起豪傑之心矣兩鎮既平末年漸肆何也執中不允私欲得而參之道心兢兢若是乎其難持人心役役若是乎其易起故耳用賢可矣用而弗克終猶弗用也故曰任賢勿疑蔡襄言于仁宗曰天下之勢譬猶病者陛下既得良醫矣信任勿疑非徒愈病而又壽民醫雖良術不得盡用則病且日深雖有和扁難責效矣李絳相憲宗忠鯁直亮受知人主言聽計從不一而足雖古之都俞吁咈無以過之而受降城之徙獨從吉甫吉甫在位十年言計鮮效至此而忽從其䇿何也李絳忠鯁至此稍以取厭吉甫順媚至此益以取憐耳嗚呼此守道者所以貴于拳拳服膺而用賢者所以貴于逐逐以繼乎易曰鼎黃耳金鉉利貞上六鼎玉鉉大吉無不利何也葉子曰古之大臣建精明之治功者貴有以涵渾厚之治體作神氣以立事者貴乎飬元氣以厚生故曰不剛不柔敷政優優百祿是遒又曰沉潛剛克高明柔克平康正直稷契臯陶伊尹周公之所以佐唐虞三代者見于書而可考也韓范富馬李沆之輩抑亦可以為次矣蕭曹丙魏房杜姚宋又次焉易曰鼎玉鉉大吉無不利震亨震來虩虩笑言啞啞震驚百里不喪匕鬯何也葉子曰老子有言妖孽者天所以警天子諸侯也惡夢者所以警士大夫也故妖孽不勝善政惡夢不勝善行也至治之極禍反為福然則天災人眚之雜集其進德修善之所由乎身心政行之交修其巨災凶禍之所弭乎故曰禍變之作天所以開聖賢又曰危者安其位者也堯以浲水而警豫湯以大旱而自責大戊以桑榖共生而受伊陟之贊高宗以雉雊鼎耳而聽祖已之規宣王以憂旱而側身修行宋景公以熒惑守心而不肯移之臣民與嵗周公以三叔流言而恐懼驚顧隨侯以季良之言而恐懼修政卒之成太平之治立中興之功致徙度之祥建大中之矩止強楚之伐何變之不圖而何平之不致哉書曰賓于四門四門穆穆納于大麓烈風雷雨不迷詩曰薄言震之莫不震疊懷柔百神及河喬嶽允王惟后此之謂生全出于憂患而死亡由于安樂多難乃興隆之地無虞為禍敗之原信哉易曰震亨震來虩虩笑言啞啞震驚百里不喪匕鬯初六震來虩虩後笑言啞啞吉何也葉子曰我為禍之主可以由我弭禍為起之初猶可速而圖何也惡夢先證不勝善行是故善行早修則精神協而惡夢蠲矣妖祥豫形不勝善政是故善政亟行則政刑明而妖祥散矣昔者周公使管叔監殷管叔以殷畔也發遣匪人之過周公不得而辭其責矣然祗慎弗懈恐懼不遑東山征而罪人得周室卒賴以安焉昌邑既立淫戲無度諌多不聽亦霍光之罪也而光能憂悶詢度挺身當變廢昏立明則周公之圖不虛負而劉氏之天下亦賴以不墜所謂患自我興亦自我息無奈道備而才宏心虔而志惕也朝錯發七國大難之端而動勞三十六將軍以誅擊錯身死而禍未結庾亮欲徵蘇峻舉朝以為不可亮卒徵之遂使擁兵濟橫江入臺城逼遷晉帝于石頭而江東之業十蕩其九宋太祖屢立大功加以法令嚴明士卒服用周恭帝幼沖中外物情皆附于宋祖密有推戴之意矣而北征之命卒致陳橋之變范質執王溥手曰倉卒遣將吾輩之罪也爪入溥手幾出血宋祖在公署將士擁溥質至相顧不知所為溥降階先拜質不得已亦拜嗚呼自己肇亂不能弭亂而以增亂且復從亂天下之亂吾不知其所終矣易曰震來虩虩後笑言啞啞吉六二震來厲億喪貝躋于九陵勿逐七日得何也葉子曰事之不能無險者遇也勢之不能不屈者時也遇險而懼以屈為伸斯其英雄之應變乎劉玄德以仁義之人當吕布虎狼之敵方其起兵討曹操殺車胄還小沛而操舉兵擊破之拔下邳禽關侯安得不棄所有而奔青州及其歸袁紹而又擊之于汝南安得不棄所有而奔新野舍其懷璧之罪擇其可奔之機以柔而避剛之猛以靜而制動之躁則險可轉而易屈可反為伸矣跨有荆益三分天下夫孰得而禦之是故屢挫不屈者英雄之志轉弱為強者否泰之機不然太王不避狄人而遷岐山趙襄子不避智伯而走晉陽高祖不避項羽而入漢中光武不避更始而出河北矣古之英雄其知應變屢如此雖然若州實之度其國危而不復紀侯之大去其國老死而不返魯昭之誓不能見夫人而客死于乾侯其志抑末矣君子不為焉易曰震來厲億喪貝躋于九陵勿逐七日得六三震蘇蘇震行無眚何也葉子曰禍患之來也以剛毅處之猶恐其不勝也而何有于暗弱以仁義行之猶恐其無成也而何况于險邪唐肅宗遭祿山之變已非應變之才矣不思以正道行之而獨與張良娣局戲不已王欽若遇契丹之寇已束手無䇿矣不知求智勇以勝之而獨閉門誦經修齋設醮若之何其不索索而矍矍哉然則如之何而可惟有猛然而自奮惕然以自改庶乎可以免矣易曰震蘇蘇震行無眚九四震遂泥何也葉子曰委曲以平王敦之難激厲以梟蘇峻之首者王導之蹇蹇成功也從容以銷桓溫之志談笑以折苻堅之寇者謝安之誠與材合也然則君子之處患難之世也不負剛斷之才曷足以自拔而不陷不秉貞誠之德曷足以自奮而不弱乎是故劉琨祖逖陶侃溫嶠卞壺之徒以孤身而當亂離板蕩之秋以疏逖而乘分崩離析之際卒能挺挺自樹或為八州之鎮或為上遊之援或為干城之倚或為姦邪之所憚而不敢發其凶或為羌氐之所賴而掖以戴其主非偶然也茍使才不足而弱志不奮而靡則百錬化為繞指一齊變于衆咻幾何不載胥以及溺駢首而受戮乎王夷甫殷深源諸人重可監也已然則劉向處王氏之山壓而不僵韓愈處伾文之波蕩而不搖其不為雄歆宗元禹錫者不有由然矣乎易曰震遂泥六五震往來厲億無喪有事何也葉子曰成事以剛不以柔濟變以強不以懦柔而懦險且枕矣作于內而有寇憂作于外而有賊慮勞于身而為旰食薰于心而成夜思奚所辭其危哉故曰人主常立于二難之間在上而國家不治難也治國家則必勤身苦思矯情以從道是難也有難之難暗主取之無難之難明君居之雖然多難乃興隆之地無虞為禍敗之原大禹克勤于邦荒度土功而卒成萬世永賴之休成湯栗栗危懼檢身若不及而竟為開基作業之主文王自朝至于日中昃用咸和萬民而終畢三分有二之業危者安其位亂者有其治亡者保其存不亦信乎然則古之諸侯朝修其禁令晝考其國職夕省其典刑夜警百工無使慆淫而後即安有以也故曰賢王厲志若殷高宗能葺其德藥瞑眩以瘳疾衛武警戒于朝勾踐懸膽于坐厲矣哉寵妻愛妾幸矣其為災也深矣易曰震往來厲億無喪有事上六震索索視矍矍征凶震不于其躬于其鄰無咎婚媾有言何也葉子曰尺箠當猛虎奮擊而大呼徒手遇蜥蜴變色而却步人之情也然則天下之變突然而來以剛健當之猶且不免赫然而恐懼柔懦焉離披而解散矣古語有云立弱子于千仞之上而觀人與虎鬬于其下此其氣必荒然盡其精蓋頽然跰矣雖然天下之禍起自膏肓之際蕭牆之內者未易卒圖來自門庭之外千百里之遠者可以豫備黃人恃齊之盟而曰自郢及我九百里焉能害我賀若弼渡江陳後主曰王氣在此周師再至而敗是自送死也斯則亡無日矣稍知警焉何至突如其來忽忽乎心計之荒張精神之潰散乎昔吳伐郯郯成季文子曰中國不振旅蠻夷入伐而莫之或恤無弔者也夫詩曰不弔昊天亂靡有定有上不弔其誰不受亂吾亡無日矣君子曰知懼如是斯不亡矣楚人滅江秦穆公為之降服出次不舉過數大夫諌公曰同盟滅雖不能救敢不矜乎吾自懼也君子曰詩曰維此二國其政不獲維彼四國爰究爰度其秦穆之謂矣魯晉盟于赤棘臧宣叔令修賦繕完具守備曰齊楚結好我新與晉盟晉楚爭盟齊師必至雖晉人伐楚齊必救之是齊楚同我也知難有備乃可以逞楚師在衛孟獻子曰小所以事大恭也盍獻物以致恭乎庶免其伐乃聘楚以示好焉此秦之所以遂霸西戎而魯之卒保其安也不知此道若虞以伐虢為利魏以伐趙為便楚貪秦賂而坐視齊之數被兵也安得不厪宫之竒孔子順諸賢之憂哉是故晉之譎詐鮮虞屢被其毒矣及聞晉師之悉起也而不警邊且不修備卒為荀吳之所滅君子以為罪之大者矣雖然滕文公知懼于築薛金哀宗先惕于將亡而卒不免于敵國之折辱者此又時命致然也夫易曰震索索視矍矍震不于其躬于其鄰無咎婚媾有言艮其背不獲其身行其庭不見其人無咎何也葉子曰天下之物莫不各有當止之處考之大學經傳而可知已人惟不知所以止之于是靜而惟知有我天理人欲戰于中而不能憑動而惟知有人毁譽是非怵于外而無所據天命之性幾何能存而率性之道或幾乎廢矣夫惟君臣父子朋友各止于仁敬孝慈而不遷則寂感動靜各安乎本然之理而不惑矣是故未感則得理不得身有忠孝而無死生有節義而無患害有道德而無功名是之謂忘我曷內顧焉既感則見理不見人一家非之而不顧一國非之而不顧天下非之而不顧是之謂忘物曷外阻焉此窮理盡性至命之學達天德之事也非孔顔曷足以語此易曰艮其背不獲其身行其庭不見其人無咎初六艮其趾無咎利永貞何也葉子曰君子藏器于身非不欲一舉千里而橫絶四海也然必待時而動者何哉天下事良不可以率意為之而妄行者必取困也是故無所感于上則必止于下為衡門之棲遲為山澗之考槃斯不失其順聽之道矣夫何履錯壯趾之過哉雖然守道而止半塗而起猶不止也遁世不見知而不悔斯其君子之永貞矣故曰伯夷避紂居北海之濱以待天下之清也若將終身焉不然而茍且以赴功名之會頃刻以變終身之操則前功盡棄萬事瓦裂矣种放之不如魏野王良之不如嚴光華歆之不如管寧有以也夫易曰艮其趾無咎利永貞六二艮其腓不拯其隨其心不快何也葉子曰敬以直內義以方外敬義立而德不孤君子之正已也盡乎性分之所固有也上而匡乎君中而輔乎僚下而扶其執君子之正人也全乎職分所當為也雖然有官守者盡其職有言責者盡其忠君子之所能也盡其責而不得其職盡其忠而不得其言非君子之所能矣君子所能其道可以自盡君子所不能其心安能以獨樂哉是故歎吒不食薛奎所為自忿仰屋竊歎富弼以之自傷臣之不得匡其君不已戚乎下而薛季昶之于五王常安民之于蘇子畢仲遊之于司馬公其勤勤懇懇于啓告之間使之以明為哲轉禍為福而諸公瞢焉莫之覺也心徒惕矣若夫晉平之轉魯于恤使靡所止居而不顧勤魯大夫之憂方且謂之宣驕而不知冉求為季氏家臣親見其僣逆之罪而不敢言親受夫子之訓而謂之不能救其猥鄙之甚而誠有不足以論拯救之義矣雖然匡之直之固不可不盡其義而可也否也又不可不審其隨東坤氏有言君子遇人之輕于質必量其成審已之難于任必辭其附否則屈力于此而失望于彼君子不可以虛承故由其道則華歆之微謂之義不由其道則齊桓之霸謂之不知矣春秋之時楚數侵伐江黃二國以為患桓公方強將伐楚二國遂來會于貫澤管仲曰江黃遠齊而近楚楚為利之國也若伐而不能救則無以宗諸侯矣不可受也桓公不聽卒與之盟管仲死楚人伐黃桓公不能救諸侯不附遂不復興東漢之末華歆避西京之亂與同志鄭泰六七人步出武關道遇一丈夫獨行願得俱衆哀欲許之歆獨曰不可今已在危險中禍福利害一也無故受人不知其義既已受之若有進退可中棄乎衆不忍卒與俱行此丈夫中道墮井衆欲棄之歆曰已與俱矣棄之不義相率出之而後别去衆服其義故曰氣盈則輕納而寡全心歉則重思而多獲此審隨盡義之辨也易曰艮其腓不拯其隨其心不快九三艮其限列其夤厲薰心何也葉子曰天有燥濕絃有緩急柱有推移趙王遣使之調琴不可記變有吉凶禮有弔賀事有權宜趙使受命之定辭不可任故聖人能與世推移而俗士苦不知變以為結繩之政可以理亂秦之緒干戚之舞足以解平城之圍豈不殆哉昔者紂母生微子啓與中衍也尚為妾已而為妻生紂父母欲置微子啓以為太子太史據法而爭之曰有妻之子不可置妾之子紂故為後太史之議法豈不曰子以母貴乎殊不知子以母貴也者二母而妻妾分焉者也不謂一母也母可以由妾而為妻子亦可以由庶而為嫡均之為是母出也先之為庶則為兄後之為嫡則為弟彼以其嫡此以其兄兄也者天道也嫡也者人道也况立嫡以長又以賢乎太史之議法又何異于夏父弗忌之議禮也故曰報中無權猶執一也君子所以惡賊道也易曰艮其限列其夤厲薰心六四艮其身無咎何也葉子曰天下甫定順流而更化者大臣肇造之規模也天下既定休養而生息者大臣洪濟之職務也天下萬物各得其所矣斂其神氣而不泄極其悃愊而無華蓋有安其身而不動易其心而不語定其交而不求者此安養天下之要道和柔蒼生之至本其斯無愧于負天下之重乎周召上也蕭曹丙魏房杜姚宋次之持其身而慎其行檢其躬而安其分石慶之醇謹張安世之謹厚盧懷慎之清素又次之易曰艮其身無咎六五艮其輔言有序悔亡何也葉子曰爾惟風下民惟草讋伏之勢君人者握之也王言如絲其出如綸王言如綸其出如綍榮辱之主為人上者其可茍乎哉成王一言而天反風景公一言而妖星退公子御説言懼而名禮臧孫達知其為君故曰言行君子之所以動天地也可不慎乎傳曰君子居其室出其言善則千里之外應之况其邇者乎出其言不善則千里之外違之况其邇者乎言行君子之樞機樞機之發榮辱之主也管子曰人主出言不逆于民心不悖于理義其所言足以安天下者也人惟恐其不後言也出言而離父子之親疏君臣之道害天下之衆此言之不可復者也故明主不言也然則不當言而不言惟有止其輔頰舌耳若之何其為口説之滕哉不妄發發則必當理惟不言言乃雍此之謂有一哉之心而後有大哉之言也是之謂有大哉之言而有以知其一哉之心也高宗三年不言一言而四海仰成威王三年不鳴一鳴而齊國震驚不其然乎故曰真主一言其利博若魏地井中龍出羣臣以為吉祥魏主髦曰龍者君德也上不在天下不在田而數居于井非嘉兆也作潛龍詩以自諷司馬昭見而惡之亦可謂言不有中矣甚者唐時溥獻黃巢首并其姬妾僖宗御樓受之宣問姬妾女曹皆勳貴子女何為從賊其居首者對曰狂賊凶逆國家以百萬之衆失守宗祧播遷巴蜀今陛下乃以不能拒賊責一女子置公卿將相于何地乎皆戮之噫發言之不當未有甚于此者也其何以為天下主易曰艮其輔言有序悔亡上九敦艮吉何也葉子曰君子依乎中庸遁世不見知而不悔不以時之久而薄所守仲尼之勉焉日有孜孜斃而後已者聖學之所以成始而成終乎遁世不見是而無悶不以節之苦而削其操伯夷之采薇首陽而餓死以畢願者聖節之所以有始而有卒乎易曰敦艮吉葉八白易傳卷十三
