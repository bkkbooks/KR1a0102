  - {type: page-break, offset: 0, content: '', id: KR1a0102_WYG_004-1a, image: WYG0032/WYG0032-0648a.png}
body:
  text: 葉八白易傳卷四明葉山撰同人于野亨利渉大川利君子貞何也葉子曰必欲四海九州之兼濟者聖人之心也不於一物二物三四五物而相暱者聖心之公也故曰老者安之朋友信之少者懐之通天下為一體合萬物為一身斯之為大道之公乎斯之為天下一身中國一人乎堯舜之世九官十二牧十六相同於朝普天之下率土之濵同於野是以濟濟緫緫堯舜之民皆以堯舜之心為心而萬邦協和黎民於變時雍百工熙庶事康至諴感神矧兹有苗必至之治矣何天下之不平何大事之不濟者哉雖然孔子告子路以君子之道曰脩已以敬脩已以安人脩已以安百姓其自言君子曰周而不比是公已公物之道己正物正之軌也非其道則詭失其軌則邪宋公子鮑禮於國人宋饑竭其粟而貸之年七十以上無不饋詒也時加羞珍異無日不數於六卿之門國之材人無不事也親自桓以下無不恤也是為邪而媚齊舊四量豆區釜鍾四升為豆各自其四以登于釜釜十則鍾陳氏三量皆登一焉鍾乃大矣以家量貸而公量收之山木如市弗加於山魚鹽蜃蛤弗加於海民三其力二入於公而衣食其一是為竊而咻是則國之賊而民之蠧矣豈非聖王之所誅哉易曰同人于野亨利涉大川利君子貞初九同人于門无咎何也葉子曰觀於海者難為水非難為水也見水之宗也遊於聖人之門者難為言非難為言也知言之奥也然則舉天地萬物為度内者而可使之窮年不見日月之光哉而可使之孤羣偏黨以為合哉故淮南子曰今有人囚之㝠室之中雖養之以芻豢衣之以綺繡不能樂也以目之無見耳之無聞穿隙穴見雨零則快然而歎之况開戸𤼵牖從㝠㝠見昭昭乎見昭昭猶尚肆然而喜又况出室坐堂見日月之光乎見日月之光曠然而樂又况登泰山履石封以望八荒視天都若蓋江河若帶又况萬物在其間乎故曰不聞大論則志不宏不聽至言則心不固思唐虞於上世瞻仲尼於中古而知夫小道者之足羞也想伯夷於首陽省四皓於商山而知夫穢志者之足恥也存張騫於西極念蘇武於朔垂而知懐閭室者之足鄙也然則門之内父子也兄弟也夫婦也遞相為宗者也門之外四方也上下也往古也來今也曷其有窮焉者乎出戸牖觀大道去家人覽乾坤此司馬子長邵堯夫之學也同人乎哉同人乎哉易曰同人于門无咎六二同人于宗吝何也葉子曰自一鄉而及天下者君子進徳之資也盡當今而進往古者君子尚友之益也則夫懐篤固於僻隘之中昵比附於卑陋之末閉門而覔友坐甕以托交不亦下士之末而規規瑣瑣之甚已乎大道之不聞至理無從得無足怪也已何也楚人亡弓楚人得之已形骸於爾女矣况爾女而遞相為爾女自棄孰甚焉歛盂之㑹辭鄭盟攅函之盟比戎狄春秋之所罪也昔者周公制政下士七十人介子推行年十五而相荆仲尼聞之使人往視還曰廊下有二十五俊士堂上有二十五老人仲尼曰合二十五人之智智於湯武并二十五人之力力於彭祖天下其固免乎是故荀氏之書曰太上不異古今其次不異海内同天下之志者其盛徳乎故大人之志不可見也浩然而同於道邵子之書曰無名公年十嵗學於里人遂盡里人之情己之滓十去其一二矣年二十求學於鄉人遂盡鄉人之情己之滓十去其三四矣三十求學於國人遂盡國人之情己之滓十去其五六矣年四十求學於古人遂盡古人之情己之滓十去其七八矣年五十求學於天地遂盡天地之情欲求己之滓無得而去矣嗚呼此同人之至也夫故曰王先成彭州一走卒也為王宗侃條七狀以白王建建能用之遂不煩兵而下一州然則取士之路可不廣哉取之廣然後賢才不在下而在上賢才在上則下受其賜而禍亂不作矣昔晉和凝為端明學士署其門不通賔客耀州推官張誼致書於凝以為切近之職為天子耳目宜知四方利病柰何拒絶四方賔客雖身安為便如負國何拓跋猗盧請并州從事莫含於劉琨含不欲行琨曰以并州單弱吾之不材而能自存於戎狄之間者代王之力也吾傾身竭貲以長子為質而奉之者庶幾為朝廷雪太恥也公欲為忠臣柰何惜共事之小誠而忘狥國之大節乎往事代王為心腹一州之所賴也含遂行猗盧甚重之與參大謀吁其有以識此矣易曰同人于宗吝九三伏戎于莽升其高陵三嵗不興何也葉子曰材徳之人成功者之所急也中正之士舉事者之所資也然則求之者有不殷而取之者有不切乎是故有以君子而求君子者矣此則不待戒而孚苗劉之變張浚與吕頤浩張俊謀起兵共討之㑹韓世忠由海道将赴任行在張俊聞之喜曰世忠來吾事濟矣因白浚以書招之世忠即率兵赴闕誅二賊以復帝位亦有小人而求君子者矣此則不可强而致姚令言反迎朱泚為權知六軍泚遣騎士以兵刼段秀實曰段公來吾事濟矣因議稱帝秀實勃然前唾泚面舉笏擊之濺血灑地何也君臣之義無所逃於天地之間則邪妄之求不可得而强諸刼奪之下是故威力雖猛猛無所施桓温忌謝安之忠壁人以圖之而不能曹操壯雲長之義百計留之而不可觀望雖詭詭無所用齊景晚年挾衛欲抑晉以代興然次五氏次垂葭㑹于牽皆不敢伐晉雖圖回數年而終莫之成其初求諸侯先得鄭魯而後得宋及鄭宋交伐欲救宋則失久好之鄭欲勿救則失新附之宋故蘧拏之次觀望二國之間待其勝負而隨為之媚奸謀雖詭而圖霸不成則何益哉易曰伏戎于莽升其高陵三嵗不興九四乗其墉弗克攻吉何也葉子曰惟天下之正理可以屈横逆之大勢惟天下之屈勢可以止無厭之欲心齊人欲伐魯師北行矣忌卞荘子勇不敢過卞晉人欲伐衛秣馬厲兵矣畏子路賢不敢過蒲趙盾欲伐邾起諸侯之師八百乗矣服矍且長不敢納㨗菑皆屈於理而阻於勢者也况彼君臣之義無所逃於天地之間理莫尚焉惟辟作威患至掇於訟上之際勢莫尚加焉而奚以妄動為哉畏天下之大義者災不逮夫身安天下之大分者禍不作於己君子所以貴自反乎易曰乗其墉弗克攻吉九五同人先號咷而後笑大師克相遇何也葉子曰君得臣而後萬化行世無賢人君子則亦已矣有之而不為我所有果能已其寤寐之思乎間之於始而合之於終又能已其魚水之歡乎詩人之歎文王曰惟天下之至靜為能配天下之至健萬化之源一本於此未得之也如之何其弗憂既得之也如之何其弗樂噫閨門之助如此而况不有君子其能國乎仲尼在衛趙鞅絶謀干木處魏秦人罷兵謝安在晉王猛知其不可伐季梁在隨楚子之兵不敢加子罕在宋而天下莫能當三良為政而鄭國未可間君子之有係於人國也如此有之而為小人之所間間之而失君臣之相孚可無憂乎昔者晉人患秦之用士㑹也六卿相見於諸浮趙宣子曰隨㑹在秦賈季在狄難日至矣於是相與謀復焉蓋其憂之深而念之重也楚不知此而卒使竒材䇿士為敵國用故析公為繞角之遯而失華夏雍子為彭城之潰而失東夷子靈教呉叛楚而罷於奔命苖賁皇夷王熠師而鄭叛呉興楚人之不復振也豈非不知因離求合之道乎嗚呼君子於此所以三致意而不能平其懐遣其心者有由然也雖然知求賢而不知去讒賢不得也知去讒而不知用斷讒不忘也唐代宗知慰李光弼而不能斬程元振徳宗知恃李懐光而不能誅盧把三國呉主休喜讀書欲與祭酒韋昭博士盛冲講談張布以昭冲切直恐入侍言已過因諫止之休曰孤欲與昭等講習舊聞亦何所損君特恐其道臣下奸慝故不欲入耳如此之事孤自己備之不須昭等然後解也布惶恐謝罪且言懼妨政事休曰王務學業其流各異不相妨也然休恐布疑懼卒廢講業不使昭等入五代楚王殷用都軍判官高郁為謀主國以富强鄰國皆疾之唐荘宗入洛殷遣其子希範入貢荘宗愛其警敏曰比聞馬氏當為郁所奪今有子如此郁安能得之高季興亦屢以流言間郁於殷殷不聽司馬楊昭謀代郁任日譖之於希聲希聲屢請誅之殷曰成吾功業皆郁力也如何為此言希聲請罷其兵柄乃左遷郁行軍司馬希聲遂矯殷命殺之嗚呼知其賢矣而不能求之專覺其奸矣而不能去之力若之何其得相遇邪惟苻堅之於王猛殆庶幾焉猛日親幸用事勲舊多疾之樊世本氐豪佐秦王健定闗中謂猛曰吾輩耕之君食之邪猛曰非徒使君耕之又将使君炊之世大怒曰要當懸女頭於長安城門不然吾不處世猛以白堅堅曰必殺此老氐然後百寮可肅㑹入言事與猛爭論於堅前世欲起擊猛堅怒斬之於是羣臣見猛皆屏息猛時年三十六嵗中五遷權傾内外人有毁之者堅輒罪之嗚呼偏國之用賢去讒乃能堅而克斷如此此所以卒成大業不然天下之士未有能至者矣齊晏子有言人有市酒而甚美者置表甚長然至酒酸而不售主人問其故里人曰公之狗甚猛而人有持器欲往者狗輒迎而嚙之是以酒酸不售也士欲白萬乗之主用事者迎而嚙之亦國之惡狗也不去惡狗士何由至哉嗟乎豈惟君臣父子之間亦誠有之漢武帝唐𤣥宗亦威明之主一為小人所間不能用其仁武遂使骨肉傷殘天親不保禍敗宜矣惟後唐明宗僅有取焉安重誨欲陷李從珂矯制令楊彦温逐之令索自通斬彦温從珂馳入自明唐主責令歸第重誨諷馮道趙鳳奏從珂失守宜加罪唐主曰吾兒為奸黨所傾未明曲直公輩遂不欲置之人間何邪且此皆非公輩意也明日重誨自言之唐主曰朕昔為小校家貧賴此兒拾馬糞以自贍以至今日為天子曽不能庇之邪嗚呼不用馮河之勇幾至大患父子尚然况君臣乎明主所宜深戒也不然墮於坑谷入於塹壑覩歸來望思之臺而痛無益矣何嗟及哉易曰同人先號咷而後笑大師克相遇上九同人于郊无悔何也葉子曰不與人異君子固未嘗遯世而離羣也而人不我同君子亦豈甘援人而推已乎芒然徬徨乎塵垢之外翛然遨遊乎無何有之鄉與木石居與鹿豕遊曠然天地萬物莫之為逅非君子之棄物也時莫我與也是故據君子隨時之義則遯世者理不背而心不歉故嘉遯龍盤越世高蹈游心於浩然玩志於衆妙絶景乎大荒之遐阻吞吐乎幽響之窮奥者可以知伯夷餓死之心原上天生物之仁則長往者心不安而志未得故不卷道而背時不遺身而匿跡生必耀華名於玉版没則勒洪伐於金冊者可以識孔子周流之意易曰同人于郊无悔大有元亨何也葉子曰普天之下有分土不可語至治率土之濵有分民不可溥同仁何也令有所梗而不通化有所沮而不達君子所不道也其惟光天之下至於海隅蒼生萬邦黎獻共惟帝臣惟帝時舉者乎其惟弼成五服至於五千州十有二師外薄四海咸建五長各迪有功者乎其惟東漸於海西被於流沙朔南暨聲教訖于四海者乎禮樂刑政四達而不悖沛然徳教充溢乎四海斯之謂極盛矣若夫東極於海西至焉耆南盡林邑北抵大漠皆為州縣東西九千五百一十一里南北一萬六千九百一十八里唐地盛矣而治功不免于雜夷天下凡有郡一百九十縣一千二百五十五户八百九十萬有竒東西九千三百里南北一萬四千八百一十五里隋氏之盛極於此矣而旋踵遂至于滅亡漢有南粤之不下宋有十六州之未收以至六朝之不能渾一五季之不復有中原其事益末其道益替而不足以語治道矣易曰大有元亨初九无交害匪咎艱則无咎何也葉子曰富貴之極侈心自起世禄之家鮮克由禮故曰富不期驕貴不期侈豈非人情也乎然則履豐裕之初居富貴之始則驕盈之失未起奢麗之態未作亦其勢使然也無有蕩陵徳背天道夫亦何過哉子貢之富而無驕公西華之積而能散此聖門之所重也雖然出見紛華入與心戰雖賢者不能自免而况常人乎見之者尚不免心動而况身履其盛乎怙侈滅義服美於人驕淫矜誇将由惡終不特殷之庶士為然也古今中知之士往往有所不免焉可無慎乎伯張曰貴而能貧可以後亡恭敬事君與二三子生在敬戒不在富也晏子曰慶氏之邑足欲故亡吾邑不足欲也益之以邶殿乃足欲足欲亡無日矣不受邶殿非惡富也恐失富也且夫富如布帛之有幅焉為之制度使無遷也夫民生厚而用利於是乎正徳以幅之謂之幅利利過則為敗吾不敢貪多所謂幅也免餘曰甯子惟多邑故亡臣恐死之速及也史魚曰富而能臣必免於難上下同之戍也驕其亡乎富而不驕者鮮驕而不亡未之有也然則始雖不害終其可以忘戒乎持其志使無終怠惕其心使無久淫閑於禮使無末侈庶幾其可免乎書曰雖收放心閑之惟艱資富能訓惟以永年惟徳惟義時乃大訓不由古訓于何其訓嗚呼此畢公之所以成就殷民者斯其為至乎子謂衛公子荆善居室抑亦庶幾於是矣易曰无交害匪咎艱則无咎九二大車以載有攸往无咎何也葉子曰短綆不可以汲深小器不可以盛大故欲引重致逺者蓋軫輪輻之具不可以不厚且良戡禍亂綏太平者文武常變之才不可以不大而博不然則僨矣戰國䇿曰君因王言而重責以事􅢠之軸今折矣楚詞曰任重載盛兮陷滯而不濟則夫有其物而無其器有其器而無其具安有不僨於濟而入於淖者哉然則授之至大而不驚納之至煩而不亂其正足以立天下之經其權足以達天下之變古之人有勝之者伊尹周公是已其次孔明李綱亦庶幾乎管仲知不足而才有餘蕭曹識不明而量褊淺房杜有宰相之才而無其道韓范富馬有宰相之道而乏其器諒哉其未易易也易曰大車以載有攸往无咎九三公用亨于天子小人弗克何也葉子曰以下而奉上者臣民之分以義而為奉者克獻之貞君子之事君吾身之上皆君物也而敢以之為自私邪是故朝而獻功以告其勤聘而獻物以表其情有嘉謨嘉猷而入獻爾后以昭其忠奉其土地奉其民人奉其犧牲玉帛而畢獻其君以述其職是為推所有以進君不敢私也然其心之公而正情之精而忠無所假也彼小人者私而邪矣狡而偽矣其何以有是邪是故不有所進則已矣茍有進焉将必面而獻諛以長其過背而獻謟以逢其惡明而獻物以投其欲微而獻計以售其奸婉而獻巧以竊其柄矣而得謂之有所進乎古之人若姚崇之手寫無逸為圖以障屏風裴度之上憂勤計畧歐陽脩之進朋黨論范純仁之進尚書解鄭俠之進流民圖與魏徵姚崇宋璟李林甫傳范仲淹之上百官圗槩可見矣不然則李絳之不進羡餘乎彼李林甫繼姚崇為相則代以山水圖矣李鷃則進慶雲圖矣丁謂則上景徳㑹稽録矣林特則上祥符㑹稽録矣王安石則進其子雱所論天下事三十餘篇矣鄧洵甫則進愛莫助圖矣不然則十五道之不申户口乎心術之不同而為獻之能否如此人君不可以莫之察矣易曰公用亨于天子小人弗克九四匪其彭无咎何也葉子曰人之言曰近君者勢不震而盛用事者權不招而集權勢之所歸禍敗之所隨也雖然此勢説也非理説也此權勝也非義勝也不有明以察夫消息盈虚之機辨以别夫上下尊卑之分明而又明辨而又辨晣以昭夫古今興亡之數諗乎賢愚禍福之原矣乎則不有其盛而處其衰不居其滿而處其虚周公之不以至親廢恐懼伊尹之不以寵利居成功是已其次張安世畏父子封侯之盛而辭禄逺權郭子儀杖其子肆言之失而歸朝待罪又其次若鄭祗徳為江西觀察使以子顥尚萬夀公主通顯固求散地罷為賔客分司後顥營求作相祗徳與書曰聞女已判户部是吾必死之年又聞欲求作相是吾必死之日也顥懼表辭庶乎其免矣不然幸則萌芒刺灑淅之疑不幸則致怏怏跋扈之死大不幸則為楊邠總機政郭威主征伐史𢎞肇典宿衛王章掌財賦邠𢎞肇嘗議事于隱帝曰陛下但禁聲有臣等在卒為誅死非茍然也故曰聖人之知固已多矣其所守者有幸故舉而必榮愚人之知固已少矣其所事者多妄故動而必窮呉起張儀知不若孔墨而爭萬乗之君此其所以車裂支解也易曰匪其彭无咎六五厥孚交如威如吉何也葉子曰至難起者天下之心非孚誠不交然而誥誓不及五帝詛盟不及三王交質子不及二霸其惟朕心朕徳惟乃知蕭王推赤心置人腹此臣民所以翕合而通為一身也周桓畏鄭而紿曰無之衛侯叛晉而詭朝國人改卜嗣質公子行工商臣民不解體乎不易屈者天下之勢非徳威不畏然而道徳之威成乎安强暴察之威成乎危弱狂妄之威成乎滅亡其惟乃聖乃神乃武乃文戒之用休董之用威庶頑讒説若不在時侯以明之撻以記之斯天下無有反道敗徳侮慢不恭者矣漢元之優柔不斷而漢業遂衰唐文之牽制文義而卒不復振國事不廢滅乎故曰事周于世則功成務合于時則名立昔齊桓公合諸侯以乗車退誅于國以斧鉞晉文公合諸侯以革車退行于國以禮義桓公前柔而後剛文公前剛而後柔然令行乎天下權制諸侯均者審於世之變也漢文帝誠信及蠻貊而叛亂競起於藩國宋仁宗能使契丹夫婦交泣以發喪而不免於疆場之禍唐代宗處僕固懐恩之母徳宗處懐恩之子未嘗不責己厚待人恕然而誠不能感物則恩加人而人不親義不足以服心則信示人而人益疑恩威不立紀綱卒壊而已矣甚而天平軍亂僖宗詔本軍宣慰之無得窮詰右補闕常濬上僖宗書曰陛下姑息藩鎮太甚是非功過駢首並足致天下紛紛若此猶未之寤宜稍振刑典以威四方嗚呼事勢至此抑又何言乎庶幾於此者唐憲宗用杜黄裳之謀討劉闢用武元衡之謀討呉元濟武宗用李徳裕之謀討劉稹誅郭誼其剛明果斷英敏特達能用忠謀不惑羣議良可詠矣善乎先達之言曰賈生有言髖髀之所非斤則斧天下固有尊官大寮方命圯族者有剖克剥截元元者有執左道以亂政者有冦賊鴟義者有强宗豪右凌虐孤寡者有作邪行以敗俗者有為訛言異服淫聲竒技以疑衆者是髖髀也不斧而斤之可乎是故四罪而天下服舜之所以帝三罪而民服文之所以霸威之不可弛也如是夫司馬法曰教笞不可廢于家刑罰不可弛于國征誅不可偃于天下書曰其尚克詰爾戎兵方行天下以陟禹之迹又曰張皇六師無廢高祖寡命蓋有以諗此矣晉武平呉而去州兵唐穆宗即位兩河畧定蕭俛段文昌以為天下已平宜漸銷兵請密詔軍鎮每嵗八人之中限一人逃死無備甚矣天下能不易而潰之乎雖然兵以威國将以威兵命将不嚴威固不立昔者城濮之敗楚殺子玉鄢陵之敗再殺子反用能轉敗為勝以弱為强與晉爭霸横行江漢其最後也敗于栢舉而其将囊瓦出奔不復能舉先王之法于是楚自此不振平王之尸鞭懐王紿以入秦其子孫以六千里之地而為讐人役至於亡而後止也可不慎與昔李光弼與史思明戰於河陽禆将郝廷玉奔還僕固懐恩少却皆命取其首二将乃奮力齊進而賊大潰周世宗高平之戰誅敗将樊愛能何徽卒取威定霸宋太祖命曹彬取江南出匣劍付之而江南平狄青討儂智高陳曙敗績于金城青㑹諸将堂上揖曙起驅出軍門斬之而智高卒㓕為君者既不能强至於不得已而用兵又不善将使敗其師而得逃死将何以安其身而存其位也耶易曰厥孚交如威如吉上九自天祐之吉无不利何也葉子曰履信思乎順人道備矣天與而人歸神道全矣履端于始而舉正于終人與其成而天防其敗不亦美乎昔者孫叔敖遇狐丘丈人狐丘丈人曰有三利必有三害爵高者人妬之官大者主惡之禄厚者怨歸之孫叔敖曰不然吾爵益高吾志益下吾官益大吾心益小吾禄益厚吾施益博可以免于患矣噫人不滿則天無所從槩非伊尹周公曷足以當此霍光不負周公之托孔明益䖍後主之誠燕陽騖歴事四朝年耆望重自太宰恪以下皆拜之而騖謙恭謹厚過於少時戒束子孫雖朱紫羅列無敢違犯其法度者抑亦可以為次矣故曰所貴乎位者達道於天下達惠於民達徳於身不然而以貴高人以富奉身以肆報心則生災矣劉聰螽斯則百堂災燒殺聰子二十一人斯堂之名何居而乃殺其子若此之多也不履信不思順天不祐之而凶禍乃如此易曰自天祐之吉无不利謙亨君子有終何也葉子曰君子知天下之不可以先也故後之徳言盛而禮言恭知夫人之不可以上也故下之善無伐而勞無施然則雖有功而不自居雖有能而不自有君子之致為矣家邦之必達州里蠻貊之可行狡偽因之獻誠而暴慢所由以致恭夫豈茍然而已乎欒黶不能違而伯石所受禄也有由然矣夫有功而不居喪其功矣而竟也人莫與爭功有能而不有泯其能矣而卒之人莫與爭能則君子之居世不矜也所以自晦也而實光其不伐也所以自降也而實升以屈為伸以晦為明斯天下莫及而為萬夫之望禹之所以厯數在躬而終陟元后也歟不然盛滿之國不可以仕任盛滿之家不可以嫁女驕倨傲暴之人不可與交是天下之所棄也而况於服人乎傳曰吾語子服人之志高尚尊賢不以驕人聰明聖知不以齒人勇猛强武不以侵人齊給便㨗不以欺侮人遇君則修臣下之義出鄉則修長幼之義遇長老則脩子弟之義遇等夷則脩朋友之義遇少而賤者則脩告道寛裕之義故無不愛也無不敬也無與人爭也曠然而兼天地包萬物也如是則老者安之少者懐之朋友信之君子之所務也如此易曰謙亨君子有終初六謙謙君子用渉大川吉何也葉子曰言忠信行篤敬雖蠻貊之邦行矣言不忠信行不篤敬雖州里行乎哉孔子之訓也何也下者萬物之所歸虚者天下之所遺古人有言曰過故鄉而下車悍夫可驅過喬木而趨水火可踰又曰居不為垣牆人莫能毁傷行不從周衛人莫能暴害此君子之行也昔者子路持劒孔子問曰由安用此乎子路曰善者固以善之不善者因以自衛孔子曰君子以忠為質以仁為衛不出環堵之内而聞千里之外不善以忠化冦暴以仁固何為持劒乎故曰杜林行義烈士假其命趙孟懐忠匹夫成其仁易曰謙謙君子用渉大川吉六二鳴謙貞吉何也葉子曰君子中和之徳充積于中而發見于外則聲名之盛洋溢于近而施及于逺傳曰伯姬賢行著於家故致女使卿以特厚其嫁遣之禮賢名聞於逺故諸國爭媵以信其無嫉妬之心一女子之賢尚聞於諸侯况士君子哉故曰宗族稱其孝鄉黨稱其弟交游稱其仁執友稱其信名譽流聞實徳彰著此閔子騫人不間于其父母昆弟之言者也豈特騰聲三輔揚名上國者哉彼色取仁而行違者何與焉易曰鳴謙貞吉九三勞謙君子有終吉何也葉子曰功在王室澤在生民衆人之所叢忌也恃功而矜能挾有勲勞而傲天下舉世之所通患也不袪人情之通患而當衆人所叢忌難乎免於今之世矣書曰地平天成萬世永賴時乃功然而且曰女惟不矜天下莫與女爭能女惟不伐天下莫與女爭功成王封伯禽于魯而周公戒之曰往矣子無以魯國驕士吾文王之子武王之弟成王之叔父也又相天下吾於天下亦不輕矣然一沐三握髮一飯三吐哺猶恐失天下之士可不慎與吾聞之易有一道大足以守天下中足以守其國近足以守其身謙之謂也夫天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙是以衣服成則必缺衽宫成則必缺隅屋成則必加拙示不成者天道然也戒之哉其無以魯國驕士也齊侯使管夷吾平戎於王王以上卿之禮享之管仲辭曰臣賤有司也有天子之二守國高在王曰舅氏予嘉乃勲應乃懿徳往踐乃職無逆朕命管仲受下卿之禮而還君子曰管仲之世祀也宜哉讓不忘其上鞍之戰晉師歸范文子後入武子曰無為吾望爾也乎對曰師有功國人喜以逆之先入必屬耳目焉是代帥受名也故不敢武子曰吾知免矣郤克見公曰子之力也對曰君之訓也二三子之力也臣何力之有焉范叔見勞之如郤伯對曰庚所命也克之制也燮何力之有焉欒伯見公亦如之對曰燮之詔也士用命也書何力之有焉君子曰為主将者不有其功而歸於君為偏禆者不居其功而歸於将庶幾乎濟濟師師之風矣王允與士孫端謀討董卓而允自專討賊之榮士孫端歸功不侯故得免於難唐彬與渾濬伐呉未至建業二百里即稱疾不視事其後果有先至者爭物後至者爭功而彬獨以賢稱辛讜在泗州犯圍出迎兵糧往返凡十二除亳州刺史乃上表言臣之功非杜慆不能成僖宗幸興元道中無供賴漢隂令李康以驢負糧數百獻之從行軍士始得食上問康何能如是曰臣不及此乃張濬教臣遂召濬為兵部侍郎後唐明宗王都之亂晏球承命討之擒楊隱斬秃餒蹙王都舉族自焚自始攻至克定州未嘗戮一卒三月入朝唐主美其功晏球謝久煩餽運而已五代呉史官問中書令柴再用戰功對曰鷹大微效皆社稷之靈再用何功之有竟不報噫禹周公尚矣兹數公者前以免不賞之禍後以光青史之榮萬民之所服而衆美之攸歸也不亦宜乎若温季位在七人之下而求掩其上亡無日矣王渾王濬爭功不已濬稍知所讓而於心終不能平至形諸言曰此是吾褊心亦豈善後之道哉雖然讓功可也女有國色軼南威紫衝而不自美則賢之若嫫母無鹽焉而自狀其醜祗益人之哂且􅀈耳故窶家子膝行蒲伏言語姁姁不見禮於人而都三公位有萬金産者一卑辭降色則衆口徧肥矣是不可不慎也易曰勞謙君子有終吉六四无不利撝謙何也葉子曰居今之世而不以賢知先人者善也然居勲庸功多之右而不以史巫紛若者亦非善之善者也昔齊魯從鄭伐許得許以歸魯魯卑辭而却之鄭卒存許君子以為善處有功者莫如鄭善處無功者莫如魯然則履多懼之地而位有功之上其可茍然而已乎不思降階之由君心或有所不足不盡巫史之誠衆志或有所不堪明於世故而安於法則者不如是也是故笑貌聲音之作恭傴僂曲躬之引敬君子非以逺恥辱也存位安身之道處世下人之節不得不然也不然居功臣之上而敬不足則幾乎王渾之排濬非所以安分敬有功之臣而禮不加尚不如李愬之事度非所以為禮然則君子豈好為過恭之行而無禮病於夏畦以自鄙哉范文子不敢亟歸以慰武子之望令尹子文必推貴仕以靖子玉之難君子知其不得已矣易曰旡不利撝謙六五不富以其鄰利用侵伐无不利何也葉子曰憞羣䇿者自屈其力者也屈羣䇿者屈羣力者也有慈父愛子之心有慈母畜子之道而天下之羣臣不報禮重庶民不子來趨者生民以來未之有也天下之諸侯懐之若父母而庶民趨之若子來而有不先之而忘其勞犯難而忘其死者生民以來亦未之有也昔者舜以温恭允塞之徳升於帝位則九官十二牧奮庸熙載時亮天工而庶績咸熙矣又安事後世督責之術假庸君驅役之煩乎豈惟是也漢高帝豁達大度不恥自降曰運籌幃幄之中决勝千里之外吾不如子房鎮國家撫百姓給餽餉不絶糧道吾不如蕭何連百萬之衆戰必勝攻必取吾不如韓信欿然退然自以為三子之不及也而天下之大智大勇奔走服役惟其所使而莫之格矣何也書曰徳日新萬邦惟懐志自滿九族乃離又曰滿招損謙受益蓋帝徳廣運則民懐有仁聖作物覩羣生利用天下歸之如夜蟲之赴火耳固不必破㟁幘削邊幅附背握手以結豪傑之心亦不必箕踞盛氣以折其驕嘲誚謔浪以盡其歡慷慨歌呼出肺肝相示以明其情亦不必踞洗以挫英布隨以王者之供張嫚罵以辱趙将隨以千戸之侯封顛倒天下之豪傑而使莫測其端倪而天下豪傑将自俛首帖耳降其虚而服其恭矣故貫澤之㑹桓公有憂中國之心不召而至者江人黄人也葵丘之㑹桓公震而矜之叛者九國魏武一得荆州而張松見忽荆州隨非其有唐高季興謂将佐曰新朝百戰方得河南乃對功臣舉手云吾於十指上得天下矜伐如此則他人皆無功矣其誰不解體遂不歸朝此皆所謂勤之於數十年之間而喪之俯仰之頃英雄肯為其所役哉雖然大順在上而獨夫顧為不順之臣有道為君而一人乃為叛道之舉則亦非聖人之所宥也是故苗民逆命弗率於化則命禹徂征布豨外叛直犯天常則自将擊斬蓋所謂親征不庭而非窮兵黷武聖人之不得已焉耳雖然誠不至而詐行道不設而術用雖死不服雖勝不臧矣若韓信不顧酈生而破田廣李靖不恤唐儉而擒頡利皆所謂狙詐徼倖之計而非至誠心服之道也其後河東都将楊弁作亂結劉稹為兄弟石㑹闗守将又以闗降稹朝議諠然言應罷兵王宰則言遊奕将得稹表有意歸附李徳裕借韓信李靖事為説且言可令王宰失信豈得損朝廷威命望遣使督其進兵其後稽山羣盜冦掠果州詔刺史王贄𢎞討之崔鉉曰此皆陛下赤子迫於饑寒盜弄兵於溪谷間不足辱大軍但遣一使者可矣乃遣京兆少尹劉潼招諭之潼言使之歸命其勢甚易所慮者武臣恥不戰之功議事者責欲速之效耳潼至山中盜皆請降潼至館而贄𢎞已引兵至山下竟擊賊滅之矣雖然尤有甚焉劉守光驕淫日甚使人諷鎮定求為尚父晉諸将請尊之以稔其惡及其自稱帝張承業又請遣使賀之以驕其心則是以聲音笑貌之間而為恭敬謙虚之態假欲取固與之術以成自斃可殪之機曽不若晉王存朂直欲伐之之為正矣豈知湯之所以處葛斯其為聖人之謙徳而有孚之威如乎易曰不富以其鄰利用侵伐无不利上六鳴謙可用行師征邑國何也葉子曰屈之極者可以求伸已不屈而欲伸是貪忿也晉景公以笑辱之故而暴行於齊春秋之所誅也所為屈者為伸之感不求伸而徒屈是畏葸也宋高宗以二帝之故而終身不加兵於金志士之所憾也其惟晉文乎退三舍而臣犯則一戰可以取威抑亦秦穆乎施三惠而不報則一舉可以定霸其又晉悼乎息民和衆五年而後用之則三駕而楚不能與之爭我無先事之圖而伸生于屈之極我不為欲伸之屈而屈感乎極之伸噫非知鬼神之情状者曷足以語此雖然齊桓失霸威不行於敵楚而區區山戎之是伐晉文自怠伐弗及於齊楚而規規胡沈之是問抑末矣干戈之所及不以恥天下之横行而以貫包中之跳躍是焉得為道之光乎易曰鳴謙可用行師征邑國豫利建侯行師何也葉子曰濟大事以人為本用兵不以天時地利為急而以人和為先然不難於得人心之和而難於順理以動動不順理則無以通天下之志而協天下之心事不和民則强人以所不能事必不立禁人以所必犯法必不行矣故管子曰棟生橈不勝任則屋覆而人不怨者其理然也弱子慈母之所愛也不以理動者下瓦則慈母笞之故以其理動者雖覆屋不為怨不以其理動者下瓦必笞故曰生棟覆屋怨怒不及弱子下瓦慈母操箠然則動而當天下之理舉而協天下之心可以感天地動鬼神而况人道之大事乎是故列爵分土惟五惟三是為五帝尚賢以徳三王尚親以功樹之君公使司牧之無失民性是所以同民心而出治道也其次不憚征繕以輔孺子出師圍許若将改立新君者其亦因民之所利而利之乎不然則雖以項羽之威而王三降将沛公一出而秦父兄棄之如遺矣又况假之為沙中之偶語成貳師之美封命不正之功而建尾大之勢者天下擾擾何時而定也貔貅百萬虎賁三千是為誅暴而禁亂保大而定功發强剛毅一怒而安天下之民是所以對天下而助上帝也其次次陘之八國城濮之七百乗夫亦勢之所不容已乎不然雖以紂之暴率其旅如林而㑹於牧野罔有敵於我師前徒倒戈矣又况同役而不同心爾西而我馬欲東雜無上之聽而違舉國之諫者生民蠢蠢何由而全也易曰豫利建侯行師初六鳴豫凶何也葉子曰以鳥鳴春以雷鳴夏以蟲鳴秋以風鳴冬天機之不容或已者也以堯舜禹湯文武周公鳴治以孔子曾參子思孟軻鳴道人道之不容或缺者也不然絡緯之不停聲不如蜘蛛之寂寂中流之砥柱其呌號也不如長江渾渾日夜之無聲而况以其卑末之微志鳴一身之佚樂哉昔者齪齪不足嗟今朝曠蕩恩無涯此以詩而鳴其樂者也家本秦人能為秦聲婦趙女也雅善鼓瑟拂衣而起酒後耳熱仰天大笑而呼嗚嗚是誠荒淫無度不知其不可此以書而鳴其樂者也自鳴其不幸猶且不可而胡以佚樂為哉滿其志亦喪其志爽其身亦禍其身此蔚宗石崇潘岳之徒卒之不免主客同誅也歟易曰鳴豫凶六二介于石不終日貞吉何也葉子曰同酣醉鄉者彼昏不知不覺一醉之日富也别坐者觀之則豫知其側弁之俄而已不忍與其亂矣同狎大川者莫知其他不覺載胥之及溺也陵居者視之則早見其過渉之㓕而已不肯履其陷矣此非其知有所弗若也見得而忘其形見利而忘其真自墮於螳螂黄雀之禍雖有明言曲曉彼将以為狂焉而况於早知獨覺乎君子則不然志道徳而功名事業不足以累其心守中正而富貴利達不得以昏其志則天下之滔滔皆是也而吾之砥柱自在曷與之同流天下之比比皆然也而吾之中正自在曷與之同倚夫惟不溺於利此利之所不能昏不逐於物此物之所不能蔽也禍福利害之原成敗得失之故孰謂不在其靜觀中邪故荀子曰權利不能傾也羣衆不能移也天下不能蕩也生乎由是死乎由是夫是之謂徳操徳操然後能定能定然後能應夫是之謂成人天見其明也地見其光也君子貴其全也又曰冥冥而行者見寝石以為伏虎也見植林以為後人也冥冥蔽其明也醉者越百歩之溝以為蹞歩之澮俯而出城門以為小之閨也酒亂其神也掩目而視者視一以為兩掩耳而聽者聽漠漠以為呶呶知夫此則夫湛澹泊之性者機事忘而必不升槃樂之堂躋懐安之域者天光昧而必不萌先事之慮巍巍乎舜禹之有天下而不與焉况出天下之下者哉是以周公之富不能迷其東都之避孔子之功不能遏其膰肉之行易曰介于石不終日貞吉六三盱豫悔遲有悔何也葉子曰語稱巍巍乎舜禹之有天下也而不與焉又曰不義而富且貴於我如浮雲夫聖人何以有是也富貴外物也所樂不存焉天下贅疣也所性不存焉聖人視之渺然而已矣况下此而瑣瑣卑卑者哉况彼之與我不相干者哉故曰君子素其位而行不願乎其外又曰無然畔援無然欣羡良有以也惟其不知天命之性而弗勝效大之私則将無任朶頤之觀而不覺銀海之昡矣是故幸則為髙帝之過秦而喟然不幸則為儋括之見王而浩歎又不幸則為楚之成章華之臺召諸侯落之而晉侯遂成虒祁之宫使諸侯往賀之視人富貴作已歡樂斯豈君子之所為也而又况冀宵燭之末光邀潤屋之㣲澤分雁鶩之稻粱沾玉斚之餘瀝者乎嗚呼斯繩樞之子窮巷之賔外之為夫衆之所姍而内之為良心之所羞者乎雖然羞之而解使去己惡之而推以與人君子所不念也不然長禍之萌而不悟樂禍之成而不去若朱穆不能脱梁冀蔡邕不能辭董卓潘岳不能離賈謐蕭至忠不能去公主卒之主客同誅交相為累矣夫亦何嗟之及哉易曰盱豫悔遲有悔九四由豫大有得勿疑朋盍簮何也葉子曰君子之際大行也其君用之則安富尊榮其民賴之則富夀康寧此得志之秋無不如意之極也雖然功蓋天下者懐不賞之諐勇略震主者畏身危之禍此人之情亦勢之所必至者也能無疑乎是故上焉者功成名遂而身退次焉者避讒畏譏而不前下焉者前無所冀則退為身慮無所不至矣若是而於大臣之道何取焉勿畏其權惟其分之所當為勿慮其迹惟其事之所可為勿顧其事惟其道之所得為天下能無量我乎窮巷之人可以見廟堂之作為幽谷之婦得以明元老之心志心之所白衆之所歸也衆之所歸身之所安也身之所安禍之所免也周公以之其次諸葛孔明范仲淹司馬君實而已矣故曰開誠心布公道廣忠益集衆思曰為之自我當如是至於成敗利鈍非吾所能與曰天若祚宋必無此事嗚呼此非萬世人臣之準與安原白曰發一誠心則李廣之石可使為虎發一疑心則樂令之弓亦能為蛇易曰由豫大有得勿疑朋盍簮六五貞疾恒不死何也葉子曰古語有之實盛者披其枝披其枝者傷其心大都者强其臣强其臣者弱其主蓋言國不可分而權不當貳也晉建曲沃而黜翼哀衛有蒲戚而黜獻公楚有陳蔡不羮而叛棄疾鄭城櫟而寘子元昭公卒不克復國也是故大權在下而威福去已軟懦微弱而號令不行則醫家之所謂走肉耳何以負綱常而載仁義履逺道而勝百用乎是天下之廢人也故曰周自遷洛陽名分盡亡漢自召董卓綱紀盡壊唐自立三帥威福盡移天下分崩無復生氣但其名分位號猶未盡亡人心天意猶未盡絶如人四肢風脾身首拘攣所恃五藏未絶六脈猶存卧死伏枕尚沿數十載而未絶也故曰祭仲逐昭公則立突衛公子洩逐惠公則立黔牟孫林甫逐獻公則立剽而意如逐魯昭八年無君非惟不敢如田和三晉之簒立亦不敢别立君者以魯秉周禮禮義在人心者深是猶懼忠義之討而未敢肆無忌憚也故蘇子由曰以臣僣君不義而得民要亦以其力斃君雖失衆而其實無罪則民将哀之其勢固當然哉是故人心位號所賴甚深人心未去則位號猶有可張位號尚在則人心猶有所統周赧王以微弱之資不及一小國諸侯之勢當七雄角逐之時内則齊楚塞其喉外則燕趙抗其背逺則嬴秦踦其足近則韓魏揕其胸周之不亡特須臾耳然而魯連一説足以奠九鼎而鎮泰山天下卒知水之有源木之有根本不敢以其為弁髦而棄之使不失為數十年之共主位號猶存故也漢獻帝以孱羸之身托寄生之地當天下鼎沸之秋内則曹操以嬰兒玩之於掌股之上外則袁紹以竒貨爭之於鋒鏑之餘逺則孫權昵比窺覷俟時而竊伐近則劉表排闔操縱乗間而輒行漢之不亡僅毛髮耳然而董承一詔孔融一言足以起枯骸而回潰肉天下猶知世之有君漢之有帝不忍以其多重負而釋之使不失為漢家之共主者人心猶未去故也有天下者其慎之哉易曰貞疾恒不死上六冥豫成有渝无咎何也葉子曰甘麴糵者馴至於酩酊故曰彼昏不知耽逸慾者漸至于矇故曰死而不悟佚樂之地豈易反歩之鄉乎是故古之人君朝脩其禁令晝考其國職夕省其典刑夜警百工無使慆淫而後即安禹之克勤于邦荒度土工湯之慄慄危懼檢身若不及文王之自朝至于日中昃不遑暇食用咸和萬民者為是故也夫茍内作色荒外作禽荒甘酒嗜音峻宇雕牆心昏而出惡政言計非是而具曰予聖亡無日矣而何足與言存哉雖然此其下愚者也亦有警而覺亟而反者焉元經有言日月之逝改于尸尚未晚也陳成公既為鷄澤之盟而卒則是固已變乎夏矣吾何求哉而况亟反之者哉昔者宋昭公出亡與其御曰吾知其所以亡矣御者曰何哉昭公曰吾被服而立侍御者數十人無不曰吾君麗者也吾發言動事朝臣者數百人無不曰吾君聖者也吾外内不見吾過夫是以亡也於是改操易行安義行道不出二年而美聞於宋人宋人迎而復之諡為昭漢武帝求神仙興土木黷兵戈玩聲色人間之樂事盡矣一朝而有輸臺之悔田千秋大鴻臚之拜以趙過為搜粟都尉之命復以耄老而遂過焉而漢之天下卒以不喪為中興之英主改過之功誠大矣哉嗚呼曷使商太甲齊威王獨美於前乎易曰冥豫成有渝无咎葉八白易傳卷四
